<style>
:root{
  --bg:#f5f5f0; --fg:#1a1a1a; --card:#ffffff; --accent:#2a5d8f; --accent2:#5a8fb8;

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);

body{min-height:100vh; padding:0 0 80px}
header{position:sticky; top:0; z-index:10; background:var(--accent); color:#fff;

header h1{font-size:18px; margin:0; font-weight:600}
.timer{font-family:"Consolas","Menlo",monospace; font-size:22px; font-weight:bold;

.timer.over{background:var(--bad); animation:pulse 1.2s infinite}
@keyframes pulse{50%{opacity:.7}}
.iconbtn{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;

main{max-width:840px; margin:0 auto; padding:20px 16px}
.card{background:var(--card); border:1px solid var(--border); border-radius:14px;

h2{font-size:24px; margin:0 0 16px; color:var(--accent)}
h3{font-size:20px; margin:0 0 12px}
.label{display:inline-block; font-size:14px; color:var(--muted); margin-right:8px}

.btn{font-size:20px; padding:12px 24px; border:none; border-radius:10px;

.btn:hover{filter:brightness(1.08)}

.btn.sec{background:var(--card); color:var(--fg); border:2px solid var(--border)}

.input-row{display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap}

.reflink{display:inline-block; background:var(--accent2); color:#fff; text-decoration:none;

<script>
// ===== 問題データ（20症例）=====
const CASES = [
{
  id:"PA-01", disease:"原発性アルドステロン症（典型例）",
  tags:["原発性アルドステロン症","二次性高血圧","内分泌性","低K血症"],
  ref:"GL p.200-201 / SU p.331-335",
  presentation:`【症例】48歳女性。会社員。
【主訴】健診で高血圧と低カリウム血症を指摘。
【現病歴】5年前から健診で血圧高値を指摘されARB（オルメサルタン20mg）内服中。今回の健診で血圧 168/102 mmHg、血清K 3.1 mEq/L、血清Na 144 mEq/L を指摘され紹介。
【既往歴】特記なし。妊娠歴2回（妊娠中の血圧は正常）。
【家族歴】父：高血圧。
【現症】身長 158cm、体重 56kg、BMI 22.4、脈拍 78/分整、血圧 162/100 mmHg（両上肢差なし）。心音・呼吸音正常、浮腫なし。
【血液検査】Na 144, K 3.1, Cl 102, Cr 0.72, eGFR 78, HbA1c 5.6%, LDL 118, TG 92。
【尿検査】蛋白(-)、潜血(-)、尿中K 38 mEq/日（高値）。
【心電図】洞調律、左室肥大の所見あり（SV1+RV5 = 38mm）。
【腹部単純CT】両側副腎は明らかな腫大なし。`,
  questions:[
    {
      q:"この症例で最も疑う疾患は何ですか。また、確定診断に向けて次に行うべきスクリーニング検査と、その実施前に注意すべき点を述べてください。",
      model_answer:`【最も疑う疾患】原発性アルドステロン症（PA）。
理由：①治療抵抗性高血圧（ARB内服下で162/100）、②低K血症（K 3.1）と尿中K排泄高値（K喪失性）、③左室肥大あり（標的臓器障害）、④若年〜中年女性の二次性高血圧プロファイル。

【スクリーニング検査】血漿アルドステロン濃度（PAC）と血漿レニン活性（PRA）あるいは活性型レニン濃度（ARC）を測定し、アルドステロン・レニン比（ARR）を算出する。
・ARR ≥ 200（PAC pg/mL ÷ PRA ng/mL/hr）かつ PAC ≥ 120 pg/mL でスクリーニング陽性。

【採血前の注意点】
①K補正：低K血症はアルドステロン分泌を抑制し偽陰性となるため、KCl製剤で K ≥ 3.5 mEq/L に補正してから測定する。
②薬剤の影響：
 - MR拮抗薬（スピロノラクトン・エプレレノン・エサキセレノン）：少なくとも4-6週間休薬。
 - β遮断薬：PRA↓→ARR偽陽性。
 - ACE阻害薬・ARB・利尿薬：PRA↑→ARR偽陰性のリスク。
 → 可能ならCa拮抗薬・α遮断薬に置換して2週間以上経過後に測定。
③体位・時間：座位30分後の午前中採血。
④食塩摂取は通常通り（極端な減塩・高食塩を避ける）。`,
      keywords:["原発性アルドステロン症","ARR","PAC","PRA","200","低K","補正","MR拮抗薬","休薬","Ca拮抗薬"],
      ref:"GL p.200-201 / SU p.331-333"
    },
    {
      q:"K補正と降圧薬置換後に再検したところ、PAC 285 pg/mL、PRA 0.3 ng/mL/hr、ARR 950 でした。次に行う確認（機能確認）検査を1つ挙げ、判定基準と実施上の注意を述べてください。",
      model_answer:`【ARR陽性の評価】PAC 285 ≥ 120、ARR 950 ≥ 200 でスクリーニング陽性。次に機能確認検査でPA確定診断を行う。

【選択肢（少なくとも1つ陽性で確定）】
①カプトプリル負荷試験：カプトプリル50mg内服、60-90分後採血。ARR ≥ 200 持続でPA確定。
②生理食塩水負荷試験（SIT）：生理食塩水2L/4時間点滴静注後、PAC ≥ 60 pg/mL（または ≥ 6 ng/dL換算）でPA確定。
③フロセミド立位試験：40mg静注後2時間立位でPRA ≥ 2.0 ng/mL/hr に上昇しない場合PA。
④経口食塩負荷試験：高食塩食3日間後、24時間蓄尿アルドステロン > 12 μg/日でPA。

【選択の指針】カプトプリル試験が外来で簡便かつ安全。SITは循環血液量増加に注意（心不全・高度高血圧・低K血症未補正例では禁忌または慎重）。

【実施上の注意】
・低K血症は事前補正必須（KCl経口）。
・心不全・脳血管疾患・高度高血圧（収縮期 ≥ 180）ではSIT回避。
・薬剤の影響を最小化（Ca拮抗薬・α遮断薬に置換）。
・本症例は左室肥大あり高血圧コントロール不良のため、まずCa拮抗薬で降圧してからカプトプリル試験を選択するのが安全。`,
      keywords:["カプトプリル","生理食塩水負荷","SIT","60","フロセミド","負荷","確認","低K"],
      ref:"GL p.201 / SU p.333"
    },
    {
      q:"カプトプリル試験陽性で原発性アルドステロン症と診断しました。次に局在診断を行うことになりました。検査の選択と手順、結果が片側性だった場合の治療方針について述べてください。",
      model_answer:`【画像検査】副腎dynamic CT（造影）を第一選択。両側副腎を薄スライス（2-3mm）で評価し、腺腫（多くは≤2cm、低濃度、造影で軽度enhance、washout中等度）、過形成、稀に副腎癌（大型・不均一・高HU）を鑑別。

【局在診断のゴールドスタンダード：副腎静脈サンプリング（AVS）】
・適応：手術希望かつ手術可能で、PAと診断された全例（CT所見と機能局在は一致しないことが多いため）。
・手順：左右副腎静脈と下大静脈（IVC）から採血、ACTH負荷（コシントロピン）下で実施することが推奨。
・判定：
 ①Selectivity index (SI) ＝副腎静脈コルチゾール/IVCコルチゾール ≥ 5（ACTH負荷下）でカテ成功。
 ②Lateralization index (LI) ＝（高位側A/C）/（低位側A/C）≥ 4 で片側性と判定（A=アルドステロン、C=コルチゾール）。
 ③対側抑制：低位側A/C ＜ IVCのA/C で抑制ありとさらに信頼性向上。

【片側性の場合の治療】腹腔鏡下副腎摘出術が第一選択。薬物療法より脳心血管イベント抑制効果が優位（PRIMARY試験等）。
【術前準備】K補正、降圧（MR拮抗薬を術前6-8週導入し血圧・K正常化）、術後はステロイド補充は通常不要だが血圧・K・腎機能のフォロー必須。`,
      keywords:["副腎静脈サンプリング","AVS","Lateralization","LI","4","ACTH","副腎摘出","腹腔鏡"],
      ref:"GL p.201 / SU p.334"
    },
    {
      q:"腹腔鏡下左副腎摘出術が施行され組織はアルドステロン産生腺腫でした。術後フォローアップで注意すべき点と、長期予後について説明してください。",
      model_answer:`【術後早期管理（術後1-4週）】
①血圧：50-70%で正常化（治癒）、残りは改善のみ。降圧薬は減量から開始（特にMR拮抗薬・K製剤は速やかに中止）。
②電解質：K上昇に注意（残存副腎の一過性低アルドステロン症で高K血症をきたしうる）。NaCl補充とフロセミド少量で対応することもある。
③血糖：耐糖能異常合併例では再評価。

【長期フォロー】
・血圧、PAC・PRA・ARR、血清K、Cr、心電図/心エコー（左室肥大の退縮評価）を6ヶ月後、以後年1回。
・治癒予測スコア（Aldosteronoma Resolution Score：女性・若年・短期高血圧・降圧薬2剤以下で治癒率高）を活用。
・本症例（48歳女性、高血圧歴5年、ARB単剤）は治癒の可能性が高い。

【予後・合併症】
・術後の脳心血管イベント率は薬物療法群より有意に低下。
・標的臓器障害（LVH、蛋白尿、心房細動、骨粗鬆症）の改善が期待できる。
・両側副腎過形成例は手術ではなくMR拮抗薬（スピロノラクトン・エプレレノン・エサキセレノン）で生涯管理。エサキセレノンは性ホルモン関連副作用が少ない。
・遺伝性PA（FH-I/II/III/IV）はまれだが家族発症や20歳未満発症では考慮。`,
      keywords:["高K血症","MR拮抗薬","中止","治癒","左室肥大","退縮","エサキセレノン","脳心血管"],
      ref:"GL p.201 / SU p.334-335"
    }
  ]
},
{
  id:"PA-02", disease:"原発性アルドステロン症（正K型・治療抵抗性）",
  tags:["原発性アルドステロン症","二次性高血圧","内分泌性","治療抵抗性"],
  ref:"GL p.200-201 / SU p.331-335",
  presentation:`【症例】55歳男性。営業職。
【主訴】3剤併用しても血圧が下がらない。
【現病歴】40代から高血圧。現在ARB（テルミサルタン80mg）＋Ca拮抗薬（アムロジピン10mg）＋サイアザイド（トリクロルメチアジド2mg）の3剤併用下で家庭血圧 156/96 mmHg。
【既往歴】脂質異常症、軽度肥満。
【現症】身長 172cm、体重 78kg、BMI 26.4、脈拍 72/分、血圧 152/94 mmHg。
【血液検査】Na 142, K 3.8（正常下限）, Cl 103, Cr 0.95, eGFR 65, HbA1c 5.9%。
【尿検査】蛋白(±)、微量アルブミン尿 65 mg/gCr。
【心電図】左室肥大あり。`,
  questions:[
    {
      q:"血清Kが正常下限（3.8）ですが、それでもPAを疑う根拠と、本症例で実施すべきスクリーニング手順を述べてください。",
      model_answer:`【PAを疑う根拠】
①治療抵抗性高血圧（適切用量の3剤併用、うち1剤は利尿薬でもコントロール不良）。
②微量アルブミン尿・左室肥大（標的臓器障害が高血圧の罹病期間や程度に比して進行）。
③正K型PAが多数（PA全体の50-70%は血清K正常）。低K血症は古典像であり感度は低い。
④40代発症で持続するコントロール不良。
→ 治療抵抗性高血圧では全例PAスクリーニング推奨。

【スクリーニング手順】
①薬剤調整：MR拮抗薬・β遮断薬は休薬または置換（4-6週）。利尿薬は可能なら中止し、Ca拮抗薬（アムロジピン）とα遮断薬（ドキサゾシン）を主体に降圧。ARB継続でも測定は可能だが解釈に注意（PRA上昇傾向）。
②座位30分後の朝採血でPAC・PRA測定、ARR算出。
③ARR ≥ 200 かつ PAC ≥ 120 pg/mL でスクリーニング陽性、機能確認検査へ。
④血圧コントロール不良が懸念されるため、ARBは可能な限り継続しつつCa拮抗薬・α遮断薬を強化。

【補助所見】尿中K排泄（K正常でも尿中K相対的高値があれば疑い）、HCO3-、HbA1cも参考に。`,
      keywords:["治療抵抗性","正K","スクリーニング全例","ARR","薬剤調整","Ca拮抗薬","α遮断薬"],
      ref:"GL p.200 / SU p.331-332"

}

};
function refLinks(refStr){
  if(!refStr) return '';
  const out=[];
  if(/GL\s*p/i.test(refStr)) out.push(`<a class="reflink" href="${BOOK_URLS.GL}" target="_blank" rel="noopener">📖 ガイドライン2025を開く</a>`);
  if(/SU\s*p/i.test(refStr)) out.push(`<a class="reflink" href="${BOOK_URLS.SU}" target="_blank" rel="noopener">📖 ステップアップを開く</a>`);
  return out.join(' ');
}

function render(){
  if(state.screen==='home') renderHome();
  else if(state.screen==='presentation') renderPresentation();
  else if(state.screen==='question') renderQuestion();
  else if(state.screen==='result') renderResult();
  else if(state.screen==='review') renderReview();
  else if(state.screen==='casepick') renderCasePick();
  window.scrollTo(0,0);
}

function renderHome(){
  resetTimer();
  const total=store.results.length;
  const correct=store.results.filter(r=>r.score==='o').length;
  const rate=total? Math.round(correct/total*100):0;
  const weakTop = Object.entries(store.weakTags).sort((a,b)=>b[1]-a[1]).slice(0,5);
  app.innerHTML = `
    <div class="card">
      <h2>口頭試問トレーナー</h2>
      <p style="margin:0 0 12px">高血圧専門医試験 二次性高血圧 ${CASES.length}症例（各4設問・10分目安）</p>
      <div class="stats">
        <div class="stat"><div class="v">${total}</div><div class="l">総回答数</div></div>
        <div class="stat"><div class="v">${rate}%</div><div class="l">正答率(◯)</div></div>
        <div class="stat"><div class="v">${Object.keys(store.completedCases).length}</div><div class="l">完了症例</div></div>
      </div>
      <div class="start-options">
        <button class="btn big" onclick="startMode('random')">ランダム出題</button>
        <button class="btn big sec" onclick="startMode('weak')">弱点優先（誤答した疾患）</button>
        <button class="btn big sec" onclick="state.screen='casepick'; render()">症例を選んで出題</button>
        <button class="btn big sec" onclick="state.screen='review'; render()">復習・誤答記録を見る</button>
      </div>
    </div>
    ${weakTop.length? `
    <div class="card">
      <h3>弱点タグ（誤答回数の多い順）</h3>
      <div class="weak-list">
        ${weakTop.map(([t,c])=>`<div class="weak-row"><span>${t}</span><span><b>${c}</b>回</span></div>`).join('')}
      </div>
    </div>`:''}
    <div class="card">
      <h3>使い方</h3>
      <p style="font-size:17px; line-height:1.8">
      ・症例提示→Q1→Q2→Q3→Q4 と1問ずつ進みます<br>
      ・音声入力ボタン（マイク🎤）で口頭練習。文字起こしのみで自動採点はしません<br>
      ・採点ボタン（◯△×）は自己採点。誤答は疾患タグごとに記録され「弱点優先」で再出題されます<br>
      ・PCを切ってもブラウザのローカルストレージに保存。スマホでホーム画面に追加すれば機内モードでも開けます
      </p>
    </div>`;
}

function renderCasePick(){
  app.innerHTML = `
    <div class="card">
      <h2>症例を選択</h2>
      <button class="btn sec" onclick="state.screen='home'; render()">← 戻る</button>
      <div class="case-pick" style="margin-top:14px">
        ${CASES.map(c=>{
          const done = store.completedCases[c.id];
          const last = done? `最終: ${done.date.slice(5,10)} (${done.summary})` : '未挑戦';
          return `<button class="case-card" onclick="startCase('${c.id}')">
            <div class="cid">${c.id}</div>
            <div class="cdis">${c.disease}</div>
            <div class="cstat">${last}</div>
          </button>`;
        }).join('')}
      </div>
    </div>`;
}

function pickCase(mode){
  if(mode==='random'){
    return CASES[Math.floor(Math.random()*CASES.length)];
  }
  if(mode==='weak'){
    const wt = Object.entries(store.weakTags).sort((a,b)=>b[1]-a[1]);
    for(const [tag] of wt){
      const candidates = CASES.filter(c=>c.tags.includes(tag));
      if(candidates.length){
        return candidates[Math.floor(Math.random()*candidates.length)];
      }
    }
    return CASES[Math.floor(Math.random()*CASES.length)];
  }
}

function startMode(mode){
  const c = pickCase(mode);
  if(!c){ alert('問題が見つかりません'); return; }
  startCase(c.id);
}
function startCase(id){
  state.caseId = id; state.qIdx=0; state.answers=[]; state.scores=[];
  state.sessionId = 's' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  state.screen='presentation';
  render();
}

function getCase(){ return CASES.find(c=>c.id===state.caseId); }

function renderPresentation(){
  const c=getCase();
  app.innerHTML = `
    <div class="card">
      <div><span class="tag">${c.id}</span><span class="tag">${c.disease}</span></div>
      <h2 style="margin-top:12px">症例提示</h2>
      <div class="presentation">${escapeHtml(c.presentation)}</div>
      <div class="ref">参考: ${c.ref||''}</div>
      <button class="btn big" onclick="startQuestions()">Q1へ進む（タイマー開始）</button>
      <button class="btn sec" onclick="state.screen='home'; render()">中止して戻る</button>
    </div>`;
}

function startQuestions(){
  state.qIdx=0; state.answers=[]; state.scores=[];
  state.screen='question'; state.qStart=Date.now();
  startTimer();
  render();
}

let rec=null, recActive=false;
function renderQuestion(){
  const c=getCase();
  const q=c.questions[state.qIdx];
  const isLast = state.qIdx === c.questions.length-1;
  const nextLabel = isLast ? '解答を見る（4問完了）' : `Q${state.qIdx+2}へ進む`;
  const prevAns = state.answers[state.qIdx] || '';
  app.innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div><span class="tag">${c.id}</span> <span class="label">Q${state.qIdx+1} / ${c.questions.length}</span></div>
        <button class="btn sec" onclick="if(confirm('中止して戻りますか？')){resetTimer(); state.screen='home'; render();}">中止</button>
      </div>
      <div class="progress"><div class="progress-bar" style="width:${(state.qIdx+1)/c.questions.length*100}%"></div></div>
      <h3>設問 ${state.qIdx+1}</h3>
      <div class="qtext">${escapeHtml(q.q)}</div>
      <textarea id="ans" placeholder="ここに答えを入力するか、🎤マイクボタンで音声入力（口頭練習用）">${escapeHtml(prevAns)}</textarea>
      <div class="input-row">
        <button class="mic" id="micBtn" onclick="toggleMic()">🎤 音声入力</button>
        <button class="btn" onclick="submitAnswer()">${nextLabel}</button>
        <button class="btn sec" onclick="document.getElementById('ans').value=''">クリア</button>
      </div>
      <div id="micStatus" style="font-size:14px; color:var(--muted); margin-top:6px">※ 答えと模範解答は4問すべて終わってからまとめて表示されます</div>
    </div>`;
  recActive=false;
}

function toggleMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('micStatus').textContent='このブラウザは音声認識に未対応です（Chrome/Edge推奨。文字入力をご利用ください）';
    return;
  }
  if(recActive && rec){ rec.stop(); return; }
  rec = new SR();
  rec.lang='ja-JP'; rec.continuous=true; rec.interimResults=true;
  const ta=document.getElementById('ans');
  const baseLen=ta.value.length;
  let finalText = ta.value;
  rec.onresult=(ev)=>{
    let interim='';
    for(let i=ev.resultIndex; i<ev.results.length; i++){
      const t = ev.results[i][0].transcript;
      if(ev.results[i].isFinal) finalText += t;
      else interim += t;
    }
    ta.value = finalText + interim;
  };
  rec.onerror=(e)=>{ document.getElementById('micStatus').textContent='音声入力エラー: '+e.error; };
  rec.onend=()=>{ recActive=false;
    document.getElementById('micBtn').classList.remove('rec');
    document.getElementById('micBtn').textContent='🎤 音声入力';
    document.getElementById('micStatus').textContent='停止しました';
  };
  rec.start(); recActive=true;
  document.getElementById('micBtn').classList.add('rec');
  document.getElementById('micBtn').textContent='■ 停止';
  document.getElementById('micStatus').textContent='録音中...（もう一度押すと停止）';
}

function submitAnswer(){
  const ans=document.getElementById('ans').value.trim();
  state.answers[state.qIdx] = ans;
  if(recActive && rec){ try{rec.stop()}catch(e){} }
  const c=getCase();
  if(state.qIdx >= c.questions.length-1){
    // 最後の設問 → 結果画面（採点はまだ）
    stopTimer();
    state.scores = c.questions.map(()=>null);
    state.screen='result';
  } else {
    state.qIdx++;
  }
  render();
}

function gradeAt(i, s){
  const c=getCase();
  const q=c.questions[i];
  const prev = state.scores[i];
  state.scores[i]=s;

  // 重複記録防止: 同じ設問は1セッション中1回のみ results に保存（上書き）
  store.results = store.results.filter(r=>!(r._sessionId===state.sessionId && r.caseId===c.id && r.qIdx===i));
  store.results.push({
    _sessionId: state.sessionId,
    date:new Date().toISOString(), caseId:c.id, qIdx:i,
    score:s, disease:c.disease, tags:c.tags, q:q.q, answer:state.answers[i]
  });

  // 弱点タグ調整（前回スコアを巻き戻し、新スコアを反映）
  if(prev && prev!=='o' && s==='o'){
    for(const t of c.tags){ if(store.weakTags[t]){ store.weakTags[t]=Math.max(0,store.weakTags[t]-1); } }
  } else if((!prev || prev==='o') && s!=='o'){
    for(const t of c.tags){ store.weakTags[t]=(store.weakTags[t]||0)+1; }
  }
  saveStore();
  render();
}

function renderResult(){
  const c=getCase();
  const sec=elapsedSec();
  const mm=String(Math.floor(sec/60)).padStart(2,'0');
  const ss=String(sec%60).padStart(2,'0');
  const o=state.scores.filter(s=>s==='o').length;
  const t=state.scores.filter(s=>s==='t').length;
  const x=state.scores.filter(s=>s==='x').length;
  const scoredCount = state.scores.filter(s=>s!==null).length;
  const allScored = scoredCount === c.questions.length;
  const score = scoredCount? Math.round((o + t*0.5)/scoredCount*100):0;
  const overTime = sec>600;

  if(allScored){
    store.completedCases[c.id] = {
      date:new Date().toISOString(),
      summary:`◯${o} △${t} ×${x}`, score, sec
    };
    saveStore();
  }

  const qBlocks = c.questions.map((q,i)=>{
    const ans = state.answers[i] || '(未入力)';
    const s = state.scores[i];
    const cls = s==='o'?'scored-o':s==='t'?'scored-t':s==='x'?'scored-x':'';
    const kwList = (q.keywords||[]).map(k=>{
      const hit = (state.answers[i]||'').indexOf(k)>=0;
      return `<span class="kw ${hit?'hit':''}">${escapeHtml(k)}</span>`;
    }).join('');
    const refStr = q.ref || c.ref || '';
    return `<div class="q-block ${cls}" id="qb-${i}">
      <h4>設問 ${i+1}</h4>
      <div class="qtext" style="font-size:20px">${escapeHtml(q.q)}</div>
      <div style="margin-top:14px"><b>あなたの解答</b></div>
      <div class="user-answer">${escapeHtml(ans)}</div>
      <div style="margin-top:14px"><b>模範解答</b></div>
      <div class="model-answer">${escapeHtml(q.model_answer)}</div>
      <div class="keywords"><span class="label">キーワード一致</span>${kwList}</div>
      <div class="ref-box">
        <div class="ref-title">📚 参考書の該当箇所</div>
        <div class="ref">${escapeHtml(refStr)}</div>
        <div style="margin-top:8px">${refLinks(refStr)}</div>
      </div>
      <div style="margin-top:14px"><b>自己採点</b> ${s?`<span class="s ${s==='o'?'o':s==='t'?'t':'x'}" style="margin-left:8px">${s==='o'?'◯':s==='t'?'△':'×'}</span>`:''}</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px">
        <button class="btn score-o" onclick="gradeAt(${i},'o')">◯ 正解</button>
        <button class="btn score-t" onclick="gradeAt(${i},'t')">△ 一部</button>
        <button class="btn score-x" onclick="gradeAt(${i},'x')">× 不正解</button>
      </div>
    </div>`;
  }).join('');

  app.innerHTML=`
    <div class="card">
      <h2>解答・参考書 — ${escapeHtml(c.disease)}</h2>
      <div><span class="tag">${c.id}</span><span class="tag">${c.disease}</span></div>
      <div class="stats">
        <div class="stat"><div class="v">${allScored?score:'-'}</div><div class="l">スコア</div></div>
        <div class="stat"><div class="v">${mm}:${ss}</div><div class="l">所要時間 ${overTime?'(超過)':''}</div></div>
        <div class="stat"><div class="v" style="color:var(--good)">${o}</div><div class="l">◯ 正解</div></div>
        <div class="stat"><div class="v" style="color:var(--warn)">${t}</div><div class="l">△ 一部</div></div>
        <div class="stat"><div class="v" style="color:var(--bad)">${x}</div><div class="l">× 不正解</div></div>
      </div>
      ${overTime?'<div class="warn-box">⚠ 10分を超えました。本番ペース配分の練習を続けましょう。</div>':''}
      <div class="ref-box">
        <div class="ref-title">📚 症例全体の参考書（クリックで該当書籍のビューワーを開く）</div>
        <div class="ref">${escapeHtml(c.ref||'')}</div>
        <div style="margin-top:8px">${refLinks(c.ref||'')}</div>
      </div>
      ${!allScored? '<div class="warn-box">各設問の◯△×を採点してください（未採点の設問が残っています）</div>':''}
    </div>
    ${qBlocks}
    <div class="card">
      <h3>次のアクション</h3>
      <button class="btn" onclick="startMode('random')">次の症例（ランダム）</button>
      <button class="btn sec" onclick="startMode('weak')">弱点優先で次へ</button>
      <button class="btn sec" onclick="state.screen='casepick'; render()">症例を選ぶ</button>
      <button class="btn sec" onclick="state.screen='home'; render()">ホームへ</button>
    </div>`;
}

function renderReview(){
  const recent = store.results.slice(-30).reverse();
  const wrong = store.results.filter(r=>r.score!=='o').slice(-30).reverse();
  app.innerHTML=`
    <div class="card">
      <h2>復習・記録</h2>
      <button class="btn sec" onclick="state.screen='home'; render()">← 戻る</button>
      <button class="btn sec" onclick="if(confirm('全記録を消去します。よろしいですか？')){store=defaultStore(); saveStore(); render();}">記録リセット</button>
      <h3 style="margin-top:18px">最近の誤答（◯以外）</h3>
      ${wrong.length===0? '<p style="color:var(--muted)">誤答記録はありません</p>':
        wrong.map(r=>{
          const cls = r.score==='t'?'t':'x';
          const lbl = r.score==='t'?'△':'×';
          return `<div class="review-item">
            <span class="s ${cls}">${lbl}</span>
            <span class="q">${escapeHtml(r.caseId)} / ${escapeHtml(r.disease)}</span>
            <div class="a" style="margin-top:6px">${escapeHtml(r.q)}</div>
            <div class="a" style="margin-top:4px; color:var(--muted)">あなた: ${escapeHtml((r.answer||'(未入力)').slice(0,120))}</div>
            <button class="btn sec" style="margin-top:8px; font-size:16px; padding:6px 14px" onclick="startCase('${r.caseId}')">この症例を再挑戦</button>
          </div>`;
        }).join('')}
      <h3 style="margin-top:18px">直近の全回答（30件）</h3>
      ${recent.length===0? '<p style="color:var(--muted)">記録はありません</p>':
        recent.map(r=>{
          const cls = r.score==='o'?'o':r.score==='t'?'t':'x';
          const lbl = r.score==='o'?'◯':r.score==='t'?'△':'×';
          return `<div class="review-item">
            <span class="s ${cls}">${lbl}</span>
            <span class="q">${escapeHtml(r.caseId)} Q${r.qIdx+1} - ${escapeHtml(r.disease)}</span>
            <div class="a" style="font-size:14px; color:var(--muted)">${new Date(r.date).toLocaleString('ja-JP')}</div>
          </div>`;
        }).join('')}
    </div>`;
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// 初期描画
render();
</script>
</body>
</html>
