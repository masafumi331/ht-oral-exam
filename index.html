<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高血圧専門医対策</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"高血圧専門医対策","short_name":"高血圧対策","start_url":".","display":"standalone","background_color":"%23f5f5f0","theme_color":"%232a5d8f"}'>
<meta name="theme-color" content="#2a5d8f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="高血圧対策">
<style>
:root{
  --bg:#f5f5f0; --fg:#1a1a1a; --card:#ffffff; --accent:#2a5d8f; --accent2:#5a8fb8;
  --good:#2e7d32; --warn:#f57c00; --bad:#c62828; --muted:#666; --border:#d0d0d0;
}
body.dark{
  --bg:#1a1d22; --fg:#e8e8e8; --card:#262a30; --accent:#7eb8e0; --accent2:#5a8fb8;
  --good:#66bb6a; --warn:#ffa726; --bad:#ef5350; --muted:#999; --border:#3a3f47;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
  font-size:20px; line-height:1.7; -webkit-text-size-adjust:100%}
body{min-height:100vh; padding:0 0 80px}
header{position:sticky; top:0; z-index:10; background:var(--accent); color:#fff;
  padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 2px 6px rgba(0,0,0,.15)}
header h1{font-size:18px; margin:0; font-weight:600}
.timer{font-family:"Consolas","Menlo",monospace; font-size:22px; font-weight:bold;
  padding:4px 12px; background:rgba(255,255,255,.18); border-radius:8px}
.timer.over{background:var(--bad); animation:pulse 1.2s infinite}
@keyframes pulse{50%{opacity:.7}}
.iconbtn{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;
  padding:6px 10px; border-radius:6px; font-size:14px; cursor:pointer}
main{max-width:840px; margin:0 auto; padding:20px 16px}
.card{background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:24px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.06)}
h2{font-size:24px; margin:0 0 16px; color:var(--accent)}
h3{font-size:20px; margin:0 0 12px}
.label{display:inline-block; font-size:14px; color:var(--muted); margin-right:8px}
.tag{display:inline-block; background:var(--accent2); color:#fff; padding:2px 10px;
  border-radius:12px; font-size:13px; margin-right:6px}
.btn{font-size:20px; padding:12px 24px; border:none; border-radius:10px;
  background:var(--accent); color:#fff; cursor:pointer; font-weight:600;
  margin:6px 4px; min-height:48px}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.5; cursor:not-allowed}
.btn.sec{background:var(--card); color:var(--fg); border:2px solid var(--border)}
.btn.big{font-size:24px; padding:16px 32px; width:100%; max-width:420px; display:block; margin:10px auto}
.btn.score-o{background:var(--good)}
.btn.score-t{background:var(--warn)}
.btn.score-x{background:var(--bad)}
.presentation{font-size:22px; line-height:1.85; white-space:pre-wrap;
  background:var(--bg); padding:18px; border-radius:10px; border-left:4px solid var(--accent)}
.qtext{font-size:23px; font-weight:600; line-height:1.7; margin-bottom:14px;
  padding:14px; background:var(--bg); border-radius:10px}
textarea{width:100%; min-height:160px; font-size:20px; padding:14px;
  border:2px solid var(--border); border-radius:10px; background:var(--card); color:var(--fg);
  font-family:inherit; line-height:1.7; resize:vertical}
textarea:focus{outline:none; border-color:var(--accent)}
.input-row{display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap}
.mic{font-size:18px; padding:12px 20px; background:var(--accent2); color:#fff;
  border:none; border-radius:10px; cursor:pointer; min-width:140px}
.mic.rec{background:var(--bad); animation:pulse 1s infinite}
.model-answer{background:#eef6ff; padding:18px; border-radius:10px; margin-top:14px;
  border-left:4px solid var(--good); font-size:20px; line-height:1.85; white-space:pre-wrap}
body.dark .model-answer{background:#1f2a35}
.user-answer{background:var(--bg); padding:14px; border-radius:10px; margin:10px 0;
  border-left:3px solid var(--muted); white-space:pre-wrap}
.keywords{font-size:16px; color:var(--muted); margin-top:10px}
.kw{display:inline-block; background:rgba(126,184,224,.18); padding:3px 10px;
  border-radius:6px; margin:3px 4px 0 0; font-size:15px}
.kw.hit{background:rgba(46,125,50,.25); color:var(--good); font-weight:600}
.progress{height:8px; background:var(--border); border-radius:4px; margin:12px 0; overflow:hidden}
.progress-bar{height:100%; background:var(--accent); transition:width .3s}
.start-options{display:grid; gap:14px}
.case-pick{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px}
.case-card{background:var(--card); border:2px solid var(--border); border-radius:10px;
  padding:14px; cursor:pointer; text-align:left; font-size:17px}
.case-card:hover{border-color:var(--accent)}
.case-card .cid{font-size:14px; color:var(--muted); margin-bottom:4px}
.case-card .cdis{font-weight:600; font-size:16px}
.case-card .cstat{font-size:13px; color:var(--muted); margin-top:6px}
.stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin:14px 0}
.stat{background:var(--bg); padding:14px; border-radius:10px; text-align:center}
.stat .v{font-size:30px; font-weight:bold; color:var(--accent)}
.stat .l{font-size:14px; color:var(--muted)}
.weak-list{margin:10px 0}
.weak-row{display:flex; justify-content:space-between; padding:8px 12px;
  background:var(--bg); border-radius:6px; margin-bottom:6px; font-size:17px}
.ref{font-size:15px; color:var(--muted); margin-top:8px; font-style:italic}
.reflink{display:inline-block; background:var(--accent2); color:#fff; text-decoration:none;
  padding:6px 12px; border-radius:6px; font-size:15px; margin:4px 6px 4px 0; font-style:normal}
.reflink:hover{filter:brightness(1.1)}
.ref-box{background:var(--bg); padding:14px; border-radius:10px; margin:10px 0;
  border-left:4px solid var(--accent2)}
.ref-box .ref-title{font-weight:600; margin-bottom:6px; font-size:17px}
.q-block{background:var(--card); border:2px solid var(--border); border-radius:12px;
  padding:18px; margin:14px 0}
.q-block.scored-o{border-color:var(--good)}
.q-block.scored-t{border-color:var(--warn)}
.q-block.scored-x{border-color:var(--bad)}
.q-block h4{font-size:21px; margin:0 0 10px; color:var(--accent)}
.review-item{background:var(--bg); padding:14px; border-radius:10px; margin-bottom:10px}
.review-item .q{font-weight:600; margin-bottom:6px}
.review-item .a{font-size:17px; color:var(--muted)}
.review-item .s{font-size:14px; padding:2px 8px; border-radius:4px; color:#fff; display:inline-block; margin-right:6px}
.s.o{background:var(--good)} .s.t{background:var(--warn)} .s.x{background:var(--bad)}
.hide{display:none !important}
.warn-box{background:#fff3cd; color:#664d03; padding:12px; border-radius:8px;
  border-left:4px solid var(--warn); margin:10px 0; font-size:16px}
body.dark .warn-box{background:#332a18; color:#ffd54f}
@media(max-width:600px){
  body{font-size:18px}
  .card{padding:16px}
  h2{font-size:21px}
  .presentation{font-size:20px}
  .qtext{font-size:21px}
  .btn{font-size:18px; padding:10px 18px}
  .btn.big{font-size:21px}
  textarea{font-size:18px}
}
:root{
  --bg:#f5f5f0; --fg:#1a1a1a; --card:#ffffff; --accent:#2a5d8f; --accent2:#5a8fb8;
  --good:#2e7d32; --warn:#f57c00; --bad:#c62828; --muted:#666; --border:#d0d0d0;
}
body.dark{
  --bg:#1a1d22; --fg:#e8e8e8; --card:#262a30; --accent:#7eb8e0; --accent2:#5a8fb8;
  --good:#66bb6a; --warn:#ffa726; --bad:#ef5350; --muted:#999; --border:#3a3f47;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
  font-size:20px; line-height:1.7; -webkit-text-size-adjust:100%}
body{min-height:100vh; padding:0 0 80px}
header{position:sticky; top:0; z-index:10; background:var(--accent); color:#fff;
  padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 2px 6px rgba(0,0,0,.15)}
header h1{font-size:18px; margin:0; font-weight:600}
header .ctrl{display:flex; gap:6px}
.iconbtn{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;
  padding:6px 10px; border-radius:6px; font-size:14px; cursor:pointer}
main{max-width:840px; margin:0 auto; padding:20px 16px}
.card{background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:24px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.06)}
h2{font-size:24px; margin:0 0 16px; color:var(--accent)}
h3{font-size:20px; margin:0 0 12px}
.label{display:inline-block; font-size:14px; color:var(--muted); margin-right:8px}
.tag{display:inline-block; background:var(--accent2); color:#fff; padding:2px 10px;
  border-radius:12px; font-size:13px; margin-right:6px}
.tag.part{background:var(--muted)}
.tag.clin{background:var(--good)}
.btn{font-size:20px; padding:12px 24px; border:none; border-radius:10px;
  background:var(--accent); color:#fff; cursor:pointer; font-weight:600;
  margin:6px 4px; min-height:48px}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.5; cursor:not-allowed}
.btn.sec{background:var(--card); color:var(--fg); border:2px solid var(--border)}
.btn.big{font-size:22px; padding:16px 28px; width:100%; max-width:420px; display:block; margin:10px auto}
.btn.warn{background:var(--bad)}
.qtext{font-size:22px; font-weight:600; line-height:1.7; margin:14px 0;
  padding:16px; background:var(--bg); border-radius:10px; white-space:pre-wrap}
.choices{display:flex; flex-direction:column; gap:10px; margin:14px 0}
.choice{background:var(--card); border:2px solid var(--border); border-radius:12px;
  padding:14px 16px; cursor:pointer; font-size:20px; line-height:1.55; text-align:left;
  min-height:56px; display:flex; align-items:flex-start; gap:12px;
  transition:all 0.15s; color:var(--fg); font-family:inherit}
.choice:hover{border-color:var(--accent); background:rgba(126,184,224,0.06)}
.choice .key{font-weight:bold; color:var(--accent); flex-shrink:0; font-size:22px;
  min-width:28px}
.choice.picked{border-color:var(--accent); background:rgba(126,184,224,0.12)}
.choice.correct{background:rgba(46,125,50,0.18); border-color:var(--good); color:var(--fg)}
.choice.correct .key{color:var(--good)}
.choice.wrong{background:rgba(198,40,40,0.18); border-color:var(--bad); color:var(--fg)}
.choice.wrong .key{color:var(--bad)}
.choice.disabled{cursor:default}
.explanation{background:#eef6ff; padding:18px; border-radius:10px; margin-top:14px;
  border-left:4px solid var(--good); font-size:20px; line-height:1.85; white-space:pre-wrap}
body.dark .explanation{background:#1f2a35}
.verdict{font-size:24px; font-weight:bold; padding:12px 16px; border-radius:10px;
  margin:14px 0; text-align:center}
.verdict.o{background:rgba(46,125,50,0.18); color:var(--good); border:2px solid var(--good)}
.verdict.x{background:rgba(198,40,40,0.18); color:var(--bad); border:2px solid var(--bad)}
.refrow{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px}
.reflink{display:inline-block; background:var(--accent2); color:#fff; text-decoration:none;
  padding:8px 14px; border-radius:6px; font-size:16px}
.reflink:hover{filter:brightness(1.1)}
.progress{height:10px; background:var(--border); border-radius:5px; margin:12px 0; overflow:hidden}
.progress-bar{height:100%; background:var(--accent); transition:width .3s}
.stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin:14px 0}
.stat{background:var(--bg); padding:14px; border-radius:10px; text-align:center}
.stat .v{font-size:32px; font-weight:bold; color:var(--accent)}
.stat .l{font-size:14px; color:var(--muted)}
.chapter-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px; margin-top:14px}
.ch-card{background:var(--card); border:2px solid var(--border); border-radius:12px;
  padding:14px; cursor:pointer; text-align:left; transition:all 0.15s;
  font-family:inherit; color:var(--fg); font-size:16px}
.ch-card:hover{border-color:var(--accent); transform:translateY(-1px);
  box-shadow:0 4px 8px rgba(0,0,0,0.08)}
.ch-card .cid{font-size:13px; color:var(--muted); margin-bottom:4px}
.ch-card .ctitle{font-weight:700; font-size:17px; line-height:1.4; margin-bottom:8px}
.ch-card .crate{font-size:13px; color:var(--muted)}
.ch-card .cbar{display:flex; gap:4px; margin-top:6px}
.ch-card .cbar > div{flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden}
.ch-card .cbar > div > span{display:block; height:100%; background:var(--good)}
.start-options{display:grid; gap:14px}
.day-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px}
.day-card{background:var(--card); border:2px solid var(--border); border-radius:12px;
  padding:18px; cursor:pointer; text-align:center; transition:all 0.15s;
  font-family:inherit; color:var(--fg)}
.day-card:hover{border-color:var(--accent)}
.day-card .dlabel{font-size:14px; color:var(--muted)}
.day-card .dnum{font-size:28px; font-weight:bold; color:var(--accent); margin:4px 0}
.day-card .drate{font-size:15px; color:var(--muted); margin-top:6px}
.wrong-list{margin-top:10px}
.wrong-row{background:var(--bg); padding:12px; border-radius:8px; margin-bottom:8px;
  display:flex; align-items:flex-start; gap:10px; font-size:16px; line-height:1.5}
.wrong-row .qno{flex-shrink:0; background:var(--bad); color:#fff; padding:2px 10px;
  border-radius:4px; font-weight:bold; font-size:14px}
.wrong-row .qsnip{flex:1}
.score-big{font-size:64px; font-weight:bold; text-align:center; margin:16px 0;
  color:var(--accent); line-height:1}
.score-big.good{color:var(--good)}
.score-big.bad{color:var(--bad)}
.multi-hint{display:inline-block; background:var(--warn); color:#fff; padding:2px 10px;
  border-radius:12px; font-size:14px; margin-left:6px; vertical-align:middle}
.warn-box{background:#fff3cd; color:#664d03; padding:12px; border-radius:8px;
  border-left:4px solid var(--warn); margin:10px 0; font-size:16px}
body.dark .warn-box{background:#332a18; color:#ffd54f}
.modal{position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:20px}
.modal .mbody{background:var(--card); border-radius:14px; padding:24px;
  max-width:400px; width:100%}
.hide{display:none !important}
@media(max-width:600px){
  body{font-size:18px}
  .card{padding:16px}
  h2{font-size:21px}
  .qtext{font-size:20px}
  .choice{font-size:18px; padding:12px 14px}
  .btn{font-size:18px; padding:10px 18px}
  .btn.big{font-size:20px}
  .explanation{font-size:18px}
  .day-grid{grid-template-columns:1fr}
  .score-big{font-size:52px}
  .chapter-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:380px){
  .chapter-grid{grid-template-columns:1fr}
}
/* ===== 模試モード (Exam Mode) ===== */
.exam-hero{background:linear-gradient(135deg,#d4a017 0%,#b8901e 100%);
  color:#fff; border-radius:14px; padding:22px 24px; margin-bottom:16px;
  box-shadow:0 3px 8px rgba(212,160,23,0.25)}
body.dark .exam-hero{background:linear-gradient(135deg,#9d770b 0%,#7d5f08 100%)}
.exam-hero h3{margin:0 0 6px; font-size:22px; color:#fff}
.exam-hero .sub{font-size:15px; line-height:1.55; opacity:0.95; margin-bottom:14px}
.exam-hero .exam-history-row{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px; font-size:14px; opacity:0.95}
.exam-hero .exam-history-row .item{background:rgba(255,255,255,0.18); padding:6px 12px; border-radius:8px}
.exam-hero .btn.gold{background:#fff; color:#b8901e; font-weight:700; border:none}
.exam-hero .btn.gold:hover{background:#fffbeb}

.exam-timer{position:sticky; top:48px; z-index:9; background:var(--card);
  border-bottom:2px solid var(--accent); padding:10px 16px; display:flex;
  align-items:center; justify-content:space-between; gap:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.06); margin:-20px -16px 16px}
.exam-timer .time-val{font-size:28px; font-weight:bold; font-variant-numeric:tabular-nums;
  color:var(--accent); letter-spacing:1px}
.exam-timer .time-val.warn{color:var(--warn)}
.exam-timer .time-val.urgent{color:var(--bad); animation:exam-pulse 1s infinite}
@keyframes exam-pulse{0%,100%{opacity:1}50%{opacity:0.55}}
.exam-timer .qpos{font-size:15px; color:var(--muted)}
.exam-timer .qpos b{color:var(--fg); font-size:18px}

.exam-dots{display:grid; grid-template-columns:repeat(20,1fr); gap:4px;
  margin:10px 0 14px; padding:8px; background:var(--bg); border-radius:8px}
.exam-dot{width:100%; aspect-ratio:1; min-height:18px; border-radius:50%;
  background:transparent; border:2px solid var(--border); cursor:pointer;
  padding:0; transition:all 0.1s}
.exam-dot:hover{transform:scale(1.15)}
.exam-dot.answered{background:var(--accent); border-color:var(--accent)}
.exam-dot.marked{border-color:var(--warn); border-width:3px}
.exam-dot.current{outline:3px solid var(--accent); outline-offset:2px}
@media(max-width:600px){
  .exam-dots{grid-template-columns:repeat(10,1fr)}
  .exam-dot{min-height:24px}
}

.exam-nav{display:flex; gap:10px; justify-content:space-between; align-items:center;
  flex-wrap:wrap; margin-top:14px}
.exam-nav .btn{margin:0; flex:1; min-width:120px}
.exam-mark-btn{background:transparent; border:2px solid var(--warn); color:var(--warn);
  padding:10px 18px; border-radius:10px; font-size:17px; cursor:pointer; font-family:inherit;
  font-weight:600; min-height:48px}
.exam-mark-btn.on{background:var(--warn); color:#fff}

.exam-result-banner{padding:24px; border-radius:14px; text-align:center; margin-bottom:16px}
.exam-result-banner.pass{background:rgba(46,125,50,0.15); border:2px solid var(--good)}
.exam-result-banner.border{background:rgba(245,124,0,0.12); border:2px solid var(--warn)}
.exam-result-banner.fail{background:rgba(198,40,40,0.10); border:2px solid var(--bad)}
.exam-result-banner .big-score{font-size:64px; font-weight:bold; line-height:1; margin:8px 0}
.exam-result-banner.pass .big-score{color:var(--good)}
.exam-result-banner.border .big-score{color:var(--warn)}
.exam-result-banner.fail .big-score{color:var(--bad)}
.exam-result-banner .verdict-text{font-size:22px; font-weight:bold; margin:6px 0}
.exam-result-banner .sub{font-size:16px; color:var(--muted)}

.exam-chbar-list .row{display:flex; align-items:center; gap:10px; margin:6px 0; font-size:15px}
.exam-chbar-list .row .lbl{flex:0 0 38%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.exam-chbar-list .row .bar{flex:1; height:14px; background:var(--border); border-radius:7px; overflow:hidden; position:relative}
.exam-chbar-list .row .bar > span{display:block; height:100%; background:var(--good); border-radius:7px}
.exam-chbar-list .row.warn .bar > span{background:var(--warn)}
.exam-chbar-list .row.bad .bar > span{background:var(--bad)}
.exam-chbar-list .row .pct{flex:0 0 80px; text-align:right; font-variant-numeric:tabular-nums; color:var(--muted)}

.exam-wrong-card{background:var(--bg); padding:14px; border-radius:10px; margin-bottom:10px;
  border-left:4px solid var(--bad)}
.exam-wrong-card .qhead{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px}
.exam-wrong-card .qstem{font-weight:600; margin-bottom:8px; line-height:1.55}
.exam-wrong-card .qmeta{font-size:14px; color:var(--muted); margin-bottom:6px}
.exam-wrong-card .qexp{background:var(--card); padding:10px; border-radius:6px; font-size:15px;
  line-height:1.7; margin-top:6px; white-space:pre-wrap}

よい","e":"足を組まずに測定する"},"format":"単一","correct":"d","explanation":"血圧測定中の会話は血圧を上昇させるため避ける。安静・無言で測定する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":2,"stem":"家庭血圧と診察室血圧の基準値の対応で正しいのはどれか。","choices":{"a":"家庭135/85 = 診察室135/85","b":"家庭135/85 = 診察室140/90","c":"家庭140/90 = 診察室140/90","d":"家庭130/80 = 診察室140/90","e":"家庭125/80 = 診察室130/85"},"format":"単一","correct":"b","explanation":"家庭血圧135/85 mmHg以上は診察室血圧140/90 mmHg以上に対応する高血圧基準。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":3,"stem":"ABPM（24時間自由行動下血圧測定）の高血圧基準として正しいのはどれか。","choices":{"a":"24時間平均 125/75 mmHg以上","b":"24時間平均 130/80 mmHg以上","c":"24時間平均 135/85 mmHg以上","d":"昼間平均 130/80 mmHg以上","e":"夜間平均 130/80 mmHg以上"},"format":"単一","correct":"b","explanation":"ABPMの高血圧基準は24時間平均130/80 mmHg以上。昼間平均135/85、夜間平均120/70 mmHg以上。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":4,"stem":"白衣高血圧の定義として正しいのはどれか。","choices":{"a":"診察室血圧が高く、家庭血圧も高い","b":"診察室血圧が高く、家庭血圧は正常","c":"診察室血圧は正常で、家庭血圧が高い","d":"診察室血圧・家庭血圧ともに正常","e":"家庭血圧のみ測定している状態"},"format":"単一","correct":"b","explanation":"白衣高血圧は診察室血圧140/90 mmHg以上かつ家庭血圧135/85 mmHg未満の状態。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":5,"stem":"仮面高血圧について正しいものを2つ選べ。","choices":{"a":"診察室血圧は正常、家庭血圧は高い","b":"心血管リスクは白衣高血圧より低い","c":"早朝高血圧・夜間高血圧・ストレス下高血圧を含む","d":"治療の必要性は低い","e":"診察室血圧のみで診断できる"},"format":"複数","correct":"ac","explanation":"仮面高血圧は診察室血圧正常・家庭血圧高値で、心血管リスクが高い。早朝・夜間・ストレス下高血圧が含まれる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":6,"stem":"カフサイズの選択について正しいのはどれか。","choices":{"a":"上腕周囲に関係なく標準カフを使用","b":"上腕周囲22cm未満では小児用カフ","c":"上腕周囲32cm以上では大型カフを使用","d":"カフ幅は上腕長の2/3が理想","e":"カフの巻き方は血圧値に影響しない"},"format":"単一","correct":"c","explanation":"上腕周囲32cm以上では大型（ラージ）カフを使用する。カフサイズの不適合は誤差の原因となる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":7,"stem":"家庭血圧の測定について、1機会あたりの測定回数として推奨されるのはどれか。","choices":{"a":"1回","b":"2回","c":"3回","d":"4回","e":"5回"},"format":"単一","correct":"b","explanation":"1機会2回測定し、その平均値を用いる。JSH2025ガイドラインで推奨。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":8,"stem":"健診における血圧の評価区分として「要医療（受診勧奨）」に該当するのはどれか。","choices":{"a":"120-129/80-84 mmHg","b":"130-139/85-89 mmHg","c":"140-159/90-99 mmHg","d":"120/80 mmHg未満","e":"125/80 mmHg"},"format":"単一","correct":"c","explanation":"140/90 mmHg以上が受診勧奨（要医療）判定値。130-139/85-89は保健指導判定値。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":9,"stem":"血圧の季節変動について正しいのはどれか。","choices":{"a":"夏季に血圧が上昇する","b":"冬季に血圧が上昇する","c":"季節変動は通常5 mmHg未満である","d":"季節変動は高齢者では認めない","e":"季節変動を考慮した治療調整は不要"},"format":"単一","correct":"b","explanation":"血圧は冬季に上昇し夏季に低下する季節変動を示す。特に高齢者で顕著であり、治療調整を考慮する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":10,"stem":"血圧測定に関するエビデンスについて正しいのはどれか。","choices":{"a":"診察室血圧は家庭血圧より予後予測能が優れる","b":"家庭血圧は診察室血圧より臓器障害との関連が強い","c":"ABPMは家庭血圧より予後予測能が劣る","d":"随時血圧で十分な評価が可能","e":"測定法による差はない"},"format":"単一","correct":"b","explanation":"家庭血圧は診察室血圧より臓器障害や予後との関連が強いことが複数の研究で示されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":11,"stem":"血圧スクリーニング後の保健指導対象者（特定保健指導）の基準について正しいものを2つ選べ。","choices":{"a":"収縮期血圧130 mmHg以上","b":"収縮期血圧140 mmHg以上","c":"拡張期血圧85 mmHg以上","d":"拡張期血圧90 mmHg以上","e":"拡張期血圧80 mmHg以上"},"format":"複数","correct":"ac","explanation":"特定保健指導の血圧基準は収縮期130 mmHg以上または拡張期85 mmHg以上。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":null},{"no":12,"stem":"ウェアラブル血圧計について正しいのはどれか。","choices":{"a":"JSH2025で家庭血圧測定に推奨されている","b":"カフレス血圧計は現時点で精度が十分とされている","c":"今後の精度向上と検証が期待されている","d":"すでに診療での使用が標準化されている","e":"ABPM の代替として使用可能である"},"format":"単一","correct":"c","explanation":"ウェアラブル・カフレス血圧計は今後の技術発展が期待されるが、現時点では精度検証が不十分で、JSH2025では推奨されていない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":13,"stem":"SU: 聴診法による血圧測定について正しいのはどれか。","choices":{"a":"コロトコフ音第I相が拡張期血圧","b":"コロトコフ音第V相の消失点が拡張期血圧","c":"カフの減圧速度は5 mmHg/秒","d":"水銀血圧計は現在も第一選択","e":"聴診法はオシロメトリック法より精度が低い"},"format":"単一","correct":"b","explanation":"聴診法ではコロトコフ音第I相が収縮期血圧、第V相（消失点）が拡張期血圧。減圧速度は2〜3 mmHg/秒（拍）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":14,"stem":"SU: オシロメトリック法について正しいのはどれか。","choices":{"a":"カフ内の脈波振動から血圧を推定する","b":"聴診法と全く同じ値を示す","c":"不整脈の影響を受けにくい","d":"カフサイズの影響を受けない","e":"自動血圧計では使用されていない"},"format":"単一","correct":"a","explanation":"オシロメトリック法はカフ内の脈波振動（オシレーション）を検出して血圧を推定する方法。不整脈では誤差が生じやすい。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":15,"stem":"SU: 血圧日内変動の正常パターン（dipper型）について正しいのはどれか。","choices":{"a":"夜間血圧が昼間より10〜20%低下する","b":"夜間血圧が昼間より0〜10%低下する","c":"夜間血圧が昼間より上昇する","d":"夜間血圧と昼間血圧が同じ","e":"夜間血圧が昼間より20%以上低下する"},"format":"単一","correct":"a","explanation":"正常なdipper型は夜間血圧が昼間の10〜20%低下する。Non-dipper(0-10%低下)、Riser(夜間上昇)、Extreme-dipper(20%以上低下)がある。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":16,"stem":"SU: non-dipper型の臨床的意義について正しいのはどれか。","choices":{"a":"心血管リスクはdipper型と同等","b":"臓器障害のリスクが高い","c":"二次性高血圧との関連はない","d":"降圧薬の変更は不要","e":"高齢者では稀である"},"format":"単一","correct":"b","explanation":"Non-dipper型（夜間血圧低下が不十分）は臓器障害や心血管イベントのリスクが高い。二次性高血圧やCKD、糖尿病などと関連。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":17,"stem":"SU: 早朝高血圧の定義として正しいのはどれか。","choices":{"a":"起床前の血圧が高い状態","b":"朝の家庭血圧が135/85 mmHg以上","c":"朝の診察室血圧が140/90 mmHg以上","d":"起床後2時間の平均血圧が高い状態","e":"朝と夜の血圧差が20 mmHg以上"},"format":"単一","correct":"b","explanation":"早朝高血圧は朝の家庭血圧が135/85 mmHg以上の状態。心血管イベントのリスク因子として重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":18,"stem":"SU: ABPM測定のプロトコルについて正しいのはどれか。","choices":{"a":"15分間隔で24時間測定する","b":"昼間15〜30分間隔、夜間30〜60分間隔で測定する","c":"昼間のみ測定する","d":"測定中は通常の日常活動を制限する","e":"24時間で10回以上測定すればよい"},"format":"単一","correct":"b","explanation":"ABPMは昼間15〜30分間隔、夜間30〜60分間隔で測定。通常の日常活動を行いながら測定する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":19,"stem":"血圧測定のバリデーションプロトコルについて正しいものを2つ選べ。","choices":{"a":"AAMI/ESH/ISO Universal Standardが国際標準","b":"バリデーション済みの血圧計リストは公開されていない","c":"日本高血圧学会はバリデーション済み血圧計のリストを提供している","d":"すべての市販血圧計はバリデーション済みである","e":"バリデーションは製造時に一度行えばよい"},"format":"複数","correct":"ac","explanation":"AAMI/ESH/ISO Universal Standard (2018)が国際的なバリデーションプロトコル。JSHはバリデーション済み血圧計リストを提供。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"},{"no":20,"stem":"SU: 測定環境が血圧に与える影響について正しいのはどれか。","choices":{"a":"室温の影響は無視できる","b":"満膀胱は収縮期血圧を約10 mmHg上昇させる","c":"喫煙後15分で血圧は正常化する","d":"カフェイン摂取は血圧に影響しない","e":"測定前の安静時間は不要"},"format":"単一","correct":"b","explanation":"満膀胱は収縮期血圧を約10 mmHg上昇させる。排尿後に測定すること。喫煙・カフェインも血圧を一時的に上昇させる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766"}]}],"gl_pages":[31,34],"su_pages":[34,57]},{"id":3,"title":"国民の生活習慣改善","is_clinical":false,"part":1,"key_topics":["健診後の保健指導・特定保健指導","生活習慣改善の普及・啓発","CQ1: 集団に対する減塩の取組みは血圧管理および脳心血管病発症予防に有用か"],"sets":[{"day":1,"questions":[{"no":1,"stem":"CQ1: 集団に対する減塩の取り組みについて正しいのはどれか。","choices":{"a":"血圧管理への効果は否定的","b":"脳心血管病発症予防に有用とするエビデンスがある","c":"個人への介入が集団アプローチより優れる","d":"日本では減塩の集団アプローチは行われていない","e":"減塩の効果は若年者に限定される"},"format":"単一","correct":"b","explanation":"CQ1: 集団に対する減塩の取り組みは血圧管理および脳心血管病発症予防に有用であるとするエビデンスがある。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":2,"stem":"特定保健指導について正しいのはどれか。","choices":{"a":"特定健診の結果に基づき実施される","b":"医師のみが実施できる","c":"40歳未満も対象となる","d":"1回の面談で終了する","e":"血圧は対象項目に含まれない"},"format":"単一","correct":"a","explanation":"特定保健指導は40〜74歳の特定健診受診者の結果に基づき、メタボリックシンドロームのリスクに応じて実施される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=35","su_link":null},{"no":3,"stem":"ポピュレーションアプローチについて正しいのはどれか。","choices":{"a":"ハイリスク者のみを対象とする","b":"集団全体の血圧分布を下方にシフトさせることを目指す","c":"個人への薬物治療を主体とする","d":"費用対効果は低い","e":"日本では実施されていない"},"format":"単一","correct":"b","explanation":"ポピュレーションアプローチは集団全体の血圧分布を下方にシフトさせることで、高血圧に伴う疾病負荷を減少させる戦略。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=35","su_link":null},{"no":4,"stem":"わが国の減塩推進について正しいものを2つ選べ。","choices":{"a":"食塩摂取量の目標は8g/日未満（厚生労働省）","b":"JSH2025では6g/日未満を推奨","c":"WHOは7g/日未満を推奨","d":"日本人の平均食塩摂取量は約10g/日","e":"加工食品の食塩含有量表示は義務化されていない"},"format":"複数","correct":"bd","explanation":"JSH2025は6g/日未満を推奨。日本人の平均食塩摂取量は約10g/日で目標との乖離が大きい。厚労省目標は男性7.5g、女性6.5g未満。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":5,"stem":"健診後の保健指導において血圧管理に最も効果的とされるのはどれか。","choices":{"a":"パンフレット配布のみ","b":"1回限りの電話指導","c":"継続的な保健指導と経過観察","d":"自己管理に任せる","e":"受診勧奨のみ"},"format":"単一","correct":"c","explanation":"継続的な保健指導と経過観察が血圧管理に最も効果的。1回限りの介入では効果が持続しにくい。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=35","su_link":null},{"no":6,"stem":"生活習慣改善の啓発について正しいのはどれか。","choices":{"a":"医療機関のみで行う","b":"マスメディアやICTの活用も推奨される","c":"学校教育は対象外","d":"職域での取り組みは不要","e":"地域での取り組みは効果がない"},"format":"単一","correct":"b","explanation":"生活習慣改善の啓発にはマスメディア、ICT、学校教育、職域、地域など多面的なアプローチが推奨される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":7,"stem":"集団への減塩介入の方法として正しいのはどれか。","choices":{"a":"個人の食事指導のみ","b":"食品の栄養成分表示の活用","c":"減塩食品の普及は効果がない","d":"外食産業への介入は不要","e":"調味料の使用制限のみ"},"format":"単一","correct":"b","explanation":"食品の栄養成分表示の活用、減塩食品の普及、外食産業への働きかけなど環境整備を含む多面的介入が重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":8,"stem":"特定健診の対象年齢として正しいのはどれか。","choices":{"a":"20〜64歳","b":"30〜74歳","c":"40〜74歳","d":"40〜79歳","e":"50〜74歳"},"format":"単一","correct":"c","explanation":"特定健診は40〜74歳の医療保険加入者を対象とする。2008年から開始。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=35","su_link":null},{"no":9,"stem":"特定保健指導の階層化について正しいのはどれか。","choices":{"a":"動機付け支援と積極的支援の2段階","b":"1段階のみ","c":"3段階に分類","d":"血圧のみで階層化される","e":"BMIは考慮されない"},"format":"単一","correct":"a","explanation":"特定保健指導はリスクに応じて「動機付け支援」と「積極的支援」の2段階に階層化される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=35","su_link":null},{"no":10,"stem":"集団に対する身体活動促進の効果について正しいのはどれか。","choices":{"a":"血圧低下効果はない","b":"減塩と組み合わせることでより大きな効果が期待される","c":"高齢者には推奨されない","d":"週1回の運動で十分","e":"有酸素運動のみが有効"},"format":"単一","correct":"b","explanation":"身体活動促進と減塩を組み合わせた複合的な生活習慣改善が、より大きな血圧低下効果をもたらす。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":11,"stem":"健康日本21（第三次）における血圧の目標について正しいのはどれか。","choices":{"a":"収縮期血圧の平均を5 mmHg低下","b":"収縮期血圧の平均を2 mmHg低下","c":"高血圧有病率を10%低下","d":"高血圧治療率を80%に向上","e":"食塩摂取量を8g/日未満に"},"format":"単一","correct":"a","explanation":"健康日本21（第三次）では国民の収縮期血圧平均を約5 mmHg低下させることが目標。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":12,"stem":"保健指導における行動変容ステージについて正しいのはどれか。","choices":{"a":"2段階で構成される","b":"無関心期→関心期→準備期→実行期→維持期の5段階","c":"全員が同じアプローチで指導する","d":"維持期の支援は不要","e":"ステージに応じた指導は効果がない"},"format":"単一","correct":"b","explanation":"行動変容ステージモデル（Prochaska）は5段階で、各ステージに応じた指導が効果的。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=35","su_link":null},{"no":13,"stem":"減塩に関するナッジの活用例として適切なのはどれか。","choices":{"a":"減塩の強制","b":"減塩食品を選びやすい配置にする","c":"高塩分食品の禁止","d":"罰金制度の導入","e":"食塩摂取量の公表"},"format":"単一","correct":"b","explanation":"ナッジ（nudge）は自然と健康的な選択ができるよう環境を整える行動経済学的手法。減塩食品の目立つ配置などが例。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":14,"stem":"わが国の減塩に関する取り組みについて正しいものを2つ選べ。","choices":{"a":"日本高血圧学会は減塩委員会を設置している","b":"JSH減塩食品リストが公開されている","c":"食品表示法では食塩相当量の表示は任意","d":"学校給食での減塩は推進されていない","e":"減塩サミットは開催されていない"},"format":"複数","correct":"ab","explanation":"JSHは減塩委員会を設置し、減塩食品リストの公開やWorld Hypertension Dayでの啓発活動を行っている。食品表示法で食塩相当量表示は義務化。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":15,"stem":"生活習慣改善指導の効果持続について正しいのはどれか。","choices":{"a":"1回の指導で長期的効果が得られる","b":"6ヶ月以上の継続的介入が推奨される","c":"効果は介入終了と同時に消失する","d":"書面による指導のみで十分","e":"電話・ICTによるフォローアップは効果がない"},"format":"単一","correct":"b","explanation":"生活習慣改善の効果を維持するには6ヶ月以上の継続的介入が推奨される。ICT活用のフォローアップも有効。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":16,"stem":"飲酒と血圧の関係について正しいのはどれか。","choices":{"a":"少量の飲酒は血圧を下げる","b":"アルコールは血圧と無関係","c":"過度の飲酒は血圧を上昇させる","d":"飲酒量と血圧は逆相関する","e":"ビールのみが血圧を上昇させる"},"format":"単一","correct":"c","explanation":"過度の飲酒は血圧を上昇させる。節酒（エタノール換算で男性20〜30 mL/日以下、女性10〜20 mL/日以下）が推奨される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":17,"stem":"受動喫煙と血圧の関係について正しいのはどれか。","choices":{"a":"受動喫煙は血圧に影響しない","b":"受動喫煙も血圧上昇や心血管リスク増加に関連する","c":"禁煙後は直ちに血圧が低下する","d":"喫煙は拡張期血圧のみを上昇させる","e":"電子タバコは血圧に影響しない"},"format":"単一","correct":"b","explanation":"受動喫煙も血圧上昇や心血管リスクの増加に関連する。禁煙は高血圧管理において重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":18,"stem":"特定保健指導の実施率について正しいのはどれか。","choices":{"a":"80%以上と高い","b":"50%程度","c":"約25%前後で低迷している","d":"100%実施されている","e":"統計は公表されていない"},"format":"単一","correct":"c","explanation":"特定保健指導の実施率は約25%前後と低迷しており、実施率向上が課題。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=35","su_link":null},{"no":19,"stem":"食環境整備として推進されている取り組みについて正しいものを2つ選べ。","choices":{"a":"減塩食品の開発・普及","b":"食品表示の活用促進","c":"食塩の販売禁止","d":"外食産業は対象外","e":"加工食品の食塩含有量増加"},"format":"複数","correct":"ab","explanation":"食環境整備として、減塩食品の開発・普及、食品表示の活用促進が推進されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":20,"stem":"地域における血圧管理の取り組みについて正しいのはどれか。","choices":{"a":"医療機関のみが担う","b":"行政・医療・地域が連携した取り組みが重要","c":"ボランティアの関与は不適切","d":"血圧測定は医療機関でのみ行う","e":"地域差は存在しない"},"format":"単一","correct":"b","explanation":"地域における血圧管理には行政・医療機関・地域住民組織が連携した包括的アプローチが重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=37","su_link":null}]},{"day":2,"questions":[{"no":1,"stem":"CQ1の推奨の強さについて正しいのはどれか。","choices":{"a":"強く推奨する（エビデンスの確実性：高）","b":"弱く推奨する（エビデンスの確実性：低）","c":"推奨しない","d":"エビデンス不十分で判断できない","e":"条件付きで推奨する（エビデンスの確実性：中）"},"format":"単一","correct":"b","explanation":"CQ1: 集団に対する減塩は弱く推奨。エビデンスの確実性は低いが、血圧管理・脳心血管病予防への有用性は支持される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":2,"stem":"WHO が推奨するナトリウム摂取量の上限として正しいのはどれか。","choices":{"a":"食塩相当量3g/日","b":"食塩相当量5g/日","c":"食塩相当量6g/日","d":"食塩相当量7g/日","e":"食塩相当量8g/日"},"format":"単一","correct":"b","explanation":"WHOは成人のナトリウム摂取量をNa 2g/日未満（食塩相当量5g/日未満）と推奨。JSH2025は6g/日未満。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":3,"stem":"集団への減塩介入研究のエビデンスについて正しいのはどれか。","choices":{"a":"大規模RCTが多数存在する","b":"クラスターRCTやコミュニティ介入研究が中心","c":"エビデンスは全くない","d":"メタ解析で効果が否定されている","e":"観察研究は存在しない"},"format":"単一","correct":"b","explanation":"集団への減塩介入のエビデンスは、クラスターRCTやコミュニティベースの介入研究が中心で、個人レベルの大規模RCTは限られる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":4,"stem":"減塩による血圧低下効果について正しいのはどれか。","choices":{"a":"正常血圧者では効果がない","b":"食塩摂取量1g減少で約1 mmHgの収縮期血圧低下","c":"高齢者では効果が小さい","d":"食塩感受性に個人差はない","e":"拡張期血圧には効果がない"},"format":"単一","correct":"b","explanation":"メタ解析では食塩摂取量1g減少あたり約1 mmHgの収縮期血圧低下が報告されている。効果には食塩感受性の個人差がある。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":5,"stem":"日本における栄養成分表示について正しいものを2つ選べ。","choices":{"a":"食品表示法により食塩相当量の表示が義務化","b":"ナトリウム量のみの表示でよい","c":"食塩相当量 = ナトリウム(mg) × 2.54 ÷ 1000","d":"外食メニューへの表示は義務","e":"栄養成分表示は任意である"},"format":"複数","correct":"ac","explanation":"2020年より食品表示法で食塩相当量の表示が義務化。計算式: 食塩相当量(g) = Na(mg) × 2.54 ÷ 1000。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":6,"stem":"特定保健指導における「積極的支援」の対象について正しいのはどれか。","choices":{"a":"動機付け支援よりリスクが低い者","b":"メタボリックシンドロームのリスクが高い者","c":"血圧のみが高値の者","d":"65歳以上の全員","e":"BMI 25未満の者"},"format":"単一","correct":"b","explanation":"積極的支援はメタボリックシンドロームのリスクが高い者（腹囲基準＋リスク因子2つ以上等）が対象。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=35","su_link":null},{"no":7,"stem":"ヘルスリテラシーと血圧管理の関係について正しいのはどれか。","choices":{"a":"ヘルスリテラシーは血圧管理と無関係","b":"ヘルスリテラシーが低いと血圧コントロールが不良となりやすい","c":"ヘルスリテラシーは先天的で改善できない","d":"医療者のリテラシーのみが重要","e":"デジタルリテラシーは不要"},"format":"単一","correct":"b","explanation":"ヘルスリテラシーが低い患者は血圧コントロールが不良になりやすい。わかりやすい情報提供と教育が重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":8,"stem":"集団への複合的介入（減塩＋運動＋節酒）の効果について正しいのはどれか。","choices":{"a":"単一介入と差がない","b":"複合的介入はより大きな血圧低下効果が期待される","c":"複合的介入は有害","d":"運動の追加効果はない","e":"節酒の効果は証明されていない"},"format":"単一","correct":"b","explanation":"減塩・運動・節酒等を組み合わせた複合的介入は、単一介入よりも大きな血圧低下効果が期待される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":9,"stem":"保健師による高血圧管理支援について正しいのはどれか。","choices":{"a":"保健師は血圧管理に関与できない","b":"保健師による継続的な保健指導は血圧管理に有効","c":"保健師よりAIの方が効果的","d":"保健師の関与は医療費を増加させる","e":"保健師は薬物治療の調整を行う"},"format":"単一","correct":"b","explanation":"保健師による継続的な保健指導は、生活習慣改善の動機付けと血圧管理の向上に有効。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=35","su_link":null},{"no":10,"stem":"健康増進法に基づく取り組みについて正しいのはどれか。","choices":{"a":"受動喫煙対策は含まれない","b":"栄養表示基準は別の法律で規定","c":"国民健康・栄養調査の実施根拠となる","d":"地方自治体は関与しない","e":"罰則規定はない"},"format":"単一","correct":"c","explanation":"健康増進法は国民健康・栄養調査の実施根拠であり、受動喫煙対策や特定給食施設の栄養管理なども規定。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=37","su_link":null},{"no":11,"stem":"食塩摂取と胃がんの関係について正しいのはどれか。","choices":{"a":"食塩摂取と胃がんは無関係","b":"食塩の過剰摂取は胃がんのリスク因子","c":"減塩により胃がんリスクは増加する","d":"胃がんとの関連は日本人では認めない","e":"ヘリコバクター・ピロリとの交互作用はない"},"format":"単一","correct":"b","explanation":"食塩の過剰摂取は胃がんのリスク因子。減塩は高血圧予防だけでなく、がん予防の観点からも重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":12,"stem":"高血圧予防のための食事パターンについて正しいのはどれか。","choices":{"a":"高タンパク食が最も効果的","b":"DASH食は血圧低下効果が証明されている","c":"和食は常に血圧に良い","d":"カリウム摂取は不要","e":"野菜・果物は効果がない"},"format":"単一","correct":"b","explanation":"DASH食（野菜・果物・低脂肪乳製品が豊富で飽和脂肪酸・コレステロールが少ない食事）は血圧低下効果が証明されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":13,"stem":"職域での高血圧対策について正しいものを2つ選べ。","choices":{"a":"産業医による事後措置が含まれる","b":"社員食堂での減塩メニュー提供は効果的","c":"職域での血圧管理は法的根拠がない","d":"労働安全衛生法に基づく","e":"残業時間と血圧は無関係"},"format":"複数","correct":"ab","explanation":"職域では産業医による事後措置や社員食堂での減塩メニュー提供など、包括的な取り組みが効果的。労働安全衛生法に基づく。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=37","su_link":null},{"no":14,"stem":"コミュニティにおける減塩活動の成功例について正しいのはどれか。","choices":{"a":"フィンランドのNorth Karelia Projectは集団の食塩摂取減少に成功","b":"イギリスのFSSA活動は失敗した","c":"日本では成功例がない","d":"集団アプローチは常に失敗する","e":"先進国でのみ有効"},"format":"単一","correct":"a","explanation":"フィンランドのNorth Karelia Projectは食品産業と連携した減塩活動で集団の血圧低下と心血管死亡減少に成功した代表例。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":15,"stem":"ICT（情報通信技術）を活用した生活習慣改善指導について正しいのはどれか。","choices":{"a":"対面指導に劣る","b":"アプリやウェアラブルデバイスの活用が期待される","c":"高齢者には適さない","d":"エビデンスは全くない","e":"個人情報保護の問題はない"},"format":"単一","correct":"b","explanation":"スマートフォンアプリやウェアラブルデバイスを活用したICTベースの保健指導が注目されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=37","su_link":null},{"no":16,"stem":"食塩感受性高血圧について正しいのはどれか。","choices":{"a":"日本人は食塩感受性が低い","b":"食塩感受性には遺伝的背景がある","c":"食塩感受性は年齢に関係ない","d":"CKD患者は食塩感受性が低い","e":"食塩感受性と人種差はない"},"format":"単一","correct":"b","explanation":"食塩感受性には遺伝的背景があり、高齢者・CKD患者・黒人で高い。日本人も比較的食塩感受性が高いとされる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":17,"stem":"減塩の経済効果について正しいのはどれか。","choices":{"a":"医療費削減効果は示されていない","b":"集団レベルの減塩はコスト効果が高い介入とされる","c":"減塩食品は高価なため費用対効果が低い","d":"経済分析は行われていない","e":"個人介入のみが費用対効果が高い"},"format":"単一","correct":"b","explanation":"集団レベルの減塩は、血圧低下→脳心血管病予防→医療費削減の連鎖によりコスト効果の高い公衆衛生介入とされる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":18,"stem":"カリウム摂取と血圧の関係について正しいのはどれか。","choices":{"a":"カリウム摂取増加は血圧を上昇させる","b":"カリウムはナトリウムの腎排泄を促進し血圧を低下させる","c":"カリウム摂取と血圧は無関係","d":"カリウムは全ての患者に無制限に推奨","e":"加工食品はカリウムが豊富"},"format":"単一","correct":"b","explanation":"カリウムはナトリウムの腎排泄を促進し、血圧低下効果がある。野菜・果物の摂取が推奨される。ただし腎機能低下例では高カリウム血症に注意。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":19,"stem":"食塩摂取量の評価方法について正しいのはどれか。","choices":{"a":"問診のみで正確に評価できる","b":"24時間蓄尿が最も正確","c":"随時尿では評価できない","d":"食事記録は24時間蓄尿より正確","e":"食塩摂取量の評価は不要"},"format":"単一","correct":"b","explanation":"24時間蓄尿によるナトリウム排泄量測定が食塩摂取量の最も正確な評価法。スポット尿からの推定式も使用される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null},{"no":20,"stem":"高血圧予防のための身体活動指針について正しいものを2つ選べ。","choices":{"a":"週に合計150分以上の中等度有酸素運動","b":"運動は毎日60分以上必要","c":"歩行などの日常的な身体活動の増加も有効","d":"高齢者は運動を避けるべき","e":"レジスタンス運動は血圧を上昇させるため禁忌"},"format":"複数","correct":"ac","explanation":"週150分以上の中等度有酸素運動が推奨。日常的な身体活動の増加（歩行、階段利用等）も血圧管理に有効。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=36","su_link":null}]}],"gl_pages":[35,37]},{"id":4,"title":"社会全体での対策","is_clinical":false,"part":1,"key_topics":["健康日本21","食環境整備","身体活動を推進するための環境整備","循環器病対策基本法と関連する医療政策"],"sets":[{"day":1,"questions":[{"no":1,"stem":"健康日本21（第三次）について正しいのはどれか。","choices":{"a":"2013年に開始された","b":"2024年度から開始（第三次）","c":"目標期間は5年間","d":"高血圧は対象疾患に含まれない","e":"国のみが実施主体である"},"format":"単一","correct":"b","explanation":"健康日本21（第三次）は2024年度から開始。健康寿命の延伸と健康格差の縮小を基本方針とする。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":2,"stem":"循環器病対策基本法について正しいのはどれか。","choices":{"a":"2018年に成立した","b":"脳卒中と心臓病の対策推進を目的とする","c":"高血圧の予防は含まれない","d":"都道府県の計画策定は任意","e":"研究の推進は対象外"},"format":"単一","correct":"b","explanation":"循環器病対策基本法（2018年成立、2019年施行）は脳卒中・心臓病等の循環器病対策の推進を目的とし、予防・医療・研究を包括的に推進。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":3,"stem":"健康日本21（第三次）における食塩摂取量の目標について正しいのはどれか。","choices":{"a":"5g/日未満","b":"6g/日未満","c":"7g/日未満","d":"8g/日未満","e":"10g/日未満"},"format":"単一","correct":"c","explanation":"健康日本21（第三次）の食塩摂取量目標は7g/日未満。JSH2025の6g/日未満とは異なる点に注意。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":4,"stem":"食環境整備の取り組みについて正しいものを2つ選べ。","choices":{"a":"健康的な食品へのアクセス改善","b":"栄養成分表示の活用推進","c":"食品添加物の全面禁止","d":"外食産業は対象外","e":"個人の自己責任のみ"},"format":"複数","correct":"ab","explanation":"食環境整備として、健康的な食品（減塩食品等）へのアクセス改善と栄養成分表示の活用推進が重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":5,"stem":"自然に健康になれる環境づくりについて正しいのはどれか。","choices":{"a":"個人の努力のみに依存する","b":"健康無関心層にもアプローチできる利点がある","c":"効果は証明されていない","d":"先進国では不要","e":"コストが高すぎて実現不可能"},"format":"単一","correct":"b","explanation":"「自然に健康になれる環境づくり」は健康に無関心な層にもアプローチでき、ポピュレーションアプローチの重要な柱。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":6,"stem":"身体活動を推進するための環境整備について正しいのはどれか。","choices":{"a":"歩きやすいまちづくりは血圧管理に無関係","b":"運動施設の整備や歩行環境の改善が含まれる","c":"車社会の推進が望ましい","d":"公園の整備は効果がない","e":"室内運動のみを推進する"},"format":"単一","correct":"b","explanation":"運動施設の整備、歩行環境の改善、公園の整備など、身体活動を促進する環境づくりが推進されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":7,"stem":"医療政策における高血圧対策について正しいのはどれか。","choices":{"a":"かかりつけ医の役割は小さい","b":"医療計画に高血圧対策は含まれない","c":"都道府県循環器病対策推進計画で高血圧予防が重視されている","d":"二次医療圏での対策は不要","e":"専門医のみが対策を担う"},"format":"単一","correct":"c","explanation":"循環器病対策基本法に基づき、都道府県は循環器病対策推進計画を策定。高血圧の予防・早期発見・適切な管理が重視されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":8,"stem":"特定健診・特定保健指導制度の法的根拠は何か。","choices":{"a":"健康増進法","b":"高齢者の医療の確保に関する法律","c":"労働安全衛生法","d":"循環器病対策基本法","e":"医療法"},"format":"単一","correct":"b","explanation":"特定健診・特定保健指導は「高齢者の医療の確保に関する法律」に基づき実施される（2008年開始）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":9,"stem":"健康格差の縮小について正しいのはどれか。","choices":{"a":"健康格差は存在しない","b":"社会経済的要因と高血圧有病率は無関係","c":"地域間・社会経済的格差の縮小が健康日本21の基本方針","d":"健康格差は個人の問題である","e":"都市部と農村部で血圧に差はない"},"format":"単一","correct":"c","explanation":"健康日本21（第三次）の基本方針に「健康格差の縮小」が含まれる。地域間・社会経済的格差への対策が重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":10,"stem":"高血圧対策におけるマルチセクトラルアプローチについて正しいのはどれか。","choices":{"a":"医療セクターのみで対応する","b":"保健・医療・食品産業・教育など多分野の連携が重要","c":"行政の関与は不要","d":"産業界は対象外","e":"研究機関は関与しない"},"format":"単一","correct":"b","explanation":"高血圧対策には保健・医療・食品産業・教育・行政など多分野（マルチセクトラル）の連携が重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":11,"stem":"日本高血圧学会のフューチャープランについて正しいのはどれか。","choices":{"a":"管理不良高血圧を500万人減少","b":"管理不良高血圧を700万人減少","c":"管理不良高血圧を1000万人減少","d":"高血圧有病者を半減","e":"治療率100%を目標"},"format":"単一","correct":"b","explanation":"JSHフューチャープランは2018年の管理不良高血圧3100万人を、2028年までに700万人減少させることが目標。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":12,"stem":"健康経営について正しいのはどれか。","choices":{"a":"従業員の健康管理は企業の責任ではない","b":"従業員の健康管理を経営的視点で戦略的に実践する取り組み","c":"中小企業は対象外","d":"血圧管理は健康経営の対象外","e":"国の認定制度はない"},"format":"単一","correct":"b","explanation":"健康経営は従業員の健康管理を経営的視点で戦略的に実践する取り組み。経済産業省が「健康経営優良法人」認定制度を運営。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":13,"stem":"データヘルス計画について正しいのはどれか。","choices":{"a":"レセプト・健診データの分析に基づく保健事業計画","b":"紙カルテのみを使用する","c":"データの活用は法律で禁止されている","d":"個人情報は一切使用しない","e":"2030年から開始予定"},"format":"単一","correct":"a","explanation":"データヘルス計画はレセプト（診療報酬明細書）や特定健診データの分析に基づき、効果的な保健事業を計画・実施する取り組み。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":14,"stem":"受動喫煙防止対策について正しいのはどれか。","choices":{"a":"健康増進法の改正により屋内原則禁煙が義務化","b":"努力義務にとどまる","c":"飲食店は対象外","d":"受動喫煙と高血圧は無関係","e":"2030年から施行予定"},"format":"単一","correct":"a","explanation":"2020年4月より改正健康増進法が全面施行され、多くの施設で屋内原則禁煙が義務化。受動喫煙も心血管リスクを増加させる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":15,"stem":"WHOのGlobal NCD Actionについて正しいのはどれか。","choices":{"a":"高血圧の有病率を25%相対的に減少させることが目標に含まれる","b":"食塩摂取量の目標はない","c":"身体活動の推進は含まれない","d":"2015年に終了した","e":"日本は参加していない"},"format":"単一","correct":"a","explanation":"WHO Global NCD Action Plan 2013-2030では、高血圧有病率の25%相対的減少、食塩30%減少等が目標。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":16,"stem":"スマートミールについて正しいのはどれか。","choices":{"a":"高カロリー食の名称","b":"健康的な食事・食環境の認証制度","c":"減塩とは無関係","d":"外食産業のみが対象","e":"厚労省が直接運営"},"format":"単一","correct":"b","explanation":"スマートミールは健康的な食事・食環境を認証する制度。減塩や栄養バランスの良い食事を提供する外食・中食・給食施設を認証。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":17,"stem":"高血圧対策における多職種連携について正しいものを2つ選べ。","choices":{"a":"医師のみで完結する","b":"薬剤師による服薬指導は重要","c":"管理栄養士による食事指導が含まれる","d":"看護師の役割はない","e":"事務職員のみが対応する"},"format":"複数","correct":"bc","explanation":"高血圧対策では医師・薬剤師・管理栄養士・保健師・看護師等の多職種連携が重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":18,"stem":"循環器病対策推進基本計画について正しいのはどれか。","choices":{"a":"国が策定し都道府県は従うのみ","b":"都道府県も独自の計画を策定する","c":"市町村は関与しない","d":"5年ごとに見直す","e":"循環器病の予防は含まれない"},"format":"単一","correct":"b","explanation":"循環器病対策基本法に基づき、国が基本計画を策定し、都道府県も地域の実情に応じた推進計画を策定する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":19,"stem":"食品産業における減塩の取り組みについて正しいものを2つ選べ。","choices":{"a":"減塩食品の開発は進んでいない","b":"食品メーカーによる自主的な減塩が進んでいる","c":"日本高血圧学会は減塩食品リストを公開","d":"コンビニエンスストアは対象外","e":"加工食品の食塩含有量は増加傾向"},"format":"複数","correct":"bc","explanation":"食品メーカーによる自主的減塩の取り組みが進み、JSHは減塩食品リストを公開して啓発を行っている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":20,"stem":"高血圧対策におけるソーシャルキャピタルの活用について正しいのはどれか。","choices":{"a":"地域のつながりは血圧管理と無関係","b":"地域の社会的なつながりを活用した健康づくりが重要","c":"個人の努力のみが重要","d":"都市部では不要","e":"高齢者のみが対象"},"format":"単一","correct":"b","explanation":"ソーシャルキャピタル（社会的なつながり・信頼・規範）を活用した地域ぐるみの健康づくりが、血圧管理にも有効。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null}]},{"day":2,"questions":[{"no":1,"stem":"健康日本21（第三次）の基本的な方向について正しいものを2つ選べ。","choices":{"a":"健康寿命の延伸","b":"健康格差の縮小","c":"医療費の最小化のみ","d":"治療中心の医療","e":"高齢者のみを対象"},"format":"複数","correct":"ab","explanation":"健康日本21（第三次）は健康寿命の延伸と健康格差の縮小を基本方針とする。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":2,"stem":"循環器病対策基本法の施行年として正しいのはどれか。","choices":{"a":"2017年","b":"2018年","c":"2019年","d":"2020年","e":"2021年"},"format":"単一","correct":"c","explanation":"循環器病対策基本法は2018年12月成立、2019年12月施行。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":3,"stem":"わが国の食塩摂取量の現状について正しいのはどれか。","choices":{"a":"平均約7g/日","b":"平均約10g/日","c":"平均約13g/日","d":"平均約15g/日","e":"平均約5g/日"},"format":"単一","correct":"b","explanation":"日本人の平均食塩摂取量は約10g/日（令和元年国民健康・栄養調査）。目標の6g/日未満との乖離が大きい。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":4,"stem":"WHO SHAKE Technical Packageについて正しいのはどれか。","choices":{"a":"Surveillance, Harness, Act, Knowledge, Environmentの頭文字","b":"減塩推進のための技術パッケージ","c":"日本では採用されていない","d":"薬物治療のガイドライン","e":"2030年に発表予定"},"format":"単一","correct":"b","explanation":"SHAKE Technical Packageは WHOが提唱する減塩推進のための技術パッケージ。各国の減塩政策立案に活用される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":5,"stem":"フレイル予防と高血圧管理の関係について正しいのはどれか。","choices":{"a":"フレイル予防と血圧管理は相反する","b":"過度の減塩はフレイル高齢者で有害となる可能性がある","c":"全ての高齢者に厳格な減塩を行う","d":"フレイルは血圧と無関係","e":"高齢者の降圧は不要"},"format":"単一","correct":"b","explanation":"フレイル高齢者では過度の減塩が食欲低下・栄養不良を招く可能性があり、個別対応が必要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":6,"stem":"社会的決定要因と高血圧の関係について正しいのはどれか。","choices":{"a":"教育歴と高血圧は無関係","b":"低所得者は高血圧リスクが高い傾向がある","c":"職業と血圧は無関係","d":"社会的要因を考慮する必要はない","e":"先進国では社会格差は存在しない"},"format":"単一","correct":"b","explanation":"社会経済的要因（所得・教育歴・職業等）は高血圧のリスクに影響する。低所得者は野菜・果物摂取が少なく、高血圧リスクが高い傾向。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":7,"stem":"高血圧対策の費用対効果について正しいのはどれか。","choices":{"a":"高血圧対策は費用対効果が低い","b":"予防的介入は治療よりコスト効果が低い","c":"ポピュレーションアプローチは費用対効果が高い","d":"薬物治療のみが費用対効果が高い","e":"費用対効果の評価は行われていない"},"format":"単一","correct":"c","explanation":"集団全体への減塩等のポピュレーションアプローチは、費用対効果の高い公衆衛生介入とされる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":8,"stem":"食品のナトリウム/カリウム（Na/K）比について正しいのはどれか。","choices":{"a":"Na/K比は血圧と無関係","b":"Na/K比が高いほど血圧上昇リスクが高い","c":"加工食品はNa/K比が低い","d":"Na/K比は測定困難","e":"カリウム摂取は不要"},"format":"単一","correct":"b","explanation":"Na/K比が高い（ナトリウムが多くカリウムが少ない）食事は血圧上昇のリスクが高い。加工食品はNa/K比が高い傾向。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null},{"no":9,"stem":"学校教育における高血圧予防について正しいのはどれか。","choices":{"a":"学校教育は高血圧予防と無関係","b":"小児期からの生活習慣教育が将来の高血圧予防に重要","c":"高校生以上のみが対象","d":"学校給食での減塩は不要","e":"運動教育は血圧に影響しない"},"format":"単一","correct":"b","explanation":"小児期からの適切な生活習慣（食塩制限・運動・適正体重）の教育が、将来の高血圧予防に重要。学校給食での減塩も推進。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":10,"stem":"PHR（Personal Health Record）について正しいのはどれか。","choices":{"a":"医療機関のみが管理するデータ","b":"個人が自身の健康データを管理・活用するシステム","c":"血圧データは含まない","d":"法律で禁止されている","e":"紙の記録のみを指す"},"format":"単一","correct":"b","explanation":"PHRは個人が自身の健康・医療データ（血圧値含む）を管理・活用するシステム。マイナポータルとの連携等が進んでいる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":11,"stem":"高血圧医療の質の指標（Quality Indicator）について正しいのはどれか。","choices":{"a":"血圧測定率は指標に含まれない","b":"降圧薬処方率のみが指標","c":"血圧管理率（140/90未満の割合）は重要な指標","d":"医療の質の評価は不要","e":"指標は国際的に統一されていない"},"format":"単一","correct":"c","explanation":"高血圧医療の質の指標として、血圧管理率（降圧目標達成率）は最も重要な指標の一つ。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":12,"stem":"受診中断対策について正しいのはどれか。","choices":{"a":"受診中断は稀な問題","b":"受診中断は血圧管理不良の主要因の一つ","c":"患者のみの責任","d":"対策は不要","e":"受診中断しても血圧は悪化しない"},"format":"単一","correct":"b","explanation":"受診中断（治療脱落）は血圧管理不良の主要因。受診勧奨の仕組みづくりや通院しやすい環境整備が重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":13,"stem":"ジェネリック医薬品と高血圧管理について正しいのはどれか。","choices":{"a":"ジェネリック医薬品は降圧効果が劣る","b":"ジェネリック医薬品の普及はアドヒアランス向上に寄与しうる","c":"全ての降圧薬にジェネリックがある","d":"医療費に影響しない","e":"患者の選択権はない"},"format":"単一","correct":"b","explanation":"ジェネリック医薬品による薬剤費負担軽減は服薬アドヒアランス向上に寄与しうる。後発品使用促進は国の政策でもある。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":14,"stem":"高血圧に関する市民啓発活動について正しいものを2つ選べ。","choices":{"a":"世界高血圧デー（5月17日）がある","b":"高血圧の日は日本では設定されていない","c":"JSHは啓発イベントを実施している","d":"啓発活動の効果はない","e":"SNSの活用は不適切"},"format":"複数","correct":"ac","explanation":"世界高血圧デー(5月17日)に合わせ、JSHは各種啓発イベントを実施。市民への高血圧の認知度向上に貢献。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":15,"stem":"医療DX（デジタルトランスフォーメーション）と高血圧管理について正しいのはどれか。","choices":{"a":"電子カルテは血圧管理に不要","b":"オンライン診療は高血圧管理に活用可能","c":"マイナンバーカードと医療は無関係","d":"AIの活用は認められていない","e":"デジタル化は医療の質を低下させる"},"format":"単一","correct":"b","explanation":"オンライン診療は高血圧管理に活用可能。特に家庭血圧データの共有や服薬管理に有用。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":16,"stem":"地域包括ケアシステムにおける高血圧管理について正しいのはどれか。","choices":{"a":"病院のみで管理する","b":"かかりつけ医を中心とした地域での継続的管理が重要","c":"訪問看護は血圧管理に関与しない","d":"介護施設での血圧管理は不要","e":"地域のボランティアは関与しない"},"format":"単一","correct":"b","explanation":"地域包括ケアシステムでは、かかりつけ医を中心に訪問看護・介護・薬局等が連携した継続的な血圧管理が重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":17,"stem":"高血圧対策の国際比較について正しいのはどれか。","choices":{"a":"日本の血圧管理率は世界最高水準","b":"カナダは血圧管理率が高い国の一つ","c":"欧米と日本で血圧管理率に差はない","d":"途上国のみが血圧管理率が低い","e":"国際比較データは存在しない"},"format":"単一","correct":"b","explanation":"カナダは世界的に血圧管理率が高い国の一つ。日本の管理率は改善傾向だが、まだ十分ではない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":18,"stem":"たばこ対策と血圧管理の関係について正しいのはどれか。","choices":{"a":"禁煙は血圧管理に無関係","b":"禁煙により心血管リスクは低下する","c":"加熱式たばこは安全","d":"受動喫煙対策は不要","e":"喫煙は拡張期血圧を下げる"},"format":"単一","correct":"b","explanation":"禁煙は心血管リスクを低下させる。たばこは血圧を一時的に上昇させ、動脈硬化を促進する。加熱式たばこも有害。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":19,"stem":"高血圧ゼロのまちプロジェクトについて正しいのはどれか。","choices":{"a":"JSHが推進している取り組み","b":"厚労省が直接運営","c":"特定の自治体のみが参加","d":"薬物治療のみを推進","e":"2030年開始予定"},"format":"単一","correct":"a","explanation":"「高血圧ゼロのまち」はJSHが推進する地域ベースの高血圧対策プロジェクト。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=39","su_link":null},{"no":20,"stem":"高血圧の医療経済学的影響について正しいものを2つ選べ。","choices":{"a":"高血圧関連の医療費は国民医療費の大きな割合を占める","b":"適切な血圧管理により脳卒中・心疾患の医療費が削減可能","c":"高血圧治療は医療費を増加させるのみ","d":"予防は治療より費用がかかる","e":"医療経済学的評価は不要"},"format":"複数","correct":"ab","explanation":"高血圧は脳卒中・心疾患等の重大な要因であり、関連医療費は膨大。適切な管理により合併症を予防し医療費を削減可能。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=38","su_link":null}]}],"gl_pages":[38,40]},{"id":5,"title":"血圧測定と臨床評価","is_clinical":true,"part":2,"key_topics":["診察室血圧・診察室外血圧の測定法","高血圧の診断基準（診察室140/90, 家庭135/85, ABPM130/80）","血圧変動性に基づく分類（白衣高血圧・仮面高血圧・血圧日内変動異常）","検査（病歴・身体所見・臨床検査）","高血圧性臓器障害の評価","二次性高血圧の除外のためのスクリーニング","CQ2: 家庭血圧を指標とした降圧治療 vs 診察室血圧","CQ3: カフ式血圧計を用いた家庭での血圧自己測定の効果"],"sets":[{"day":1,"questions":[{"no":1,"stem":"JSH2025における診察室血圧での高血圧の基準値として正しいのはどれか。","choices":{"a":"130/80 mmHg以上","b":"135/85 mmHg以上","c":"140/85 mmHg以上","d":"140/90 mmHg以上","e":"150/90 mmHg以上"},"format":"単一","correct":"d","explanation":"診察室血圧での高血圧基準は140/90 mmHg以上。家庭血圧は135/85、ABPM 24時間平均は130/80。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=43","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=38"},{"no":2,"stem":"血圧測定における正しい手技について誤っているのはどれか。","choices":{"a":"背もたれのある椅子に座る","b":"上腕にカフを巻く","c":"足を組まないようにする","d":"測定前に5分以上の安静が必要","e":"1〜2分の安静後に測定する"},"format":"単一","correct":"d","explanation":"診察室血圧測定は1〜2分の安静後に測定。5分以上ではなく1〜2分。背もたれ椅子、上腕カフ、足を組まない点は正しい。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=41","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=34"},{"no":3,"stem":"白衣高血圧の特徴について正しいものを2つ選べ。","choices":{"a":"診察室血圧が140/90以上で家庭血圧が135/85未満","b":"持続性高血圧と比べて臓器障害リスクは低い","c":"将来的に持続性高血圧に移行するリスクがある","d":"治療は不要で経過観察も不要","e":"診察室血圧は常に正常"},"format":"複数","correct":"ac","explanation":"白衣高血圧は診察室高値・家庭正常。持続性高血圧より臓器障害リスクは低いが正常血圧より高く、持続性高血圧への移行リスクがある。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=47","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=44"},{"no":4,"stem":"仮面高血圧のタイプに含まれないのはどれか。","choices":{"a":"早朝高血圧","b":"夜間高血圧","c":"ストレス下高血圧","d":"白衣高血圧","e":"職場高血圧"},"format":"単一","correct":"d","explanation":"仮面高血圧は診察室正常・診察室外高値で、早朝・夜間・ストレス下（職場）高血圧が含まれる。白衣高血圧は逆パターン。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=48","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=45"},{"no":5,"stem":"ABPM（24時間自由行動下血圧測定）の適応について正しいのはどれか。","choices":{"a":"全ての高血圧患者に必須","b":"白衣高血圧や仮面高血圧が疑われる場合","c":"家庭血圧で代替可能なため不要","d":"入院患者のみに実施","e":"1週間装着する"},"format":"単一","correct":"b","explanation":"ABPMは白衣高血圧・仮面高血圧の鑑別、夜間血圧評価、治療抵抗性高血圧の評価等に適応。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=45","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=42"},{"no":6,"stem":"CQ2: 家庭血圧を指標とした降圧治療について正しいのはどれか。","choices":{"a":"診察室血圧を指標とした治療より劣る","b":"家庭血圧を指標とした降圧治療が推奨される","c":"エビデンスは存在しない","d":"家庭血圧は治療効果の評価に不適切","e":"ABPMのみが治療指標となる"},"format":"単一","correct":"b","explanation":"CQ2: 家庭血圧を指標とした降圧治療は、診察室血圧を指標とした治療と比較して推奨される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=56","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=38"},{"no":7,"stem":"診察室血圧の血圧分類（JSH2025）で「高値血圧」に該当するのはどれか。","choices":{"a":"120-129/80未満","b":"130-139/80-89","c":"140-159/90-99","d":"120未満/80未満","e":"160以上/100以上"},"format":"単一","correct":"b","explanation":"JSH2025の血圧分類: 正常血圧<120/80、正常高値血圧120-129/80未満、高値血圧130-139/80-89、I度高血圧140-159/90-99。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=43","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=38"},{"no":8,"stem":"二次性高血圧を疑うスクリーニング検査に含まれないのはどれか。","choices":{"a":"血清カリウム","b":"血漿アルドステロン濃度","c":"血清クレアチニン","d":"心臓カテーテル検査","e":"尿蛋白定量"},"format":"単一","correct":"d","explanation":"二次性高血圧スクリーニングにはK、PAC/PRA(ARR)、Cr、尿蛋白、甲状腺機能等が含まれる。心カテはスクリーニングではない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=55","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=80"},{"no":9,"stem":"血圧測定で左右差が15 mmHg以上ある場合に疑うべき疾患はどれか。","choices":{"a":"原発性アルドステロン症","b":"大動脈炎症候群（高安動脈炎）","c":"褐色細胞腫","d":"腎実質性高血圧","e":"クッシング症候群"},"format":"単一","correct":"b","explanation":"左右の上肢で血圧差が15 mmHg以上ある場合、大動脈炎症候群や鎖骨下動脈狭窄を疑う。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=53","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=62"},{"no":10,"stem":"高血圧の臨床検査で必須項目に含まれるものを2つ選べ。","choices":{"a":"尿検査（蛋白・糖・潜血）","b":"心エコー","c":"血算・生化学（Cr,K,脂質,血糖,尿酸）","d":"頸動脈エコー","e":"腎動脈エコー"},"format":"複数","correct":"ac","explanation":"高血圧の基本検査として尿検査と血液生化学（Cr,K,脂質,血糖,尿酸等）は必須。心エコー・頸動脈エコーは臓器障害評価として推奨。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=54","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=80"},{"no":11,"stem":"家庭血圧の測定で推奨されるカフの位置として正しいのはどれか。","choices":{"a":"手首","b":"上腕（心臓の高さ）","c":"大腿","d":"指","e":"前腕"},"format":"単一","correct":"b","explanation":"家庭血圧測定は上腕カフ式が推奨。カフは心臓の高さに合わせる。手首式は推奨されない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=42","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=36"},{"no":12,"stem":"CQ3: カフ式血圧計を用いた家庭血圧自己測定について正しいのはどれか。","choices":{"a":"効果は証明されていない","b":"血圧低下・管理改善に有効","c":"コスト効果が低い","d":"高齢者には不適","e":"測定回数は週1回でよい"},"format":"単一","correct":"b","explanation":"CQ3: 家庭血圧自己測定は血圧の低下および管理の改善に有効。エビデンスに基づいて推奨される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=57","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=36"},{"no":13,"stem":"脈波伝播速度（PWV/baPWV）について正しいのはどれか。","choices":{"a":"動脈の柔軟性を反映する","b":"baPWVが高いほど動脈硬化が進行している","c":"血圧とは無関係","d":"若年者でのみ有用","e":"侵襲的検査である"},"format":"単一","correct":"b","explanation":"baPWV（上腕-足首間脈波伝播速度）は動脈硬化の指標。値が高いほど動脈壁の硬化が進行。非侵襲的に測定可能。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=55","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=88"},{"no":14,"stem":"高血圧患者の眼底検査について正しいのはどれか。","choices":{"a":"全例に必須","b":"重症高血圧や糖尿病合併例で推奨","c":"眼底所見と予後は無関係","d":"I度高血圧では不要","e":"Keith-Wagener分類は使われていない"},"format":"単一","correct":"b","explanation":"眼底検査は特に重症高血圧・糖尿病合併例で推奨。Keith-Wagener分類やScheie分類で評価。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=55","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=92"},{"no":15,"stem":"起立性低血圧の定義として正しいのはどれか。","choices":{"a":"起立後1分以内に収縮期血圧20 mmHg以上または拡張期10 mmHg以上の低下","b":"起立後5分以内に収縮期血圧10 mmHg以上の低下","c":"起立後に血圧が上昇すること","d":"起立後3分以内に収縮期血圧30 mmHg以上の低下","e":"座位と臥位の差が5 mmHg以上"},"format":"単一","correct":"a","explanation":"起立性低血圧は起立後3分以内に収縮期血圧20 mmHg以上または拡張期10 mmHg以上の低下。高齢者・降圧薬使用中に注意。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=53","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=62"},{"no":16,"stem":"JSH2025の血圧分類で「正常高値血圧」に該当するのはどれか。","choices":{"a":"120未満 かつ 80未満","b":"120-129 かつ 80未満","c":"130-139 または 80-89","d":"140-159 または 90-99","e":"160以上 または 100以上"},"format":"単一","correct":"b","explanation":"正常高値血圧は収縮期120-129 mmHgかつ拡張期80 mmHg未満。JSH2025で新設された分類。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=43","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=38"},{"no":17,"stem":"心電図で左室肥大を示唆する所見について正しいものを2つ選べ。","choices":{"a":"SV1+RV5 ≧ 35mm（Sokolow-Lyon基準）","b":"Cornell voltage基準（RaVL+SV3）","c":"右軸偏位","d":"P波の増高","e":"QT延長"},"format":"複数","correct":"ab","explanation":"心電図での左室肥大基準はSokolow-Lyon（SV1+RV5≧35mm）やCornell voltage（男性SV3+RaVL>28mm、女性>20mm）が代表的。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=55","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=85"},{"no":18,"stem":"高血圧患者の尿アルブミン検査の意義について正しいのはどれか。","choices":{"a":"全例で不要","b":"腎障害の早期マーカーとして有用","c":"治療効果の判定には使えない","d":"糖尿病合併例のみで有用","e":"30mg/gCr以上が正常"},"format":"単一","correct":"b","explanation":"尿アルブミン（微量アルブミン尿30-299mg/gCr）は腎障害の早期マーカーとして有用。心血管リスクの指標でもある。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=55","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=86"},{"no":19,"stem":"血圧の測定精度に影響する因子について正しいものを2つ選べ。","choices":{"a":"カフサイズの不適合","b":"膀胱の充満度","c":"部屋の照明","d":"血液型","e":"利き手"},"format":"複数","correct":"ab","explanation":"カフサイズの不適合（上腕周囲に対して小さいと高値に）と膀胱充満（満膀胱で約10mmHg上昇）は血圧測定精度に影響する代表的因子。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=41","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=34"},{"no":20,"stem":"頸動脈エコーで評価する項目について正しいのはどれか。","choices":{"a":"内膜中膜複合体厚（IMT）とプラーク","b":"心室壁運動","c":"腎血流量","d":"脈波伝播速度","e":"大動脈径"},"format":"単一","correct":"a","explanation":"頸動脈エコーはIMT（内膜中膜複合体厚）とプラークの有無を評価。動脈硬化の非侵襲的指標として有用。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=55","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=89"}]},{"day":2,"questions":[{"no":1,"stem":"診察室血圧測定において1回目と2回目の測定値が異なる場合の取り扱いについて正しいのはどれか。","choices":{"a":"常に1回目を採用","b":"常に2回目を採用","c":"2回の平均値を用いる","d":"高い方を採用","e":"低い方を採用"},"format":"単一","correct":"c","explanation":"診察室血圧は2回測定し、その平均値を用いる。1回目が高くなることが多い（警戒反応）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=42","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=34"},{"no":2,"stem":"ABPMにおける夜間血圧の高血圧基準値として正しいのはどれか。","choices":{"a":"110/65 mmHg以上","b":"115/70 mmHg以上","c":"120/70 mmHg以上","d":"125/75 mmHg以上","e":"130/80 mmHg以上"},"format":"単一","correct":"c","explanation":"ABPM夜間高血圧基準: 120/70 mmHg以上。24時間平均130/80、昼間135/85、夜間120/70。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=45","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=43"},{"no":3,"stem":"SU: 聴診間隙（auscultatory gap）について正しいのはどれか。","choices":{"a":"若年者に多い","b":"拡張期血圧が実際より高く測定される","c":"コロトコフ音が一時的に消失する現象","d":"オシロメトリック法でも発生する","e":"臨床的意義はない"},"format":"単一","correct":"c","explanation":"聴診間隙は聴診法で収縮期と拡張期の間でコロトコフ音が一時的に消失する現象。動脈硬化の進んだ高齢者に多い。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=35"},{"no":4,"stem":"血圧日内変動のriser型の特徴として正しいのはどれか。","choices":{"a":"夜間血圧が昼間より10-20%低下","b":"夜間血圧が昼間より高い","c":"夜間血圧が昼間より20%以上低下","d":"夜間血圧が昼間と同等","e":"血圧日内変動がない"},"format":"単一","correct":"b","explanation":"Riser型は夜間血圧が昼間血圧より上昇するパターン。心血管リスクが最も高い。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=48","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=45"},{"no":5,"stem":"白衣高血圧と仮面高血圧の心血管リスクについて正しいのはどれか。","choices":{"a":"白衣高血圧のリスクが最も高い","b":"仮面高血圧のリスクが白衣高血圧より高い","c":"両者のリスクは同等","d":"両者とも正常血圧と同等","e":"仮面高血圧のリスクは正常血圧と同等"},"format":"単一","correct":"b","explanation":"心血管リスク: 持続性高血圧＞仮面高血圧＞白衣高血圧＞正常血圧の順。仮面高血圧は白衣高血圧より高リスク。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=48","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=45"},{"no":6,"stem":"高血圧の初診時に聴取すべき病歴について正しいものを2つ選べ。","choices":{"a":"高血圧の家族歴","b":"服用中の薬剤（NSAIDs、漢方等）","c":"ペットの有無","d":"血液型","e":"利き手"},"format":"複数","correct":"ab","explanation":"初診時には高血圧の家族歴、服用薬剤（NSAIDs・漢方のカンゾウ・経口避妊薬等は二次性高血圧の原因）を確認。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=52","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=60"},{"no":7,"stem":"SU: 血圧サージについて正しいのはどれか。","choices":{"a":"血圧の急激な一過性上昇","b":"持続的な高血圧","c":"血圧の急激な低下","d":"血圧変動がない状態","e":"測定誤差による見かけの変動"},"format":"単一","correct":"a","explanation":"血圧サージは血圧の急激な一過性上昇。morning surge（早朝の急上昇）は心血管イベントのリスク因子。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=46"},{"no":8,"stem":"morning surgeの定義として正しいのはどれか。","choices":{"a":"起床後2時間の最高血圧 - 夜間最低血圧 ≧ 55 mmHg","b":"朝の家庭血圧 - 夜の家庭血圧 ≧ 20 mmHg","c":"起床前の血圧上昇 ≧ 30 mmHg","d":"朝の診察室血圧 ≧ 180 mmHg","e":"朝の脈拍数 ≧ 100/分"},"format":"単一","correct":"a","explanation":"Morning surge = 起床後2時間の最高血圧 - 夜間の最低血圧。55 mmHg以上で心血管リスクが上昇。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=48","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=46"},{"no":9,"stem":"SU: 血圧測定におけるデジタル技術の活用について正しいのはどれか。","choices":{"a":"Bluetooth連携血圧計は使用禁止","b":"血圧データのクラウド管理が可能な製品がある","c":"電子記録は紙の記録より信頼性が低い","d":"データ送信機能付き血圧計は精度が劣る","e":"遠隔モニタリングのエビデンスはない"},"format":"単一","correct":"b","explanation":"Bluetooth連携やクラウドサービスを活用した血圧データ管理が可能。遠隔モニタリングへの活用も期待される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=57","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=40"},{"no":10,"stem":"高血圧患者の身体診察で重要な所見について正しいものを2つ選べ。","choices":{"a":"腹部血管雑音（腎動脈狭窄の示唆）","b":"大腿動脈の拍動減弱（大動脈縮窄の示唆）","c":"手掌紅斑","d":"脾腫","e":"巨舌"},"format":"複数","correct":"ab","explanation":"腹部血管雑音は腎動脈狭窄、大腿動脈拍動減弱は大動脈縮窄を示唆。二次性高血圧のスクリーニングに重要な身体所見。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=53","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=62"},{"no":11,"stem":"ABPMとHBPM（家庭血圧）の使い分けについて正しいのはどれか。","choices":{"a":"ABPMは夜間血圧評価に優れる","b":"HBPMは夜間血圧の評価に最適","c":"ABPMは毎日行うべき検査","d":"HBPMは1回のみの測定","e":"両者の臨床的意義は同等"},"format":"単一","correct":"a","explanation":"ABPMは夜間血圧・血圧日内変動パターンの評価に優れる。HBPMは日常的な血圧管理に優れる。相補的に使用。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=45","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=42"},{"no":12,"stem":"SU: 起立性高血圧について正しいのはどれか。","choices":{"a":"起立時に血圧が低下する","b":"起立時に血圧が上昇する","c":"高齢者に多い","d":"心血管リスクとの関連はない","e":"治療は不要"},"format":"単一","correct":"b","explanation":"起立性高血圧は立位で血圧が上昇するパターン。自律神経の過活動が関与。心血管リスクの上昇と関連。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=62"},{"no":13,"stem":"eGFR（推算糸球体濾過量）の計算に必要な因子を2つ選べ。","choices":{"a":"血清クレアチニン","b":"年齢","c":"体重","d":"血圧値","e":"コレステロール値"},"format":"複数","correct":"ab","explanation":"eGFRは血清Cr値・年齢・性別から計算（日本人用GFR推算式）。体重は不要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=54","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=84"},{"no":14,"stem":"SU: 正常血圧者における家庭血圧測定の意義について正しいのはどれか。","choices":{"a":"全く意義がない","b":"仮面高血圧の発見に有用","c":"家庭血圧は高血圧患者のみ測定すべき","d":"正常血圧者が測定すると不安を煽る","e":"健常者での測定は保険適用外"},"format":"単一","correct":"b","explanation":"正常血圧者でも家庭血圧測定により仮面高血圧の発見が可能。特にリスク因子のある者では有用。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=48","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=38"},{"no":15,"stem":"ABI（足関節上腕血圧比）について正しいのはどれか。","choices":{"a":"正常値は1.0〜1.4","b":"0.9未満で末梢動脈疾患を疑う","c":"1.5以上は正常","d":"上肢の血圧のみで計算","e":"高齢者では測定不要"},"format":"単一","correct":"b","explanation":"ABI（足関節収縮期血圧/上腕収縮期血圧）0.9未満は末梢動脈疾患を示唆。正常は1.0〜1.3。1.4以上は動脈の石灰化を疑う。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=55","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=89"},{"no":16,"stem":"SU: 血圧変動の短期変動と長期変動について正しいのはどれか。","choices":{"a":"短期変動は心拍ごとの変動のみを指す","b":"長期変動には日間変動や季節変動が含まれる","c":"長期変動は臨床的に無意味","d":"visit-to-visit variabilityは短期変動","e":"血圧変動は予後と無関係"},"format":"単一","correct":"b","explanation":"長期血圧変動（日間変動・受診間変動・季節変動）は臓器障害や予後と関連。Visit-to-visit variabilityは長期変動に分類。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=46"},{"no":17,"stem":"高血圧患者の心エコー評価で重要な項目として正しいのはどれか。","choices":{"a":"左室壁厚と左室心筋重量","b":"右室のサイズのみ","c":"弁膜症の評価のみ","d":"心嚢液貯留のみ","e":"大動脈弁の石灰化のみ"},"format":"単一","correct":"a","explanation":"高血圧患者の心エコーでは左室壁厚（中隔・後壁）、左室心筋重量（LVMI）、拡張能（E/e'等）が重要な評価項目。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=55","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=85"},{"no":18,"stem":"JSH2025でのIII度高血圧の基準値として正しいのはどれか。","choices":{"a":"140-159/90-99 mmHg","b":"160-179/100-109 mmHg","c":"180/110 mmHg以上","d":"200/120 mmHg以上","e":"150-169/95-104 mmHg"},"format":"単一","correct":"c","explanation":"III度高血圧（重症）は収縮期180 mmHg以上かつ/または拡張期110 mmHg以上。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=43","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=38"},{"no":19,"stem":"SU: 血圧日内変動の評価で用いる指標について正しいものを2つ選べ。","choices":{"a":"夜間血圧低下率（%）","b":"morning surge指数","c":"BMI","d":"HbA1c","e":"BNP"},"format":"複数","correct":"ab","explanation":"血圧日内変動は夜間血圧低下率（dipper/non-dipper/riser/extreme-dipper分類）とmorning surge指数で評価。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=44"},{"no":20,"stem":"レニン・アンジオテンシン・アルドステロン（RAA）系に関する記載で正しいのはどれか。1つ選べ。","choices":{"a":"アンジオテンシン変換酵素はアンジオテンシノーゲンからアンジオテンシンIを産生する。","b":"アンジオテンシンIIはタイプ1受容体のみ刺激する。","c":"レニンは基本的には腎臓尿細管細胞から分泌される。","d":"アンジオテンシンIIはステロイドホルモンである。","e":"全身性のRAA系と局所性のRAA系が存在する。"},"format":"単一","correct":"e","explanation":"RAA系は古典的な全身循環性RAA系（肝臓由来のアンジオテンシノーゲン→腎臓由来のレニン→肺などのACE→AT1/AT2受容体）に加え、各臓器（心臓・血管・腎臓・脂肪組織・脳など）で独立した局所性RAA系が存在し、組織特異的に作用する。Aは誤り（ACEはAng I→Ang II、レニンがAng I産生）、Bは誤り（AT2受容体も刺激）、Cは誤り（レニンは腎臓の傍糸球体細胞から分泌）、Dは誤り（Ang IIはペプチドホルモン）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=43","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=22","from_past_exam":true,"note":"次スライド（10.29.31）でEが黄色ハイライト。解説『RAAS活性化→血管収縮＋Na・水貯留→血圧上昇』。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.27.53.png","confidence":"high","slide_section":"2 血圧調節機序"},{"no":21,"stem":"診察室血圧測定について誤っているのはどれか。1つ選べ。","choices":{"a":"数分の安静後に測定する","b":"測定中は会話をかわさない","c":"脈拍数も必ず測定し記録する","d":"初診時には上腕の血圧左右差を確認する","e":"安定した値を示した3回の平均値を血圧値とする"},"format":"単一","correct":"e","explanation":"JSH2025 第5章「血圧測定と臨床評価」では、診察室血圧測定は『安定した2回以上の測定値の平均』を採用するとされ、『3回固定』ではない。Eは『安定した値を示した3回の平均値』と回数を固定的に断定している点が誤り。A（数分の安静後）、B（測定中は無会話）、C（脈拍も記録）、D（初診時左右差確認）はJSH2025の推奨に合致する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=44","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=35","from_past_exam":true,"note":"解説スライド『診察室血圧測定の方法・条件』(JSH2025)より、正解は安定した値を示した数回（通常2回）の平均値とする趣旨。Eの『3回』を断定的に固定化している点が誤りと推定されるが、正解の黄色ハイライトはこの画像セットでは確認できなかった。\n正解の黄色ハイライトは画像セット内で未確認のため自信度medium。Eが最も誤りに該当する選択肢と推定。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.29.49.png","confidence":"medium","slide_section":"3 血圧測定"},{"no":22,"stem":"56歳の男性。とくに既往症はないが、今回、一般健康診断で高血圧を指摘された。本来院、受診はないが、現在屋外内勤で勤務している関係で1年間外出血圧の平均は144/90 mmHg、朝・晩それぞれの白朝の平均血圧は132/82 mmHgであった。この方の高血圧について誤っているのはどれか。1つ選べ。","choices":{"a":"高血圧患者の約10～30％にみられ、高齢者でその割合が増加する。","b":"非高血圧と比較して将来的な心血管病リスクが高いため、注意深く経過フォローの上、評価する。","c":"持続性高血圧と比べ、臓器障害を軽度で心血管病予後も良好とする報告がある。","d":"非高血圧と一群性の約10～15%、コントロール良好な持続性高血圧の患者の約22%にみられる。","e":"新規糖尿病発症や腎臓病発症を合併する頻度が高く、将来の糖尿病の新規発症リスクとなる。"},"format":"単一","correct":"d","explanation":"JSH2025 第5章では白衣高血圧について、『一般集団の約15-30%、コントロール良好な治療中高血圧患者の約30%にみられ、高齢者で増加する』とされる。Dの『非高血圧の約10-15%、コントロール良好持続性高血圧の約22%』という数値は誤り（実際の頻度はもっと高い）。AはJSH2025の記載と合致、Bは将来心血管病リスク増加で正しい、Cは持続性高血圧と比較して臓器障害・予後は軽度との報告があり正しい、Eは新規糖尿病・腎臓病リスク増加で正しい。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=53","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=64","from_past_exam":true,"note":"解説（10.34.36/10.34.51『白衣高血圧』JSH2025）と次の問題スライド（10.36.12）でDが黄色ハイライト。白衣高血圧は診察室で測定した血圧が高血圧に該当しても診察室外血圧が正常な状態を指す。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.33.17.png","confidence":"high","slide_section":"4 臨床評価"}]}],"gl_pages":[41,62],"su_pages":[34,97]},{"id":6,"title":"管理および治療の基本","is_clinical":true,"part":2,"key_topics":["治療の目的と対象者","病態評価とリスク層別化（血圧値・臓器障害・危険因子）","降圧目標（全年齢130/80mmHg未満）","初診時の管理計画","生活習慣の改善と薬物療法の基本","治療の基本（共同意思決定の推進）","CQ4: 成人の高血圧患者において収縮期血圧130mmHg未満を目標とした降圧治療","CQ5: デジタル技術を活用した遠隔医療・保健指導","Q2: 拡張期高血圧に対する積極的な降圧治療"],"sets":[{"day":1,"questions":[{"no":1,"stem":"JSH2025における全年齢共通の降圧目標として正しいのはどれか。","choices":{"a":"140/90 mmHg未満","b":"135/85 mmHg未満","c":"130/80 mmHg未満","d":"120/80 mmHg未満","e":"150/90 mmHg未満"},"format":"単一","correct":"c","explanation":"JSH2025では全年齢で診察室血圧130/80 mmHg未満が降圧目標。JSH2019からの重要な変更点。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=68","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=98"},{"no":2,"stem":"高血圧管理における初診時の対応として正しいのはどれか。","choices":{"a":"直ちに降圧薬を処方する","b":"血圧値・臓器障害・リスク因子を評価して管理計画を立てる","c":"3ヶ月後に再診する","d":"生活習慣改善のみで経過観察","e":"専門医に紹介する"},"format":"単一","correct":"b","explanation":"初診時には血圧値・高血圧性臓器障害・心血管病の危険因子を評価し、リスク層別化に基づく管理計画を立てる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=63","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=98"},{"no":3,"stem":"CQ4: 成人高血圧患者における130/80未満の降圧目標について正しいのはどれか。","choices":{"a":"エビデンスがないため推奨されない","b":"75歳未満でのみ推奨","c":"脳心血管病の発症・死亡を減少させるとされ推奨される","d":"拡張期血圧は考慮しない","e":"腎機能が正常な患者のみ対象"},"format":"単一","correct":"c","explanation":"CQ4: SPRINT等のRCTエビデンスに基づき、130/80 mmHg未満の降圧が脳心血管病の発症・死亡を減少させるとして推奨。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=70","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=100"},{"no":4,"stem":"リスク層別化の因子に含まれるものを2つ選べ。","choices":{"a":"糖尿病","b":"CKD（蛋白尿陽性）","c":"BMI 22","d":"アルブミン値正常","e":"HDLコレステロール高値"},"format":"複数","correct":"ab","explanation":"リスク層別化因子: 糖尿病、CKD、心血管病既往、蛋白尿、左室肥大、年齢（65歳以上）、喫煙、脂質異常症等。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=65","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=100"},{"no":5,"stem":"高値血圧（130-139/80-89）で臓器障害なし・リスク因子なしの場合の初期対応として正しいのはどれか。","choices":{"a":"直ちに降圧薬開始","b":"生活習慣改善を指導","c":"精密検査を行う","d":"3年後に再診","e":"入院加療"},"format":"単一","correct":"b","explanation":"高値血圧で低リスクの場合はまず生活習慣改善を指導し、1〜3ヶ月後に再評価。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=66","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=102"},{"no":6,"stem":"I度高血圧で高リスク（臓器障害・心血管病既往あり）の場合の対応として正しいのはどれか。","choices":{"a":"生活習慣改善のみで6ヶ月経過観察","b":"直ちに生活習慣改善＋降圧薬開始","c":"3ヶ月間生活習慣改善後に降圧薬検討","d":"専門医紹介のみ","e":"経過観察不要"},"format":"単一","correct":"b","explanation":"I度高血圧でも高リスク（臓器障害・心血管病既往・糖尿病合併等）では直ちに生活習慣改善と降圧薬治療を開始。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=67","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=103"},{"no":7,"stem":"II度以上の高血圧における初期対応として正しいのはどれか。","choices":{"a":"生活習慣改善のみで3ヶ月経過観察","b":"リスクに関係なく直ちに生活習慣改善＋降圧薬開始","c":"入院治療が必須","d":"6ヶ月の経過観察","e":"専門医に紹介して治療を待つ"},"format":"単一","correct":"b","explanation":"II度以上の高血圧ではリスクレベルに関係なく、直ちに生活習慣改善と降圧薬治療を開始する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=67","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=103"},{"no":8,"stem":"CQ5: デジタル技術を活用した遠隔医療について正しいのはどれか。","choices":{"a":"高血圧管理に効果なし","b":"血圧管理の改善に有用とされる","c":"対面診療より劣る","d":"若年者にのみ有効","e":"コスト効果は否定的"},"format":"単一","correct":"b","explanation":"CQ5: デジタル技術（遠隔医療・保健指導）は高血圧管理の改善に有用とされ、条件付きで推奨される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=74","su_link":null},{"no":9,"stem":"Q2: 拡張期高血圧について正しいのはどれか。","choices":{"a":"治療は不要","b":"拡張期血圧90 mmHg以上は降圧治療の対象","c":"収縮期血圧が正常なら問題ない","d":"高齢者に多い","e":"心血管リスクとの関連はない"},"format":"単一","correct":"b","explanation":"Q2: 拡張期血圧90 mmHg以上（収縮期正常でも）は孤立性拡張期高血圧として降圧治療の対象。中年男性に多い。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=76","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=104"},{"no":10,"stem":"共同意思決定（SDM: Shared Decision Making）について正しいのはどれか。","choices":{"a":"医師が一方的に治療方針を決める","b":"患者の希望のみに従う","c":"医師と患者が情報を共有し、協働して治療方針を決定する","d":"治療に時間がかかりすぎる","e":"エビデンスは不要"},"format":"単一","correct":"c","explanation":"JSH2025では共同意思決定(SDM)を重視。医師・患者が情報を共有し、エビデンスと患者の価値観に基づき協働で決定。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=78","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=108"},{"no":11,"stem":"降圧目標に関してJSH2019から2025への変更点として正しいのはどれか。","choices":{"a":"全体的に目標値が緩和された","b":"75歳以上の降圧目標が130/80未満に引き下げられた","c":"糖尿病合併例の目標が150/90に変更","d":"CKD合併例の目標が緩和された","e":"変更はなかった"},"format":"単一","correct":"b","explanation":"JSH2025では75歳以上の降圧目標も130/80 mmHg未満に統一。JSH2019では75歳以上は140/90未満だった。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=68","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=100"},{"no":12,"stem":"高血圧治療におけるJ曲線（J-curve）について正しいのはどれか。","choices":{"a":"過度の降圧で心血管イベントが増加する可能性","b":"血圧を下げるほど常に良好な予後","c":"拡張期血圧には当てはまらない","d":"若年者のみに関連","e":"エビデンスは全くない"},"format":"単一","correct":"a","explanation":"J曲線は過度の降圧（特に拡張期<70 mmHg）で冠動脈疾患イベントが増加する可能性を示す概念。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=69","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=100"},{"no":13,"stem":"SPRINT試験について正しいのはどれか。","choices":{"a":"収縮期血圧150 mmHg未満群が140未満群より優れた","b":"収縮期血圧120 mmHg未満群が140未満群より心血管イベントが少なかった","c":"糖尿病患者を含む試験","d":"日本人を対象とした試験","e":"降圧薬なしの生活習慣改善のみの試験"},"format":"単一","correct":"b","explanation":"SPRINT試験は糖尿病・脳卒中既往を除外した高リスク高血圧患者で、SBP<120群が<140群より心血管イベント・死亡が有意に少なかった。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=70","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=100"},{"no":14,"stem":"高血圧管理におけるリスク層別化で「高リスク」に分類される条件について正しいものを2つ選べ。","choices":{"a":"I度高血圧＋糖尿病","b":"I度高血圧＋危険因子1つ","c":"高値血圧＋危険因子なし","d":"II度高血圧＋CKD","e":"正常高値血圧＋喫煙"},"format":"複数","correct":"ad","explanation":"高リスク: I度以上＋糖尿病/CKD/臓器障害/心血管病既往。またはII-III度＋危険因子あり。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=66","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=102"},{"no":15,"stem":"家庭血圧での降圧目標値として正しいのはどれか。","choices":{"a":"140/90 mmHg未満","b":"135/85 mmHg未満","c":"130/80 mmHg未満","d":"125/75 mmHg未満","e":"120/70 mmHg未満"},"format":"単一","correct":"d","explanation":"JSH2025の家庭血圧での降圧目標は125/75 mmHg未満。診察室130/80に対応。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=68","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=98"},{"no":16,"stem":"SU: 絶対リスクと相対リスクの違いについて正しいのはどれか。","choices":{"a":"絶対リスクは個人が一定期間にイベントを起こす確率","b":"相対リスクは個人のイベント発生確率","c":"絶対リスクのみが治療方針に関連","d":"相対リスクは常に絶対リスクより大きい","e":"両者に臨床的な違いはない"},"format":"単一","correct":"a","explanation":"絶対リスクは個人が一定期間に脳心血管病を発症する確率。相対リスクは基準群との比。治療判断には絶対リスクがより重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=100"},{"no":17,"stem":"降圧薬開始後のフォローアップについて正しいのはどれか。","choices":{"a":"6ヶ月後に初回再診","b":"1〜2週間後に再診し副作用と降圧効果を確認","c":"再診は不要","d":"血圧が正常化すれば通院終了","e":"年1回の受診で十分"},"format":"単一","correct":"b","explanation":"降圧薬開始後は1〜2週間後（遅くとも1ヶ月以内）に再診し、降圧効果と副作用を確認する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=78","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=106"},{"no":18,"stem":"高血圧治療における「治療の質」の指標として重要なのはどれか。","choices":{"a":"処方された薬剤数","b":"降圧目標達成率","c":"受診回数","d":"検査回数","e":"処方箋の発行枚数"},"format":"単一","correct":"b","explanation":"高血圧治療の質の最も重要な指標は降圧目標達成率。処方薬剤数や受診回数自体は質の指標とならない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=78","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=108"},{"no":19,"stem":"SU: 臨床イナーシャ（clinical inertia）について正しいのはどれか。","choices":{"a":"患者の服薬忘れ","b":"目標未達でも治療を
