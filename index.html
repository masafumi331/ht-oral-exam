加させた","e":"高齢者は厳格降圧で全死亡が増加した"},"format":"単一","correct":"b","explanation":"SPRINT-MIND試験（JAMA 2019）では厳格降圧群（SBP<120 mmHg）と標準降圧群（SBP<140）を比較し、主要エンドポイントのprobable dementia発症は有意差なし（HR 0.83、p=0.10）、しかしMCI発症は有意に減少（HR 0.81、p=0.007）、複合エンドポイント（MCI+dementia）も有意に減少（HR 0.85、p=0.01）。脳容積はやや減少傾向だが認知機能悪化とは関連せず有害ではない。dementia単独で有意差を示せなかった点に注意。GL p.135参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=137","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=217"},{"no":11,"stem":"認知症合併高齢者の降圧治療について最も適切なのはどれか。","choices":{"a":"認知症があれば降圧治療は中止する","b":"降圧目標を一律に150/90 mmHg未満とする","c":"認知機能・ADL・併存疾患・服薬アドヒアランスを評価し、忍容性をみながら個別目標を設定する","d":"認知症のある高齢者では家庭血圧測定は不要","e":"薬剤数は多いほど血圧管理に有利"},"format":"単一","correct":"c","explanation":"JSH2025では認知症合併高齢者の降圧治療は画一的な目標設定ではなく、認知機能・ADL・併存疾患・服薬アドヒアランス・余命・本人/家族の意向を総合的に評価して個別に降圧目標を決める（shared decision making）。過度な降圧は起立性低血圧・転倒・失神・脳灌流低下のリスクを増す。服薬アドヒアランス向上のため一日一回製剤・配合剤の活用、家庭血圧測定・家族や訪問看護による服薬支援が有用。GL p.135-136参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=137","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=218"},{"no":12,"stem":"CKDステージG4-G5（eGFR<30 mL/min/1.73m²）でのRA系阻害薬使用について正しいのはどれか。","choices":{"a":"eGFR<30では絶対禁忌である","b":"蛋白尿のあるCKD進行例ではRA系阻害薬の継続を考慮するが、高K血症・Cr急上昇を慎重にモニタリングする","c":"高度CKDではRA系阻害薬を中止することで腎機能の改善が期待できる（STOP&GO試験で証明）","d":"RA系阻害薬は透析導入を早める","e":"高K血症が出たら必ず中止する"},"format":"単一","correct":"b","explanation":"進行CKD（G4-G5、eGFR<30）でもRA系阻害薬は蛋白尿減少・腎保護効果が期待でき、JSH2025では『中止せず継続を考慮』が基本方針。ただしK値・Cr・血圧を慎重に監視し、高K血症（K>5.5）ではK吸着薬（パチロマー・ジルコニウムシクロケイ酸ナトリウム）の併用や減量も検討する。STOP-ACEi試験（2022 NEJM）では進行CKDでRA系阻害薬を中止しても腎機能は改善せず、心血管予後はむしろ悪化傾向であった。GL p.127参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=129","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=206"},{"no":13,"stem":"55歳男性、高血圧と2型糖尿病。診察室血圧148/88、家庭血圧142/85、HbA1c 7.2%、eGFR 58 mL/min/1.73m²、尿アルブミン/Cr比 180 mg/gCr。治療方針として最も適切なのはどれか。","choices":{"a":"降圧目標は140/90未満、ARBから開始しSGLT2阻害薬を追加","b":"降圧目標は130/80未満、ARB/ACE阻害薬を第一選択とし、SGLT2阻害薬・必要に応じてフィネレノンを追加","c":"降圧目標は120/70未満、α遮断薬から開始","d":"糖尿病合併のため降圧は150/90未満で十分","e":"アルブミン尿はないため降圧薬は不要"},"format":"単一","correct":"b","explanation":"糖尿病合併CKD（アルブミン/Cr比 180 mg/gCrでA2、eGFR 58でG3a）の典型例。降圧目標130/80未満（JSH2025 CQ10/CQ12）、降圧第一選択はARB/ACE阻害薬（CQ11/CQ13）で、輸出細動脈拡張による糸球体内圧低下と蛋白尿減少を期待。さらに腎・心保護を強化するためSGLT2阻害薬（DAPA-CKD・EMPA-KIDNEY）を、高K血症リスクを慎重評価のうえフィネレノン（FIDELIO-DKD・FIGARO-DKD）を追加するのがJSH2025・KDIGO 2024の標準。GL p.126-128参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=128","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=205"},{"no":14,"stem":"Stanford B型大動脈解離の慢性期管理（保存的治療例）として正しいのはどれか。","choices":{"a":"降圧目標はSBP<140 mmHgで、β遮断薬を中心としたレジメンが推奨される","b":"保存的管理ではSBP 180 mmHg程度でよい","c":"Ca拮抗薬は禁忌である","d":"解離既往があるためすべての降圧薬は禁忌","e":"高血圧管理は慢性期には不要"},"format":"単一","correct":"a","explanation":"Stanford B型大動脈解離の保存的慢性期管理ではSBP<130-140 mmHg・心拍数<60-70/分を目標に、β遮断薬を中心とした多剤併用で厳格管理する。impulse control（dP/dtの低下）が解離拡大・破裂予防に最重要。β遮断薬不十分例ではCa拮抗薬・RA系阻害薬を併用。偽腔開存例は遠隔期破裂・解離拡大リスクが高く、生涯にわたる血圧管理とCT等の画像フォロー（最初1-3-6か月、以降毎年）が必要。GL p.131-132参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=133","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=211"},{"no":15,"stem":"高血圧と腎機能障害の関係について誤っているのはどれか。","choices":{"a":"高血圧は末期腎不全（ESKD）の独立した危険因子である","b":"蛋白尿は心血管病・腎機能悪化の強力な予測因子である","c":"腎硬化症は本邦の透析導入原因の主要疾患の一つである","d":"高血圧があってもeGFRが正常範囲ならCKDではない（蛋白尿・尿異常・画像異常を問わず）","e":"降圧治療は腎機能低下進行を抑制する"},"format":"単一","correct":"d","explanation":"KDIGOおよびCKD診療ガイド2024でのCKDの定義は『①蛋白尿等の腎障害の証拠（尿異常・画像異常・病理・腎移植）、または②eGFR<60 mL/min/1.73m²、のいずれかが3か月以上持続』。したがってeGFR正常（≧60）でも蛋白尿・尿沈渣異常・画像異常があればCKDと診断される。dは『eGFR正常範囲ならCKDではない』が誤り。a・b・c・eはJSH2025の記載と一致。GL p.123参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=125","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=199"},{"no":16,"stem":"高血圧合併間欠性跛行患者でABI 0.75。降圧薬選択について最も適切なのはどれか。","choices":{"a":"ABI低値のため降圧治療を行わない","b":"ARB/ACE阻害薬・Ca拮抗薬を中心に、必要に応じてβ遮断薬も考慮し、目標130/80未満","c":"β遮断薬から開始する","d":"α遮断薬を第一選択とする","e":"サイアザイドは禁忌"},"format":"単一","correct":"b","explanation":"ABI≦0.90はPAD、≦0.50は重症下肢虚血を示唆する。本症例のABI 0.75は中等症PAD。JSH2025の降圧目標は他のPAD症例同様130/80 mmHg未満。第一選択は禁忌のないARB/ACE阻害薬・Ca拮抗薬で、HOPE試験等でラミプリル等のACE阻害薬がPAD患者の心血管予後を改善することが示された。冠動脈疾患・心不全合併でなければβ遮断薬は必須でないが、必要に応じて使用可（重症虚血肢では慎重）。サイアザイドも問題なく使える。GL p.133参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=135","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=214"},{"no":17,"stem":"DKDでフィネレノン（選択的非ステロイド型MR拮抗薬）の使用適応と注意点について誤っているのはどれか。","choices":{"a":"アルブミン尿のある2型糖尿病性CKDで腎・心血管イベント抑制が示されている","b":"ACE阻害薬/ARBに上乗せで使用する","c":"K≧4.8-5.0 mEq/L程度では慎重投与・モニタリング強化","d":"高K血症リスクが小さく、K測定は不要である","e":"eGFR≧25 mL/min/1.73m²の維持下で導入する"},"format":"単一","correct":"d","explanation":"フィネレノン（選択的非ステロイド型MR拮抗薬）はFIDELIO-DKD・FIGARO-DKDでアルブミン尿のある2型糖尿病性CKDの腎複合エンドポイント・心血管複合エンドポイント抑制を証明し、JSH2025・KDIGO 2024で推奨。RA系阻害薬最大忍容量への上乗せで投与する。スピロノラクトンより選択性が高く高K血症リスクは低いが、Kモニタリングは必須（投与前K≦4.8で開始、K≧5.5で減量・中止）。eGFR≧25 mL/min/1.73m²で導入。dの『K測定不要』が明確な誤り。GL p.128参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=130","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=206"},{"no":18,"stem":"高血圧性腎硬化症の臨床像として正しいのはどれか。2つ選べ。","choices":{"a":"緩徐進行性のeGFR低下を呈する","b":"尿沈渣は活動性所見（顆粒円柱・赤血球円柱）に乏しく蛋白尿も少量〜中等度のことが多い","c":"急速進行性糸球体腎炎（RPGN）として発症することが多い","d":"ネフローゼ症候群を呈することが典型的である","e":"降圧治療は腎機能進行抑制に無効"},"format":"複数","correct":"ab","explanation":"高血圧性腎硬化症（benign nephrosclerosis）は緩徐進行性のeGFR低下と少量〜中等度（通常<1 g/日）の蛋白尿が典型像で、本邦の透析導入原因の第3位を占める。尿沈渣は赤血球円柱・顆粒円柱等の活動性所見に乏しい。RPGN（急速進行性糸球体腎炎）として発症する病態や、ネフローゼレベルの大量蛋白尿は腎硬化症ではなく糸球体腎炎・糖尿病性腎症など他の腎疾患を疑う。降圧治療（特にRA系阻害薬）は進行抑制に有効。GL p.124-125参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=126","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=201"},{"no":19,"stem":"末梢動脈疾患・大動脈疾患の評価と高血圧管理について正しいのはどれか。2つ選べ。","choices":{"a":"ABIに加えて、TBI（toe-brachial index）は石灰化が強くABIが偽高値を呈する糖尿病・透析例で有用","b":"上腕血圧の左右差≧10 mmHgは鎖骨下動脈狭窄等の上肢動脈病変を示唆する","c":"大動脈解離の急性期は緩徐な降圧（24-48時間かけて）でよい","d":"AAA・PADの患者は脳卒中・冠動脈疾患の合併が少ない","e":"PADの降圧目標は150/90 mmHg未満で十分"},"format":"複数","correct":"ab","explanation":"TBI（toe-brachial index）は動脈石灰化が強くABIが偽高値（≧1.40）を呈する糖尿病・透析・高齢例で補完的に用いる指標で、0.70未満をPAD所見とする。上腕血圧の左右差≧10 mmHgは鎖骨下動脈狭窄等の上肢動脈病変や大動脈解離（A型）を示唆。c（大動脈解離は数十分〜数時間で急速降圧、24-48時間はNG）、d（AAA・PADは脳卒中・冠動脈疾患合併が多い汎血管病）、e（PADの降圧目標は130/80未満）はいずれも誤り。GL p.132-133参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=134","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=213"},{"no":20,"stem":"82歳女性、軽度認知障害（MCI）あり、ADLは自立。家庭血圧平均152/82 mmHg。脳血管障害・心不全の既往なし。降圧目標と薬剤選択について最も適切なのはどれか。","choices":{"a":"認知症進行リスクのため降圧は行わない","b":"ADL自立・忍容性があれば家庭血圧125/75 mmHg未満を目標に少量から開始し、転倒・起立性低血圧に注意","c":"通常用量で直ちにβ遮断薬を開始","d":"拡張期血圧のみコントロールする","e":"目標値を160/90 mmHgとして緩める"},"format":"単一","correct":"b","explanation":"75歳以上のADL自立・忍容性ありの高齢者ではSPRINT-MIND・STEP試験等から、厳格降圧（診察室130/80未満、家庭125/75未満）が認知機能（MCI予防）・心血管予後ともに有益と示されている。MCI併存例でも積極的降圧の対象となる。ただし高齢者では薬剤を少量から段階的に増量し、起立性低血圧・転倒・腎機能悪化に注意。SBP/DBPいずれも管理対象。aは認知症進行リスクで降圧しないが誤り、cは通常用量での開始がリスク。GL p.135-136、過去問Q12とも整合。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=137","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=219"},{"no":21,"stem":"脳梗塞でrt-PA（アルテプラーゼ）投与前に必須とされる血圧管理（降圧目標）はどれか。1つ選べ。","choices":{"a":"SBP<200 mmHgかつDBP<130 mmHg","b":"SBP<180 mmHgかつDBP<105 mmHg","c":"SBP<160 mmHgかつDBP<95 mmHg","d":"SBP<140 mmHgかつDBP<90 mmHg","e":"SBP<130 mmHgかつDBP<80 mmHg"},"format":"単一","correct":"b","explanation":"脳梗塞急性期のrt-PA（アルテプラーゼ）投与前の血圧管理基準は『SBP<185 mmHgかつDBP<110 mmHg』、投与後24時間は『SBP<180かつDBP<105 mmHg』。Bの『SBP<180かつDBP<105 mmHg』は投与後の維持基準とほぼ一致し、わが国の脳卒中ガイドラインでもrt-PA関連の降圧目標として広く認識されている。JSH2025 第9章「高血圧性臓器障害」脳血管障害急性期の項参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=112","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=174","from_past_exam":true,"note":"次スライド(10.46.02)でBが黄色ハイライト。rt-PA投与前の血圧条件はSBP<180かつDBP<105 mmHg。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.44.48.png","confidence":"high","slide_section":"8 脳血管疾患"},{"no":22,"stem":"心不全Aステージにおける心不全リスクにあてはまらないものはどれか。1つ選べ。","choices":{"a":"高血圧","b":"脂質異常症","c":"糖尿病","d":"慢性腎臓病","e":"肥満"},"format":"単一","correct":"b","explanation":"2025年改訂版心不全診療ガイドラインの心不全ステージ分類において、ステージA（心不全リスクあり、構造的・機能的心疾患なし）の主要リスクは『高血圧、糖尿病、慢性腎臓病、肥満』とされる。脂質異常症はステージAの構成リスク因子としては明示されておらず、よってBが正解（あてはまらない）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=120","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=187","from_past_exam":true,"note":"解説（10.46.21『2025年改訂版心不全診療ガイドライン』ステージA図）を経て、次スライド(10.46.31)でBが黄色ハイライト。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.46.07.png","confidence":"high","slide_section":"9 心・大血管"},{"no":23,"stem":"蛋白尿陽性と判断する濃度として正しいのはどれか。1つ選べ。","choices":{"a":"0.10g/gCr 以上","b":"0.15g/gCr 以上","c":"0.30g/gCr 以上","d":"0.50g/gCr 以上","e":"1.0g/gCr 以上"},"format":"単一","correct":"b","explanation":"CKD診療ガイド2024およびJSH2025 第9章「腎疾患」では、蛋白尿陽性の判定基準は『尿蛋白/Cr比 0.15 g/gCr以上』。0.50 g/gCr以上は『高度蛋白尿』とされ、より厳格なリスク評価対象となる。よってBが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=126","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=200","from_past_exam":true,"note":"解説『CKD診療ガイド2024』を経て、次スライド(10.47.10)でBが黄色ハイライト。蛋白尿陽性のカットオフは0.15g/gCr以上。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.46.37.png","confidence":"high","slide_section":"10 腎疾患"}]}],"gl_pages":[108,138],"su_pages":[171,220]},{"id":10,"title":"他疾患やライフステージを考慮した対応","is_clinical":true,"part":2,"key_topics":["糖尿病合併高血圧","肥満","脂質異常症","睡眠時無呼吸症候群","高尿酸血症・痛風","抗血栓薬服用患者","担がん患者（Onco-Hypertension）","その他の疾患（気管支喘息・COPD・肝疾患）","女性のライフステージ（性差・プレコンセプションケア・閉経後）","青年期・高齢者（フレイル・認知症・ポリファーマシー）","CQ12: 糖尿病合併高血圧において130/80mmHg未満","CQ13: 糖尿病合併高血圧に対するRA系阻害薬","CQ14: 75歳以上の高齢者に対する降圧の目標値"],"sets":[{"day":1,"questions":[{"no":1,"stem":"62歳男性。2型糖尿病(HbA1c 7.4%)・脂質異常症・微量アルブミン尿(尿Alb/Cr 80 mg/gCr)あり。診察室血圧148/88 mmHg、家庭血圧平均142/86 mmHg、eGFR 68 mL/min/1.73m²。降圧薬未投与。JSH2025に基づく初期治療として最も適切なのはどれか。1つ選べ。","choices":{"a":"サイアザイド系利尿薬を第一選択薬として開始する","b":"ARBまたはACE阻害薬を第一選択薬として開始する","c":"α遮断薬を第一選択薬として開始する","d":"β遮断薬を第一選択薬として開始する","e":"1か月間生活習慣改善のみで経過観察"},"format":"単一","correct":"b","explanation":"JSH2025 第10章「糖尿病合併高血圧」(GL p.139-141)では、糖尿病合併例で蛋白尿(微量アルブミン尿を含む)を有する場合、CQ13に基づきRA系阻害薬(ARBまたはACE阻害薬)が第一選択薬として強く推奨される(推奨グレード強・エビデンス高)。本症例は微量アルブミン尿陽性かつ家庭血圧135/85以上で糖尿病合併例の高血圧基準を満たすため、生活習慣改善と同時にRA系阻害薬を開始する。サイアザイドは耐糖能悪化、β遮断薬は脂質代謝悪化や低血糖マスクで第一選択ではない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=141","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=222"},{"no":2,"stem":"JSH2025における糖尿病合併高血圧の降圧目標として正しいのはどれか。1つ選べ。","choices":{"a":"診察室血圧 140/90 mmHg未満、家庭血圧 135/85 mmHg未満","b":"診察室血圧 130/80 mmHg未満、家庭血圧 125/75 mmHg未満","c":"診察室血圧 120/70 mmHg未満、家庭血圧 115/65 mmHg未満","d":"診察室血圧 150/90 mmHg未満、家庭血圧 145/85 mmHg未満","e":"年齢により全例で140/90 mmHg未満を許容"},"format":"単一","correct":"b","explanation":"JSH2025 第10章 糖尿病合併高血圧の項(GL p.140)およびCQ12では、糖尿病合併高血圧の降圧目標は『診察室血圧130/80 mmHg未満、家庭血圧125/75 mmHg未満』が推奨される(CQ12: 推奨強・エビデンス中)。ACCORD-BP試験等のSPRINT後メタ解析で、糖尿病合併例でもSBP130未満が脳卒中・蛋白尿進展抑制に有用とされたことを根拠とする。aは非糖尿病合併・通常の高血圧目標。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=142","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=223"},{"no":3,"stem":"55歳女性。2型糖尿病(SGLT2阻害薬・メトホルミン内服)で外来通院中。診察室血圧138/82 mmHg、家庭血圧平均135/82 mmHg。HbA1c 6.8%、eGFR 75、尿Alb/Cr 12 mg/gCr。糖尿病合併高血圧に関する記載として正しいものを2つ選べ。","choices":{"a":"微量アルブミン尿の有無に関係なく糖尿病合併例ではRA系阻害薬が第一選択である","b":"SGLT2阻害薬は2-5 mmHg程度の降圧効果が報告される","c":"ジヒドロピリジン系Ca拮抗薬は糖尿病合併例で禁忌である","d":"降圧薬3剤併用でも血圧コントロール不良なら治療抵抗性高血圧として精査・MR拮抗薬追加を検討する","e":"夜間血圧高値(non-dipper)は糖尿病ではむしろ稀な所見である"},"format":"複数","correct":"bd","explanation":"JSH2025 第10章および新ガイドラインのキーポイント。b: SGLT2阻害薬はナトリウム利尿・浸透圧利尿で2-5mmHg程度のSBP低下を示し、糖尿病合併HTN治療に有益(GL p.141)。d: 治療抵抗性HTNはJSH2025 第12章でMR拮抗薬(エサキセレノン等)追加が推奨される。aは誤り(蛋白尿なしの糖尿病ではRA系・Ca拮抗薬・利尿薬いずれも選択可)、cは誤り(ジヒドロピリジン系Ca拮抗薬はむしろ糖尿病で広く併用される)、eは誤り(糖尿病では自律神経障害でnon-dipper/riser型が多い)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=142","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=224"},{"no":4,"stem":"48歳男性。BMI 29.5、腹囲92cm、空腹時血糖108 mg/dL、HDL-C 38 mg/dL、TG 165 mg/dL、診察室血圧146/92 mmHg。肥満・メタボリック症候群合併高血圧に関して正しいのはどれか。1つ選べ。","choices":{"a":"減量目標はBMI 18.5未満","b":"現体重から3%以上の減量で有意な降圧効果が期待できる","c":"メタボ合併例では塩分制限は不要","d":"肥満合併高血圧ではβ遮断薬が第一選択である","e":"肥満では二次性高血圧の精査は不要である"},"format":"単一","correct":"b","explanation":"JSH2025 第10章「肥満」(GL p.144)では、現体重から3-5%以上の減量で有意な降圧効果(約2-5/1-3 mmHg低下)が報告される。aは誤り(BMI 25未満を目標、低体重を目指す必要はない)。cは誤り(肥満合併例でも食塩制限6g/日未満は必須)。dは誤り(肥満ではRA系阻害薬・Ca拮抗薬が推奨、β遮断薬は体重増加・耐糖能悪化のため積極的適応がない限り回避)。eは誤り(若年肥満男性ではSAS・PA・クッシング症候群など二次性高血圧の精査が重要)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=146","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=228"},{"no":5,"stem":"高血圧と脂質異常症合併に関する記述として正しいのはどれか。1つ選べ。","choices":{"a":"高血圧と脂質異常症は独立した冠動脈疾患リスクで、合併すると相乗的にリスクが増加する","b":"スタチンには直接的な降圧作用があり、降圧薬の代替となる","c":"サイアザイド系利尿薬は脂質代謝に有利に作用する","d":"β遮断薬(特に非選択性)はLDL-Cを低下させる","e":"脂質異常症合併例では家庭血圧測定は不要である"},"format":"単一","correct":"a","explanation":"JSH2025 第10章「脂質異常症」(GL p.147-148)では、高血圧と脂質異常症は独立した冠動脈疾患リスクで併存により脳心血管病リスクが相乗的に上昇する。動脈硬化性疾患予防ガイドライン2022の絶対リスク評価でも血圧とLDL-Cが同時に考慮される。bは誤り(スタチンは降圧薬の代替にならない)。cは誤り(サイアザイド大量・長期で軽度のTG上昇/HDL低下、ただしJSH2025用量では影響軽微)。dは誤り(β遮断薬はTG上昇・HDL低下傾向)。eは誤り(リスク高でむしろ厳格管理目的に家庭血圧推奨)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=149","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=232"},{"no":6,"stem":"58歳男性、BMI 28、頸囲42cm。妻からの『大きないびきと無呼吸の指摘』あり。日中傾眠Epworth 12点。降圧薬3剤(ARB+Ca拮抗薬+利尿薬)併用下で診察室血圧158/96 mmHg、夜間血圧上昇あり(riser型)。最も考えるべき病態と検査として正しいのはどれか。1つ選べ。","choices":{"a":"本態性高血圧の白衣高血圧、ABPMで確認","b":"閉塞性睡眠時無呼吸症候群(OSA)を疑い、ポリソムノグラフィー(PSG)または簡易検査を実施する","c":"原発性アルドステロン症を疑い、RA系阻害薬を中止後にPAC/PRA測定","d":"腎血管性高血圧を疑い、腎動脈造影を最優先で実施","e":"甲状腺機能亢進症を疑い、TSH/FT4測定"},"format":"単一","correct":"b","explanation":"JSH2025 第10章「睡眠時無呼吸症候群」(GL p.150-152)では、肥満・大きないびき・無呼吸の目撃・日中傾眠(Epworth 11点以上)・治療抵抗性高血圧・夜間血圧上昇(riser型)はOSA合併を強く示唆し、簡易検査(携帯型睡眠モニター)またはPSGによる無呼吸低呼吸指数(AHI)評価が推奨される。AHI≧5でOSA、≧15で中等症、≧30で重症と診断。本症例は典型的OSA合併治療抵抗性高血圧の臨床像である。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=152","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=235"},{"no":7,"stem":"問題6の症例で、PSGによりAHI 38(重症OSA)と診断された。治療と血圧への影響について正しいものを2つ選べ。","choices":{"a":"CPAP療法はOSA合併高血圧の血圧低下に寄与する(平均2-3 mmHg程度のSBP低下)","b":"重症OSAでも体重には影響しないため減量指導は不要","c":"OSAでは夜間にカテコラミン上昇、酸化ストレス亢進、RAA系活性化が血圧上昇に寄与する","d":"OSA合併高血圧ではβ遮断薬が第一選択である","e":"CPAP導入後は降圧薬を全て中止できる"},"format":"複数","correct":"ac","explanation":"JSH2025 第10章 SAS治療(GL p.152)。a: CPAPはメタ解析で平均2-3 mmHg程度のSBP低下を示し、特に治療抵抗性HTNや夜間高血圧では効果が大きい。c: OSAの高血圧機序は夜間の間欠的低酸素→交感神経活性化→カテコラミン・RAA系上昇・酸化ストレスである(GL p.151)。bは誤り(OSAでは減量で5%の体重減でもAHI改善・降圧効果)、dは誤り(β遮断薬はOSAで積極的適応はない、ARB/ACEI/Ca拮抗薬が中心)、eは誤り(CPAPは降圧薬を完全に代替するわけではない)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=152","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=236"},{"no":8,"stem":"67歳男性。高血圧治療中(ARB 80mg+アムロジピン5mg)、過去に痛風発作2回、現在の尿酸値 8.2 mg/dL、eGFR 62 mL/min/1.73m²。最近、血圧管理悪化のためサイアザイド系利尿薬の追加を検討中である。高尿酸血症・痛風合併高血圧の管理として最も適切なのはどれか。1つ選べ。","choices":{"a":"サイアザイド系利尿薬は痛風患者でも全く問題ない","b":"サイアザイドは尿酸値を上昇させるため、痛風既往例では原則回避し、ロサルタンやCa拮抗薬を優先する","c":"痛風発作時は降圧薬を全て中止する","d":"尿酸値8.2 mg/dLは正常範囲のため尿酸降下薬不要","e":"高尿酸血症・痛風は血圧管理に影響しないので無視してよい"},"format":"単一","correct":"b","explanation":"JSH2025 第10章「高尿酸血症・痛風」(GL p.153)では、サイアザイド・ループ利尿薬は近位尿細管での尿酸再吸収を増加させ尿酸値を上昇させるため、痛風既往例では原則回避すべきと記載されている。代替としてはARBの中でロサルタンが尿酸排泄促進作用(URAT1阻害)を持ち推奨される。Ca拮抗薬も尿酸への悪影響がない。尿酸値7.0以上で高尿酸血症、痛風発作既往例では尿酸6.0 mg/dL未満を目標に尿酸降下薬(フェブキソスタット等)を併用する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=155","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=240"},{"no":9,"stem":"高血圧治療薬と尿酸値への影響について正しいものを2つ選べ。","choices":{"a":"ロサルタン(ARBの一部)は尿酸排泄促進作用がある","b":"ループ利尿薬は尿酸排泄を促進するため痛風には有利","c":"サイアザイド系利尿薬は尿酸値を上昇させる","d":"Ca拮抗薬は尿酸値を有意に上昇させる","e":"ACE阻害薬は尿酸値を有意に低下させる"},"format":"複数","correct":"ac","explanation":"JSH2025 第10章(GL p.153-154)。a: ロサルタンはARBの中で唯一URAT1(腎尿細管尿酸トランスポーター)を阻害し尿酸排泄を促進する。c: サイアザイドは近位尿細管での尿酸再吸収を促進し血清尿酸値を上昇させる(典型的に0.5-1.0 mg/dL上昇)。bは誤り(ループ利尿薬も尿酸を上昇させ痛風にはむしろ不利)。dは誤り(Ca拮抗薬は尿酸値にほぼ影響しない)。eは誤り(ACE阻害薬の尿酸への影響は弱く中立的)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=155","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=241"},{"no":10,"stem":"76歳女性。非弁膜症性心房細動(CHADS2スコア3点)でアピキサバン5mg×2/日内服中。診察室血圧162/88 mmHg、家庭血圧平均158/86 mmHg。降圧療法に関する記述として正しいものを2つ選べ。","choices":{"a":"抗凝固薬服用中は脳出血リスクが上昇するため、血圧130/80 mmHg未満を目標に積極的に降圧する","b":"抗凝固薬を中止してから降圧治療を開始する","c":"アピキサバンはCa拮抗薬と相互作用するため併用禁忌である","d":"ジヒドロピリジン系Ca拮抗薬とARBの併用は問題なく使用可能である","e":"降圧目標を達成しても出血リスクは変わらないため血圧管理は重要ではない"},"format":"複数","correct":"ad","explanation":"JSH2025 第10章「抗血栓薬服用患者」(GL p.156-157)では、抗血小板薬・抗凝固薬服用中は脳出血リスクが2-5倍上昇するため厳格な血圧管理(診察室130/80未満)が推奨される(a正解)。アピキサバン等のDOACはARB・Ca拮抗薬と相互作用なく併用可(d正解)。なお、ベラパミル・ジルチアゼム等の非ジヒドロピリジン系Ca拮抗薬はDOACのCYP3A4阻害で血中濃度を上昇させる可能性があるため減量を要する。bは誤り(抗凝固薬は心房細動脳塞栓予防に必須で中止すべきでない)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=158","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=243"},{"no":11,"stem":"JSH2025 CQ12『糖尿病合併高血圧において診察室血圧130/80 mmHg未満を目標とした降圧治療は推奨されるか』に関する記述として正しいものを2つ選べ。","choices":{"a":"CQ12では130/80 mmHg未満が推奨されている(推奨強・エビデンス中)","b":"CQ12では140/90 mmHg未満が推奨されている","c":"ACCORD-BP試験のサブ解析やSPRINT後メタ解析が根拠の一部である","d":"CQ12は高齢者糖尿病でも一律に適用される(忍容性に関係なく)","e":"CQ12では収縮期血圧120 mmHg未満が推奨されている"},"format":"複数","correct":"ac","explanation":"JSH2025 CQ12(GL p.142)。a: CQ12は『糖尿病合併高血圧では診察室血圧130/80 mmHg未満を目標とした降圧治療を推奨する(推奨強・エビデンス中)』と明記。c: 根拠としてACCORD-BP試験のサブ解析、SPRINT(非糖尿病)からの外挿、複数のメタ解析が引用されている。bは誤り(2014版は140/90、2019/2025で130/80に改訂)、dは誤り(高齢者・フレイル・低血圧傾向では忍容性を考慮し緩徐に降圧)、eは誤り(SBP120未満はSPRINTの主要解析だが、CQ12の推奨は130未満)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=142","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=223"},{"no":12,"stem":"JSH2025 CQ13『糖尿病合併高血圧に対してRA系阻害薬(ACE阻害薬・ARB)は第一選択として推奨されるか』に関する記述として正しいのはどれか。1つ選べ。","choices":{"a":"蛋白尿の有無に関わらず糖尿病合併例ではRA系阻害薬が絶対適応","b":"蛋白尿(微量アルブミン尿を含む)合併例ではRA系阻害薬が第一選択として強く推奨される(CQ13)","c":"蛋白尿合併糖尿病ではCa拮抗薬を必ず第一選択とする","d":"RA系阻害薬は糖尿病合併例でも腎機能悪化のため使用すべきでない","e":"ACE阻害薬とARBの併用が第一選択として推奨される"},"format":"単一","correct":"b","explanation":"JSH2025 CQ13(GL p.143)。蛋白尿(微量アルブミン尿≧30 mg/gCrを含む)合併の糖尿病高血圧では、RA系阻害薬(ACE阻害薬またはARB)が腎保護・心血管保護効果(RENAAL/IDNT/IRMA-2試験等)から第一選択として強く推奨される(推奨強・エビデンス高)。蛋白尿のない糖尿病ではRA系阻害薬は推奨されるが『絶対的』ではなくCa拮抗薬・サイアザイドも選択肢となる(aは『絶対適応』が言い過ぎ)。eは誤り(ACE+ARB併用は腎機能悪化・高K血症リスクで禁忌)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=143","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=225"},{"no":13,"stem":"65歳女性。乳癌で術後ベバシズマブ(抗VEGF抗体)+化学療法中。投与開始3週後より血圧上昇、診察室血圧168/98 mmHg、家庭血圧平均162/96 mmHg。Onco-Hypertensionの管理として最も適切なのはどれか。1つ選べ。","choices":{"a":"ベバシズマブを即座に永久中止する","b":"ARBまたはACE阻害薬・Ca拮抗薬を開始し、血圧コントロール下で抗がん剤治療を継続する","c":"降圧薬は必要ない、自然に低下する","d":"抗がん剤治療を中止し、降圧薬も不要","e":"β遮断薬を第一選択として開始する"},"format":"単一","correct":"b","explanation":"JSH2025 第10章「担がん患者(Onco-Hypertension)」(GL p.158-160)では、VEGF阻害薬(ベバシズマブ・スニチニブ・ソラフェニブ等)関連高血圧の管理として、(1)RA系阻害薬(ARB/ACE阻害薬)・Ca拮抗薬を第一選択として開始、(2)抗がん剤継続のもとで血圧130/80 mmHg未満を目標に管理、(3)管理不能・脳症・心不全合併等では抗がん剤の減量・休薬を検討、と推奨される。VEGF阻害薬の機序はNO産生低下・血管内皮機能障害・腎傷害である。安易な抗がん剤中止はがん予後を悪化させるため避ける。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=160","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=247"},{"no":14,"stem":"Onco-Hypertension(担がん患者の高血圧)に関する記述として正しいものを2つ選べ。","choices":{"a":"VEGF阻害薬(ベバシズマブ等)による高血圧の主要機序はNO産生低下・末梢血管抵抗増加である","b":"免疫チェックポイント阻害薬は高血圧を起こさない","c":"イブルチニブ(BTK阻害薬)も高血圧を惹起しうる","d":"担がん患者では降圧薬による予後改善は全く期待できない","e":"がん治療開始前の血圧評価は不要である"},"format":"複数","correct":"ac","explanation":"JSH2025 第10章 Onco-HTN(GL p.158-160)・第15章 薬剤誘発性HTN(GL p.210)。a: VEGF阻害薬関連HTNはNO産生低下→末梢血管抵抗増加・細小血管床減少・腎傷害が主機序(過去問Q19参照)。c: BTK阻害薬イブルチニブも血管内皮機能障害により高血圧を惹起する(慢性リンパ性白血病等)。bは誤り(免疫チェックポイント阻害薬は心筋炎等の心血管合併症あり、高血圧も報告される)、dは誤り(降圧薬で心不全・脳卒中等の合併症は予防可能)、eは誤り(治療開始前に血圧評価・脳心血管リスク層別化が必須)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=160","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=248"},{"no":15,"stem":"68歳男性、気管支喘息(ICS/LABA吸入中)で診察室血圧154/92 mmHg。降圧薬の選択として最も適切なのはどれか。1つ選べ。","choices":{"a":"プロプラノロール(非選択性β遮断薬)を開始する","b":"ビソプロロール(β1選択性β遮断薬)も喘息では禁忌のため避ける","c":"ARBまたはACE阻害薬を第一選択として開始する","d":"ACE阻害薬は咳が出やすいため喘息患者には絶対禁忌である","e":"Ca拮抗薬は気管支収縮を惹起するため避ける"},"format":"単一","correct":"c","explanation":"JSH2025 第10章「その他の疾患 気管支喘息・COPD」(GL p.161)。気管支喘息では非選択性β遮断薬(プロプラノロール等)は気管支収縮を惹起するため禁忌、β1選択性(ビソプロロール・カルベジロール)も慎重投与だが絶対禁忌ではない。第一選択はARB・ACE阻害薬・Ca拮抗薬。ACE阻害薬は空咳の副作用(7-20%)で気管支喘息患者では喘息増悪との鑑別が困難になるためARBの方が安全だが、絶対禁忌ではない。Ca拮抗薬はむしろ気管支拡張作用があり気管支喘息で有用。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=161","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=250"},{"no":16,"stem":"COPD合併高血圧の管理に関する記述として誤っているのはどれか。1つ選べ。","choices":{"a":"COPDではβ1選択性β遮断薬は慎重投与だが、心不全・冠動脈疾患合併では使用可能","b":"COPDでは利尿薬は脱水・血液濃縮による塞栓症リスクや低K血症増悪に注意する","c":"COPDでは喫煙が共通リスクであり、禁煙指導が重要","d":"COPDでは降圧薬としてACE阻害薬は咳の副作用との鑑別困難で避けることが多い","e":"COPD合併高血圧は全例でCa拮抗薬が禁忌である"},"format":"単一","correct":"e","explanation":"JSH2025 第10章 COPD合併高血圧(GL p.161-162)。eは明らかに誤り(Ca拮抗薬はCOPDで第一選択の一つ、気管支拡張作用もある)。a: β1選択性β遮断薬(ビソプロロール等)はCOPDでも心不全・虚血性心疾患合併例で予後改善のため使用可能(慎重投与)。b: COPDでは肺血管床減少・脱水で塞栓症リスクあり、利尿薬は慎重に。c: 喫煙はCOPD・高血圧共通のリスクで禁煙必須。d: ACE阻害薬の咳とCOPD・喘息増悪の鑑別困難でARB優先となることが多い。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=162","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=251"},{"no":17,"stem":"60歳男性、C型肝炎によるChild-Pugh B肝硬変、食道静脈瘤(F2、出血既往あり)で外来通院。診察室血圧148/88 mmHg。肝疾患合併高血圧治療に関する記述として正しいものを2つ選べ。","choices":{"a":"肝硬変・食道静脈瘤合併例ではプロプラノロール等の非選択性β遮断薬が門脈圧低下のため積極的適応となる","b":"肝代謝の降圧薬は肝硬変では血中濃度上昇のリスクがあり、用量調整・少量からの開始が必要","c":"肝硬変では降圧薬は全て禁忌である","d":"肝硬変ではNSAIDsは肝腎症候群のリスクが低いので安全に併用できる","e":"肝硬変患者の降圧目標は通常患者と全く同じ"},"format":"複数","correct":"ab","explanation":"JSH2025 第10章「肝疾患合併高血圧」(GL p.163)。a: 食道静脈瘤(F2以上または出血既往)合併肝硬変では非選択性β遮断薬(プロプラノロール・ナドロール)が門脈圧低下・出血予防の積極的適応(肝硬変ガイドラインでも推奨)。b: 肝代謝薬(ARB・Ca拮抗薬の多くがCYP3A4代謝)は肝硬変で血中濃度上昇しうるため少量開始・慎重漸増する。cは誤り(降圧薬は必要、適切な選択を行う)、dは誤り(NSAIDsは肝腎症候群を惹起するため避ける)、eは誤り(腹水・浮腫・低血圧傾向に応じて目標を個別化)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=163","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=252"},{"no":18,"stem":"32歳女性。慢性高血圧(ARB 40mg内服中、家庭血圧平均128/82 mmHg)で半年後の妊娠を希望している。プレコンセプションケアとして適切な対応はどれか。1つ選べ。","choices":{"a":"ARBを継続したまま妊娠を許可する","b":"ARB/ACE阻害薬は胎児腎・頭蓋形成不全のため妊娠前に中止し、メチルドパ・ラベタロール・徐放性ニフェジピン等の妊娠安全薬に変更する","c":"アムロジピンに変更する","d":"妊娠する直前まで降圧薬を中止する","e":"妊娠中は降圧治療は不要であるためARBを単に中止する"},"format":"単一","correct":"b","explanation":"JSH2025 第10章「女性のライフステージ プレコンセプションケア」(GL p.155)および第13章 周産期。ARB・ACE阻害薬・MR拮抗薬は胎児の腎尿細管形成不全・頭蓋形成不全・羊水過少を惹起するため妊娠前(挙児希望時)に中止し、妊娠中に安全とされるメチルドパ・ラベタロール・徐放性ニフェジピン(妊娠20週以降)・ヒドララジン等に変更する。Ca拮抗薬の中ではニフェジピン(徐放)・ニカルジピンが使用される(アムロジピンの妊娠中安全性は確立していない)。中止後も降圧治療は継続が必要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=157","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=255"},{"no":19,"stem":"閉経後女性の高血圧に関する記述として正しいものを2つ選べ。","choices":{"a":"閉経後はエストロゲン低下により血管拡張作用が減弱し、塩分感受性が亢進する","b":"閉経後女性ではホルモン補充療法(HRT)は高血圧治療として第一選択である","c":"閉経後は男性と比較して脈圧上昇(収縮期高血圧優位)が顕著になる","d":"閉経後女性では降圧目標は男性より緩く設定する","e":"閉経後は心血管病リスクが男性より低下する"},"format":"複数","correct":"ac","explanation":"JSH2025 第10章「女性のライフステージ 閉経後」(GL p.157)。a: 閉経後はエストロゲン低下→NO産生低下・RAA系活性化・塩分感受性亢進により血圧が上昇する。c: 閉経後女性では大動脈スティフネス増加で収縮期高血圧優位の脈圧拡大が顕著になる(男性より顕著な傾向)。bは誤り(HRTは降圧薬の代替ではなく、むしろ高血圧では慎重投与)、dは誤り(降圧目標は性別で変えない、診察室130/80未満)、eは誤り(閉経後はリスクが男性に近づき、高齢ではむしろ男性以上の心不全・脳卒中リスクとなる)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=157","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=256"},{"no":20,"stem":"高血圧における性差に関する記述として正しいのはどれか。1つ選べ。","choices":{"a":"若年期(20-40代)では男性の方が女性より高血圧有病率が高い","b":"高血圧合併症としての心房細動は女性で多い","c":"妊娠高血圧症候群の既往は将来の高血圧・心血管病リスクを下げる","d":"高血圧治療薬の薬物動態には全く性差はない","e":"経口避妊薬は血圧を低下させる"},"format":"単一","correct":"a","explanation":"JSH2025 第10章 女性のライフステージ 性差(GL p.155-156)。a: 若年(40歳未満)では男性の高血圧有病率は女性の2-3倍と高く、男性ホルモン・体格・肥満有病率の差が影響する。bは誤り(心房細動は男性で多い)、cは誤り(HDP既往は将来の高血圧・心血管病・腎疾患リスクを2-4倍上げる重要な女性特有のリスク因子)、dは誤り(性差あり、女性は体格・腎機能・CYP活性で薬物動態差がある)、eは誤り(経口避妊薬は血圧を1-5 mmHg程度上昇させ、35歳以上・喫煙・高血圧合併では血栓・脳卒中リスクで禁忌)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=156","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=257"}]},{"day":2,"questions":[{"no":1,"stem":"メタボリックシンドロームと高血圧に関する記述として正しいものを2つ選べ。","choices":{"a":"わが国のメタボ診断基準では腹囲(男性≧85cm、女性≧90cm)が必須条件である","b":"メタボ合併高血圧では脳心血管病リスクが単独高血圧より3-5倍上昇する","c":"メタボ合併例では減塩より減量を優先すべきで塩分制限は不要","d":"メタボの病態の中核はインスリン抵抗性と内臓脂肪蓄積である","e":"メタボ合併高血圧ではβ遮断薬+利尿薬の併用が第一選択である"},"format":"複数","correct":"ad","explanation":"JSH2025 第10章「肥満・メタボリック症候群」(GL p.144-146)。a: わが国のメタボ診断基準(内科学会等2005)は腹囲(男性≧85cm、女性≧90cm)を必須+(脂質異常・血圧高値・空腹時血糖高値)のうち2項目で診断。d: メタボの病態の中核は内臓脂肪型肥満によるアディポサイトカイン異常→インスリン抵抗性。bは誤り(脳心血管病リスクは概ね1.5-2倍程度の上昇)、cは誤り(減塩6g/日未満と減量の両方が必須)、eは誤り(β遮断薬・利尿薬は耐糖能悪化のため代謝面で不利、ARB/ACE阻害薬・Ca拮抗薬がメタボ合併HTNでは第一選択)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=146","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=229"},{"no":2,"stem":"70歳男性、進行性腎細胞癌でスニチニブ(TKI、VEGF/PDGFR阻害薬)導入後3週間で血圧172/102 mmHgに上昇、軽度の蛋白尿(尿Pro/Cr 1.0 g/gCr)出現。Onco-Hypertensionの治療方針として最も適切なのはどれか。1つ選べ。","choices":{"a":"スニチニブを直ちに永久中止し、降圧薬不要","b":"ARBまたはACE阻害薬を開始し、必要に応じてCa拮抗薬を追加して血圧130/80 mmHg未満を目指し、スニチニブを継続する","c":"Ca拮抗薬のジルチアゼムを追加する","d":"降圧目標は140/90 mmHg未満で十分","e":"蛋白尿は無視してよい"},"format":"単一","correct":"b","explanation":"JSH2025 第10章 Onco-HTN(GL p.158-160)。VEGF/TKI関連HTNは投与開始2-8週で50-80%に発症する。蛋白尿合併ではRA系阻害薬(腎保護)が第一選択、Ca拮抗薬の併用も推奨される。ただしジルチアゼム・ベラパミル等非ジヒドロピリジン系はスニチニブのCYP3A4阻害で血中濃度上昇・骨髄抑制増悪リスクがあり回避(c誤り)。降圧目標は脳心血管病予防の観点から130/80未満が推奨される(d誤り)。蛋白尿は腎傷害の早期サインで定期評価が必要(e誤り)。安易な抗がん剤中止は予後悪化のため避ける(a誤り)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=160","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=248"},{"no":3,"stem":"28歳女性。経口避妊薬(OC)内服開始6か月後の定期健診で血圧148/92 mmHg(以前は120/74 mmHg)。BMI 22、家族歴に母の高血圧。最も適切な対応はどれか。1つ選べ。","choices":{"a":"OC関連高血圧を疑い、OC中止を提案し1-3か月後に血圧再評価する","b":"そのままOCを継続し、ARBを追加開始する","c":"本態性高血圧と診断し降圧薬を即開始","d":"OCは血圧に影響しないため経過観察のみ","e":"ARBに加えて経口避妊薬の用量を増加する"},"format":"単一","correct":"a","explanation":"JSH2025 第10章「女性のライフステージ」(GL p.156)では、経口避妊薬(OC)は使用者の約5%で軽度の血圧上昇、稀に高血圧を惹起する(エストロゲンによるアンギオテンシノーゲン肝産生増加が主機序)。OC開始後の血圧上昇では原則OC中止→1-3か月で血圧再評価が第一選択。35歳以上・喫煙・高血圧・肥満・片頭痛(前兆あり)・血栓既往ではOCは禁忌または避ける。中止後も持続する場合は本態性高血圧として降圧薬を検討。bは誤り(OCを継続したまま降圧薬では原因除去にならない)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=156","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=257"},{"no":4,"stem":"妊娠後の女性のフォローアップに関する記述として正しいものを2つ選べ。","choices":{"a":"妊娠高血圧症候群(HDP)既往は将来の高血圧・脳卒中・冠動脈疾患・腎疾患リスクを2-4倍上昇させる","b":"HDP既往女性は産後の血圧フォローアップは不要である","c":"妊娠糖尿病(GDM)既往は将来の2型糖尿病リスクを大幅に上昇させ、降圧療法の文脈でも重要な情報である","d":"HDPは妊娠中の一過性現象であり、産後3か月で完全に消失する","e":"産後の家庭血圧測定は不要"},"format":"複数","correct":"ac","explanation":"JSH2025 第10章 女性のライフステージ(GL p.156-157)。a: HDP既往は将来の慢性高血圧(2-4倍)・脳卒中(2倍)・冠動脈疾患(2倍)・末期腎不全(5倍以上)のリスク因子で、生涯にわたる脳心血管病スクリーニングが推奨される。c: GDM既往も将来の2型糖尿病(7-10倍)・心血管病リスクを上昇させ、降圧治療を行う際の重要な背景情報。bは誤り(産後・閉経後も継続フォローが必要)、dは誤り(HDP女性の約30%は産後も高血圧が残存または再燃)、eは誤り(産後・以降の家庭血圧測定で早期発見・介入が重要)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=157","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=258"},{"no":5,"stem":"閉経前後の女性の高血圧管理に関する記述として最も適切なのはどれか。1つ選べ。","choices":{"a":"閉経後10年以内の更年期女性ではエストロゲン低下に伴い血圧変動が大きくなりやすい","b":"ホルモン補充療法(HRT)は閉経後高血圧の第一選択治療である","c":"閉経後女性ではRA系阻害薬は禁忌である","d":"閉経後でも降圧目標は男性と異なる","e":"閉経後女性では家庭血圧測定は推奨されない"},"format":"単一","correct":"a","explanation":"JSH2025 第10章 女性のライフステージ(GL p.157)。a: 閉経後10年以内の更年期女性ではエストロゲン低下に伴いhot flush・自律神経不安定で血圧変動・収縮期高血圧が顕在化することが多く、ABPM・家庭血圧で評価し早期に介入する。bは誤り(HRTは更年期症状緩和目的で使用される場合があるが高血圧治療薬の代替ではなく、血栓・脳卒中リスクで慎重)、cは誤り(RA系阻害薬は閉経後女性でも標準薬)、dは誤り(降圧目標は性別で変えない)、eは誤り(むしろ家庭血圧は閉経後女性で重要)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=157","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=259"},{"no":6,"stem":"19歳男性。学生健診で血圧152/94 mmHg、BMI 31、両親とも高血圧。家庭血圧平均148/92 mmHg。JSH2025の青年期高血圧管理として正しいのはどれか。1つ選べ。","choices":{"a":"青年期(19歳)の高血圧は二次性高血圧(腎・内分泌)精査が成人より重要である","b":"若年では脳心血管病リスクが低いため家庭血圧測定は不要","c":"若年で肥満があっても減量指導は効果がない","d":"青年期では薬物治療開始基準が高く、SBP180以上にならないと治療しない","e":"若年高血圧では生活習慣改善は無効である"},"format":"単一","correct":"a","explanation":"JSH2025 第10章「青年期」(GL p.158)。若年(15-30歳)発症の高血圧では二次性高血圧(腎血管性・腎実質性・原発性アルドステロン症・褐色細胞腫・大動脈縮窄・クッシング症候群等)の有病率が成人より高く(20-30%)、家族歴・症候・血液生化学・腎エコー・PAC/PRA・カテコラミン等のスクリーニングが必須(a正解)。生活習慣改善(減塩・運動・減量)で十分な降圧が得られる場合も多く、肥満があれば減量指導は有効。降圧目標は通常成人と同様130/80未満。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=158","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=261"},{"no":7,"stem":"82歳女性、軽度フレイル(J-CHS基準で3項目陽性)、ADL自立で外来通院中。診察室血圧156/84 mmHg、家庭血圧平均148/82 mmHg、合併症なし。JSH2025の高齢者高血圧治療方針として最も適切なのはどれか。1つ選べ。","choices":{"a":"フレイルがあるので減塩指導は行わない","b":"通常用量から降圧薬を開始する","c":"ADL自立・忍容性ありなら診察室血圧130/80 mmHg未満を目指し、降圧薬は低用量(常用量の1/2程度)から開始し慎重に漸増する","d":"高齢者では家庭血圧測定は不要","e":"降圧目標は150/90 mmHg未満で十分"},"format":"単一","correct":"c","explanation":"JSH2025 第10章「高齢者」(GL p.158-160)・CQ14。75歳以上でも(1)ADL自立・(2)認知機能保持・(3)忍容性良好なら130/80 mmHg未満を目標とする(CQ14推奨)。ただし(1)起立性低血圧・(2)転倒リスク・(3)ポリファーマシー・(4)腎機能低下を勘案し、降圧薬は低用量(常用量の1/2程度)から開始し2-4週ごとに緩徐に漸増する。aは誤り(軽度フレイルでも減塩6g/日未満は基本)、bは誤り(高齢では低用量開始)、dは誤り(高齢では家庭血圧重要)、eは誤り(忍容性あれば130/80目標)。過去問Q12の論点と一致。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=160","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=263"},{"no":8,"stem":"高齢者高血圧の特徴として正しいものを2つ選べ。","choices":{"a":"高齢者では大動脈スティフネス増加により収縮期血圧優位の脈圧拡大が特徴である","b":"高齢者は塩分感受性が低下するため減塩は不要","c":"高齢者では起立性低血圧・食後低血圧の頻度が増加する","d":"高齢者では白衣高血圧の頻度は若年者と同等である","e":"高齢者では血圧日内変動はriser・non-dipperより必ずextreme dipperになる"},"format":"複数","correct":"ac","explanation":"JSH2025 第10章 高齢者(GL p.158-160)。a: 高齢者は動脈硬化進行による大動脈スティフネス増加でSBP上昇・DBP低下、脈圧拡大が典型。c: 高齢者は圧受容器反射低下で起立性低血圧(立位3分以内にSBP低下≧20またはDBP低下≧10)・食後低血圧(食後2時間以内のSBP低下≧20)の頻度が増加し、転倒・失神リスクとなる。bは誤り(高齢者は塩分感受性むしろ亢進し、減塩6g/日未満は降圧効果大)、dは誤り(白衣高血圧は高齢者で増加、過去問Q4のA選択肢『高齢者で割合が増加』も同様)、eは誤り(高齢者はnon-dipper/riser型が多い)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=160","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=264"},{"no":9,"stem":"85歳男性、中等度認知症(MMSE 18点)、独居困難で施設入所中。診察室血圧168/86 mmHg、立位ふらつき頻回、過去1か月で転倒2回、5剤(ARB・Ca拮抗薬・ループ利尿薬・スタチン・ベンゾジアゼピン)を服用中。降圧治療として最も適切なのはどれか。1つ選べ。","choices":{"a":"降圧薬をさらに追加し、診察室血圧130/80 mmHg未満を厳格に目指す","b":"起立性低血圧・転倒リスクを考慮し、降圧目標を緩めて150/90 mmHg未満程度を許容し、ループ利尿薬・ベンゾジアゼピンの中止・減量を検討する","c":"降圧薬を全て中止する","d":"認知症があるため降圧治療は行わない","e":"ベンゾジアゼピンは増量する"},"format":"単一","correct":"b","explanation":"JSH2025 第10章 高齢者・認知症・フレイル(GL p.160-162)。中等度以上の認知症・起立性低血圧・転倒既往・ポリファーマシー合併例では、過度の降圧でかえって脳灌流低下・転倒骨折・QOL低下を招くため、目標を150/90程度に緩める個別化が推奨される。本症例ではループ利尿薬(脱水・起立性低血圧)・ベンゾジアゼピン(STOPP/START criteria・Beersリストで高齢者推奨度低、転倒リスク)はポリファーマシーの観点から中止・減量が望ましい。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=162","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=265"},{"no":10,"stem":"高齢者のポリファーマシーと降圧治療に関する記述として正しいものを2つ選べ。","choices":{"a":"ポリファーマシー(6剤以上)は転倒・薬物有害事象・入院リスクを増加させる","b":"STOPP/START criteria、ベンゾジアゼピン・NSAIDs・PPI長期等のpotentially inappropriate medications (PIMs)は高齢者で見直しを行う","c":"降圧薬は配合剤を活用するとアドヒアランスは改善するが薬剤数は減らない","d":"高齢者では多剤併用が常に予後を改善する","e":"PPIは高齢者で常に推奨される"},"format":"複数","correct":"ab","explanation":"JSH2025 第10章 高齢者ポリファーマシー(GL p.162)。a: ポリファーマシーは6剤以上で転倒・薬物有害事象・入院・死亡リスクが有意増加する。b: STOPP/START criteria・ベンゾジアゼピン・NSAIDs・抗コリン薬・第一世代抗ヒスタミン薬等のPIMsは高齢者で減薬・中止を検討。cは誤り(配合剤は実質的に薬剤数=錠剤数を減らしアドヒアランス向上と薬剤管理を改善)、dは誤り(多剤併用は必ずしも予後改善せず、有害事象増加)、eは誤り(PPIの長期投与は骨折・感染症・認知症リスク等で慎重)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=162","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=266"},{"no":11,"stem":"78歳女性、高血圧・心房細動(DOAC内服)・軽度認知障害(MCI、MMSE 24点)。診察室血圧148/82 mmHg、家庭血圧平均144/80 mmHg。認知症進行予防の観点から降圧治療について正しいのはどれか。1つ選べ。","choices":{"a":"降圧治療は認知症進行に影響しないため、現状維持で良い","b":"SPRINT-MIND試験等のメタ解析では、適切な降圧治療は軽度認知障害・認知症発症リスクを低下させる","c":"認知症予防のためにはSBP120未満を全例で厳格に目指す","d":"認知症があるとRA系阻害薬は禁忌である","e":"認知症既往例では降圧薬は全て中止する"},"format":"単一","correct":"b","explanation":"JSH2025 第10章 高齢者・認知症(GL p.161)。SPRINT-MIND試験(2019)では強化降圧群(SBP120未満目標)でMCI発症が有意減少(HR 0.81)、認知症単独は有意差なしだったが、その後の多くのメタ解析(2020-2024)で適切な降圧治療(特にRA系阻害薬・Ca拮抗薬)は認知症発症リスクを低下させる方向で一致している(b正解)。aは誤り、cは誤り(個別化が原則、過度の降圧は脳灌流低下リスク)、dは誤り(RA系は認知機能保護効果も示唆)、eは誤り(降圧薬中止は脳卒中・心不全リスク増加)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=161","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=267"},{"no":12,"stem":"高齢者の起立性低血圧・食後低血圧の対応として正しいものを2つ選べ。","choices":{"a":"起立性低血圧は立位3分以内のSBP低下≧20またはDBP低下≧10で診断される","b":"食後低血圧は食後2時間以内のSBP低下≧20で診断され、糖尿病・パーキンソン病で多い","c":"起立性低血圧では水分・塩分を厳しく制限する","d":"起立性低血圧では利尿薬・α遮断薬は積極的に使用する","e":"食後低血圧では食後すぐの起立・歩行が推奨される"},"format":"複数","correct":"ab","explanation":"JSH2025 第10章 高齢者(GL p.160-161)。a: 起立性低血圧の定義は立位後3分以内のSBP低下≧20 mmHgまたはDBP低下≧10 mmHg。b: 食後低血圧は食後30分-2時間以内のSBP低下≧20 mmHgで、糖尿病(自律神経障害)・パーキンソン病・高齢者で多い。cは誤り(脱水を避けるためむしろ十分な水分摂取・適度な塩分を)、dは誤り(利尿薬・α遮断薬は起立性低血圧を悪化させ慎重投与)、eは誤り(食後低血圧では食後30分は安静で起立・運動を避ける)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=161","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=268"},{"no":13,"stem":"90歳女性、重度フレイル(J-CHS 5項目陽性)、車椅子移動、慢性心不全(LVEF 35%)、HbA1c 6.2%。診察室血圧154/76 mmHg、家庭血圧平均150/74 mmHg。降圧目標として最も適切なのはどれか。1つ選べ。","choices":{"a":"診察室血圧130/80 mmHg未満を厳格に目指す","b":"重度フレイルでは個別化し、忍容性を見ながらSBP 140-150 mmHg程度を目標として緩徐に管理する","c":"降圧治療は不要、自然経過で良い","d":"血圧上昇傾向のためβ遮断薬を高用量で追加","e":"起立性低血圧予防のために減塩は中止し、塩分を増やす"},"format":"単一","correct":"b","explanation":"JSH2025 第10章 高齢者・フレイル(GL p.159-160)・CQ14。75歳以上でも(1)ADL自立・(2)認知機能保持・(3)忍容性良好なら130/80未満を目指すが、重度フレイル・要介護・予後限定例ではSBP 140-150 mmHg程度の緩い目標で個別化が推奨される(b正解)。心不全合併ではARB/ACEI・β遮断薬・MR拮抗薬は予後改善のため継続するが、過度の降圧で脳灌流低下・転倒・QOL低下を避ける。cは誤り(脳卒中・心不全悪化予防のため降圧治療は必要)、eは誤り(減塩は心不全管理上必須)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=160","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=263"},{"no":14,"stem":"JSH2025 CQ14『75歳以上の高齢者高血圧に対する降圧目標値は130/80 mmHg未満が推奨されるか』に関する記述として正しいものを2つ選べ。","choices":{"a":"CQ14では(1)ADL自立・(2)認知機能保持・(3)忍容性良好な75歳以上に対して診察室血圧130/80 mmHg未満を提案する(推奨弱・エビデンス中)","b":"STEP試験(中国、60-80歳)やSPRINT高齢者サブ解析が根拠の一部である","c":"CQ14ではフレイル・認知症・転倒既往に関わらず全例で130/80未満を強く推奨する","d":"CQ14ではSBP 120 mmHg未満を全例で推奨する","e":"CQ14ではSBP 150 mmHg未満を全例で推奨する"},"format":"複数","correct":"ab","explanation":"JSH2025 CQ14(GL p.160)。a: CQ14は『ADL自立・認知機能保持・忍容性良好な75歳以上高血圧患者に対し、診察室130/80 mmHg未満を目標とした降圧治療を提案する(推奨弱・エビデンス中)』と記載。b: 根拠としてSTEP試験(2021、中国60-80歳でSBP 110-130群が心血管イベント減)・SPRINT高齢者サブ解析・HYVET試験等が引用される。cは誤り(個別化が原則、フレイル・転倒既往等では緩める)、d/eは誤り(目標は130/80未満が基本、患者状態で個別化)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=160","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=264"},{"no":15,"stem":"高齢者高血圧における薬剤選択として正しいのはどれか。1つ選べ。","choices":{"a":"高齢者ではARB/ACEI、Ca拮抗薬、サイアザイド系利尿薬が第一選択として推奨される","b":"高齢者では一律にα遮断薬が第一選択である","c":"高齢者ではβ遮断薬を全例で第一選択とする","d":"高齢者では中枢性交感神経抑制薬(クロニジン等)が第一選択である","e":"高齢者ではMR拮抗薬を一律に第一選択とする"},"format":"単一","correct":"a","explanation":"JSH2025 第10章 高齢者(GL p.159)。高齢者高血圧でも主要降圧薬5クラスの中でARB/ACEI・Ca拮抗薬・サイアザイド(少量)が第一選択として推奨される(高齢者ガイドライン2017準拠)。低用量から開始し緩徐に漸増する。α遮断薬は起立性低血圧リスク、β遮断薬は脈拍低下・心ブロック・脂質悪化、中枢性薬は鎮静・口渇・うつ等でルーチンの第一選択ではない。MR拮抗薬は心不全・PA・治療抵抗性HTN等の積極的適応で使用される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=159","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=264"},{"no":16,"stem":"高齢者高血圧の家庭血圧測定における注意点として正しいものを2つ選べ。","choices":{"a":"家庭血圧測定は降圧効果の評価・白衣/仮面高血圧の鑑別・服薬アドヒアランス向上に有用である","b":"高齢者では家庭血圧は信頼性が低いため不要","c":"高齢者では家庭血圧と診察室血圧の乖離(白衣高血圧・仮面高血圧)が増加する","d":"高齢者では家庭血圧の自己測定はバイアスがあり全く参考にならない","e":"家庭血圧計はカフ式上腕用ではなく手首式を推奨する"},"format":"複数","correct":"ac","explanation":"JSH2025 第5章・第10章(GL p.160)。a: 家庭血圧は降圧効果・白衣/仮面HTNの鑑別・アドヒアランス向上に有用で高齢者でも推奨される。c: 高齢者では圧受容反射低下・自律神経機能低下で白衣高血圧(診察室>>家庭)・仮面高血圧(家庭>>診察室)が増加。bは誤り(高齢者こそ家庭血圧で個別の評価が重要)、dは誤り(適切な測定指導で十分参考になる)、eは誤り(カフ式上腕用が推奨、手首式は精度が劣る)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=160","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=265"},{"no":17,"stem":"70歳男性、2型糖尿病・微量アルブミン尿・BMI 28・OSA(AHI 22、中等症、CPAP導入済)・高尿酸血症(7.5 mg/dL、痛風既往なし)。診察室血圧146/86 mmHg。降圧薬選択として最も適切なのはどれか。1つ選べ。","choices":{"a":"サイアザイド系利尿薬+β遮断薬","b":"ARB(ロサルタンまたは他のARB)+ジヒドロピリジン系Ca拮抗薬","c":"α遮断薬+β遮断薬","d":"ループ利尿薬単剤","e":"ACE阻害薬+サイアザイド+β遮断薬"},"format":"単一","correct":"b","explanation":"JSH2025 第10章 複数合併症統合管理(GL p.140-163)。本症例は糖尿病(微量Alb尿)→RA系阻害薬必須、肥満・高尿酸→サイアザイド/β遮断薬は不利、OSA→Ca拮抗薬・ARBが妥当、痛風予防→ロサルタンは尿酸排泄促進で有利。最適選択はARB+ジヒドロピリジン系Ca拮抗薬(b)。aは利尿薬・β遮断薬で尿酸・耐糖能悪化、cはα/β遮断薬で代謝悪化・起立性、dはループ単剤では不十分・尿酸悪化、eは多剤併用で代謝面に不利。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=141","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=270"},{"no":18,"stem":"他疾患・ライフステージ別の降圧薬の主な禁忌・注意の組合せとして誤っているのはどれか。1つ選べ。","choices":{"a":"妊娠 - ARB/ACE阻害薬・MR拮抗薬(禁忌)","b":"気管支喘息 - 非選択性β遮断薬(禁忌)","c":"痛風既往 - サイアザイド系利尿薬(原則回避)","d":"閉塞性睡眠時無呼吸 - Ca拮抗薬(禁忌)","e":"両側腎動脈狭窄 - RA系阻害薬(禁忌)"},"format":"単一","correct":"d","explanation":"JSH2025 第10章および各薬剤注意事項。dは明らかに誤り(OSAではCa拮抗薬はむしろ第一選択の一つで禁忌ではない)。a: 妊娠ではARB/ACEI/MR拮抗薬は胎児腎・頭蓋形成不全で禁忌(過去問Q11/Q13関連)。b: 気管支喘息では非選択性β遮断薬(プロプラノロール)は気管支収縮で禁忌。c: 痛風既往ではサイアザイド・ループ利尿薬は尿酸上昇で原則回避(過去問Q11関連)。e: 両側腎動脈狭窄ではRA系阻害薬で輸出細動脈過度拡張→GFR急減・腎不全で禁忌(過去問Q17 D選択肢関連)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=155","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=270"},{"no":19,"stem":"ライフステージ別の高血圧管理の優先事項として正しい組合せはどれか。1つ選べ。","choices":{"a":"青年期(15-30歳) - 二次性高血圧の精査優先","b":"妊娠可能年齢の女性 - RA系阻害薬の積極的使用","c":"妊娠中 - MR拮抗薬の継続","d":"閉経後女性 - ホルモン補充療法を必ず第一選択","e":"75歳以上のフレイル合併者 - 全例で130/80未満を厳格に目指す"},"format":"単一","correct":"a","explanation":"JSH2025 第10章 ライフステージ別管理(GL p.155-162)。a: 青年期発症HTNでは腎血管性・腎実質性・PA・褐色細胞腫・大動脈縮窄・クッシング症候群等の二次性高血圧頻度が高く、家族歴・症候・血液検査・PAC/PRA・腎エコー等の精査が優先される(本日Day2 Q6と同趣旨)。bは誤り(妊娠可能年齢ではRA系阻害薬は妊娠時禁忌のため挙児希望時に中止、Day1 Q18)、cは誤り(MR拮抗薬は妊娠中禁忌)、dは誤り(HRTは降圧第一選択ではない)、eは誤り(フレイル合併では個別化、Day2 Q13)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=158","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=270"},{"no":20,"stem":"JSH2025 第10章「他疾患やライフステージを考慮した対応」の全体方針として正しいものを2つ選べ。","choices":{"a":"合併疾患・ライフステージに応じて積極的適応・禁忌・注意事項を考慮し、個別化された降圧薬選択を行う","b":"全ての患者で一律にARBから開始し、合併症に関わらず降圧目標は130/80 mmHg未満で固定する","c":"高齢者・フレイル・認知症・予後限定例では忍容性・QOL・転倒・起立性低血圧・ポリファーマシーを総合的に評価し、目標を緩める個別化が必要である","d":"妊娠・授乳期では降圧治療を必ず中止する","e":"担がん患者では血圧管理は予後に関係しないため不要である"},"format":"複数","correct":"ac","explanation":"JSH2025 第10章 章全体の方針(GL p.139-164)。a: 第10章の核心は『合併疾患(糖尿病・肥満・脂質・SAS・痛風・抗血栓・がん・喘息COPD肝)・ライフステージ(女性・青年期・高齢者)に応じて積極的適応・禁忌・注意事項を考慮した個別化された降圧薬選択と目標設定』。c: 高齢者・フレイル・認知症・予後限定例ではQOL・転倒・起立性低血圧・ポリファーマシー・予後を総合評価し個別化(CQ14趣旨)。bは誤り(画一的ではなく個別化)、dは誤り(妊娠・授乳期も適切な薬剤に変更して継続)、eは誤り(降圧で脳卒中・心不全予防、Onco-HTN管理は予後改善に重要)。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=164","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=270"},{"no":21,"stem":"糖尿病合併高血圧症の降圧治療について正しくないのはどれか。1つ選べ。","choices":{"a":"診察室血圧 170/90 mmHg：直ちに降圧薬を開始する","b":"診察室血圧 160/90 mmHg：直ちに降圧薬を開始する","c":"診察室血圧 150/90 mmHg：直ちに降圧薬を開始する","d":"診察室血圧 140/90 mmHg：1ヶ月を超えない範囲で生活習慣による降圧を試みる","e":"診察室血圧 130/80 mmHg：1ヶ月を超えない範囲で生活習慣による降圧を試みる"},"format":"単一","correct":"e","explanation":"JSH2025 第10章「他疾患を考慮した対応」糖尿病合併高血圧の項では、診察室血圧≧140/90 mmHgで高血圧と診断し直ちに降圧薬を考慮、また糖尿病合併例では130/80 mmHg未満が降圧目標。診察室血圧130/80 mmHgは既に目標達成レベルであり『1ヶ月を超えない範囲で生活習慣による降圧を試みる』は不適切なため、Eが誤り。A・B・C（150以上）は明らかな高血圧で直ちに降圧薬開始が妥当、D（140/90）は1ヶ月以内に生活習慣を試みる範囲。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=142","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=222","from_past_exam":true,"note":"解説（10.47.57『診察室血圧に基づく脳心血管病リスクの層別化』、10.48.04/10.48.24『初診時血圧レベル別の高血圧管理計画』JSH2025）が提示されたが、正解ハイライトは確認できず。\n正解ハイライト未確認のため自信度medium。糖尿病合併高血圧の降圧目標130/80未満の観点からEが誤り。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.47.37.png","confidence":"medium","slide_section":"11 代謝性疾患・他疾患"},{"no":22,"stem":"82歳女性。軽度フレイルあるが、自力で外来通院している。診察室血圧156/84 mmHg、家庭血圧平均148/80 mmHg、ADLは自立、合併症なし。治療方針として最も適切なのはどれか。1つ選べ。フレイルがあるので減塩は指導しない。","choices":{"a":"食事・運動療法のみを2か月間行う","b":"忍容性があれば血圧130/80mmHg未満への降圧を目指す","c":"降圧薬は通常用量から開始する","d":"診察室血圧を目安に降圧を行う","e":"（読み取り不能）"},"format":"単一","correct":"b","explanation":"JSH2025 第10章「高齢者高血圧」では、75歳以上の高齢者でADL自立・忍容性があれば診察室血圧130/80 mmHg未満を目指す。Bが正解。A（食事運動のみ2か月）は心血管リスクが高い高齢高血圧では薬物治療開始が望ましく不適切。Cは『通常用量から開始』は高齢者では低用量から開始が原則のため不適切。Dは家庭血圧を重視するため不適切。設問文中の『フレイルがあるので減塩は指導しない』も誤り（軽度フレイルでも減塩指導は推奨）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=160","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=250","from_past_exam":true,"note":"選択肢Eが読み取れず。解説（10.49.16『75歳以上の高齢者の健康・機能状態によるカテゴリー分類と降圧指針』）あり。\n選択肢Eが画像から読み取れず。設問文の前提『フレイルあり減塩指導しない』も不適切。臨床的にはBが妥当。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.48.36.png","confidence":"medium","slide_section":"12 高齢者高血圧"}]}],"gl_pages":[139,164],"su_pages":[221,270]},{"id":11,"title":"コントロール不良の高血圧","is_clinical":true,"part":2,"key_topics":["コントロール不良の要因","対策（正確な血圧測定・QOLへの配慮・服薬アドヒアランス・患者とのコミュニケーション・臨床イナーシャ・運動療法・心理的アプローチ・多職種連携）","一過性の血圧上昇","CQ15: 高血圧のチーム医療は血圧管理を向上させるか","Q8: 高血圧専門医による降圧治療の血圧管理率","Q9: 専門的知識を有する医療スタッフによる指導"],"sets":[{"day":1,"questions":[{"no":1,"stem":"55歳男性、ARB＋Ca拮抗薬服用中で診察室血圧156/96mmHg。家庭血圧の平均は128/82mmHg、過去3回の診察室血圧も150mmHg台で推移している。臨床的に最も考えられるのはどれか。","choices":{"a":"治療抵抗性高血圧","b":"白衣高血圧（白衣現象）","c":"仮面高血圧","d":"二次性高血圧","e":"服薬アドヒアランス不良"},"format":"単一","correct":"b","explanation":"診察室血圧が高く家庭血圧が正常域に保たれているパターンは未治療例では「白衣高血圧」、治療中患者では「白衣現象（white coat effect）」と呼ばれる。コントロール不良に見える患者の鑑別では、まず家庭血圧との乖離を確認することが重要であり、家庭血圧135/85mmHg未満であれば良好なコントロールと評価できる。診察室血圧のみで増量するとオーバートリートメントを招く。GL p.165-166参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=271"},{"no":2,"stem":"「臨床イナーシャ（clinical inertia）」の説明として最も適切なのはどれか。","choices":{"a":"患者が降圧薬の服用を自己中断してしまう状態","b":"血圧が目標未達成にもかかわらず治療の強化・変更が行われないこと","c":"降圧薬への耐性が生じて効果が減弱する現象","d":"家庭血圧と診察室血圧の解離","e":"服薬を頻回に忘れることによる血圧変動"},"format":"単一","correct":"b","explanation":"臨床イナーシャ（clinical inertia）とは「治療目標が達成されていないにもかかわらず、医師が治療の強化・変更を行わないこと」を指す。コントロール不良の主要因の一つで、医師側の要因として明確に意識すべき概念である。降圧目標未達成例では、漫然と経過観察を続けず、降圧薬の増量・追加・変更を適切なタイミングで決断する姿勢が求められる。GL p.166-167参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=166","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=273"},{"no":3,"stem":"服薬アドヒアランス不良の要因として誤っているのはどれか。","choices":{"a":"1日複数回の服薬","b":"副作用の出現","c":"医療費の負担","d":"配合剤（合剤）の使用","e":"高血圧の自覚症状の乏しさ"},"format":"単一","correct":"d","explanation":"配合剤（合剤）は錠剤数と服薬回数を減らしアドヒアランス向上に寄与するため、不良要因ではなくむしろ改善要因である。アドヒアランス不良の要因には、複数回服薬、多剤併用（pill burden）、副作用、医療費負担、高血圧の自覚症状の乏しさ、医師-患者関係の希薄さ、認知機能低下、独居などがある。配合剤・1日1回製剤・服薬カレンダー・残薬確認・家族の協力などが具体的対策となる。GL p.167-168参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=167","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=275"},{"no":4,"stem":"コントロール不良の高血圧患者で、まず確認すべき項目として正しい組み合わせはどれか。","choices":{"a":"血圧測定法・服薬状況・生活習慣","b":"腎機能・電解質のみ","c":"脳MRI・冠動脈CT","d":"ホルター心電図・心エコー","e":"甲状腺機能のみ"},"format":"単一","correct":"a","explanation":"コントロール不良の評価では、まず「正しく血圧が測定されているか（測定法・カフサイズ・条件）」「処方通り服薬されているか（残薬・服薬カレンダー）」「生活習慣（塩分・飲酒・体重・運動・睡眠）が守られているか」を順に確認する。これらの基本要因をクリアした上で、二次性高血圧の検索や薬剤調整、多職種連携に進むのが原則である。GL p.165-167参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=271"},{"no":5,"stem":"65歳女性、ARB・Ca拮抗薬・サイアザイド利尿薬の3剤併用で診察室血圧158/94mmHg。本人は「ちゃんと飲んでいる」と話すが、薬の残数が処方より多く残っている。最も適切な対応はどれか。","choices":{"a":"患者を強く叱責し、服薬を厳守させる","b":"服薬していないと判断し、降圧薬を中止する","c":"なぜ飲めないのかを傾聴し、服薬しやすい工夫を一緒に考える","d":"ただちに4剤目を追加する","e":"二次性高血圧の精査を最優先で行う"},"format":"単一","correct":"c","explanation":"服薬アドヒアランス不良が疑われる場合、非難ではなく「なぜ飲みにくいか」を共感的に聴く姿勢が重要。配合剤への変更、1日1回製剤、服薬カレンダー、家族の協力、薬剤師との連携など、患者と一緒に対策を考える共同意思決定（shared decision making）が推奨される。GL p.168-169参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=168","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=277"},{"no":6,"stem":"コントロール不良の高血圧で疑うべき二次性高血圧として頻度の高いものはどれか。","choices":{"a":"原発性アルドステロン症","b":"褐色細胞腫","c":"クッシング症候群","d":"甲状腺機能亢進症","e":"副甲状腺機能亢進症"},"format":"単一","correct":"a","explanation":"コントロール不良・治療抵抗性高血圧で疑うべき二次性高血圧のうち、最も頻度が高いのは原発性アルドステロン症（PA）である。3剤併用でも血圧が下がらない場合は、血漿アルドステロン濃度（PAC）・血漿レニン活性（PRA）からアルドステロン/レニン比（ARR）を算出してスクリーニングを行う。低カリウム血症や副腎偶発腫があればさらに疑いが強い。次いで腎血管性、OSA、薬剤性も鑑別。GL p.165-166、第15章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=272"},{"no":7,"stem":"コントロール不良の高血圧における正確な血圧測定について正しいのはどれか。","choices":{"a":"診察室血圧のみで治療効果を判定する","b":"家庭血圧は朝晩の2回測定値を平均して評価する","c":"血圧計のカフは細い方が正確な値が得られる","d":"1回測定で十分判断できる","e":"ABPMはコントロール不良の評価には不要"},"format":"単一","correct":"b","explanation":"家庭血圧は朝（起床後1時間以内・排尿後・服薬前・座位1-2分安静後）と就寝前の朝晩2回、各1-3回測定し平均値で評価する。少なくとも1週間以上の値を用いる。診察室血圧のみでは白衣・仮面高血圧を見逃すため家庭血圧の活用が必須。ABPMは血圧日内変動や仮面高血圧の評価に有用。GL p.165、第5章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=271"},{"no":8,"stem":"QOL（生活の質）への配慮として誤っているのはどれか。","choices":{"a":"副作用の少ない降圧薬を選択する","b":"服薬回数を可能な限り減らす","c":"高齢者では患者の意向や生活背景を尊重する","d":"降圧達成のためであればQOL低下はやむを得ない","e":"性機能障害などの副作用にも配慮する"},"format":"単一","correct":"d","explanation":"降圧治療はQOL（生活の質）の維持・向上を伴うべきであり、QOLを大きく損なう治療は長期継続が困難でアドヒアランス不良を招く。副作用の少ない薬剤選択、服薬簡素化（配合剤・1日1回製剤）、性機能障害（β遮断薬・サイアザイド等）への配慮、起立性低血圧の回避、高齢者の意向や生活背景の尊重などQOLへの配慮はコントロール改善の鍵となる。GL p.166-167参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=166","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=274"},{"no":9,"stem":"CQ15「高血圧のチーム医療は血圧管理を向上させるか」のJSH2025における推奨について正しいのはどれか。","choices":{"a":"チーム医療は推奨されない","b":"医師単独診療と差がない","c":"医師・看護師・薬剤師・管理栄養士等によるチーム医療は血圧管理向上に有用で推奨される","d":"費用対効果が悪いため推奨されない","e":"海外データのみで日本人では推奨されない"},"format":"単一","correct":"c","explanation":"CQ15では「高血圧管理においてチーム医療（医師・看護師・薬剤師・管理栄養士・保健師等）は血圧管理を向上させるため推奨される」とされている。多職種が役割分担して服薬指導・生活指導・血圧モニタリングを行うことで、血圧コントロール率が向上することが多数のRCT・メタ解析で示されている。GL p.171-172参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=171","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=283"},{"no":10,"stem":"一過性の血圧上昇をきたす状況として誤っているのはどれか。","choices":{"a":"疼痛・不安・興奮","b":"排尿困難・便秘","c":"睡眠時無呼吸","d":"アルコール摂取直後","e":"長期にわたる安静"},"format":"単一","correct":"e","explanation":"一過性の血圧上昇は、疼痛・不安・興奮・寒冷曝露・排尿困難・便秘（怒責）・睡眠時無呼吸・アルコール急性摂取・カフェイン・喫煙直後・薬剤（NSAIDs等）などで生じる。長期安静は血圧低下や起立性低血圧を招くことが多く、一過性上昇の原因ではない。診察室や朝の一過性上昇に対しては原因への対処が優先される。GL p.169-170参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=169","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=281"},{"no":11,"stem":"Q8「高血圧専門医による降圧治療の血圧管理率」について正しいのはどれか。","choices":{"a":"一般医と差がない","b":"高血圧専門医による治療は血圧管理率が高い傾向が示されている","c":"むしろ専門医の方が管理率が低い","d":"日本にはエビデンスがない","e":"専門医制度は廃止が検討されている"},"format":"単一","correct":"b","explanation":"Q8（GL）では「高血圧専門医による降圧治療は一般医より血圧管理率を高める傾向がある」と記載されている。専門医は二次性高血圧の鑑別、合理的薬剤選択、ABPM・家庭血圧の解釈、患者教育・チーム医療運営に長けており、コントロール不良例では高血圧専門医・専門施設への紹介・相談が推奨される。日本高血圧学会は専門医・指導医・専門施設の認定制度を整備している。GL p.172-173参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=172","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=285"},{"no":12,"stem":"コントロール不良の高血圧患者への運動療法について正しいものを2つ選べ。","choices":{"a":"有酸素運動は血圧低下に有効","b":"レジスタンス運動は血圧上昇を招くため禁忌","c":"週合計150分以上の中等度有酸素運動が推奨される","d":"運動強度はBorgスケール15-17（きつい〜とてもきつい）が望ましい","e":"降圧薬服用中は運動を行うべきでない"},"format":"複数","correct":"ac","explanation":"コントロール不良例でも運動療法は重要。有酸素運動（ウォーキング・水泳等）週150分以上、または中等度〜やや強い強度（Borg 11-13）でSBP 5-7mmHg程度の降圧が期待できる。レジスタンス運動も適切に行えば降圧効果があり禁忌ではない（CQ6）。降圧薬服用中も運動可能で、むしろ併用が推奨される。GL p.170-171、第7章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=170","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=282"},{"no":13,"stem":"薬剤性のコントロール不良として原因薬剤に該当しないものはどれか。","choices":{"a":"NSAIDs","b":"グルココルチコイド","c":"甘草（漢方薬）","d":"アセトアミノフェン","e":"シクロスポリン"},"format":"単一","correct":"d","explanation":"コントロール不良の薬剤性要因として、NSAIDs（最多）、グルココルチコイド、甘草（偽性アルドステロン症）、シクロスポリン、エリスロポエチン（ESA）、エストロゲン、分子標的薬（VEGF阻害薬等）、交感神経刺激薬、SNRIなどが挙げられる。アセトアミノフェンは大量・長期では血圧上昇の報告もあるが一般的にNSAIDsより影響は小さい。コントロール不良時は併用薬の精査が必須。GL p.165-167、第15章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=166","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=274"},{"no":14,"stem":"Q9「専門的知識を有する医療スタッフによる指導」について正しいのはどれか。","choices":{"a":"薬剤師による服薬指導は血圧管理に寄与しない","b":"管理栄養士による減塩指導は推奨されない","c":"看護師・薬剤師・管理栄養士・保健師等による指導は血圧管理向上に有用","d":"医師以外は患者教育に関与すべきでない","e":"日本には専門スタッフを養成する制度がない"},"format":"単一","correct":"c","explanation":"Q9では「専門的知識を有する医療スタッフ（看護師・薬剤師・管理栄養士・保健師・臨床心理士等）による指導は血圧管理を向上させる」とされる。日本高血圧学会は「高血圧・循環器病予防療養指導士」「高血圧・循環器病予防看護師」等の認定制度を運営しており、多職種連携によるチーム医療の中核を担う。GL p.172-173、CQ15参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=172","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=286"},{"no":15,"stem":"70歳男性、降圧薬3剤（ARB・Ca拮抗薬・サイアザイド）服用中で診察室・家庭血圧ともに150/90mmHg台。減塩指導は守られている。次に確認すべきこととして最も適切なのはどれか。","choices":{"a":"降圧薬の自己判断中止・飲み忘れの有無","b":"ただちに腎デナベーション施行","c":"ARB→ACE阻害薬への切替のみ","d":"降圧薬中止して経過観察","e":"α遮断薬への一本化"},"format":"単一","correct":"a","explanation":"正確な血圧測定と生活習慣を確認した後、次に確認すべきは「服薬アドヒアランス」。3剤併用で家庭血圧も高い真の治療抵抗性が疑われる場合は、まずアドヒアランスを確認し、その後二次性高血圧（PA等）の検索、MR拮抗薬の追加（第12章）等を検討する。腎デナベーションはこれらの対応後に検討。GL p.165-168、第12章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=167","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=275"},{"no":16,"stem":"コントロール不良に対する患者とのコミュニケーションについて誤っているのはどれか。","choices":{"a":"共同意思決定（shared decision making）を実践する","b":"患者の価値観・生活背景を尊重する","c":"服薬しない患者には診療を拒否する","d":"達成可能な目標を一緒に設定する","e":"肯定的なフィードバックを行う"},"format":"単一","correct":"c","explanation":"コントロール不良患者への対応では、共同意思決定・傾聴・共感・肯定的フィードバックが基本。診療拒否や叱責は信頼関係を損ない、ますますコントロールを悪化させる。動機づけ面接（motivational interviewing）の技法を用いて行動変容を支援することが推奨される。GL p.168-169参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=168","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=278"},{"no":17,"stem":"心理的アプローチが特に有効と考えられる高血圧コントロール不良の状況はどれか。","choices":{"a":"うつ症状・不安が併存し服薬や生活改善が困難な患者","b":"完全に無症候の若年男性","c":"ホルモン異常が明確な二次性高血圧","d":"薬剤性高血圧の原因薬剤が判明している例","e":"急性の高血圧緊急症"},"format":"単一","correct":"a","explanation":"うつ・不安・ストレス・職場や家庭の心理社会的問題が背景にあるコントロール不良例では、認知行動療法・マインドフルネス・リラクセーション法・心理士やカウンセラーとの連携が有効である。心理的要因は服薬アドヒアランスや生活習慣改善（減塩・運動・節酒）の遂行能力にも影響するため、コントロール不良時には必ず評価して見逃さないことが重要。動機づけ面接の技法も有用。GL p.170-171参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=170","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=281"},{"no":18,"stem":"次のうち、多職種連携の例として最も適切でないものはどれか。","choices":{"a":"薬剤師による服薬指導と残薬確認","b":"管理栄養士による減塩・DASH食指導","c":"看護師による家庭血圧測定指導","d":"医師が薬剤の処方のみを行い他職種は関与しない","e":"保健師による地域での生活習慣指導"},"format":"単一","correct":"d","explanation":"多職種連携は薬剤師・管理栄養士・看護師・保健師・理学療法士・臨床心理士等が役割を分担して患者を支援する体制である。医師単独で処方のみを行う診療では血圧管理は不十分で、CQ15で示されたチーム医療によりコントロール率が改善する。薬剤師は服薬指導・残薬確認、管理栄養士は減塩・DASH食指導、看護師は家庭血圧指導など、専門性を生かした介入が血圧管理向上に寄与する。GL p.171-172、CQ15参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=171","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=283"},{"no":19,"stem":"60歳男性。診察室では常に160/100mmHgだが、家庭血圧は朝晩とも120/75mmHg前後。臓器障害なし。最も適切な対応はどれか。","choices":{"a":"降圧薬を即座に増量","b":"新規降圧薬を追加","c":"白衣高血圧と判断し、家庭血圧をもとに経過観察","d":"ABPMで24時間血圧を評価し白衣高血圧を確認した上で家庭血圧基準で管理","e":"薬物治療を全て中止"},"format":"単一","correct":"d","explanation":"本症例は典型的な白衣高血圧パターン。診察室高血圧・家庭血圧正常で、ABPMで日中・夜間血圧が正常域であれば白衣高血圧として家庭血圧・ABPMを基準に管理する。診察室血圧のみで増量するとオーバートリートメントとなり起立性低血圧・転倒等のリスクが上がる。臓器障害がなければ厳重な薬物治療強化は不要。GL p.165-166、第5章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=271"},{"no":20,"stem":"服薬アドヒアランス向上策として推奨されるものを2つ選べ。","choices":{"a":"配合剤（合剤）の活用","b":"1日3-4回の服薬指示","c":"服薬カレンダー・ピルケースの利用","d":"副作用を厳しく無視させる","e":"家族の協力を得ない"},"format":"複数","correct":"ac","explanation":"アドヒアランス向上の具体策：(1)配合剤（合剤）・1日1回製剤の活用で錠剤数と回数を減らす、(2)服薬カレンダー・週単位ピルケース・服薬アラームアプリの利用、(3)家族・介護者の協力、(4)副作用への迅速な対応、(5)薬剤師との連携、(6)定期的な残薬確認、(7)患者の生活リズムに合わせた服薬時間設定。GL p.167-168参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=167","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=276"}]},{"day":2,"questions":[{"no":1,"stem":"コントロール不良の高血圧の評価で、患者側の要因として最も影響が大きいとされるのはどれか。","choices":{"a":"服薬アドヒアランス不良","b":"遺伝的素因","c":"皮膚の色調","d":"血液型","e":"身長"},"format":"単一","correct":"a","explanation":"コントロール不良の患者側要因として最大かつ介入可能なのは服薬アドヒアランス不良である。海外の研究では治療抵抗性とされる患者の半数以上がアドヒアランス不良によるものと報告されている（血中薬物濃度測定による直接評価）。次いで塩分過剰摂取、肥満、飲酒、睡眠不足、ストレス、運動不足などの生活習慣要因も重要で、コントロール不良時にはまずこれらを系統的に評価する。GL p.165-167参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=272"},{"no":2,"stem":"医師側の要因によるコントロール不良として最も該当するのはどれか。","choices":{"a":"アドヒアランス不良","b":"臨床イナーシャ","c":"白衣現象","d":"二次性高血圧","e":"塩分過剰摂取"},"format":"単一","correct":"b","explanation":"コントロール不良は患者側・医師側・薬剤側・社会的要因に分けられる。医師側の代表的要因が臨床イナーシャ（治療強化の遅延・回避）。「もう少し様子を見ましょう」が繰り返され目標血圧未達成のまま放置されることが多い。降圧薬の増量・追加・変更を適切なタイミングで決断する姿勢が重要。GL p.166-167参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=166","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=273"},{"no":3,"stem":"正確な家庭血圧測定の指導内容として誤っているのはどれか。","choices":{"a":"上腕式血圧計を使用する","b":"朝は起床後1時間以内、排尿後、服薬前に測定","c":"座位で1-2分安静後に測定","d":"カフは心臓の高さに合わせる","e":"値が高ければ正確になるまで何度も測り直して低い値を採用する"},"format":"単一","correct":"e","explanation":"家庭血圧は決まった条件で測定し、得られた値（朝晩各1-3回測定の平均）を全て記録するのが原則である。低い値だけを選んで採用すると過小評価となり治療が不十分になり、コントロール不良の見逃しにつながる。上腕式血圧計、朝（起床後1時間以内・排尿後・服薬前）と就寝前、座位1-2分安静、カフは心臓の高さ、が基本。コントロール不良では患者の測定法を必ず確認・指導する。GL p.165、第5章・第2章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=271"},{"no":4,"stem":"コントロール不良の対策として優先順位が低いものはどれか。","choices":{"a":"正確な血圧測定の確認","b":"服薬アドヒアランスの確認","c":"生活習慣（減塩・節酒・運動・減量）の確認","d":"副作用の確認とQOLへの配慮","e":"ただちに腎デナベーションを実施"},"format":"単一","correct":"e","explanation":"コントロール不良対策の基本順序は、(1)正確な血圧測定、(2)服薬アドヒアランス、(3)生活習慣の見直し、(4)二次性高血圧の鑑別、(5)薬剤調整（合理的併用・MR拮抗薬の追加等）、(6)QOL・コミュニケーション・チーム医療。腎デナベーション（CQ16）は治療抵抗性として確立し、上記対応後に検討される非薬物療法。GL p.165-172、第12章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=271"},{"no":5,"stem":"53歳男性会社員。仕事のストレスで残業多く、外食中心、飲酒週5日、睡眠5時間。診察室血圧148/92mmHg、家庭血圧145/90mmHg。ARB単剤服用中。最も優先される指導はどれか。","choices":{"a":"ただちに3剤併用へ","b":"節酒・減塩・睡眠改善などの生活習慣指導と服薬継続","c":"降圧薬を中止して生活指導のみ","d":"二次性高血圧の精査を全例に行う","e":"心理療法のみ"},"format":"単一","correct":"b","explanation":"中等度高血圧でアドヒアランス良好だが生活習慣に明らかな問題がある例である。塩分過剰摂取・飲酒過多・短時間睡眠・ストレス・運動不足・体重増加が血圧コントロール不良の主因と考えられる。まず生活習慣改善（節酒・減塩・睡眠時間確保・運動・体重管理）と服薬継続を並行し、改善が乏しい場合に薬剤強化を検討する。職場ストレスへの心理社会的配慮も重要。GL p.166-167、第7章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=166","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=274"},{"no":6,"stem":"次のうち、コントロール不良の患者で疑うべき二次性高血圧の特徴的所見の組み合わせとして正しいのはどれか。","choices":{"a":"原発性アルドステロン症 — 低カリウム血症・副腎腫瘍","b":"褐色細胞腫 — 動悸・発汗・頭痛発作","c":"腎血管性高血圧 — 腹部血管雑音・若年女性のFMD","d":"睡眠時無呼吸症候群 — いびき・日中眠気・夜間血圧上昇","e":"上記すべて正しい"},"format":"単一","correct":"e","explanation":"コントロール不良では二次性高血圧の検索が重要。PA（低K・副腎腫瘍）、褐色細胞腫（三主徴：頭痛・動悸・発汗）、腎血管性（腹部血管雑音・FMD・動脈硬化）、OSA（いびき・日中眠気・nondipper/riser）、クッシング症候群（中心性肥満・満月様顔貌）など、それぞれの特徴的所見を意識して問診・診察を行う。GL p.165-166、第15章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=272"},{"no":7,"stem":"コントロール不良の高血圧患者に対する運動療法の効果について正しいのはどれか。","choices":{"a":"降圧薬との併用は禁忌","b":"有酸素運動は収縮期血圧で5-7mmHg程度の低下が期待できる","c":"効果はSBP 30mmHg以上の劇的低下","d":"週1回30分の運動で十分","e":"高齢者は運動禁忌"},"format":"単一","correct":"b","explanation":"JSH2025では有酸素運動により収縮期血圧で約5-7mmHg、拡張期で約3-5mmHgの低下が報告されている。週合計150分以上の中等度有酸素運動が推奨される。降圧薬との併用は推奨され、高齢者でも個別化された運動療法は安全で有効。CQ6でレジスタンス運動の有用性も示されている。GL p.170-171、第7章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=170","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=282"},{"no":8,"stem":"コントロール不良に関連する睡眠の問題として誤っているのはどれか。","choices":{"a":"短時間睡眠は血圧上昇に関連する","b":"睡眠時無呼吸はnondipper/riser型を引き起こす","c":"夜間頻尿は二次性高血圧（OSA・PA）の手がかり","d":"不眠症はストレス・血圧上昇に関連する","e":"睡眠時間と血圧管理は無関係"},"format":"単一","correct":"e","explanation":"睡眠は血圧管理に重要。短時間睡眠（<6時間）、不眠、OSAは血圧上昇・コントロール不良の原因となる。OSAでは夜間血圧上昇（nondipper/riser）が特徴的で日中の血圧管理だけでは不十分。コントロール不良時はOSAスクリーニング（いびき・無呼吸・日中眠気・夜間頻尿）を行い、必要に応じ睡眠ポリグラフ検査を実施する。GL p.166、第10章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=166","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=275"},{"no":9,"stem":"CQ15で述べられているチーム医療のメンバーとして主に想定されないのはどれか。","choices":{"a":"看護師","b":"薬剤師","c":"管理栄養士","d":"保健師","e":"外科医のみ"},"format":"単一","correct":"e","explanation":"CQ15で想定されるチーム医療のメンバーは、医師（一般医・高血圧専門医）、看護師、薬剤師、管理栄養士、保健師、理学療法士、臨床心理士などの多職種である。外科医のみで構成されるチームは血圧管理の文脈では想定されていない。各職種が役割分担し、患者教育・服薬指導・減塩等の生活指導・家庭血圧モニタリング・心理的サポートを協働して行うことで、血圧コントロール率が向上する。GL p.171-172参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=171","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=283"},{"no":10,"stem":"コントロール不良の対策で「臨床イナーシャ」を回避するために有用なものはどれか。","choices":{"a":"目標血圧の明確化と達成までの定期的な薬剤調整","b":"患者の希望に応じてできるだけ薬を増やさない","c":"副作用がなければ目標未達成でも放置する","d":"次回受診時に必ず治療強化することを避ける","e":"診察室血圧のみで判断する"},"format":"単一","correct":"a","explanation":"臨床イナーシャ回避には、(1)目標血圧（130/80mmHg未満等）の明確化、(2)達成までの治療強化の道筋を計画、(3)毎回の受診で目標達成度を確認、(4)未達成なら原因評価と治療強化（増量・追加・変更）の決断、(5)患者と目標を共有、が有効。漫然とした経過観察を避けることがコントロール改善につながる。GL p.166-167参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=166","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=273"},{"no":11,"stem":"Q8に関連して、高血圧専門医への紹介・相談を検討すべき状況として誤っているのはどれか。","choices":{"a":"3剤併用でもコントロール不良の治療抵抗性高血圧","b":"二次性高血圧が強く疑われる場合","c":"妊娠合併症・小児高血圧","d":"高血圧緊急症","e":"降圧目標を達成し副作用もない安定例"},"format":"単一","correct":"e","explanation":"高血圧専門医・専門施設への紹介を考慮すべきは、(1)治療抵抗性、(2)二次性高血圧疑い、(3)妊娠・小児高血圧、(4)高血圧緊急症、(5)複数臓器障害、(6)複雑な薬剤副作用、(7)若年発症・家族歴顕著な例など。コントロール良好・副作用なしの安定例は一般診療で継続可能。GL p.172-173参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=172","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=285"},{"no":12,"stem":"コントロール不良の高血圧で、ABPMが診断的価値を発揮する状況はどれか。","choices":{"a":"診察室血圧と家庭血圧の解離評価","b":"白衣高血圧・仮面高血圧の同定","c":"夜間血圧・血圧日内変動の評価","d":"降圧薬の作用持続時間の確認","e":"上記すべて"},"format":"単一","correct":"e","explanation":"ABPM（24時間自由行動下血圧測定）はコントロール不良の評価で多面的に有用。白衣・仮面高血圧の鑑別、夜間血圧・dipping pattern（dipper/nondipper/riser/extreme dipper）の評価、降圧薬の作用持続性の確認に役立つ。家庭血圧と併用することで治療方針決定の精度が上がる。GL p.165、第5章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=272"},{"no":13,"stem":"コントロール不良に関連する一過性血圧上昇の対処として適切でないものはどれか。","choices":{"a":"疼痛のコントロール","b":"便秘・排尿障害の治療","c":"不安・興奮の鎮静（必要なら薬物含む）","d":"アルコール・喫煙の節制","e":"一過性上昇のたびに即座に降圧薬を頓服で投与"},"format":"単一","correct":"e","explanation":"一過性血圧上昇は原因対処が原則で、頓服降圧薬の安易な投与は低血圧・転倒・血圧変動増大を招く。原因（疼痛・不安・便秘・排尿障害・寒冷・興奮）への対応と原疾患（OSA・薬剤性等）の評価が重要。著明な上昇で臓器症状を伴う場合は高血圧切迫症・緊急症として個別対応（第16章）。GL p.169-170、第16章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=169","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=281"},{"no":14,"stem":"服薬アドヒアランス評価法として誤っているのはどれか。","choices":{"a":"残薬確認・処方記録の照合","b":"問診による自己申告","c":"薬剤師との連携による情報収集","d":"血中薬物濃度測定（必要時）","e":"患者を疑う様子を見せて緊張感で評価"},"format":"単一","correct":"e","explanation":"アドヒアランス評価法には、自己申告（Morisky scale等）、残薬確認、処方記録の照合、薬剤師との連携、必要に応じた血中薬物濃度測定、電子モニタリング（MEMS）等がある。患者を疑う・責めるような姿勢は信頼関係を損ない、かえって正確な評価を妨げる。共感的に確認することが重要。GL p.167-168参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=167","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=276"},{"no":15,"stem":"コントロール不良の高血圧患者へのデジタル技術（アプリ・遠隔モニタリング等）の活用について正しいのはどれか。","choices":{"a":"効果が示されておらず推奨されない","b":"家庭血圧の遠隔モニタリングや服薬支援アプリは血圧管理改善に有用","c":"高齢者には全例で使えない","d":"医師が監督していなくても安全に使用できる","e":"保険診療では一切認められない"},"format":"単一","correct":"b","explanation":"JSH2025（CQ5・CQ7）ではデジタル技術活用が推奨されている。家庭血圧の遠隔モニタリング、服薬支援アプリ、生活習慣改善アプリ、AI問診、ウェアラブル等により血圧管理の改善が報告されている。高齢者でも使いやすい設計やサポートにより活用可能で、医療者の関与のもと安全に運用する。GL p.171、第6章・第7章CQ5/CQ7参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=171","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=282"},{"no":16,"stem":"75歳女性、ARB＋Ca拮抗薬服用中で家庭血圧148/82mmHg。フレイル傾向あり、転倒既往2回。最も適切な対応はどれか。","choices":{"a":"目標を130/80mmHg未満として速やかに薬剤を増量","b":"起立性低血圧・転倒リスクに配慮しつつ、患者の状態に応じた個別化された降圧目標で慎重に治療強化","c":"血圧治療を中止","d":"α遮断薬を就寝前に追加","e":"サイアザイドを大量併用"},"format":"単一","correct":"b","explanation":"高齢・フレイル例ではQOL・転倒リスクを考慮した個別化が重要。CQ14でも75歳以上は併存症・フレイル度・認知機能で目標を調整する旨が推奨されている。起立性低血圧の評価、転倒既往への配慮、薬剤数の最適化（多剤併用回避・α遮断薬は転倒リスクで慎重）、家族・介護者との連携が必要。一律の強化降圧は推奨されない。GL p.166-167、第10章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=166","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=274"},{"no":17,"stem":"コントロール不良の対策として「正確な血圧測定」を確保するために有用な指導内容を2つ選べ。","choices":{"a":"適切なサイズのカフを使用する","b":"上腕の高さは心臓の位置に合わせる","c":"腕を強く締め付けるほど正確になる","d":"会話しながら測定する","e":"脚を組んで測定する"},"format":"複数","correct":"ab","explanation":"正確な血圧測定には、(1)適切なサイズのカフ（上腕周囲長に応じて）、(2)カフは上腕で心臓の高さ、(3)座位で背もたれあり、足は床、(4)1-2分の安静、(5)会話禁止、(6)排尿・カフェイン・運動・喫煙直後を避ける、(7)朝の服薬前など条件を統一。第2章で詳述。コントロール不良ではまず測定の妥当性を確認する。GL p.165、第2章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=271"},{"no":18,"stem":"コントロール不良に対する心理的アプローチとして適切なものを2つ選べ。","choices":{"a":"動機づけ面接（motivational interviewing）","b":"認知行動療法・マインドフルネス・リラクセーション","c":"患者を強く叱責し服薬を強制する","d":"心理士・精神科医との連携をすべて避ける","e":"降圧目標を達成するまで励ましを禁止する"},"format":"複数","correct":"ab","explanation":"心理的アプローチには、動機づけ面接（motivational interviewing）、認知行動療法、マインドフルネス、リラクセーション法、自律訓練法、ストレスマネジメント等がある。うつ・不安併存例では精神科・心理士との連携が有用である。叱責や強制は信頼関係を損ねアドヒアランス低下を招くため避ける。肯定的フィードバック、共感的傾聴、共同意思決定（shared decision making）が基本姿勢となる。GL p.170-171参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=170","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=281"},{"no":19,"stem":"Q9に関連する「高血圧・循環器病予防療養指導士」について正しいのはどれか。","choices":{"a":"日本高血圧学会の認定制度である","b":"医師のみが取得できる","c":"学会の認定制度は存在しない","d":"海外学会の認定資格","e":"看護師は対象外"},"format":"単一","correct":"a","explanation":"「高血圧・循環器病予防療養指導士」は日本高血圧学会が運営する認定制度で、看護師・薬剤師・管理栄養士・保健師・臨床検査技師・理学療法士・健康運動指導士など、医師以外の医療従事者が幅広く対象となっている。専門的知識を有する医療スタッフによる継続的な患者指導は血圧管理を向上させるとQ9で示されており、チーム医療（CQ15）の中核を担い、コントロール不良対策の重要なリソースとなる。GL p.172-173参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=172","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=286"},{"no":20,"stem":"コントロール不良の高血圧管理を改善するための包括的アプローチとして適切な組み合わせを2つ選べ。","choices":{"a":"正確な血圧測定＋アドヒアランス＋生活習慣＋薬剤調整＋多職種連携","b":"ICT/デジタル技術＋遠隔モニタリング＋共同意思決定","c":"降圧薬の即時最大量投与のみ","d":"二次性高血圧の検索を行わない","e":"患者教育を行わない"},"format":"複数","correct":"ab","explanation":"コントロール不良への包括的アプローチは、(1)正確な血圧測定、(2)服薬アドヒアランス確保、(3)生活習慣改善、(4)合理的薬剤調整、(5)二次性高血圧の除外、(6)多職種チーム医療、(7)患者教育・共同意思決定、(8)ICT・デジタル技術の活用、(9)心理社会的支援、(10)QOLへの配慮。これらを統合的に実施することが推奨される。GL p.165-173、CQ15参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=165","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=290"}]}],"gl_pages":[165,175],"su_pages":[271,290]},{"id":12,"title":"治療抵抗性高血圧","is_clinical":true,"part":3,"key_topics":["定義と有病割合","要因と対策","薬物療法（MR拮抗薬の追加など）","非薬物療法（腎デナベーションなど）","CQ16: 治療抵抗性高血圧の治療において腎デナベーションは推奨されるか","Q10: 治療抵抗性高血圧においてMR拮抗薬の追加投与は血圧コントロールに有用か"],"sets":[{"day":1,"questions":[{"no":1,"stem":"JSH2025における治療抵抗性高血圧の定義として最も適切なのはどれか。","choices":{"a":"利尿薬を含まない2剤以上の降圧薬を服用しても診察室血圧が目標値に到達しないもの","b":"利尿薬を含む3剤以上の異なるクラスの降圧薬を至適用量で服用しても診察室血圧が目標値に到達しないもの、または4剤以上で目標値が達成されているもの","c":"ACE阻害薬とARBの併用で目標血圧に到達しないもの","d":"5剤以上の降圧薬を服用しても血圧が180/110 mmHg以上のもの","e":"外来診察室血圧のみで判定し、家庭血圧やABPMは用いないと定義されているもの"},"format":"単一","correct":"b","explanation":"JSH2025の治療抵抗性高血圧の定義は、利尿薬を含む3クラス以上の降圧薬（いずれも至適用量または忍容性のある最大用量）を服用してもなお診察室血圧が目標値に到達しない病態、あるいは4剤以上の降圧薬で目標血圧が達成されている状態を指す。ACE阻害薬とARBの併用は推奨されない。GL p.176-177参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=176","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=291"},{"no":2,"stem":"高血圧外来における治療抵抗性高血圧の有病割合として最も近いのはどれか。","choices":{"a":"高血圧患者全体の約1%","b":"高血圧患者全体の約3%","c":"高血圧患者全体の約10〜15%","d":"高血圧患者全体の約30%","e":"高血圧患者全体の約50%"},"format":"単一","correct":"c","explanation":"治療抵抗性高血圧の有病割合は、薬物治療を受けている高血圧患者のおよそ10〜15%とされている。ABPMや家庭血圧で偽性治療抵抗性を除外した「真の治療抵抗性高血圧」はその半数程度（5〜8%）に減少する。GL p.176参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=176","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=291"},{"no":3,"stem":"「偽性治療抵抗性高血圧（pseudo-resistant hypertension）」の原因として最も該当しにくいのはどれか。","choices":{"a":"白衣高血圧","b":"不適切なカフサイズによる血圧過大評価","c":"服薬アドヒアランス不良","d":"原発性アルドステロン症","e":"臨床イナーシャ（処方の不十分な強化）"},"format":"単一","correct":"d","explanation":"偽性治療抵抗性高血圧は、診察室血圧の過大評価・白衣現象・測定法の誤り・服薬アドヒアランス不良・臨床イナーシャなど「真の薬剤抵抗性ではない原因」によって治療抵抗性に見える状態を指す。原発性アルドステロン症は真の治療抵抗性高血圧の重要な背景病態（二次性高血圧）であり、偽性ではない。GL p.176-177参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=292"},{"no":4,"stem":"55歳男性。Ca拮抗薬・ARB・サイアザイド利尿薬を至適用量で12週間服用しているが診察室血圧150/95 mmHg、家庭血圧148/92 mmHg。次の対応として最も推奨されるのはどれか。","choices":{"a":"ACE阻害薬を追加してARBと併用する","b":"服薬アドヒアランスと生活習慣（食塩・アルコール）の確認、二次性高血圧スクリーニング、ABPM施行の後に第4剤としてMR拮抗薬を考慮する","c":"ただちに腎デナベーションを施行する","d":"全降圧薬を中止して経過観察する","e":"β遮断薬を第4剤として無条件に追加する"},"format":"単一","correct":"b","explanation":"真の治療抵抗性高血圧と判断するには、まず偽性治療抵抗性の除外（アドヒアランス確認・正確な血圧測定・ABPM/家庭血圧）と二次性高血圧スクリーニング（特にPA、SAS、CKD、腎血管性）が必須。その上で、JSH2025ではPATHWAY-2試験などの知見をふまえ第4剤としてMR拮抗薬（スピロノラクトン等）が推奨される。ACE阻害薬とARBの併用は禁忌レベルで推奨されない。GL p.177-178参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=293"},{"no":5,"stem":"治療抵抗性高血圧の背景となる二次性高血圧として最も頻度が高いのはどれか。","choices":{"a":"褐色細胞腫","b":"クッシング症候群","c":"原発性アルドステロン症","d":"腎血管性高血圧（線維筋性異形成）","e":"甲状腺機能亢進症"},"format":"単一","correct":"c","explanation":"治療抵抗性高血圧の患者では原発性アルドステロン症（PA）の頻度が高く、約15〜20%にPAが存在すると報告されている。JSH2025ではPAスクリーニング対象として「治療抵抗性高血圧」が明記されている。SASも高頻度に併存するが、二次性HTとしての確定診断頻度ではPAが最多。GL p.177、第15章 p.198参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=292"},{"no":6,"stem":"治療抵抗性高血圧の薬物療法における第4剤としてJSH2025で最も推奨されるのはどれか。","choices":{"a":"α遮断薬（ドキサゾシン）","b":"β遮断薬（ビソプロロール）","c":"MR拮抗薬（スピロノラクトン・エプレレノン）","d":"中枢性交感神経抑制薬（クロニジン）","e":"直接的血管拡張薬（ヒドララジン）"},"format":"単一","correct":"c","explanation":"PATHWAY-2試験（Williams B, Lancet 2015）でスピロノラクトンは治療抵抗性高血圧においてビソプロロールやドキサゾシンより降圧効果が優れていた。JSH2025のQ10でもMR拮抗薬の追加投与が治療抵抗性高血圧の血圧コントロールに有用と推奨されている。エプレレノンも代替として使用可能。GL p.177-178、Q10参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=178","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=294"},{"no":7,"stem":"62歳女性、CKD G3a（eGFR 48 mL/min/1.73m²）・血清K 4.8 mEq/L。Ca拮抗薬・ARB・サイアザイド利尿薬で診察室血圧154/88 mmHg。スピロノラクトン25 mgの追加を検討する際の留意点として最も適切なのはどれか。","choices":{"a":"高K血症のリスクがあるため血清K・腎機能を開始前および開始後1〜2週、以後定期的にモニタリングする","b":"eGFR <60 では絶対禁忌である","c":"ARBとの併用は禁忌である","d":"女性化乳房はエプレレノンで多くスピロノラクトンでは稀である","e":"ループ利尿薬への変更が必須である"},"format":"単一","correct":"a","explanation":"MR拮抗薬は高K血症（特にCKD・RA系阻害薬併用例・高齢者）のリスクがあり、開始前にK値とeGFR、開始後1〜2週、以後定期モニタリングが必須。eGFR <30 では原則として推奨されないが、G3aで血清K正常なら使用可能。女性化乳房はスピロノラクトンで多くエプレレノンで少ない（記述d逆）。ARBとの併用は禁忌ではないが高K血症に注意。GL p.178参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=178","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=295"},{"no":8,"stem":"JSH2025のCQ16「治療抵抗性高血圧の治療において腎デナベーションは推奨されるか」の推奨として最も適切なのはどれか。","choices":{"a":"すべての高血圧患者に第一選択として強く推奨される","b":"薬物療法が不十分または忍容性に問題のある治療抵抗性高血圧患者において、施設・症例を選んで考慮することが提案される（弱い推奨）","c":"エビデンス不足のためいかなる場合も実施すべきでない","d":"原発性アルドステロン症が確定した症例に限り推奨される","e":"妊娠高血圧症候群でも安全に施行できる治療として推奨される"},"format":"単一","correct":"b","explanation":"CQ16では、SPYRAL HTN-OFF/ON MED、RADIANCE-HTNなどの近年のシャム対照RCTで降圧効果が示されたことを根拠に、薬物療法で目標血圧未達かつ忍容性に問題がある治療抵抗性高血圧患者で、十分な患者選択と施設要件下で腎デナベーションを考慮することが提案される（弱い推奨）。第一選択ではなく、症例を厳格に選ぶ位置づけ。GL p.180-181、CQ16参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=180","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=300"},{"no":9,"stem":"治療抵抗性高血圧の評価において、まず実施すべき検査として最も適切なのはどれか。","choices":{"a":"副腎CT","b":"腎動脈造影","c":"ABPM（24時間自由行動下血圧測定）と家庭血圧測定","d":"心臓カテーテル検査","e":"PET-CT"},"format":"単一","correct":"c","explanation":"治療抵抗性高血圧の評価の第一歩は、ABPMと家庭血圧で白衣高血圧（偽性治療抵抗性）を除外し、夜間血圧異常やnon-dipper型などを評価すること。これにより真の治療抵抗性高血圧かを判定し、その後に二次性HTスクリーニング・標的臓器障害評価へ進む。GL p.177参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=292"},{"no":10,"stem":"治療抵抗性高血圧で血圧上昇に寄与しうる併用薬・物質として誤っているのはどれか。","choices":{"a":"NSAIDs（非ステロイド性抗炎症薬）","b":"グルココルチコイド","c":"甘草（カンゾウ）含有漢方薬","d":"メトホルミン","e":"経口避妊薬（エストロゲン含有）"},"format":"単一","correct":"d","explanation":"薬剤誘発性高血圧（治療抵抗性の原因となる）の代表は、NSAIDs、グルココルチコイド、甘草（偽性アルドステロン症）、シクロスポリン/タクロリムス、ESA、経口避妊薬・エストロゲン、VEGF阻害薬などの分子標的薬。メトホルミンは血圧上昇には基本的に関与しない。問診で「市販薬・サプリ・漢方」を含めた服薬を確認することが必須。GL p.177、第15章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=294"},{"no":11,"stem":"治療抵抗性高血圧の生活習慣関連因子として、降圧効果のために最優先で介入すべきものはどれか。","choices":{"a":"ビタミンD投与","b":"減塩（食塩 6 g/日未満）とアルコール摂取制限","c":"高蛋白食への変更","d":"カフェイン完全断ち","e":"鉄分制限"},"format":"単一","correct":"b","explanation":"治療抵抗性高血圧では塩分過剰摂取と過剰飲酒が極めて重要な修飾因子。減塩6 g/日未満とアルコール制限（男性20-30 mL/日以下、女性10-20 mL/日以下）は、降圧薬の効果を高める。肥満があれば減量、SAS合併ならCPAPも併せて行う。GL p.177、第7章生活習慣参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=293"},{"no":12,"stem":"57歳男性、肥満（BMI 31）、いびき・日中傾眠あり。Ca拮抗薬・ARB・サイアザイドで診察室血圧158/96 mmHg。ABPMで夜間血圧132/85 mmHg（non-dipper型）。次に最も推奨される検査・対応はどれか。","choices":{"a":"ただちに腎デナベーションを実施","b":"睡眠時無呼吸症候群のスクリーニング（簡易PSG/AHI評価）と必要ならCPAP導入","c":"ループ利尿薬への変更のみ","d":"降圧薬すべてを中止して経過観察","e":"心臓カテーテル検査"},"format":"単一","correct":"b","explanation":"肥満・いびき・日中傾眠・non-dipper型は睡眠時無呼吸症候群（SAS）の典型像。SASは治療抵抗性高血圧の重要な背景病態であり、JSH2025でもスクリーニングが推奨される。中等症以上ではCPAPで降圧効果が期待できる。第10章のSAS合併HT・第12章治療抵抗性HTの両方で重要。GL p.177、p.148-149参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=296"},{"no":13,"stem":"治療抵抗性高血圧に関する以下の記述のうち、正しいものを2つ選べ。","choices":{"a":"服薬アドヒアランス不良は治療抵抗性の主要原因の一つで、服薬カウンセリングや簡略化（配合剤・1日1回製剤）が有用である","b":"ACE阻害薬とARBの併用は治療抵抗性HTで強く推奨される標準治療である","c":"ABPMによる白衣現象の除外は偽性治療抵抗性の診断に有用である","d":"MR拮抗薬は治療抵抗性HTで効果がないことが証明されている","e":"腎デナベーションは全患者で第一選択である"},"format":"複数","correct":"ac","explanation":"正しいのはa（アドヒアランス不良対策＝服薬カウンセリング・配合剤・1日1回製剤・服薬時刻調整）とc（ABPM・家庭血圧で白衣現象を除外することは偽性治療抵抗性の判定に有用）。bは禁忌レベルで誤り、dはPATHWAY-2試験等でMR拮抗薬が有効性を示しており誤り、eは腎デナベーションは選択された症例での弱い推奨で誤り。GL p.177-180参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=293"},{"no":14,"stem":"60歳男性、治療抵抗性高血圧。Ca拮抗薬・ARB・サイアザイドにスピロノラクトン25 mgを追加したが血圧164/94 mmHg。第5剤目として比較的優先順位が高いのはどれか。","choices":{"a":"ACE阻害薬を追加してARBと併用","b":"β遮断薬またはα遮断薬の追加（脈拍・心血管リスクに応じて選択）","c":"甘草（漢方）を追加","d":"NSAIDsの定時投与","e":"経口避妊薬を併用"},"format":"単一","correct":"b","explanation":"MR拮抗薬で十分な効果が得られない場合、第5剤として安静時心拍数が高い・冠動脈疾患/HFrEF合併などではβ遮断薬、それ以外でα遮断薬を追加することが提案される。中枢性交感神経抑制薬（クロニジン・メチルドパ）や血管拡張薬（ヒドララジン）も選択肢。ACE/ARB併用、漢方甘草、NSAIDs、エストロゲンはむしろ血圧を悪化させる。GL p.178参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=178","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=295"},{"no":15,"stem":"治療抵抗性高血圧の予後について正しいのはどれか。","choices":{"a":"コントロール良好群と比べて脳心血管イベント・腎機能低下リスクは同等である","b":"コントロール良好群と比べて脳心血管イベント・末期腎不全・全死亡のリスクが有意に高い","c":"降圧目標を達成しなくても予後は変わらない","d":"若年者ではむしろ予後が良い","e":"予後に関するエビデンスは存在しない"},"format":"単一","correct":"b","explanation":"治療抵抗性高血圧は、コントロール良好な高血圧と比べて脳卒中・冠動脈疾患・心不全・末期腎不全・全死亡のリスクが有意に高いことが複数のコホート研究で示されている。そのため、適切な評価と多剤併用・生活習慣修正・専門医連携が重要。GL p.176参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=176","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=291"},{"no":16,"stem":"服薬アドヒアランスを客観的に評価する方法として最も信頼性が高いのはどれか。","choices":{"a":"患者の自己申告のみ","b":"家族からの聞き取りのみ","c":"薬局での処方箋受領歴・残薬確認、必要に応じて尿/血中薬物濃度測定（薬剤暴露評価）","d":"血圧値からの推測のみ","e":"BMIの変化"},"format":"単一","correct":"c","explanation":"服薬アドヒアランス不良は治療抵抗性HTの最大の原因の一つ（実臨床で30-50%）。自己申告は過大評価されやすい。客観的評価として、処方歴・残薬確認、尿/血中の降圧薬代謝物測定（一部研究施設）、電子的服薬モニタリングが用いられる。簡単に介入できるのは配合剤・1日1回製剤・服薬カウンセリング。GL p.177参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=292"},{"no":17,"stem":"腎デナベーションの臨床応用に関する記述として正しいのはどれか。","choices":{"a":"高周波カテーテルアブレーションや超音波エネルギーで腎動脈周囲の交感神経を選択的に修飾し降圧を図る","b":"両側腎動脈の完全閉塞をきたす手技である","c":"腎機能を必ず低下させる","d":"妊娠高血圧症候群が主な適応である","e":"経口降圧薬の代替として全例で薬物療法を中止できる"},"format":"単一","correct":"a","explanation":"腎デナベーション（renal denervation, RDN）は経皮的に腎動脈にカテーテルを挿入し、高周波（RF）または超音波エネルギーで腎動脈周囲の腎交感神経を局所的に修飾（denervation）して交感神経活動を抑制し降圧を図る。腎動脈を閉塞させるものではない。シャム対照RCT（SPYRAL HTN、RADIANCE-HTN）で薬物併用または非併用下に有意な降圧効果が示された。薬物療法を全廃するものではない。GL p.180-181、CQ16参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=180","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=301"},{"no":18,"stem":"JSH2025のQ10「治療抵抗性高血圧においてMR拮抗薬の追加投与は血圧コントロールに有用か」について正しいのはどれか。","choices":{"a":"推奨されない","b":"推奨される（PATHWAY-2試験などのRCTに基づくエビデンスあり）","c":"高齢者にのみ推奨される","d":"若年者にのみ推奨される","e":"降圧効果は確認されていない"},"format":"単一","correct":"b","explanation":"Q10では、PATHWAY-2試験（スピロノラクトンがビソプロロール・ドキサゾシンより優れた降圧効果）やResistant Hypertension Optimal Treatment（ReHOT）試験などをもとに、治療抵抗性高血圧におけるMR拮抗薬（スピロノラクトン25-50 mg、エプレレノン50-100 mg）追加投与が血圧コントロールに有用であり推奨される。高K血症・腎機能モニタリング下で使用。GL p.178、Q10参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=178","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=295"},{"no":19,"stem":"サイアザイド系利尿薬で十分な降圧が得られない治療抵抗性高血圧について正しいのはどれか。","choices":{"a":"eGFR <30 mL/min/1.73m² の進行CKDではサイアザイドからループ利尿薬（フロセミド・トラセミド・アゾセミド）への変更を検討する","b":"eGFRに関わらずサイアザイドが最も有効である","c":"利尿薬は治療抵抗性HTでは使用しない","d":"K保持性利尿薬は使用してはならない","e":"利尿薬を増量するほど降圧効果と安全性が直線的に向上する"},"format":"単一","correct":"a","explanation":"サイアザイドはeGFR <30〜45で降圧・利尿効果が著明に減弱するため、進行CKDではループ利尿薬（フロセミド、トラセミド、アゾセミド）への変更が推奨される。長時間作用型のトラセミド・アゾセミドはコンプライアンスにも優れる。MR拮抗薬（K保持性利尿薬）はむしろ治療抵抗性HTで推奨される。利尿薬の過剰投与は脱水・腎機能悪化・電解質異常を招くため至適用量にとどめる。GL p.178、第9章CKD参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=178","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=295"},{"no":20,"stem":"治療抵抗性高血圧の専門医紹介の適応として誤っているのはどれか。","choices":{"a":"二次性高血圧が疑われる場合（PA・SAS・腎血管性・褐色細胞腫など）","b":"4剤以上の併用でも血圧コントロールが不良な場合","c":"急速な臓器障害の進行や高血圧緊急症が疑われる場合","d":"若年発症の重症高血圧","e":"降圧目標は130/80未満だが家庭血圧で125/78 mmHgと良好な患者"},"format":"単一","correct":"e","explanation":"選択肢eは家庭血圧で目標達成されており、治療抵抗性HTには該当しない。a〜dは典型的な専門医紹介適応：①二次性HT疑い、②4剤以上で不良、③急速な臓器障害・緊急症、④若年重症HT、加えて妊娠中、CKD進行例、薬物副作用などで紹介が望ましい。GL p.178-179、第11章コントロール不良参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=178","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=296"}]},{"day":2,"questions":[{"no":1,"stem":"「真の治療抵抗性高血圧（true resistant hypertension）」と判定するために必須なのはどれか。","choices":{"a":"診察室血圧のみで判定する","b":"ABPMまたは家庭血圧で白衣現象を除外し、服薬アドヒアランス・正確な血圧測定・適切な薬剤クラスと至適用量を確認した上で、なお目標未達であること","c":"腎機能が低下していること","d":"5剤以上服用していること","e":"若年発症であること"},"format":"単一","correct":"b","explanation":"「真の治療抵抗性高血圧」と判定するには、①ABPM/家庭血圧での白衣現象除外、②服薬アドヒアランス確認、③正確な血圧測定（適切なカフサイズ・5分安静）、④利尿薬を含む3剤以上の適切なクラス・至適用量の確認、を経た上で目標未達と判定する。これらを満たさない場合は偽性治療抵抗性として除外。GL p.176-177参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=176","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=291"},{"no":2,"stem":"治療抵抗性高血圧の患者でPAスクリーニングを行うタイミング・条件として最も適切なのはどれか。","choices":{"a":"症状がなければ施行しない","b":"ARRの測定前にCa拮抗薬・α遮断薬以外の降圧薬は影響があるため、可能なら一定期間中止/変更してから測定する。緊急時は内服下のARRと血清Kから推測し、陽性なら確認検査へ進む","c":"全降圧薬をいきなり中止して測定する","d":"若年女性のみが対象","e":"CTで副腎を見てから決定する"},"format":"単一","correct":"b","explanation":"PAスクリーニング時にはARRに影響する降圧薬（MR拮抗薬・利尿薬・β遮断薬・ACE/ARB）の影響を考慮する。理想的にはCa拮抗薬・α遮断薬（ARRへの影響が小さい）に変更して2-4週後にPAC/PRAを測定する。ただし重症高血圧で中止できない場合はそのまま測定し、陽性なら確認検査へ。低K血症がある場合はK補正後に再検も必要。GL第15章 p.198-199参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=292"},{"no":3,"stem":"70歳女性、収縮期優位の治療抵抗性高血圧。ARB・Ca拮抗薬・サイアザイドにスピロノラクトンを加えて4週間。診察室血圧148/72 mmHg、血清K 5.4 mEq/L、Cr 1.2 mg/dL（前1.0）。次の対応として最も適切なのはどれか。","choices":{"a":"スピロノラクトンを継続増量する","b":"スピロノラクトンを減量または中止し、K・Crを再検。代替としてエプレレノンへの変更や他クラス（α/β遮断薬）追加を検討する","c":"ARBの増量のみ行う","d":"経過観察のみ","e":"塩分制限を解除する"},"format":"単一","correct":"b","explanation":"K 5.4は高K血症（>5.0）。MR拮抗薬とCr上昇・高K血症が出現した場合は、減量または中止して再検し、必要なら他剤に変更する。エプレレノンはスピロノラクトンより女性化乳房等の性ホルモン関連副作用が少ないが、高K血症のリスクは類似。塩分制限の解除は不適切。GL p.178参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=178","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=295"},{"no":4,"stem":"治療抵抗性高血圧の非薬物療法に関する以下の記述のうち、正しいものを2つ選べ。","choices":{"a":"腎デナベーション（RDN）は薬物療法で目標未達かつ忍容性に問題のある症例で考慮される弱い推奨である","b":"RDNはすべての高血圧患者の第一選択である","c":"減塩・減量・節酒・運動などの生活習慣修正は治療抵抗性HTでも降圧効果と予後改善が期待できる","d":"頸動脈洞圧受容体刺激療法（barostimulation）はJSH2025で第一選択として強く推奨されている","e":"治療抵抗性HTでは生活習慣修正は不要である"},"format":"複数","correct":"ac","explanation":"正しいのはa（CQ16でRDNは選択された症例で弱い推奨）とc（生活習慣修正は治療抵抗性HTでも基盤として継続が必要、減塩・減量・節酒・運動の追加効果あり）。bは誤り（RDNは第一選択ではない）、dは誤り（barostimulationは研究段階で日本では一般診療として推奨されていない）、eは誤り。GL p.177-180参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=180","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=300"},{"no":5,"stem":"治療抵抗性高血圧で多剤併用時の処方単純化として最も推奨されるのはどれか。","choices":{"a":"1日複数回服用に分散して服薬機会を増やす","b":"個別錠剤を可能な限り増やす","c":"2剤・3剤配合剤（SPC: single-pill combination）を活用し、1日1回投与に簡略化する","d":"夜間頻回投与を推奨する","e":"降圧薬の自己中断を許容する"},"format":"単一","correct":"c","explanation":"アドヒアランス改善には処方単純化が有用で、配合剤（SPC: ARB+Ca拮抗薬、ARB+利尿薬、3剤配合など）と1日1回投与が推奨される。複雑な処方・複数回投与・自己中断は治療抵抗性の悪化因子。JSH2025は配合剤の活用を支持。GL p.177-178、第8章薬物治療参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=293"},{"no":6,"stem":"CQ16の根拠となる主要なシャム対照RCTでないのはどれか。","choices":{"a":"SPYRAL HTN-OFF MED","b":"SPYRAL HTN-ON MED","c":"RADIANCE-HTN SOLO/TRIO","d":"ONTARGET試験","e":"REQUIRE試験（日本人含むアジア圏）"},"format":"単一","correct":"d","explanation":"ONTARGET試験はテルミサルタンvsラミプリルvs併用の心血管予防試験で、腎デナベーションのRCTではない。CQ16の根拠はSPYRAL HTN-OFF/ON MED、RADIANCE-HTN SOLO/TRIO、SPYRAL HTN-ON MED Expansion、REQUIRE試験（日本・韓国の超音波RDN）など。GL p.180-181、CQ16参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=181","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=301"},{"no":7,"stem":"65歳男性、糖尿病・CKD G3b（eGFR 38）・微量アルブミン尿。Ca拮抗薬・ARB・サイアザイド・スピロノラクトン使用中も診察室血圧156/88 mmHg、家庭血圧150/86 mmHg。最も優先される対応はどれか。","choices":{"a":"サイアザイドをループ利尿薬（フロセミドまたはトラセミド/アゾセミド）に変更し、容量負荷の是正と腎機能・電解質モニタリングを行う","b":"ACE阻害薬を追加してARBと併用する","c":"降圧薬をすべて中止する","d":"ヘモグロビン目標を高くするためESAを増量する","e":"NSAIDsの定時投与を行う"},"format":"単一","correct":"a","explanation":"eGFR <45ではサイアザイドの効果が減弱するため、ループ利尿薬（フロセミド・トラセミド・アゾセミド）への変更が推奨される。CKD合併治療抵抗性HTでは容量負荷が主因となることが多く、利尿薬の最適化が重要。ACE/ARB併用は腎機能悪化・高K血症のリスクが高く禁忌レベル、ESA過剰は血圧上昇、NSAIDsも血圧上昇・腎機能悪化を招くため不適切。GL p.178、第9章CKD参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=178","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=295"},{"no":8,"stem":"腎デナベーション施行時の適応・除外条件として最も適切なのはどれか。","choices":{"a":"適応：薬物療法で目標未達かつ忍容性に問題のある真の治療抵抗性HT。除外：腎動脈解剖学的に不適（副腎動脈分岐・腎動脈狭窄・複数の副腎動脈）、進行CKD（eGFR <40-45）、二次性HT未除外、妊娠など","b":"若年女性の妊娠高血圧症候群が主な適応","c":"症例選択は問わず誰でも施行できる","d":"腎動脈の重度狭窄症例こそ最良の適応","e":"進行CKD（eGFR <30）でも安全に施行できる"},"format":"単一","correct":"a","explanation":"RDNは①真の治療抵抗性HT、②忍容性問題、③患者希望、を満たした上で、④腎動脈解剖学的適合、⑤eGFR概ね >40-45、⑥二次性HT除外済み、⑦妊娠なし、を満たす症例が対象。妊婦・進行CKD・複雑な腎動脈解剖・重度狭窄は除外。施設要件・術者経験も重要。GL p.180-181、CQ16参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=181","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=301"},{"no":9,"stem":"治療抵抗性高血圧におけるMR拮抗薬の用量として最も適切なのはどれか。","choices":{"a":"スピロノラクトン 12.5〜25 mg/日から開始、必要に応じ50 mg/日まで増量（高K血症・腎機能に注意）","b":"スピロノラクトン 200 mg/日が標準","c":"エプレレノン 5 mg/日が最大用量","d":"用量設定は不要で患者の自己判断に任せる","e":"1日3回以上に分割投与する"},"format":"単一","correct":"a","explanation":"スピロノラクトンは12.5〜25 mg/日から開始し、降圧・電解質・腎機能をみながら必要に応じ50 mg/日まで増量。エプレレノン（保険適用は本邦では本態性高血圧で承認）は50〜100 mg/日（1日1〜2回）。1日1回投与で十分。高K血症・腎機能をモニタリング。GL p.178、Q10、第8章薬物治療参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=178","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=295"},{"no":10,"stem":"治療抵抗性高血圧の患者教育・チーム医療について誤っているのはどれか。","choices":{"a":"薬剤師・看護師・栄養士などの多職種連携によるアドヒアランス支援・服薬指導が有用","b":"家庭血圧測定の方法と意義を繰り返し教育する","c":"減塩・節酒・運動などの生活習慣指導は単発の説明で十分","d":"電話・遠隔診療・スマートフォンアプリなどデジタル技術の活用が推奨される","e":"服薬カレンダー・お薬手帳・配合剤の活用で服薬負担を軽減する"},"format":"単一","correct":"c","explanation":"生活習慣指導は単発でなく継続的・反復的に行うべきで、行動変容と維持に向けた支援が重要。多職種チーム医療、デジタル技術、家庭血圧自己管理、服薬の簡略化はいずれもJSH2025で推奨されるアプローチ。CQ15「チーム医療」（第11章）とも関連。GL p.177-179、第11章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=178","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=296"},{"no":11,"stem":"治療抵抗性高血圧で見落とされやすい二次性高血圧として頻度が高いものを2つ選べ。","choices":{"a":"原発性アルドステロン症（PA）","b":"睡眠時無呼吸症候群（SAS）","c":"甲状腺機能低下症（顕性）","d":"副甲状腺機能低下症","e":"原発性赤血球増加症"},"format":"複数","correct":"ab","explanation":"治療抵抗性HTで見落とされやすく頻度が高い二次性HTは原発性アルドステロン症（15-20%）と睡眠時無呼吸症候群（30-50%程度に合併）。他に腎血管性HT、CKD、薬剤性、クッシング症候群、褐色細胞腫など。甲状腺機能低下症や副甲状腺機能低下症は治療抵抗性HTの典型的背景ではない。GL p.177、第15章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=292"},{"no":12,"stem":"59歳男性、Ca拮抗薬・ARB・サイアザイド服用中、診察室血圧158/95 mmHg。OTC薬として鎮痛目的でロキソプロフェンを連用、漢方として甘草含有処方を週5日服用、機能性食品（カフェイン高含有）も使用。最も優先される指導はどれか。","choices":{"a":"降圧薬を強化するのみ","b":"NSAIDs・甘草・カフェイン高含有食品など血圧を上昇させうる併用物質の中止・減量を指導し、再評価する","c":"甘草はむしろ降圧作用があるので継続","d":"腎デナベーションを直ちに実施","e":"経口避妊薬を併用する"},"format":"単一","correct":"b","explanation":"薬剤誘発性血圧上昇の代表（NSAIDs、甘草グリチルリチンによる偽性アルドステロン症、カフェイン・エナジードリンク）を含む併用物質の確認・中止/減量は治療抵抗性HT評価の必須項目。これらを中止しないまま降圧薬を強化しても効果は限定
