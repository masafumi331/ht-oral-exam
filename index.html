伝子座位は近年1000以上同定されており、『50程度』とするBは誤り。A（両親が高血圧の場合に発症リスクが約3倍）、C（個々の多型の影響はmmHgオーダー）、D（人種差あり）、E（日本人で食塩感受性関連多型のリスクが高い）はいずれも近年の知見と合致する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=217","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=341","from_past_exam":true,"note":"解説（10.58.36『遺伝性高血圧の原因遺伝子と臨床の特徴』）が提示されたが、正解ハイライトは確認できず。\n正解ハイライト未確認のため自信度medium。GWASヒット数が『50程度』は古い知見なのでBが誤り。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.57.32.png","confidence":"medium","slide_section":"18 血管性・脳・遺伝子高血圧"},{"no":24,"stem":"VEGF阻害薬関連高血圧の最重要機序はどれか。1つ選べ。","choices":{"a":"Na貯留","b":"血管内皮NO産生低下","c":"末梢α受容体刺激","d":"利尿剤との相互作用","e":"血管内皮ACE活性増加"},"format":"単一","correct":"b","explanation":"JSH2025 第15章「薬剤誘発性高血圧」p.210によると、VEGF阻害薬（抗VEGF抗体・血管新生阻害薬）による高血圧の主要機序は『細小血管床減少、VEGF阻害によるNO産生低下に伴う末梢血管抵抗増加、腎機能障害』とされ、特にNO産生低下が中心機序である。よってBが正解。Aの『Na貯留』、Cの『α受容体刺激』、E『ACE活性増加』は機序として不適切。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=212","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=342","from_past_exam":true,"note":"解説（10.59.11『薬剤誘発性高血圧の原因薬剤と高血圧治療法』）を経て、次スライド(10.59.22)でBが黄色ハイライト。VEGF阻害薬関連高血圧はNO産生低下が中心機序。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.58.53.png","confidence":"high","slide_section":"19 薬剤誘発性高血圧"}]}],"gl_pages":[198,220],"su_pages":[331,345]},{"id":16,"title":"特殊な病態の高血圧","is_clinical":true,"part":3,"key_topics":["高血圧緊急症および切迫症","悪性高血圧","術前・術後の血圧管理","災害時の高血圧管理"],"sets":[{"day":1,"questions":[{"no":1,"stem":"高血圧緊急症の定義について正しいのはどれか。1つ選べ。","choices":{"a":"拡張期血圧120 mmHg以上であれば臓器障害がなくても緊急症と診断する","b":"血圧の高度上昇（多くは180/120 mmHg以上）に加え、脳・心・腎・大血管などに急性臓器障害を生じている病態である","c":"血圧が異常高値であれば、急速な血圧上昇による高血圧性脳症は緊急症に含まれない","d":"臓器障害の急速な進行がなくても、収縮期血圧180 mmHg以上であれば緊急症である","e":"緊急症と切迫症は降圧スピード・降圧目標ともに同じであり区別する意義は乏しい"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.221によれば、高血圧緊急症は『血圧の高度上昇（多くは180/120 mmHg以上）によって脳・心・腎・大血管などの標的臓器に急性の障害が生じ進行する病態』と定義される。血圧が異常高値でなくとも急速に血圧が上昇した高血圧性脳症・子癇・大動脈解離などは緊急症に含まれる（cは誤り）。高度高血圧でも臓器障害の急速進行がない場合は切迫症として扱う（a・dは誤り）。緊急症は経静脈的降圧で迅速に降圧し、切迫症は内服で数時間〜48時間かけて緩徐に降圧するため両者の区別は治療方針上重要（eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=223","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=346"},{"no":2,"stem":"高血圧緊急症と切迫症の取り扱いについて正しいのはどれか。1つ選べ。","choices":{"a":"切迫症では緊急降圧による予後改善のエビデンスが確立している","b":"切迫症は内服薬で24〜48時間かけて160/100 mmHg程度まで緩徐に降圧する","c":"緊急症の初期降圧では1時間以内に正常血圧（130/80未満）まで下げる","d":"切迫症では原則として入院し経静脈的降圧を行う","e":"切迫症では脳心血管病既往例でも常に外来管理で十分である"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.221-222によれば、切迫症では緊急降圧による予後改善のエビデンスはない（aは誤り）。降圧治療は数時間以内に開始すべきだが、24〜48時間かけて比較的緩徐に160/100 mmHg程度まで降圧する（bが正しい）。緊急症は最初の1時間で平均血圧で最大25%までの降圧に留め、次の2〜6時間で160/100、その後24〜48時間で140/90未満を目指す（cは誤り）。切迫症は原則内服で可能だが脳心血管病既往など強い危険因子があれば入院加療が望ましい（d・eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=224","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=346"},{"no":3,"stem":"高血圧緊急症の初期降圧目標として正しいのはどれか。1つ選べ。","choices":{"a":"1時間以内に正常血圧（120/80 mmHg未満）まで下げる","b":"最初の1時間で平均血圧で最大25%程度の降圧に留める","c":"可能な限り迅速に収縮期血圧100 mmHg未満まで低下させる","d":"初期降圧後すぐに内服薬は中止する","e":"1時間以内に拡張期血圧60 mmHgまで下げる"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.221-222では、高血圧緊急症の一般的降圧目標として『最初の1時間以内では平均血圧で最大25%までの降圧に留め、次の2〜6時間では160/100 mmHg程度まで降圧し、その後24〜48時間かけて徐々に140/90 mmHg未満まで降圧する』と明記。急速で過度な降圧は臓器灌流圧の低下から脳梗塞・心筋梗塞・腎機能障害を増悪させるため、慎重な降圧が原則。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=224","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=347"},{"no":4,"stem":"急性大動脈解離（Stanford A型）に伴う高血圧緊急症の血圧管理目標として正しいのはどれか。1つ選べ。","choices":{"a":"1時間で平均血圧の25%降下に留める","b":"ただちに収縮期血圧を120 mmHg未満に低下させ、心拍数60回/分未満を目標とする","c":"24時間かけて140/90 mmHg未満まで緩徐に降圧する","d":"降圧の前にまず血栓溶解療法を行う","e":"収縮期血圧180 mmHg未満を24時間維持する"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.224「大動脈解離（急性期）」によれば、急性大動脈解離では収縮期血圧100〜120 mmHg、心拍数60回/分未満を目標とし、超急性期には静注薬で迅速にコントロールする。禁忌がなければβ遮断薬の静注で心拍数コントロールを優先（β遮断薬が使えなければ非ジヒドロピリジン系Ca拮抗薬）し、心拍数コントロール後にニカルジピン・ニトログリセリン・ニトロプルシドなどを併用する。Stanford A型は緊急外科手術の適応。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=226","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=347"},{"no":5,"stem":"脳出血急性期の血圧管理について、JSH2025の推奨に最も近いのはどれか。1つ選べ。","choices":{"a":"発症からできるだけ早期に収縮期血圧140 mmHg未満に降下させ、110 mmHg超に維持する","b":"ただちに収縮期血圧120 mmHg未満に低下させる","c":"降圧は原則行わない","d":"拡張期血圧60 mmHg未満を目標とする","e":"収縮期血圧降下幅が90 mmHg超となる積極的降圧が推奨される"},"format":"単一","correct":"a","explanation":"JSH2025 第16章 p.223「脳出血」では『発症からできるだけ早期に収縮期血圧140 mmHg未満に降下させ、その下限を110 mmHg超に維持することを考慮する』とされ、収縮期血圧降下幅が90 mmHg超となる積極的降圧は勧められない（eは誤り）。120未満の極端な降圧は推奨されない（bは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=225","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=347"},{"no":6,"stem":"脳梗塞急性期に対するrt-PA静注療法に関連した血圧管理について正しいのはどれか。1つ選べ。","choices":{"a":"rt-PA投与予定例で血圧が185/110 mmHg以上の場合に降圧療法が勧められる","b":"rt-PA投与後24時間以内は血圧が200/120 mmHgを超えるまでは降圧不要である","c":"rt-PA投与に降圧管理は不要である","d":"rt-PA投与前は収縮期血圧120 mmHg未満を必須とする","e":"血栓溶解の対象外の急性期脳梗塞では積極的降圧が原則である"},"format":"単一","correct":"a","explanation":"JSH2025 第16章 p.223「脳梗塞」では、血栓溶解療法予定で185/110 mmHg以上の場合と、同療法後24時間以内で180/105 mmHgを超えた場合に降圧療法が勧められると明記。機械的血栓回収後は収縮期血圧≧180 mmHgの場合のみ速やかな降圧を行う一方、回収中・回収後の過度な血圧低下は避ける。血栓溶解・機械的血栓回収療法の対象とならない急性期（発症2週間以内）では、特殊な条件下以外は原則降圧しない（eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=225","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=347"},{"no":7,"stem":"くも膜下出血（破裂脳動脈瘤による軽症〜中等症）の急性期血圧管理について正しいのはどれか。1つ選べ。","choices":{"a":"収縮期血圧100 mmHg未満まで急速に低下させる","b":"発症から脳動脈瘤処置までの収縮期血圧目標は160 mmHg未満である","c":"降圧は原則禁忌である","d":"拡張期血圧60 mmHg未満を目標とする","e":"降圧目標は140/90 mmHg未満である"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.223「くも膜下出血」では、発症から脳動脈瘤処置までの破裂脳動脈瘤による軽症〜中等症のくも膜下出血で『収縮期血圧160 mmHg未満に降圧する』と明記。再破裂予防のため脳動脈瘤処置までの管理は重要だが、急峻すぎる降圧は脳虚血のリスクとなるため100未満などの極端な目標は推奨されない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=225","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=348"},{"no":8,"stem":"高血圧緊急症で使用される注射薬の特徴として誤っているのはどれか。1つ選べ。","choices":{"a":"ニカルジピン持続静注は0.5〜6 μg/kg/分で投与し、効果発現は5〜10分、作用持続は約60分である","b":"ニカルジピンは添付文書上『高血圧性緊急症』が適応疾患である","c":"ジルチアゼム持続静注はHFrEFを除くほとんどの緊急症に使用可能で、徐脈・房室ブロックに注意する","d":"ニトロプルシドは長時間投与でシアン中毒に注意し、遮光が必要である","e":"切迫症の初期治療として、ニカルジピン注射薬のワンショット静注が標準である"},"format":"単一","correct":"e","explanation":"JSH2025 第16章 p.222では『ニフェジピンカプセル内容物の投与や、ニカルジピン注射薬のワンショット静注は、過度の降圧や反射性頻脈を来すことがあるため行わない』と明記。Eは禁忌に近い誤り。a〜dは表16-3の記載と合致（過去問Q15と類似テーマだが、設問の角度を変えてニカルジピン・ジルチアゼム・ニトロプルシドなど注射薬の薬理学的特徴を問う形式とした）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=224","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=348"},{"no":9,"stem":"高血圧性脳症について正しいのはどれか。1つ選べ。","choices":{"a":"長期の高血圧患者では160/100 mmHg以上から発症する","b":"MRIで後頭葉・頭頂葉に可逆性の血管原性浮腫（PRES）を呈することが多い","c":"ヒドララジン静注が第一選択である","d":"適切な治療が行われれば自然軽快し画像所見も不変である","e":"巣症状（片麻痺など）が早期から強くみられる"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.222-223「高血圧性脳症」によれば、急激または著明な血圧上昇により脳血流自動調節能の上限を超え血管原性脳浮腫を生じる病態。MRIで頭頂〜後頭葉白質にPRES（posterior reversible encephalopathy syndrome）の可逆性血管原性浮腫を認めることが多い（b正解）。長期高血圧患者では220/110 mmHg以上、正常血圧者では160/100 mmHg以上で発症（aは誤り）。治療は用量調整しやすいニカルジピン静注が有用で、ヒドララジンは頭蓋内圧を上昇させるため用いない（cは誤り）。血圧コントロールで臨床症状・画像所見は徐々に消失（dは誤り）。巣症状は比較的まれだが脳梗塞・脳出血・脳腫瘍の除外のため頭部画像検査は必須（eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=225","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=348"},{"no":10,"stem":"次のうち高血圧緊急症で誤っているのはどれか。2つ選べ。","choices":{"a":"重症高血圧による肺水腫を伴う急性心不全は緊急症である","b":"褐色細胞腫クリーゼは緊急症に含まれる","c":"子癇・重症の妊娠高血圧腎症・HELLP症候群はただちに収縮期血圧160 mmHg未満、拡張期血圧105 mmHg未満まで降圧する","d":"ループ利尿薬は緊急症において体液量過剰がなくても積極的に第一選択として使用する","e":"切迫症ではニフェジピンカプセル内容物の舌下投与が標準治療として推奨される"},"format":"複数","correct":"de","explanation":"JSH2025 第16章 p.221-222によれば、高血圧緊急症では『圧利尿による体液減少状態を呈していることが多く、ループ利尿薬の使用は体液量過剰を来していない限り推奨されない』（dは誤り）。切迫症でも『ニフェジピンカプセル内容物の投与や、ニカルジピン注射薬のワンショット静注は過度の降圧や反射性頻脈を来すため行わない』（eは誤り）。a・b・cは表16-1および本文の記載と合致。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=224","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=348"},{"no":11,"stem":"急性冠症候群に重症高血圧が合併した場合の血圧管理について正しいのはどれか。1つ選べ。","choices":{"a":"ニトログリセリン持続静注は右室梗塞合併が疑われる場合の第一選択である","b":"ただちに収縮期血圧を140 mmHg未満に低下させる","c":"Ca拮抗薬の経口ワンショット投与が標準治療である","d":"降圧の前にまず血栓溶解療法を行うべきである","e":"β遮断薬は禁忌である"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.224「急性冠症候群」では『ただちに収縮期血圧を140 mmHg未満に低下させる』『心筋酸素需要量の減少と冠血流の増加を図る目的でニトログリセリンを持続静注する』と明記。ただし右室梗塞の合併が疑われる場合は、前負荷低下から過度の血圧低下を来す恐れがあるためニトログリセリンは避ける（aは誤り）。著明な徐脈など禁忌となる病態がなければβ遮断薬を併用する（eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=226","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=349"},{"no":12,"stem":"褐色細胞腫クリーゼの治療について正しいのはどれか。1つ選べ。","choices":{"a":"β遮断薬の単独投与を第一選択とする","b":"α遮断薬フェントラミンを静注し、治療開始後1時間以内に収縮期血圧140 mmHg未満を目指す","c":"緊急降圧の第一選択はループ利尿薬である","d":"α遮断薬投与後の輸液は禁忌である","e":"頻脈に対してはα遮断薬を投与する前にβ遮断薬を併用する"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.224-225「褐色細胞腫・パラガングリオーマ」では『治療開始後1時間以内に収縮期血圧140 mmHg未満に降圧する』『α遮断薬のフェントラミン2〜5 mgを血圧が安定するまで1 mg/分のスピードで3〜5分ごとに静注する』と明記。β遮断薬の単独投与は『α受容体刺激による血管収縮から血圧上昇を来す恐れがあるため禁忌』（a・eは誤り）。圧利尿から体液量減少を来していることも多く、α遮断薬投与後は生理食塩水などを十分量輸液して低血圧を予防する（dは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=226","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=349"},{"no":13,"stem":"加速型−悪性高血圧について正しいのはどれか。1つ選べ。","choices":{"a":"拡張期血圧100 mmHg程度の中等度高血圧で発症する","b":"Keith-Wagener分類III度（出血・軟性白斑）の加速型高血圧とIV度（乳頭浮腫）の悪性高血圧は予後に差があり区別されている","c":"本態性高血圧からのみ発症し、二次性高血圧からは発症しない","d":"拡張期血圧120〜130 mmHg以上の著明な血圧上昇に加え、両側の網膜症や急速進行性腎機能障害を呈する","e":"数時間で平均血圧を50%以上低下させる急速降圧が標準治療である"},"format":"単一","correct":"d","explanation":"JSH2025 第16章 p.226「加速型−悪性高血圧」では『拡張期血圧120〜130 mmHg以上の著明な血圧上昇を認め、両側の網膜症や腎機能障害が急速に進行し、放置すると高血圧性脳症・脳出血・心不全などを発症する予後不良の病態』と定義（d正解）。従来Keith-Wagener IV度（乳頭浮腫）の悪性高血圧とIII度（出血・軟性白斑）の加速型高血圧を区別したが、臓器障害の進行や生命予後に差がないため現在では『加速型−悪性高血圧』と総称する（bは誤り）。腎実質性・腎血管性などの二次性高血圧からも発症する（cは誤り）。高血圧病歴が長い患者が多く急速降圧は虚血を来すため、数時間かけて平均血圧20〜25%低下を目標とする（eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=228","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=350"},{"no":14,"stem":"加速型−悪性高血圧の病理学的特徴と合併症について誤っているのはどれか。1つ選べ。","choices":{"a":"全身の細動脈血管壁への血漿成分侵入に伴う増殖性内膜炎およびフィブリノイド壊死を特徴とする","b":"血栓性微小血管症（TMA）を合併することがある","c":"降圧治療の普及により近年は5年生存率が90%以上に改善したが、腎予後は依然として不良である","d":"圧利尿による体液量減少を伴うことが多く、ACE阻害薬/ARBは大量から開始するのが原則である","e":"RA系阻害薬・β遮断薬などRA系を阻害する薬剤の効果が期待される"},"format":"単一","correct":"d","explanation":"JSH2025 第16章 p.226によれば、加速型−悪性高血圧では圧利尿による体液量減少を伴うことが多く、『ACE阻害薬やARBの投与は過度な降圧による腎機能の悪化を来す恐れがあるため、使用する場合は少量から開始し、血圧値・腎機能・血清カリウム値を慎重にフォローする必要がある』（dは誤り）。a（病理）、b（TMA合併）、c（英国の1997-2006年症例で5年生存率93%に改善する一方、発症後4年で18%が末期腎不全との報告あり）、e（RA系阻害薬の効果期待）はいずれも本文記載と合致。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=228","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=350"},{"no":15,"stem":"高血圧患者の待機的手術における術前血圧管理について正しいのはどれか。1つ選べ。","choices":{"a":"未治療高血圧でも二次性高血圧の鑑別は不要である","b":"術前血圧が180/110 mmHg以上であれば、手術の延期も考慮する","c":"術前血圧が160/100 mmHgであれば必ず手術を延期する","d":"白衣現象を疑う場合は家庭血圧や24時間血圧測定は禁忌である","e":"原発性アルドステロン症が疑われても診断確定前に予定手術を優先する"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.225「術前評価」POINT 16bおよび本文では、『待機的手術で血圧が180/110 mmHg以上であれば、血圧のコントロールを優先させる』『手術を延期することも考慮する』と明記（b正解）。術前血圧が160/100 mmHg未満にコントロールされていれば血圧値のみで手術を延期する理由とはならない（cは誤り）。未治療高血圧者では二次性高血圧の鑑別と高血圧性臓器障害・合併症の評価を行う（aは誤り）。待機的手術患者では白衣現象も多く、家庭血圧や24時間血圧測定を用いた評価が望ましい（dは誤り）。褐色細胞腫が疑われる場合は手術を延期して精査を進め、診断が確定すれば腫瘍摘出術を先に行う（eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=227","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=350"},{"no":16,"stem":"周術期の降圧薬管理について誤っているのはどれか。1つ選べ。","choices":{"a":"降圧治療中の患者では、降圧薬は手術当日まで服用させ、術後もできるだけ早期に再開する","b":"慢性的にβ遮断薬を投与している場合は周術期も治療を継続する","c":"手術当日に新たなβ遮断薬の投与開始は原則として行わない","d":"ACE阻害薬/ARBは術中の低血圧リスクとなりうるため、高齢者など高リスク例では中止可否を個別判断する","e":"サイアザイド系利尿薬は術前中止が必須であり、エビデンスも確立している"},"format":"単一","correct":"e","explanation":"JSH2025 第16章 p.226「周術期の降圧薬」では『サイアザイド系利尿薬の術前投与中止に関するエビデンスはない』と明記（eが誤り）。a（手術当日まで服用・術後早期再開）、b（慢性投与β遮断薬は継続）、c（手術当日新規β遮断薬開始は原則しない、非心臓手術の術前β遮断薬新規開始は非致死性心筋梗塞は減少したが脳卒中・死亡・低血圧・徐脈リスクが増加した報告あり）、d（ACE阻害薬・ARBは周術期体液量減少に伴い血圧低下や腎機能障害の懸念、高リスク例で中止可否を個別判断）はいずれも本文記載と合致。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=227","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=351"},{"no":17,"stem":"歯科治療における高血圧患者の血圧管理について正しいのはどれか。1つ選べ。","choices":{"a":"血圧が180/110 mmHg以上でも緊急処置でなければ歯科治療を優先する","b":"降圧薬を内服中の患者では治療当日は服薬を中止させる","c":"血管収縮物質（アドレナリン）含有局所麻酔薬は高血圧者に禁忌である","d":"血圧が180/110 mmHg以上であれば、緊急処置以外は高血圧治療を優先する","e":"歯科治療中は脳心血管病の発症リスクはほぼないため血圧評価は不要である"},"format":"単一","correct":"d","explanation":"JSH2025 第16章 p.227「歯科手術」では、歯科治療中にも脳心血管病の発症リスクがあるため、高血圧の有無と血圧管理状況について事前に評価する。『血圧が180/110 mmHg以上であれば、緊急処置以外は高血圧治療を優先する』（d正解）。降圧薬内服中の患者では治療当日も服用するように指導し、治療前の血圧をコントロールしておく（bは誤り）。高血圧者にも血管収縮物質含有局所麻酔薬は安全に使用できる（cは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=229","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=352"},{"no":18,"stem":"災害時の高血圧管理について正しいのはどれか。1つ選べ。","choices":{"a":"災害後の血圧上昇は心理的ストレスとは無関係である","b":"災害時には家庭血圧モニタリングや遠隔診療の活用が血圧管理に有用である","c":"災害下では塩分摂取量はむしろ少なくなりやすく、減塩指導は不要である","d":"災害後の急性心血管病発症リスクは増加せず、血圧管理の意義は乏しい","e":"災害時には降圧薬を一時的に全例で中止すべきである"},"format":"単一","correct":"b","explanation":"JSH2025 第16章および高血圧診療ステップアップ XIII章「災害時の高血圧管理」では、災害は心理的・身体的ストレス、避難所での食塩過剰摂取、睡眠障害、運動不足、降圧薬中断などにより血圧上昇と脳心血管病発症リスクを増大させる。家庭血圧計や血圧手帳の備蓄、遠隔診療・ICTを用いた血圧モニタリングの活用、降圧薬の継続供給体制、避難所での減塩・睡眠・運動指導が推奨される（b正解）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=229","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=353"},{"no":19,"stem":"55歳男性。激しい背部痛で救急搬送。血圧右上肢200/110 mmHg、左上肢170/95 mmHg、脈拍94/分。胸部造影CTで上行〜下行大動脈に解離（Stanford A型）。血液検査でD-dimer著明上昇。最も優先される初期治療はどれか。1つ選べ。","choices":{"a":"ニカルジピン持続静注で速やかに収縮期血圧120 mmHg未満まで降圧","b":"ヒドララジン静注","c":"禁忌がなければβ遮断薬の静注で心拍数を60回/分未満にコントロール後、必要に応じてニカルジピン・ニトログリセリンを併用し収縮期血圧100〜120 mmHgを目標とする","d":"ループ利尿薬の静注","e":"経口ACE阻害薬を開始しつつ経過観察"},"format":"単一","correct":"c","explanation":"JSH2025 第16章 p.224「大動脈解離（急性期）」では、Stanford A型は緊急外科手術の適応であるが、術前に血圧と心拍数の管理が重要。収縮期血圧100〜120 mmHg、心拍数60回/分未満を目標とし、超急性期には静注薬で迅速にコントロールする。禁忌となる病態がないかぎり早期にβ遮断薬の静注で心拍数をコントロール、心拍数コントロール後に他のCa拮抗薬（ニカルジピン）・ニトログリセリン・ニトロプルシドなどを併用する。aのようにβ遮断薬抜きでニカルジピン単独投与すると反射性頻脈で解離進展のリスクがあるため不適切。ヒドララジン・ループ利尿薬・経口ACE阻害薬単独は急性大動脈解離には不適切。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=226","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=353"},{"no":20,"stem":"60歳女性。健診で著明な高血圧（200/130 mmHg）を指摘され受診。視力低下と頭痛を訴える。眼底検査で両側に乳頭浮腫、軟性白斑、線状出血を認め、血液検査で血清Cr 2.4 mg/dL（前年1.0）、Hb 9.2 g/dL、血小板10万/μL、LDH高値、破砕赤血球陽性。本症例の診断と治療方針について最も適切なのはどれか。1つ選べ。","choices":{"a":"二次性高血圧の精査を優先し、降圧治療は数週間待つ","b":"加速型−悪性高血圧と血栓性微小血管症の合併と考え、緊急症に準じて入院・経静脈的降圧（用量調節可能なニカルジピン等）で数時間かけて平均血圧20〜25%低下を目標とする","c":"急速に正常血圧（120/80 mmHg未満）まで1時間で下げる","d":"ACE阻害薬を大量から開始する","e":"切迫症として外来で経口降圧薬を開始する"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.226-227「加速型−悪性高血圧」によれば、本症例は拡張期血圧130 mmHg、両側網膜症（乳頭浮腫・出血・軟性白斑）、進行性腎機能障害（Cr 1.0→2.4）、TMA所見（貧血・血小板減少・LDH高値・破砕赤血球）を呈しており加速型−悪性高血圧+TMAの典型像。緊急症に準じて治療を行うが『数時間かけて平均血圧20〜25%低下を目標』に降圧し、過度な急速降圧は重要臓器の虚血を来すため避ける（b正解）。圧利尿による体液量減少を伴うことが多くACE阻害薬/ARBは少量から開始する（dは誤り）。1時間で正常血圧まで下げるのは過度な降圧（cは誤り）。切迫症ではなく緊急症レベルの病態（eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=228","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=354"}]},{"day":2,"questions":[{"no":1,"stem":"高血圧緊急症の病態把握のために必要なチェック項目について誤っているのはどれか。1つ選べ。","choices":{"a":"血圧測定を繰り返し、左右差も確認する","b":"眼底検査で線状・火炎状出血、軟性白斑、乳頭浮腫の有無を確認する","c":"緊急検査としては心電図のみで十分で、胸部X線や血液生化学は不要である","d":"交感神経作動薬を含む服薬歴を必ず聴取する","e":"中枢神経系所見（意識障害・けいれん・片麻痺）の有無を評価する"},"format":"単一","correct":"c","explanation":"JSH2025 第16章 表16-2 p.221「高血圧緊急症を疑った場合の病態把握のために必要なチェック項目」では、緊急検査として①尿・末梢血（スメアを含む）、②血液生化学（尿素窒素、クレアチニン、電解質、糖、LDH、CKなど）、③心電図・胸部X線（2方向）、必要に応じ動脈血ガス分析、④必要に応じ心・腹部エコー、頭部CT/MRI、胸部・腹部CT、⑤必要に応じ血漿レニン活性・アルドステロン・カテコールアミン・BNP測定のための採血、と多項目が挙げられている（cは誤り）。a・b・d・eはいずれも表16-2の項目と一致。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=223","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=346"},{"no":2,"stem":"高血圧緊急症と切迫症の鑑別について正しいのはどれか。1つ選べ。","choices":{"a":"180/120 mmHg以上であれば全例緊急症である","b":"急性の臓器障害の進行がない、または進行の可能性が低い持続する著明な高血圧（通常180/120 mmHg以上）は切迫症として内服薬により降圧治療を行う","c":"切迫症では原則として経静脈的降圧を行う","d":"緊急症は外来で内服薬による治療が可能である","e":"切迫症は緊急症よりも院内死亡率が高い"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.221のpoint 16aで『急性の臓器障害の進行がない、または、進行の可能性が低い持続する著明な高血圧（通常、180/120 mmHg以上）は切迫症として内服薬により降圧治療を行う』と明記（b正解）。緊急症は入院・経静脈的降圧が原則（c・dは誤り）。海外メタ解析では緊急症の院内死亡率は約9.9%と高く、切迫症より予後不良（eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=223","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=346"},{"no":3,"stem":"高血圧緊急症で第一選択となる注射用降圧薬の組み合わせとして最も適切なのはどれか。1つ選べ。","choices":{"a":"ほとんどの緊急症 — ニカルジピンまたはジルチアゼム持続静注","b":"急性大動脈解離 — ニフェジピンカプセル内容物の舌下投与","c":"褐色細胞腫クリーゼ — β遮断薬単独静注","d":"高血圧性脳症 — ヒドララジン静注","e":"急性冠症候群 — ループ利尿薬大量静注"},"format":"単一","correct":"a","explanation":"JSH2025 第16章 p.222 表16-3および本文では、ほとんどの緊急症ではニカルジピン（持続静注 0.5〜6 μg/kg/分）またはジルチアゼム持続静注が第一選択（HFrEFを除く）（a正解）。大動脈解離はβ遮断薬で心拍数コントロール+必要時ニカルジピン併用（bの舌下投与は禁忌）。褐色細胞腫はα遮断薬フェントラミンが第一選択（β遮断薬単独は禁忌）。高血圧性脳症はニカルジピン静注で、ヒドララジンは頭蓋内圧上昇のため用いない（dは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=224","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=346"},{"no":4,"stem":"高血圧緊急症におけるニトロプルシド・ナトリウムについて正しいのはどれか。1つ選べ。","choices":{"a":"効果発現は10〜20分と緩徐である","b":"作用持続時間は12時間以上と長く、用量調節は不要である","c":"高濃度・長時間投与でシアン中毒のリスクがあり、遮光が必要である","d":"頭蓋内圧亢進例で第一選択である","e":"高血圧緊急症には適応がなく使用すべきでない"},"format":"単一","correct":"c","explanation":"JSH2025 第16章 表16-3 p.224より、ニトロプルシド・ナトリウムは持続静注 0.25〜2 μg/kg/分、効果発現は瞬時、作用持続は1〜2分。副作用として悪心・嘔吐・頻脈、高濃度・長時間投与でシアン中毒があり遮光が必要。主な適応はほとんどの緊急症であるが、頭蓋内圧亢進や腎障害例では要注意（dは誤り）。aは効果発現が瞬時で誤り、bは作用持続が1〜2分と短く誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=226","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=347"},{"no":5,"stem":"妊娠高血圧症候群における緊急降圧について正しいのはどれか。1つ選べ。","choices":{"a":"収縮期血圧160 mmHg以上または拡張期血圧110 mmHg以上が複数回認められれば高血圧緊急症を念頭に置く","b":"子癇・重症妊娠高血圧腎症ではCa拮抗薬の内服のみで対応する","c":"ACE阻害薬を第一選択とする","d":"降圧目標は収縮期血圧100 mmHg未満である","e":"急速な降圧が標準で、平均血圧50%以上の低下を目標とする"},"format":"単一","correct":"a","explanation":"JSH2025 第16章 p.222では、妊娠高血圧症候群では『収縮期血圧160 mmHg以上かつ/または拡張期血圧110 mmHg以上が複数回認められた場合は高血圧緊急症を念頭におき速やかに降圧を行い、原則的に入院管理とする』。子癇・重症妊娠高血圧腎症・HELLP症候群ではただちに収縮期血圧160 mmHg未満、拡張期血圧105 mmHg未満まで降圧する。ACE阻害薬・ARBは妊婦禁忌（cは誤り）。降圧目標を100未満まで下げると胎盤血流低下のリスク（d・eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=224","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=347"},{"no":6,"stem":"高血圧緊急症の薬物治療において体液量に関する記述で正しいのはどれか。1つ選べ。","choices":{"a":"高血圧緊急症では一律にループ利尿薬を第一選択として併用する","b":"高血圧緊急症では圧利尿による体液減少状態を呈していることが多く、ループ利尿薬は体液量過剰がない限り推奨されない","c":"褐色細胞腫クリーゼではα遮断薬投与後の輸液は禁忌である","d":"悪性高血圧では脱水補正のため積極的に大量輸液を行う","e":"急性心不全合併例でも体液過剰の評価なくループ利尿薬は使用しない"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.222では『高血圧緊急症では圧利尿による体液減少状態を呈していることが多く、ループ利尿薬の使用は体液量過剰を来していない限り推奨されない』と明記（b正解）。重症高血圧を伴う急性心不全・心不全や体液貯留がある場合にはフロセミドやカルペリチドを併用する（eは誤り）。褐色細胞腫クリーゼではα遮断薬投与後は生理食塩水などを十分量輸液して低血圧を予防する（cは誤り）。悪性高血圧でもACE阻害薬/ARBで過度の降圧を来す恐れがあるため少量から開始し、無計画な大量輸液は推奨されない（dは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=224","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=348"},{"no":7,"stem":"切迫症の治療について正しいのはどれか。1つ選べ。","choices":{"a":"切迫症では緊急降圧によるエビデンスが豊富である","b":"切迫症は数分以内に正常血圧まで降下させる必要がある","c":"切迫症の初期治療は外来で可能だが、投与開始後5〜6時間は施設内で経過観察が必要である","d":"切迫症ではニフェジピンカプセル内容物の舌下投与が標準である","e":"脳心血管病既往例は切迫症でも外来管理で問題ない"},"format":"単一","correct":"c","explanation":"JSH2025 第16章 p.222では、切迫症の初期治療は外来で可能であるが、投与開始後5〜6時間は施設内にて、その後2〜3日は外来で注意深い観察と薬剤の調整が必要である（c正解）。切迫症では緊急降圧による予後改善のエビデンスはない（aは誤り）。24時間から48時間かけて緩徐に160/100 mmHg程度まで降圧（bは誤り）。ニフェジピンカプセル舌下やニカルジピンワンショットは過度の降圧・反射性頻脈のため行わない（dは誤り）。脳心血管病既往など強い危険因子があれば入院加療が望ましい（eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=224","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=348"},{"no":8,"stem":"切迫症で内服薬を選択する場合、JSH2025の記載に最も合致するのはどれか。1つ選べ。","choices":{"a":"ニフェジピンカプセル内容物の舌下投与を第一選択とする","b":"ニカルジピン注射薬のワンショット静注を初回投与として行う","c":"作用発現が比較的早いCa拮抗薬（中間型作用薬）、ACE阻害薬、ARB、αβ遮断薬（ラベタロール）、β遮断薬の内服を用いる","d":"MR拮抗薬の大量投与を行う","e":"サイアザイド利尿薬の単独高用量投与を行う"},"format":"単一","correct":"c","explanation":"JSH2025 第16章 p.222では、切迫症では『作用発現が比較的早いCa拮抗薬（中間型作用薬）、ACE阻害薬、ARB、αβ遮断薬のラベタロール、β遮断薬の内服、また、病態によってループ利尿薬の併用などを行う』と記載。カプトプリルは作用発現までの時間が比較的短く投与量を調整しやすいが、RA系が亢進している悪性高血圧や脱水状態では過度の降圧を来す可能性があるため少量（6.25〜12.5 mg）から投与を始める。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=224","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=349"},{"no":9,"stem":"ACE阻害薬・ARB使用に関する注意点について誤っているのはどれか。1つ選べ。","choices":{"a":"腎機能障害例ではACE阻害薬やARB投与1〜2日後より高カリウム血症を来しやすい","b":"両側性または単腎性の腎血管性高血圧例では腎不全が生じる恐れがある","c":"悪性高血圧では圧利尿による体液量減少を来していることが多く、ACE阻害薬/ARB投与は過度な降圧による腎機能悪化の恐れがある","d":"悪性高血圧でACE阻害薬を使用する場合は最大用量から開始する","e":"切迫症でカプトプリルを用いる場合、6.25〜12.5 mgから開始する"},"format":"単一","correct":"d","explanation":"JSH2025 第16章 p.222によれば、悪性高血圧や圧利尿による体液量減少を来している例にACE阻害薬/ARBを使用する場合は『少量から開始し、血圧値・腎機能や血清カリウム値を慎重にフォローする必要がある』とされる。Dの『最大用量から開始』は過度な降圧による腎機能悪化リスクが大きく明らかに誤り。a（腎機能障害例での高K血症リスク）、b（両側性・単腎性腎血管性高血圧での腎不全リスク）、c（悪性高血圧での体液量減少と過度降圧リスク）、e（カプトプリル6.25-12.5 mgからの開始）はいずれも本文記載と合致。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=224","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=349"},{"no":10,"stem":"次のうち高血圧緊急症に該当するのはどれか。2つ選べ。","choices":{"a":"拡張期血圧100 mmHgで臓器障害のない高血圧","b":"急性大動脈解離に合併した重症高血圧","c":"降圧薬中断による反跳性高血圧で意識清明・臓器障害なし","d":"褐色細胞腫クリーゼ","e":"白衣高血圧"},"format":"複数","correct":"bd","explanation":"JSH2025 第16章 表16-1 p.221「高血圧緊急症」の分類によれば、急性大動脈解離に合併した高血圧（b）、褐色細胞腫クリーゼ（d）は典型的な緊急症。aは臓器障害がなくⅡ度高血圧レベルで緊急症ではない。c（降圧薬中断による反跳性高血圧）は重症でなければ切迫症の範疇に入りうる。e（白衣高血圧）は緊急症の対象ではない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=223","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=349"},{"no":11,"stem":"65歳男性。胆嚢摘出術が予定されている。外来診察室血圧180/115 mmHg、家庭血圧平均152/95 mmHg。心電図で左室肥大を認める。最も適切な対応はどれか。1つ選べ。","choices":{"a":"予定通り手術を施行する","b":"血圧の高さから180/110 mmHg以上であり待機的手術なので、血圧コントロールを優先し手術延期を考慮する。家庭血圧も確認して評価する","c":"手術日にACE阻害薬を初回投与する","d":"降圧目標を120/70 mmHg未満として術前1日で達成する","e":"血圧管理のためのβ遮断薬の術前新規開始を最優先する"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.225「術前評価」POINT 16bでは『待機的手術で血圧が180/110 mmHg以上であれば、血圧のコントロールを優先させる』『待機的手術で血圧が180/110 mmHg以上であれば、手術を延期することも考慮する』と明記。本症例は診察室血圧180/115と180/110を超え、待機的手術である胆嚢摘出術なので血圧コントロールを優先（b正解）。白衣現象の評価のため家庭血圧（既に152/95）や24時間血圧測定の活用も推奨。手術当日のβ遮断薬の新規投与開始は脳卒中・死亡・低血圧・徐脈リスク増加のため原則行わない（eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=227","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=350"},{"no":12,"stem":"周術期管理に関する記述で正しいのはどれか。1つ選べ。","choices":{"a":"周術期の低血圧は予後に影響しない","b":"術後の収縮期血圧上昇（>130 mmHg）は頭蓋内出血のリスクを上昇させる","c":"緊急手術および術中の血圧上昇に対しては経口降圧薬で対応する","d":"術後は循環動態が安定しているため早期の降圧再開は不要である","e":"疼痛・不安・興奮は血圧変動と関連しない"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.226「周術期の降圧薬」では、周術期の低血圧は死亡率を上げるが、術後の収縮期血圧の上昇（>130 mmHg）は頭蓋内出血のリスクを上昇させる（b正解）。緊急手術および術中の血圧上昇に対しては経静脈的に降圧薬を用いて降圧を維持する（cは誤り）。術後は循環動態が不安定であるため早期に降圧療法を再開し、経口投与ができない場合は経静脈的投与を行う（dは誤り）。術後の疼痛・不安・興奮など血圧を上昇させる要因に対しても適切に対処する（eは誤り）。周術期の血圧変動を最小限にすることにより合併症減少が期待できる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=227","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=350"},{"no":13,"stem":"二次性高血圧と周術期管理について誤っているのはどれか。1つ選べ。","choices":{"a":"褐色細胞腫が疑われる場合は、手術を延期して精査を進める","b":"褐色細胞腫の診断が確定すれば、原疾患である腫瘍摘出術を先に行う","c":"腎血管性高血圧・原発性アルドステロン症・クッシング症候群などは、術前血圧が160/100 mmHg未満にコントロールされていれば問題は少ない","d":"二次性高血圧の鑑別は周術期合併症の予防に重要である","e":"二次性高血圧が疑われても、待機的手術を必ず優先する"},"format":"単一","correct":"e","explanation":"JSH2025 第16章 p.225「術前評価」では『待機的手術であれば治癒可能な二次性高血圧の治療を優先する』と明記（eが誤り）。POINT 16bでは『高血圧患者の周術期合併症の発症予防には、褐色細胞腫など二次性高血圧の鑑別と高血圧性臓器障害・合併症の評価を行うことが重要である』（d正解）。褐色細胞腫が疑われる場合は手術を延期して精査を進め、診断確定後に腫瘍摘出術を先行する（a・b正解）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=227","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=351"},{"no":14,"stem":"災害時の高血圧管理（disaster hypertension）について誤っているのはどれか。1つ選べ。","choices":{"a":"災害後は心理的ストレス、塩分摂取増、睡眠障害、運動不足、降圧薬中断などで血圧が上昇しやすい","b":"災害後の急性心血管病（脳卒中・心筋梗塞）発症リスクは増加することが知られている","c":"家庭血圧計の備蓄、血圧手帳、遠隔診療やICT活用が推奨される","d":"災害時には全例で降圧薬を中止することが推奨される","e":"避難所での減塩・睡眠・運動指導や、降圧薬の継続供給体制の構築が重要である"},"format":"単一","correct":"d","explanation":"JSH2025 第16章および高血圧診療ステップアップ XIII章「災害時の高血圧管理」では、災害は心理的・身体的ストレス、避難所での食塩過剰摂取、睡眠障害、運動不足、降圧薬中断などにより血圧上昇と脳心血管病リスク増大を招くため、降圧薬の継続供給・服薬継続が原則である。Dの『全例で降圧薬中止』は明らかに誤り。a・b・c・eは災害時高血圧管理の基本事項。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=229","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=351"},{"no":15,"stem":"歯科治療時の降圧管理について正しいのはどれか。1つ選べ。","choices":{"a":"血圧が160/95 mmHgであれば歯科治療を必ず中止する","b":"降圧薬内服中の患者では治療当日は降圧薬を必ず休薬する","c":"アドレナリン含有局所麻酔薬は使用量が多くなければ血圧への影響は少なく、疼痛管理に必要な麻酔は確実に行う","d":"歯科治療中の血圧上昇は脳心血管病リスクとは無関係である","e":"高血圧者には局所麻酔薬を使用してはならない"},"format":"単一","correct":"c","explanation":"JSH2025 第16章 p.227「歯科手術」では『高血圧者にも、血管収縮物質含有局所麻酔薬は安全に使用できる』『アドレナリンを含む局所麻酔薬使用により血漿アドレナリン濃度は上昇するが、使用量が多くなければ血圧への影響は少ない』『その使用量を考慮しつつ、疼痛管理に必要な麻酔は確実に行う』と明記（c正解）。血圧が180/110 mmHg以上であれば緊急処置以外は高血圧治療を優先する（aは160/95では即中止する根拠なし）。降圧薬内服中の患者では治療当日も服用するように指導（bは誤り）。歯科治療中にも脳心血管病の発症リスクがある（dは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=229","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=352"},{"no":16,"stem":"次のうち、悪性高血圧の典型像として正しいものを2つ選べ。","choices":{"a":"拡張期血圧120〜130 mmHg以上の著明な血圧上昇","b":"両側の網膜症（眼底Keith-Wagener III/IV度）と進行性腎機能障害","c":"1か月以上かけてゆっくりと進行する症状","d":"降圧治療を遵守している若年女性に多発する","e":"腎機能・血圧予後は治療後速やかに正常化し再発はみられない"},"format":"複数","correct":"ab","explanation":"JSH2025 第16章 p.226「加速型−悪性高血圧」では、本症は『拡張期血圧120〜130 mmHg以上の著明な血圧上昇を認め、両側の網膜症や腎機能障害が急速に進行し、放置すると高血圧性脳症・脳出血・心不全などを発症する予後不良の病態』（a・b正解）。乳頭浮腫（KW IV度）に加え出血や軟性白斑などの滲出性病変（KW III度）も含む。未治療あるいは降圧治療を中断したコントロール不良の本態性高血圧に発症することが多く、治療遵守例ではない（dは誤り）。降圧治療普及で英国1997-2006年症例の5年生存率は93%まで改善したが、依然として腎予後は不良で発症後4年で18%が末期腎不全に至る（eは誤り）。発症は急速で1か月以上の緩徐な経過ではない（cは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=228","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=352"},{"no":17,"stem":"高血圧専門医への紹介が望ましい症例について、JSH2025の記載に合致しないものはどれか。1つ選べ。","choices":{"a":"二次性高血圧が疑われる症例","b":"治療抵抗性高血圧","c":"妊娠高血圧症候群","d":"高血圧緊急症・切迫症","e":"白衣高血圧で血圧管理が容易な定型例"},"format":"単一","correct":"e","explanation":"JSH2025 第16章 p.228「専門医への紹介・相談」では、二次性高血圧が疑われる症例、治療抵抗性高血圧、妊娠高血圧症候群、高血圧緊急症・切迫症、コントロール不良の高血圧などを高血圧専門医へ紹介するよう勧めている。白衣高血圧や仮面高血圧の判断に迷う症例も専門医の意見が参考になるとされるが、e『白衣高血圧で血圧管理が容易な定型例』は紹介必要性が低い。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=230","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=353"},{"no":18,"stem":"70歳男性。震災後3週間。避難所生活を継続。震災前家庭血圧は135/82 mmHg程度で安定していたが、最近の家庭血圧は158/96 mmHgと上昇。降圧薬（ARB）は2週間前に流出し、その後内服していない。最も適切な対応はどれか。1つ選べ。","choices":{"a":"災害ストレスによる一時的上昇なので経過観察","b":"家庭血圧の上昇とARB中断を踏まえ、ARB再開と減塩・睡眠指導、必要に応じて遠隔診療や地域支援チームを介した継続フォローを行う","c":"急速に正常血圧まで下げるため緊急症として入院・経静脈的降圧","d":"降圧薬は災害時には全例で中止する","e":"心理的ストレスのみが原因なので抗不安薬のみ処方"},"format":"単一","correct":"b","explanation":"災害時の高血圧管理（disaster hypertension）では、降圧薬の中断、塩分過剰摂取、睡眠不足、心理的ストレスにより血圧上昇と脳心血管病発症リスクが増大する。本症例は典型的な災害高血圧であり、ARBの再開、減塩・睡眠・運動の生活指導、家庭血圧モニタリング、遠隔診療・ICT・地域支援チームを介した継続フォローが推奨される（b正解）。血圧158/96 mmHgはⅠ度高血圧レベルで緊急症ではないため、c（入院・経静脈的降圧）は過剰。降圧薬の一律中止（d）はリスクを増大させるため不適切。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=229","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=353"},{"no":19,"stem":"48歳女性。来院時の血圧は215/125 mmHg、強い頭痛、悪心、視力低下を訴える。意識はやや傾眠傾向（GCS E3V4M6）。眼底検査で乳頭浮腫、線状出血、軟性白斑を認める。頭部MRIで頭頂葉〜後頭葉の白質に対称性の血管原性浮腫（PRES）を認め、明らかな脳出血・脳梗塞・腫瘍はなし。最も適切な初期治療はどれか。1つ選べ。","choices":{"a":"ニフェジピンカプセル内容物の舌下投与","b":"ニカルジピン持続静注を開始し、最初の1時間で平均血圧20〜25%程度の低下を目指し慎重に降圧","c":"ヒドララジン静注で頭蓋内圧を下げる","d":"ループ利尿薬大量静注","e":"降圧治療は不要、まず開頭手術を準備する"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.222-223「高血圧性脳症」によれば、本症例は著明な高血圧（215/125）に頭痛・悪心・視力低下・意識障害（PRES所見）を呈する典型的な高血圧性脳症。治療は『用量を調整しやすい静注薬（持続静注）で治療を開始する。ニカルジピンの静注は脳組織酸素供給を減少させず有用である』『速やかに診断し、ただちに平均血圧を20〜25%低下させる』が標準（b正解）。ニフェジピンカプセル舌下は過度の降圧・反射性頻脈で禁忌（aは誤り）。ヒドララジンは頭蓋内圧を上昇させるため用いない（cは誤り）。降圧治療なしの開頭手術は適応外（eは誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=225","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=354"},{"no":20,"stem":"40歳女性。発汗、動悸、頭痛発作を繰り返し、来院時血圧220/130 mmHg、脈拍130/分、不整。血漿および尿中メタネフリン上昇、副腎CTで右副腎腫瘍を認める。診断的および治療方針として正しいのはどれか。1つ選べ。","choices":{"a":"確定診断のためβ遮断薬を単独で投与開始する","b":"α遮断薬による血圧コントロールと十分な輸液で循環血液量を是正してから、頻脈に対してβ遮断薬を併用し、待機的に副腎摘出術を計画する","c":"緊急的に副腎摘出術を行い、降圧管理は術後に開始する","d":"ACE阻害薬の高用量投与で対応する","e":"本態性高血圧と判断し、Ca拮抗薬を増量する"},"format":"単一","correct":"b","explanation":"JSH2025 第16章 p.224-225「褐色細胞腫・パラガングリオーマ」によれば、本症例は典型的な褐色細胞腫（発作性高血圧・頻脈・発汗・頭痛・メタネフリン上昇・副腎腫瘍）。治療はα遮断薬（フェントラミン静注、ドキサゾシン内服）で血圧コントロールと圧利尿による体液量減少の補正（生理食塩水十分輸液）を行い、頻脈に対してはα遮断薬投与後にβ遮断薬を併用する（b正解）。β遮断薬単独投与はα受容体刺激による血管収縮から血圧上昇を来す恐れがあり禁忌（a・eは不適切）。褐色細胞腫が疑われる場合は手術を延期して精査を進め、診断確定後に腫瘍摘出術を計画する（cの『緊急副腎摘出』は不適切で、α遮断薬・輸液の前準備が必要）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=226","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=354"},{"no":21,"stem":"一過性に高血圧の血圧上昇を示す病態、およびその治療について誤っているものはどれか。1つ選べ。","choices":{"a":"高齢者では圧受容体反射機構の障害のため、血圧変動が大きくなりやすい。","b":"パニック発作に伴う血圧上昇に対しては、抗不安薬や抗うつ薬の投与が予防に有効である。","c":"高度の血圧上昇が持続する場合は、ニカルジピン注射薬のワンショット静注が有効である。","d":"運行性循環障害がみられない場合は、褐色細胞腫を除く緊急性高血圧の対象にはならない。","e":"過換気症候群では呼吸性アルカローシスから細胞内カルシウムイオン濃度が上昇し、血圧が上昇する。"},"format":"単一","correct":"c","explanation":"JSH2025 第16章「特殊な病態の高血圧」p.221-222によると、『ニフェジピンカプセル内容物の投与や、ニカルジピン注射薬のワンショット静注は、過度の降圧や反射性頻脈を来すことがあるため行わない』と明記されている。Cは『ニカルジピンのワンショット静注が有効』としている点が明確に誤り。緊急症ではニカルジピンは持続点滴で投与する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=224","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=347","from_past_exam":true,"note":"解説（10.55.32『高血圧緊急症』、10.55.39『高血圧緊急症に用いられる注射薬（降圧薬）』）が提示されたが、正解ハイライトは確認できず。臨床的にはCのワンショット静注は禁忌で持続点滴が正しいため、Cが誤りと推定される。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.54.50.png","confidence":"high","slide_section":"15 特殊条件下の高血圧"}]}],"gl_pages":[221,227],"su_pages":[346,355]}]}</script>

<script>

// ===== Hub (mode selector) =====
(function(){
  const HUB_KEY = 'ht-app-current-mode';
  const ORAL_STORE_KEY = 'htOralData_v1';
  const QUIZ_STORE_KEY = 'ht-quiz-progress';
  const QUIZ_SETTINGS_KEY = 'ht-quiz-settings';
  const EXAM_HISTORY_KEY = 'ht-quiz-exam-history';

  function readJSON(k, d){ try{ return JSON.parse(localStorage.getItem(k)) || d; } catch(e){ return d; } }
  function readArr(k){ try{ const v = JSON.parse(localStorage.getItem(k)); return Array.isArray(v)?v:[]; } catch(e){ return []; } }

  function getTheme(){
    const qs = readJSON(QUIZ_SETTINGS_KEY, null);
    if(qs && qs.theme) return qs.theme;
    const os = readJSON(ORAL_STORE_KEY, null);
    if(os && os.theme) return os.theme;
    return 'light';
  }
  function setTheme(t){
    document.body.classList.toggle('dark', t==='dark');
    const qs = readJSON(QUIZ_SETTINGS_KEY, {theme:'light'}); qs.theme = t;
    localStorage.setItem(QUIZ_SETTINGS_KEY, JSON.stringify(qs));
    const os = readJSON(ORAL_STORE_KEY, null);
    if(os){ os.theme = t; localStorage.setItem(ORAL_STORE_KEY, JSON.stringify(os)); }
  }

  // 初期テーマ適用
  if(getTheme() === 'dark') document.body.classList.add('dark');

  // 配色切替ボタン（全モード共通）
  document.getElementById('themeBtn').onclick = function(){
    const cur = document.body.classList.contains('dark') ? 'dark' : 'light';
    setTheme(cur === 'dark' ? 'light' : 'dark');
  };

  const backBtn = document.getElementById('hub-back');
  const title = document.getElementById('hub-title');
  const timerEl = document.getElementById('hub-timer');

  let currentMode = 'home';

  function showHub(){
    backBtn.classList.add('hide');
    timerEl.classList.add('hide');
    title.textContent = '高血圧専門医対策';
    document.title = '高血圧専門医対策';
  }
  function showMode(mode){
    backBtn.classList.remove('hide');
    if(mode === 'oral'){
      title.textContent = '口頭試問';
      timerEl.classList.remove('hide');
      document.title = '口頭試問 - 高血圧専門医対策';
    } else if(mode === 'quiz'){
      title.textContent = '問題演習';
      timerEl.classList.add('hide');
      document.title = '問題演習 - 高血圧専門医対策';
    } else if(mode === 'exam'){
      title.textContent = '模試モード';
      timerEl.classList.add('hide');
      document.title = '模試 - 高血圧専門医対策';
    }
  }

  function exitCurrent(){
    if(currentMode === 'oral' && window.OralM) window.OralM.exit();
    else if((currentMode === 'quiz' || currentMode === 'exam') && window.QuizM) window.QuizM.exit();
  }

  function goHome(){
    exitCurrent();
    currentMode = 'home';
    try{ localStorage.setItem(HUB_KEY, 'home'); }catch(e){}
    showHub();
    renderHub();
  }
  function enterOral(){
    exitCurrent();
    currentMode = 'oral';
    try{ localStorage.setItem(HUB_KEY, 'oral'); }catch(e){}
    showMode('oral');
    window.OralM.start();
  }
  function enterQuiz(){
    exitCurrent();
    currentMode = 'quiz';
    try{ localStorage.setItem(HUB_KEY, 'quiz'); }catch(e){}
    showMode('quiz');
    window.QuizM.start();
  }
  function enterExam(){
    exitCurrent();
    currentMode = 'exam';
    try{ localStorage.setItem(HUB_KEY, 'exam'); }catch(e){}
    showMode('exam');
    window.QuizM.startExamMode();

      model_answer:`【ACS見落としによる予後悪化】

 - 中等症〜重症OSA（AHI ≥ 20、または症状あり AHI 5-19）で保険適応。
 - 圧設定はマニュアル滴定（PSG下）、APAP（自動圧調整）も可。
 - 効果：AHI低下、日中眠気改善、血圧低下（特に夜間・早朝、平均 2-5 mmHg）、心血管イベント抑制、糖尿病・脂質改善、QOL向上。
 - 使用基準：4時間/日以上 × 70%の夜以上で adequate use。

②口腔内装置（OA、マウスピース）：軽症〜中等症で、CPAP拒否例、簡易使用希望例。

③外科：軟口蓋・扁桃肥大例で UPPP、上下顎前方移動術、舌根減量術。限定的適応。

④減量：BMI 25 を目標、5-10% 減量で AHI 改善期待。生活習慣指導、薬物（GLP-1作動薬・SGLT2阻害薬）、外科（肥満手術 BMI ≥ 35）。

⑤体位療法：仰臥位OSAに側臥位指導。
⑥アルコール・睡眠薬制限：就寝前飲酒・ベンゾジアゼピンは上気道筋緊張を抑制し悪化。

【降圧薬の調整】
①OSAは MR拮抗薬（スピロノラクトン・エサキセレノン）が特に有効：体液貯留・上気道浮腫を改善し AHI 低下。
②既存薬：ARB、Ca拮抗薬、サイアザイド継続 + MR拮抗薬追加で4剤目に。
③ABPM での non-dipper 改善も期待。
④目標：診察室 < 130/80、家庭 < 125/75（高リスク）。

【包括管理】
①糖尿病：HbA1c < 7.0、SGLT2阻害薬・GLP-1作動薬で体重減＋OSA改善。
②脂質：LDL < 120、スタチン。
③禁煙・節酒。
④心房細動スクリーニング（OSA合併で発症率 4-5倍）。
⑤心エコー・頸動脈エコー・蛋白尿で標的臓器障害評価。`,

①AHI 4 → CPAP有効（残余 AHI < 5）。

【長期フォロー】
①CPAP：

①低酸素血症と交感神経活性化：

⑤代謝異常：

⑥心血管疾患：

 - 夜間血圧上昇、non-dipper/riser pattern。

【CPAP治療による血圧低下効果のエビデンス】

①メタ解析：
 - CPAP使用で 24時間平均血圧 約 2.5/2.0 mmHg 低下。

④メカニズム別効果：
 - 交感神経活性低下、RAA系抑制、内皮機能改善、酸化ストレス低減、インスリン抵抗性改善。

【臨床的意義】
治療抵抗性高血圧では OSAスクリーニング・CPAP・MR拮抗薬の組み合わせが標準。`,

      model_answer:`【OSAの性差】
①一般人口：男性 > 女性（3-5:1）。
②閉経後女性で発症増加（性差縮小：1.5-2:1）。
③妊娠中：プロゲステロン作用で上気道緊張は保たれるが、第3三半期で体重増加・浮腫により OSA リスク上昇。

【若年女性OSAの特徴と高血圧】
①BMI正常〜軽度肥満でも上顎・下顎の発達不全（高アーチ口蓋、後退下顎）で OSA。
②症状：日中眠気よりも倦怠感、頭痛、不眠、抑うつ、月経関連症状が前面。男性より診断遅延しやすい。
③高血圧合併：見逃されやすい治療抵抗性高血圧の原因。
④PCOS（多嚢胞性卵巣症候群）合併が多い：OSA合併率高、肥満・インスリン抵抗性。
⑤治療：CPAP・口腔内装置・減量。

【妊娠中のOSAと高血圧】
①妊娠中OSAは妊娠高血圧症候群（HDP）・子癇前症・妊娠糖尿病・早産・胎児発育不全のリスクを増加。
②特に肥満妊婦、いびき・無呼吸目撃あれば妊娠中期から精査。
③診断：簡易PSGまたはPSG（妊娠中の安全性は確立）。
④治療：CPAP は妊娠中安全、HDPリスク低減・胎児予後改善のエビデンスあり。口腔内装置も使用可。
⑤分娩時：CPAP継続、麻酔科に申告（挿管困難評価）。
⑥産後：体重戻れば OSA 軽快もあるが再評価必要。

【閉経後女性のOSAと高血圧】
①エストロゲン低下で上気道筋緊張低下、内臓脂肪増加、メタボリックシンドローム → OSA リスク男性並みに上昇。
②症状：男性と類似（眠気、いびき、無呼吸）だが「年齢のせい」「更年期」と誤解されやすい。
③高血圧：閉経後高血圧の背景因子。
④治療：CPAPは閉経後女性でも有効、ホルモン補充療法（HRT）の OSA 改善エビデンスは限定的。

【臨床的注意】
①女性のOSAは過小診断・過小治療。

// ===== 状態管理 =====
const STORE_KEY = 'htOralData_v1';
let store = loadStore();
function loadStore(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || defaultStore(); }
  catch(e){ return defaultStore(); }
}
function defaultStore(){
  return { results: [], weakTags: {}, completedCases: {}, theme: 'light' };
}
function saveStore(){ localStorage.setItem(STORE_KEY, JSON.stringify(store)); }

// テーマ
// theme managed by hub
// タイマー
let timerStart=null, timerId=null;
function startTimer(){ timerStart=Date.now(); if(timerId)clearInterval(timerId);
  timerId=setInterval(updateTimer,500); updateTimer(); }
function stopTimer(){ if(timerId){clearInterval(timerId); timerId=null;} }
function resetTimer(){ stopTimer(); timerStart=null;
  document.getElementById('hub-timer').textContent='00:00';
  document.getElementById('hub-timer').classList.remove('over'); }
function updateTimer(){
  if(!timerStart) return;
  const s=Math.floor((Date.now()-timerStart)/1000);
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss=String(s%60).padStart(2,'0');
  document.getElementById('hub-timer').textContent=`${mm}:${ss}`;
  document.getElementById('hub-timer').classList.toggle('over', s>=600);
}
function elapsedSec(){ return timerStart? Math.floor((Date.now()-timerStart)/1000):0; }

// 画面ルーティング

let state={ screen:'home', caseId:null, qIdx:0, answers:[], scores:[], qStart:0 };

function refLinks(refStr){
  if(!refStr) return '';
  const out=[];
  if(/GL\s*p/i.test(refStr)) out.push(`<a class="reflink" href="${BOOK_URLS.GL}" target="_blank" rel="noopener">📖 ガイドライン2025を開く</a>`);
  if(/SU\s*p/i.test(refStr)) out.push(`<a class="reflink" href="${BOOK_URLS.SU}" target="_blank" rel="noopener">📖 ステップアップを開く</a>`);
  return out.join(' ');
}

function render(){
  if(state.screen==='home') renderHome();
  else if(state.screen==='presentation') renderPresentation();
  else if(state.screen==='question') renderQuestion();
  else if(state.screen==='result') renderResult();
  else if(state.screen==='review') renderReview();
  else if(state.screen==='casepick') renderCasePick();
  window.scrollTo(0,0);
}

      </div>

    <div class="card">
      <h3>弱点タグ（誤答回数の多い順）</h3>
      <div class="weak-list">
        ${weakTop.map(([t,c])=>`<div class="weak-row"><span>${t}</span><span><b>${c}</b>回</span></div>`).join('')}
      </div>
    </div>`:''}
    <div class="card">
      <h3>使い方</h3>
      <p style="font-size:17px; line-height:1.8">
      ・症例提示→Q1→Q2→Q3→Q4 と1問ずつ進みます<br>
      ・音声入力ボタン（マイク🎤）で口頭練習。文字起こしのみで自動採点はしません<br>
      ・採点ボタン（◯△×）は自己採点。誤答は疾患タグごとに記録され「弱点優先」で再出題されます<br>
      ・PCを切ってもブラウザのローカルストレージに保存。スマホでホーム画面に追加すれば機内モードでも開けます
      </p>
    </div>`;
}

function renderCasePick(){
  app.innerHTML = `
    <div class="card">
      <h2>症例を選択</h2>
      <button class="btn sec" onclick="OralM.state.screen='home'; OralM.render()">← 戻る</button>
      <div class="case-pick" style="margin-top:14px">
        ${CASES.map(c=>{
          const done = store.completedCases[c.id];
          const last = done? `最終: ${done.date.slice(5,10)} (${done.summary})` : '未挑戦';
          return `<button class="case-card" onclick="OralM.startCase('${c.id}')">
            <div class="cid">${c.id}</div>
            <div class="cdis">${c.disease}</div>
            <div class="cstat">${last}</div>
          </button>`;
        }).join('')}
      </div>
    </div>`;
}

function pickCase(mode){
  if(mode==='random'){
    return CASES[Math.floor(Math.random()*CASES.length)];
  }
  if(mode==='weak'){
    const wt = Object.entries(store.weakTags).sort((a,b)=>b[1]-a[1]);
    for(const [tag] of wt){
      const candidates = CASES.filter(c=>c.tags.includes(tag));
      if(candidates.length){
        return candidates[Math.floor(Math.random()*candidates.length)];
      }
    }
    return CASES[Math.floor(Math.random()*CASES.length)];
  }
}

function startMode(mode){
  const c = pickCase(mode);
  if(!c){ alert('問題が見つかりません'); return; }
  startCase(c.id);
}
function startCase(id){
  state.caseId = id; state.qIdx=0; state.answers=[]; state.scores=[];
  state.sessionId = 's' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  state.screen='presentation';
  render();
}

function getCase(){ return CASES.find(c=>c.id===state.caseId); }

function renderPresentation(){
  const c=getCase();
  app.innerHTML = `

}

function startQuestions(){
  state.qIdx=0; state.answers=[]; state.scores=[];
  state.screen='question'; state.qStart=Date.now();
  startTimer();
  render();
}

let rec=null, recActive=false;
function renderQuestion(){
  const c=getCase();
  const q=c.questions[state.qIdx];
  const isLast = state.qIdx === c.questions.length-1;
  const nextLabel = isLast ? '解答を見る（4問完了）' : `Q${state.qIdx+2}へ進む`;
  const prevAns = state.answers[state.qIdx] || '';
  app.innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div><span class="tag">${c.id}</span> <span class="label">Q${state.qIdx+1} / ${c.questions.length}</span></div>
        <button class="btn sec" onclick="if(confirm('中止して戻りますか？')){OralM.resetTimer(); OralM.state.screen='home'; OralM.render();}">中止</button>
      </div>

      <div class="input-row">

      </div>

    </div>`;
  recActive=false;
}

function toggleMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('micStatus').textContent='このブラウザは音声認識に未対応です（Chrome/Edge推奨。文字入力をご利用ください）';
    return;
  }
  if(recActive && rec){ rec.stop(); return; }
  rec = new SR();
  rec.lang='ja-JP'; rec.continuous=true; rec.interimResults=true;
  const ta=document.getElementById('ans');
  const baseLen=ta.value.length;
  let finalText = ta.value;
  rec.onresult=(ev)=>{
    let interim='';
    for(let i=ev.resultIndex; i<ev.results.length; i++){
      const t = ev.results[i][0].transcript;
      if(ev.results[i].isFinal) finalText += t;
      else interim += t;
    }
    ta.value = finalText + interim;
  };
  rec.onerror=(e)=>{ document.getElementById('micStatus').textContent='音声入力エラー: '+e.error; };
  rec.onend=()=>{ recActive=false;
    document.getElementById('micBtn').classList.remove('rec');
    document.getElementById('micBtn').textContent='🎤 音声入力';
    document.getElementById('micStatus').textContent='停止しました';
  };
  rec.start(); recActive=true;
  document.getElementById('micBtn').classList.add('rec');
  document.getElementById('micBtn').textContent='■ 停止';
  document.getElementById('micStatus').textContent='録音中...（もう一度押すと停止）';
}

function submitAnswer(){
  const ans=document.getElementById('ans').value.trim();
  state.answers[state.qIdx] = ans;
  if(recActive && rec){ try{rec.stop()}catch(e){} }
  const c=getCase();
  if(state.qIdx >= c.questions.length-1){
    // 最後の設問 → 結果画面（採点はまだ）
    stopTimer();
    state.scores = c.questions.map(()=>null);
    state.screen='result';
  } else {
    state.qIdx++;
  }
  render();
}

function gradeAt(i, s){
  const c=getCase();
  const q=c.questions[i];
  const prev = state.scores[i];
  state.scores[i]=s;

  // 重複記録防止: 同じ設問は1セッション中1回のみ results に保存（上書き）
  store.results = store.results.filter(r=>!(r._sessionId===state.sessionId && r.caseId===c.id && r.qIdx===i));
  store.results.push({
    _sessionId: state.sessionId,
    date:new Date().toISOString(), caseId:c.id, qIdx:i,
    score:s, disease:c.disease, tags:c.tags, q:q.q, answer:state.answers[i]
  });

  // 弱点タグ調整（前回スコアを巻き戻し、新スコアを反映）
  if(prev && prev!=='o' && s==='o'){
    for(const t of c.tags){ if(store.weakTags[t]){ store.weakTags[t]=Math.max(0,store.weakTags[t]-1); } }
  } else if((!prev || prev==='o') && s!=='o'){
    for(const t of c.tags){ store.weakTags[t]=(store.weakTags[t]||0)+1; }
  }
  saveStore();
  render();
}

    const kwList = (q.keywords||[]).map(k=>{

    const refStr = q.ref || c.ref || '';
    return `<div class="q-block ${cls}" id="qb-${i}">

      <div style="margin-top:14px"><b>自己採点</b> ${s?`<span class="s ${s==='o'?'o':s==='t'?'t':'x'}" style="margin-left:8px">${s==='o'?'◯':s==='t'?'△':'×'}</span>`:''}</div>

  app.innerHTML=`
    <div class="card">

      <div class="stats">
        <div class="stat"><div class="v">${allScored?score:'-'}</div><div class="l">スコア</div></div>
        <div class="stat"><div class="v">${mm}:${ss}</div><div class="l">所要時間 ${overTime?'(超過)':''}</div></div>
        <div class="stat"><div class="v" style="color:var(--good)">${o}</div><div class="l">◯ 正解</div></div>
        <div class="stat"><div class="v" style="color:var(--warn)">${t}</div><div class="l">△ 一部</div></div>
        <div class="stat"><div class="v" style="color:var(--bad)">${x}</div><div class="l">× 不正解</div></div>
      </div>
      ${overTime?'<div class="warn-box">⚠ 10分を超えました。本番ペース配分の練習を続けましょう。</div>':''}
      <div class="ref-box">
        <div class="ref-title">📚 症例全体の参考書（クリックで該当書籍のビューワーを開く）</div>
        <div class="ref">${escapeHtml(c.ref||'')}</div>
        <div style="margin-top:8px">${refLinks(c.ref||'')}</div>
      </div>
      ${!allScored? '<div class="warn-box">各設問の◯△×を採点してください（未採点の設問が残っています）</div>':''}
    </div>
    ${qBlocks}
    <div class="card">
      <h3>次のアクション</h3>
      <button class="btn" onclick="OralM.startMode('random')">次の症例（ランダム）</button>

      <button class="btn sec" onclick="OralM.state.screen='casepick'; OralM.render()">症例を選ぶ</button>

}

function renderReview(){
  const recent = store.results.slice(-30).reverse();
  const wrong = store.results.filter(r=>r.score!=='o').slice(-30).reverse();
  app.innerHTML=`
    <div class="card">

      <h3 style="margin-top:18px">最近の誤答（◯以外）</h3>

        wrong.map(r=>{
          const cls = r.score==='t'?'t':'x';
          const lbl = r.score==='t'?'△':'×';
          return `<div class="review-item">

            <div class="a" style="margin-top:4px; color:var(--muted)">あなた: ${escapeHtml((r.answer||'(未入力)').slice(0,120))}</div>
            <button class="btn sec" style="margin-top:8px; font-size:16px; padding:6px 14px" onclick="OralM.startCase('${r.caseId}')">この症例を再挑戦</button>

        }).join('')}
      <h3 style="margin-top:18px">直近の全回答（30件）</h3>
      ${recent.length===0? '<p style="color:var(--muted)">記録はありません</p>':

          const lbl = r.score==='o'?'◯':r.score==='t'?'△':'×';
          return `<div class="review-item">

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// rendered on demand via OralM.start()
// ===== Hub integration =====
function oralStart(){

}
function oralExit(){

  try{ if(recActive && rec) rec.stop(); }catch(e){}
}
window.OralM = {
  start: oralStart, exit: oralExit,
  render: render,
  resetTimer: resetTimer,
  startMode: startMode,
  startCase: startCase,
  startQuestions: startQuestions,

  submitAnswer: submitAnswer,
  gradeAt: gradeAt,
  saveStore: function(){ saveStore(); },

  get state(){ return state; }, set state(v){ state = v; },

};

})();

<script>
// 問題演習・模試モジュール（IIFE で隔離）
(function(){
// ===== データ読み込み =====
const QUIZ = JSON.parse(document.getElementById('quiz-data').textContent);
const META = QUIZ.meta;
const CHAPTERS = QUIZ.chapters;

// ===== 状態 =====
const STORE_KEY = 'ht-quiz-progress';
const SETTINGS_KEY = 'ht-quiz-settings';
let progress = loadProgress();
let settings = loadSettings();

function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveProgress(){ localStorage.setItem(STORE_KEY, JSON.stringify(progress)); }
function loadSettings(){
  try{ return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {theme:'light'}; }
  catch(e){ return {theme:'light'}; }
}
function saveSettings(){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }

// テーマ適用
// theme managed by hub
// ===== 履歴データ操作 =====
// progress[`${chId}-${day}`][qNo] = ['o','x','o',...] 直近の正誤を時系列保存
function getHistory(chId, day, qNo){
  const key = `${chId}-${day}`;
  return (progress[key] && progress[key][qNo]) || [];
}
function pushHistory(chId, day, qNo, result){
  const key = `${chId}-${day}`;
  if(!progress[key]) progress[key] = {};
  if(!progress[key][qNo]) progress[key][qNo] = [];
  progress[key][qNo].push(result);
  // 直近20件まで保持
  if(progress[key][qNo].length > 20) progress[key][qNo] = progress[key][qNo].slice(-20);
  saveProgress();
}
function setRate(chId, day){
  // その章セット全体の最新試行の正答率
  const key = `${chId}-${day}`;
  const set = (CHAPTERS.find(c=>c.id===chId)||{}).sets || [];
  const setObj = set.find(s=>s.day===day);
  if(!setObj) return {answered:0,correct:0,total:0};
  let answered=0, correct=0;
  for(const q of setObj.questions){
    const h = getHistory(chId, day, q.no);
    if(h.length){
      answered++;
      if(h[h.length-1]==='o') correct++;
    }
  }
  return {answered, correct, total:setObj.questions.length};
}
function chapterRate(chId){
  const r1 = setRate(chId, 1);
  const r2 = setRate(chId, 2);
  return {
    answered: r1.answered + r2.answered,
    correct: r1.correct + r2.correct,
    total: r1.total + r2.total,
    day1: r1, day2: r2
  };
}
function globalStats(){
  let attempts=0, correct=0;
  for(const k in progress){
    for(const qno in progress[k]){
      for(const v of progress[k][qno]){
        attempts++;
        if(v==='o') correct++;
      }
    }
  }
  return {attempts, correct, rate: attempts? Math.round(correct/attempts*100):0};
}

// 弱点問題を選ぶ: 不正解率の高い問題を優先
function getWeakQuestions(limit=10){
  const all = [];
  for(const ch of CHAPTERS){
    for(const s of ch.sets){
      for(const q of s.questions){
        const h = getHistory(ch.id, s.day, q.no);
        if(h.length === 0) continue;
        const wrong = h.filter(v=>v==='x').length;
        const wrongRate = wrong / h.length;
        // 直近が×ならさらに優先
        const recentWrong = h[h.length-1] === 'x' ? 1 : 0;
        const score = wrongRate * 10 + recentWrong * 3 + (wrong / Math.max(1, h.length));
        if(wrong > 0){
          all.push({ch, day:s.day, q, score, wrong, total:h.length});
        }
      }
    }
  }
  all.sort((a,b)=>b.score - a.score);
  return all.slice(0, limit);
}

function getRandomQuestions(limit=10){
  // 全章から未挑戦優先 → 全体ランダム
  const unanswered = [];
  const all = [];
  for(const ch of CHAPTERS){
    for(const s of ch.sets){
      for(const q of s.questions){
        const item = {ch, day:s.day, q};
        all.push(item);
        if(getHistory(ch.id, s.day, q.no).length === 0) unanswered.push(item);
      }
    }
  }
  const pool = unanswered.length >= limit ? unanswered : all;
  // shuffle
  const shuffled = pool.slice().sort(()=>Math.random()-0.5);
  return shuffled.slice(0, limit);
}

// ===== 画面ルーティング =====
const app = document.getElementById('app');
let state = {
  screen: 'home',
  // 通常モード（章セット）
  chId: null, day: null, qIdx: 0,
  // ピックアップモード（弱点/ランダム）
  pickList: null,    // [{ch,day,q}, ...]
  pickIdx: 0,
  pickLabel: '',
  // 現在の問題で
  selected: null,    // 単一: 'a' / 複数: ['a','c']
  graded: false,     // 採点済み？
  // セッション結果（章セット終了時用）
  sessionWrong: [],  // [{q, picked, correct}]
  sessionCorrect: 0,
};

function render(){
  if(state.screen==='home') renderHome();
  else if(state.screen==='chapter') renderChapter();
  else if(state.screen==='question') renderQuestion();
  else if(state.screen==='summary') renderSummary();
  else if(state.screen==='review') renderReview();
  else if(state.screen==='settings') renderSettings();
  window.scrollTo(0,0);
}

// ===== ホーム画面 =====
function renderHome(){
  const g = globalStats();
  const completedSets = CHAPTERS.reduce((acc, ch)=>{
    for(const s of ch.sets){
      const r = setRate(ch.id, s.day);
      if(r.answered === r.total && r.total>0) acc++;
    }
    return acc;
  }, 0);

  const chCards = CHAPTERS.map(ch=>{
    const r = chapterRate(ch.id);
    const pct1 = r.day1.total ? (r.day1.correct/r.day1.total*100) : 0;
    const pct2 = r.day2.total ? (r.day2.correct/r.day2.total*100) : 0;
    const ans = r.answered;
    const tot = r.total;

function countAll(){

// ===== 演習開始 =====
function startSet(chId, day){
  const ch = CHAPTERS.find(c=>c.id===chId);
  const s = ch.sets.find(s=>s.day===day);
  if(!s || s.questions.length===0){ alert('問題がありません'); return; }
  state.chId = chId; state.day = day;
  state.pickList = null; state.pickIdx = 0;
  state.qIdx = 0; state.selected = null; state.graded = false;
  state.sessionWrong = []; state.sessionCorrect = 0;
  state.screen = 'question';
  render();
}
function startRandom(){
  const list = getRandomQuestions(10);
  if(list.length === 0){ alert('問題がありません'); return; }
  state.pickList = list; state.pickIdx = 0;
  state.pickLabel = 'ランダム10問';
  state.chId = null; state.day = null;
  state.selected = null; state.graded = false;
  state.sessionWrong = []; state.sessionCorrect = 0;
  state.screen = 'question';
  render();
}
function startWeak(){
  const list = getWeakQuestions(10);
  if(list.length === 0){ alert('弱点問題がまだありません（誤答記録ゼロ）。まず通常モードで問題を解いてください。'); return; }
  state.pickList = list; state.pickIdx = 0;
  state.pickLabel = `弱点優先${list.length}問`;
  state.chId = null; state.day = null;
  state.selected = null; state.graded = false;
  state.sessionWrong = []; state.sessionCorrect = 0;
  state.screen = 'question';
  render();
}

// 現在出題中の問題情報
function currentItem(){
  if(state.pickList){
    return state.pickList[state.pickIdx];
  }
  const ch = CHAPTERS.find(c=>c.id===state.chId);
  const s = ch.sets.find(s=>s.day===state.day);
  return { ch, day: state.day, q: s.questions[state.qIdx] };
}
function currentIdx(){
  return state.pickList ? state.pickIdx : state.qIdx;
}
function currentTotal(){
  if(state.pickList) return state.pickList.length;
  const ch = CHAPTERS.find(c=>c.id===state.chId);
  return ch.sets.find(s=>s.day===state.day).questions.length;
}

// ===== 問題画面 =====
function renderQuestion(){
  const item = currentItem();
  const q = item.q;
  const ch = item.ch;
  const day = item.day;
  const idx = currentIdx();
  const total = currentTotal();
  const isMulti = q.correct.length > 1;
  const title = state.pickList
    ? `${state.pickLabel} - ${idx+1}/${total}`
    : `第${ch.id}章 Day${day} - ${idx+1}/${total}`;

  // 選択肢ボタン
  let choicesHtml = '';
  const keys = ['a','b','c','d','e'];
  for(const k of keys){
    const text = q.choices[k] || '';
    if(!text) continue;
    let cls = 'choice';
    let onclick = `QuizM.pickChoice('${k}')`;
    if(state.graded){
      cls += ' disabled';
      const inCorrect = q.correct.includes(k);
      const inPicked = (Array.isArray(state.selected)? state.selected : [state.selected]).includes(k);
      if(inCorrect) cls += ' correct';
      else if(inPicked) cls += ' wrong';
      onclick = '';
    } else {
      const picked = isMulti
        ? (state.selected||[]).includes(k)
        : state.selected === k;
      if(picked) cls += ' picked';
    }
    choicesHtml += `<button class="${cls}" ${onclick?`onclick="${onclick}"`:''}>
      <span class="key">${k.toUpperCase()})</span>
      <span>${escapeHtml(text)}</span>
    </button>`;
  }

  // 採点ボタン or 次へ
  let actionBtn = '';
  if(!state.graded){
    if(isMulti){
      const n = (state.selected||[]).length;
      actionBtn = `<button class="btn big" onclick="QuizM.gradeMulti()" ${n===0?'disabled':''}>判定する (${n}個選択中)</button>`;
    } else {
      actionBtn = `<button class="btn big" onclick="QuizM.gradeSingle()" ${!state.selected?'disabled':''}>判定する</button>`;
    }
  } else {
    const isLast = idx + 1 >= total;
    actionBtn = `<button class="btn big" onclick="QuizM.nextQ()">${isLast?'結果を見る':'次の問題 →'}</button>`;
  }

  // 採点後の結果表示
  let resultHtml = '';
  if(state.graded){
    const correct = q.correct;
    const picked = Array.isArray(state.selected) ? state.selected.slice().sort().join('') : state.selected;
    const ok = picked === correct;
    const correctLabel = correct.split('').map(c=>c.toUpperCase()).join(', ');
    const pickedLabel = (Array.isArray(state.selected)? state.selected : [state.selected])
      .map(c=>c.toUpperCase()).join(', ') || '(未選択)';
    resultHtml = `
      <div class="verdict ${ok?'o':'x'}">
        ${ok?'◯ 正解':'× 不正解'} <span style="font-size:18px; font-weight:normal">（正解: ${correctLabel} / あなた: ${pickedLabel}）</span>
      </div>
      <div class="explanation"><b>解説</b>\n${escapeHtml(q.explanation || '(解説なし)')}</div>
      <div class="refrow">
        ${q.gl_link?(()=>{const p=(q.gl_link.match(/#page=(\d+)/)||[])[1];return `<a class="reflink" href="${escapeAttr(q.gl_link)}" target="_blank" rel="noopener">📖 GL ${p?'p.'+p:'を開く'}</a>`;})():''}
        ${q.su_link?(()=>{const p=(q.su_link.match(/#page=(\d+)/)||[])[1];return `<a class="reflink" href="${escapeAttr(q.su_link)}" target="_blank" rel="noopener">📖 SU ${p?'p.'+p:'を開く'}</a>`;})():''}
      </div>`;
  }

  app.innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
        <div style="font-size:15px; color:var(--muted)">${escapeHtml(title)}</div>
        <button class="btn sec" style="font-size:14px; padding:6px 12px; margin:0"
          onclick="if(confirm('中止してホームに戻りますか？')){QuizM.state.screen='home'; QuizM.render();}">中止</button>
      </div>
      <div class="progress"><div class="progress-bar" style="width:${(idx+1)/total*100}%"></div></div>
      <div style="display:flex; align-items:center; flex-wrap:wrap; gap:4px; margin-top:8px">
        <span class="tag">問${q.no}</span>
        ${state.pickList?`<span class="tag part">第${ch.id}章 Day${day}</span>`:''}
        ${isMulti?`<span class="multi-hint">複数選択 (${q.correct.length}つ)</span>`:''}
      </div>
      <div class="qtext">${escapeHtml(q.stem)}</div>
      <div class="choices">${choicesHtml}</div>
      ${resultHtml}
      <div style="margin-top:18px">${actionBtn}</div>
    </div>`;
}

function pickChoice(k){
  if(state.graded) return;
  const item = currentItem();
  const isMulti = item.q.correct.length > 1;
  if(isMulti){
    if(!Array.isArray(state.selected)) state.selected = [];
    const i = state.selected.indexOf(k);
    if(i>=0) state.selected.splice(i,1);
    else state.selected.push(k);
    render();
  } else {
    // 単一選択 → 即判定
    state.selected = k;
    gradeSingle();
  }
}

function gradeSingle(){
  if(state.graded || !state.selected) return;
  doGrade();
}
function gradeMulti(){
  if(state.graded) return;
  if(!Array.isArray(state.selected) || state.selected.length===0) return;
  doGrade();
}
function doGrade(){
  const item = currentItem();
  const q = item.q;
  const picked = Array.isArray(state.selected)
    ? state.selected.slice().sort().join('')
    : state.selected;
  const ok = picked === q.correct;
  state.graded = true;

  pushHistory(item.ch.id, item.day, q.no, ok?'o':'x');
  if(ok){
    state.sessionCorrect++;
  } else {
    state.sessionWrong.push({
      ch: item.ch, day: item.day, q,
      picked,
      correct: q.correct
    });
  }
  render();
}

function nextQ(){
  const total = currentTotal();
  const idx = currentIdx();
  if(idx + 1 >= total){
    state.screen = 'summary'; render(); return;
  }
  if(state.pickList) state.pickIdx++;
  else state.qIdx++;
  state.selected = null;
  state.graded = false;
  render();
}

// ===== 章末サマリー =====
function renderSummary(){
  const total = currentTotal();
  const correct = state.sessionCorrect;
  const pct = Math.round(correct/total*100);
  const label = state.pickList
    ? state.pickLabel
    : `第${state.chId}章 Day${state.day}`;
  const cls = pct>=80?'good':(pct<60?'bad':'');

  const wrongHtml = state.sessionWrong.length===0
    ? '<p style="color:var(--good); text-align:center; font-size:20px">🎉 全問正解！</p>'
    : state.sessionWrong.map(w=>`
        <div class="wrong-row">
          <span class="qno">問${w.q.no}</span>
          <div class="qsnip">
            <div>${escapeHtml(w.q.stem.slice(0,90))}${w.q.stem.length>90?'…':''}</div>
            <div style="font-size:13px; color:var(--muted); margin-top:4px">
              正解 ${w.correct.toUpperCase()} / あなた ${(w.picked||'(未選択)').toUpperCase()}
              ${state.pickList?` ／ 第${w.ch.id}章 Day${w.day}`:''}
            </div>
          </div>
        </div>`).join('');

  // 次のアクション
  let nextAction = '';
  if(state.pickList){
    nextAction = `
      <button class="btn big" onclick="${QuizM.state.pickLabel.includes('弱点')?'QuizM.startWeak()':'QuizM.startRandom()'}">もう一度同じモード</button>
      <button class="btn big sec" onclick="QuizM.state.screen='home'; QuizM.render()">ホームへ</button>`;
  } else {
    nextAction = `
      <button class="btn big" onclick="QuizM.startSet(${QuizM.state.chId},${QuizM.state.day})">もう一度この${state.day==1?'Day1':'Day2'}</button>
      <button class="btn big sec" onclick="QuizM.startSet(${QuizM.state.chId},${QuizM.state.day===1?2:1})">${state.day===1?'Day2へ':'Day1へ'}</button>
      <button class="btn big sec" onclick="QuizM.state.screen='home'; QuizM.render()">ホームへ</button>`;
  }

  app.innerHTML = `
    <div class="card">
      <h2>${escapeHtml(label)} 終了</h2>
      <div class="score-big ${cls}">${pct}%</div>
      <p style="text-align:center; font-size:20px; margin:0 0 16px">${correct}問 / ${total}問正解</p>
      <div class="stats">
        <div class="stat"><div class="v" style="color:var(--good)">${correct}</div><div class="l">◯ 正解</div></div>
        <div class="stat"><div class="v" style="color:var(--bad)">${total-correct}</div><div class="l">× 不正解</div></div>
        <div class="stat"><div class="v">${total}</div><div class="l">出題数</div></div>
      </div>
    </div>
    <div class="card">
      <h3>誤答した問題</h3>
      <div class="wrong-list">${wrongHtml}</div>
    </div>
    <div class="card">
      <h3>次のアクション</h3>
      ${nextAction}
    </div>`;
}

// ===== 復習画面 =====
function renderReview(){
  // 全章で「最新試行が×」の問題を集める
  const wrongs = [];
  for(const ch of CHAPTERS){
    for(const s of ch.sets){
      for(const q of s.questions){
        const h = getHistory(ch.id, s.day, q.no);
        if(h.length === 0) continue;
        const lastWrong = h[h.length-1] === 'x';
        const wrongCount = h.filter(v=>v==='x').length;
        if(lastWrong || wrongCount>0){
          wrongs.push({ch, day:s.day, q, lastWrong, wrongCount, total:h.length});
        }
      }
    }
  }
  wrongs.sort((a,b)=>{
    if(a.lastWrong !== b.lastWrong) return a.lastWrong?-1:1;
    return (b.wrongCount/b.total) - (a.wrongCount/a.total);
  });
  const top = wrongs.slice(0, 50);

  const listHtml = top.length===0
    ? '<p style="color:var(--muted); text-align:center">まだ誤答記録はありません</p>'
    : top.map(w=>`
        <div class="wrong-row" style="cursor:pointer" onclick="QuizM.reviewQuestion(${w.ch.id},${w.day},${w.q.no})">
          <span class="qno" style="background:${w.lastWrong?'var(--bad)':'var(--warn)'}">${w.wrongCount}/${w.total}</span>
          <div class="qsnip">
            <div>${escapeHtml(w.q.stem.slice(0,90))}${w.q.stem.length>90?'…':''}</div>
            <div style="font-size:13px; color:var(--muted); margin-top:4px">第${w.ch.id}章 Day${w.day} 問${w.q.no}</div>
          </div>
        </div>`).join('');

  app.innerHTML = `
    <div class="card">
      <button class="btn sec" onclick="QuizM.state.screen='home'; QuizM.render()">← 戻る</button>
      <h2 style="margin-top:14px">復習・誤答記録</h2>
      <p style="color:var(--muted)">直近で誤答した問題 / 誤答回数の多い問題（上位50件）</p>
      <div class="wrong-list">${listHtml}</div>
    </div>`;
}

function reviewQuestion(chId, day, qNo){
  // 単一問題ピックアップで再演習
  const ch = CHAPTERS.find(c=>c.id===chId);
  const s = ch.sets.find(s=>s.day===day);
  const q = s.questions.find(q=>q.no===qNo);
  state.pickList = [{ch, day, q}];
  state.pickIdx = 0;
  state.pickLabel = `復習 第${ch.id}章 Day${day} 問${qNo}`;
  state.selected = null; state.graded = false;
  state.sessionWrong = []; state.sessionCorrect = 0;
  state.screen='question'; render();
}
