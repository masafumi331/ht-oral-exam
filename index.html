的。GL p.177、第15章 薬剤誘発性参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=294"},{"no":13,"stem":"治療抵抗性高血圧における降圧目標について正しいのはどれか。","choices":{"a":"治療抵抗性HTでは降圧目標を緩める","b":"原則として通常の降圧目標（成人診察室130/80 mmHg未満、75歳以上は個別判断）を踏襲し、忍容性を確認しつつ達成を目指す","c":"全例で140/90 mmHg未満で十分","d":"拡張期は管理しなくてよい","e":"夜間血圧は無視してよい"},"format":"単一","correct":"b","explanation":"治療抵抗性HTでも降圧目標は通常通り（成人原則130/80未満、75歳以上は個別判断・忍容性確認）を踏襲する。CKD・糖尿病合併でも同様に130/80未満が目標。ABPM/家庭血圧で夜間・早朝高血圧やnon-dipper型を評価し、必要なら投薬時刻を工夫する。GL p.176-178、第6章降圧目標参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=176","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=292"},{"no":14,"stem":"治療抵抗性高血圧での「臨床イナーシャ（clinical inertia）」について正しいのはどれか。","choices":{"a":"目標未達でも処方変更・強化を行わない医療者側の傾向で、治療抵抗性HTの主要な要因の一つ","b":"患者の慣性で薬を飲み続けてしまうこと","c":"腎機能が次第に低下する自然経過のこと","d":"血圧計の機械的問題","e":"プラセボ効果のこと"},"format":"単一","correct":"a","explanation":"臨床イナーシャ（clinical inertia）は、血圧が目標未達であるにもかかわらず処方を強化・変更しない医療者側の不作為を指す。治療抵抗性HT・コントロール不良HTの重要な要因。定期的な処方見直し・診療フロー・チーム医療・遠隔モニタリングなどで対策する。GL p.177、第11章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=293"},{"no":15,"stem":"53歳女性、Ca拮抗薬・ARB・サイアザイドで診察室血圧156/96、家庭血圧130/82 mmHg。ABPMでは平均127/78 mmHg。最も適切な対応はどれか。","choices":{"a":"真の治療抵抗性HTと判断して第4剤追加","b":"白衣現象による偽性治療抵抗性高血圧と判断し、現行治療を維持しつつ家庭血圧・ABPMで継続評価する","c":"降圧薬をすべて中止する","d":"腎デナベーションを実施","e":"ACE阻害薬を追加してARBと併用"},"format":"単一","correct":"b","explanation":"診察室高値（156/96）に対し家庭血圧130/82・ABPM平均127/78が良好＝白衣現象による偽性治療抵抗性高血圧。診察室外で目標達成しているため第4剤追加は不要。家庭血圧・ABPMで継続評価し、不安・診察環境への配慮、必要ならリラックス法も検討。GL p.176-177参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=292"},{"no":16,"stem":"治療抵抗性高血圧におけるβ遮断薬使用の位置づけとして正しいのはどれか。","choices":{"a":"全例で第一選択薬として使用する","b":"MR拮抗薬で効果不十分または忍容性問題がある場合に第5剤として、または心拍数が高い・冠動脈疾患/HFrEF/頻脈性不整脈合併例で優先的に追加する","c":"治療抵抗性HTでは禁忌である","d":"心拍数とは無関係に第2剤として推奨される","e":"α遮断薬とは同時に使ってはならない"},"format":"単一","correct":"b","explanation":"PATHWAY-2試験ではβ遮断薬はスピロノラクトンより降圧効果が劣ったが、心拍数が高い症例や冠動脈疾患・HFrEF・頻脈性不整脈合併例ではβ遮断薬が優先的選択肢。治療抵抗性HTでは第5剤の位置づけが多い。第1選択ではない、禁忌でもない、α遮断薬との併用も可能。GL p.178、第8章参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=178","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=295"},{"no":17,"stem":"治療抵抗性高血圧における夜間高血圧・early morning surge への対応として最も適切なのはどれか。","choices":{"a":"投薬時刻を一切変更しない","b":"ABPMで夜間・早朝高血圧パターンを評価し、必要なら長時間作用型ARB/Ca拮抗薬の最適化、就寝前・分割投与の工夫（chronotherapy）、SAS合併ならCPAP導入などを検討する","c":"夜間血圧は評価不要","d":"朝の投薬を完全に中止する","e":"塩分を増やして夜間血圧を上げる"},"format":"単一","correct":"b","explanation":"治療抵抗性HTでは夜間高血圧・early morning surge・non-dipper型が予後悪化と関連する。ABPMで評価し、長時間作用型降圧薬の最適化、就寝前投与や分割投与（chronotherapy、Q7関連）、SAS合併ならCPAP、CKD・糖尿病・自律神経障害の評価が重要。GL p.177-178、第8章Q7参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=293"},{"no":18,"stem":"腎デナベーションの効果・限界について正しいのはどれか。","choices":{"a":"数年単位で薬物療法を完全に不要にする治療法である","b":"シャム対照RCTで平均約5〜10 mmHgの収縮期血圧低下（24時間ABPM）が示されているが、effect sizeにはばらつきがあり全例で奏効するわけではない。降圧薬の併用は通常継続される","c":"降圧効果は全例で30 mmHg以上","d":"効果は永続的に増強する","e":"降圧薬を完全に置換する治療として位置づけられる"},"format":"単一","correct":"b","explanation":"シャム対照RCT（SPYRAL HTN-OFF/ON、RADIANCE-HTN）で平均ABPM収縮期血圧の約5〜10 mmHg低下が示されたが、レスポンダー/ノンレスポンダーがあり個別変動が大きい。薬物療法の補助として位置づけられ、置換ではない。長期効果・再発・再施行の可否は今後の課題。GL p.180-181、CQ16参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=181","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=302"},{"no":19,"stem":"治療抵抗性高血圧の包括的管理ステップとして最も適切な順序はどれか。","choices":{"a":"①降圧薬を5剤に増やす → ②原因検索 → ③生活習慣指導","b":"①正確な血圧測定・家庭血圧/ABPM → ②偽性治療抵抗性の除外（アドヒアランス・白衣・併用薬・生活習慣） → ③二次性高血圧スクリーニング → ④利尿薬の最適化（CKDではループへ）・MR拮抗薬の追加 → ⑤β/α遮断薬等の追加 → ⑥専門医紹介、症例によりRDN検討","c":"①ただちにRDN → ②薬剤調整","d":"①ACE+ARB併用 → ②腎機能低下を放置","e":"①NSAIDs追加 → ②血圧経過観察"},"format":"単一","correct":"b","explanation":"JSH2025の推奨する治療抵抗性HTの管理ステップは選択肢bの通り。①正確な測定→②偽性除外（アドヒアランス・白衣・薬剤・生活習慣）→③二次性HTスクリーニング（PA・SAS・CKD・腎血管性・薬剤性）→④利尿薬最適化＋MR拮抗薬→⑤β/α遮断薬等→⑥専門医紹介、症例選択でRDNを考慮。GL p.176-181全般参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=176","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=291"},{"no":20,"stem":"治療抵抗性高血圧について誤っているのはどれか。","choices":{"a":"高齢・肥満・CKD・糖尿病・黒人系・男性・閉経後女性で頻度が高い","b":"ABPMでmasked uncontrolled hypertension（診察室は正常だが診察室外で高い）も存在し、偽性治療抵抗性の対極として注意が必要","c":"心血管イベント・腎機能低下・全死亡のリスクが上昇する","d":"降圧目標を緩めることが推奨される","e":"多職種チーム医療・デジタル技術活用が管理改善に有用"},"format":"単一","correct":"d","explanation":"選択肢dは誤り：治療抵抗性HTでも降圧目標は通常通り（130/80未満が原則、75歳以上は個別判断）。a〜c、eはいずれも正しく、特にmasked uncontrolled hypertension（仮面コントロール不良HT）はABPM・家庭血圧で発見される予後不良病態として重要。GL p.176-179参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=177","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=292"}]}],"gl_pages":[176,182],"su_pages":[291,305]},{"id":13,"title":"周産期女性の高血圧","is_clinical":true,"part":3,"key_topics":["妊娠と関連した高血圧の診断（妊娠高血圧症候群の分類）","降圧目標","非薬物療法","薬物療法（妊娠期・授乳期）","産後（短期・長期）","CQ17: 非重症域の妊娠高血圧症候群において130/80mmHg未満は母子合併症を予防するか","Q11: 妊娠高血圧症候群で積極的な減塩は必要か"],"sets":[{"day":1,"theme":"HDPの分類・診断・降圧目標・非薬物療法","questions":[{"no":1,"stem":"妊娠高血圧症候群（HDP）の病型分類として、JSH2025で記載される4分類に含まれないものはどれか。1つ選べ。","choices":{"a":"妊娠高血圧","b":"妊娠高血圧腎症","c":"加重型妊娠高血圧腎症","d":"高血圧合併妊娠","e":"子癇"},"format":"単一","correct":"e","explanation":"HDPは『妊娠高血圧』『妊娠高血圧腎症（preeclampsia）』『加重型妊娠高血圧腎症』『高血圧合併妊娠』の4病型に分類される。子癇（eclampsia）はHDPに合併する痙攣発作であり、独立した病型ではない。過去問にも出題された頻出ポイント。GL p.183-185参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=185","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=308"},{"no":2,"stem":"妊娠高血圧症候群の定義として、高血圧と判定される血圧値の閾値はどれか。1つ選べ。","choices":{"a":"≥130/80 mmHg","b":"≥135/85 mmHg","c":"≥140/90 mmHg","d":"≥150/100 mmHg","e":"≥160/110 mmHg"},"format":"単一","correct":"c","explanation":"HDPの高血圧の定義は収縮期140 mmHg以上または拡張期90 mmHg以上。重症は160/110 mmHg以上と定義される。妊娠20週以降に発症した高血圧で、原則として産後12週までに正常化することが診断要件。妊娠20週以前に確認されれば高血圧合併妊娠となる。GL p.183, SU p.306参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=185","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=308"},{"no":3,"stem":"妊娠20週以降に初めて高血圧を発症し、蛋白尿や臓器障害を伴わない場合の診断はどれか。1つ選べ。","choices":{"a":"妊娠高血圧","b":"妊娠高血圧腎症","c":"加重型妊娠高血圧腎症","d":"高血圧合併妊娠","e":"白衣高血圧"},"format":"単一","correct":"a","explanation":"妊娠高血圧（GH: gestational hypertension）は妊娠20週以降に発症し、蛋白尿や臓器障害を伴わず、産後12週までに正常化する高血圧と定義される。蛋白尿（300 mg/日以上）または母体臓器障害もしくは子宮胎盤機能不全を伴えば妊娠高血圧腎症（preeclampsia）に進展したと診断する。経過観察中の進展に注意が必要。GL p.183-184, SU p.308参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=185","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=308"},{"no":4,"stem":"妊娠高血圧腎症（preeclampsia）の診断に必要な所見として正しいものを2つ選べ。","choices":{"a":"妊娠20週以降に発症した高血圧","b":"蛋白尿または母体の臓器障害もしくは子宮胎盤機能不全","c":"発症時期は妊娠初期から","d":"産後24週まで継続することが必須","e":"尿酸値の低下"},"format":"複数","correct":"ab","explanation":"妊娠高血圧腎症は妊娠20週以降に発症した高血圧で、(1)蛋白尿（300 mg/日以上または蛋白/Cre比 ≥0.3）、(2)母体臓器障害（腎機能障害、肝機能障害、血液障害＝血小板減少・凝固障害、神経障害、血管系障害＝肺水腫など）、(3)子宮胎盤機能不全（胎児発育不全、臍帯動脈血流異常、死産）のいずれかを伴うものと定義される。蛋白尿がなくても臓器障害や子宮胎盤機能不全があれば診断可能。GL p.183-184, SU p.308参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=185","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=308"},{"no":5,"stem":"慢性高血圧の女性が妊娠し、妊娠20週以降に蛋白尿が出現または増悪した場合の診断はどれか。1つ選べ。","choices":{"a":"妊娠高血圧","b":"妊娠高血圧腎症","c":"加重型妊娠高血圧腎症","d":"高血圧合併妊娠","e":"白衣高血圧"},"format":"単一","correct":"c","explanation":"加重型妊娠高血圧腎症（superimposed preeclampsia）は、(1)高血圧合併妊娠が妊娠20週以降に蛋白尿または臓器障害もしくは子宮胎盤機能不全を伴う場合、(2)蛋白尿のみを呈する腎疾患合併妊娠が妊娠20週以降に高血圧を発症する場合などをいう。GL p.184参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=185","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=309"},{"no":6,"stem":"妊娠前から高血圧を認めていた32歳女性が妊娠した。妊娠16週時点で蛋白尿はなく、血圧は135/85 mmHg。診断として正しいものはどれか。1つ選べ。","choices":{"a":"妊娠高血圧","b":"妊娠高血圧腎症","c":"加重型妊娠高血圧腎症","d":"高血圧合併妊娠","e":"二次性高血圧"},"format":"単一","correct":"d","explanation":"高血圧合併妊娠（chronic hypertension）は、妊娠前または妊娠20週以前に確認された高血圧が妊娠中も持続するもの。本態性高血圧のほか、二次性高血圧（PA、腎血管性、慢性腎臓病など）の可能性も考慮する。妊娠20週以降に蛋白尿や臓器障害、子宮胎盤機能不全を伴えば加重型妊娠高血圧腎症と診断する。GL p.184, SU p.309参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=185","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=309"},{"no":7,"stem":"CQ17：非重症域の妊娠高血圧症候群の降圧目標として推奨されるものはどれか。1つ選べ。","choices":{"a":"150/100 mmHg未満","b":"140/90 mmHg未満","c":"130/80 mmHg未満","d":"120/80 mmHg未満","e":"降圧療法は不要"},"format":"単一","correct":"c","explanation":"CQ17：非重症域HDP（140-159/90-109 mmHg）に対する130/80 mmHg未満の降圧目標は、CHAP試験などのエビデンスから、母体重症化や胎児有害事象を増やさず母体合併症を減らすため弱く推奨される（JSH2025）。JSH2019より積極的な降圧目標へ変更された重要点。GL p.185-186参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=187","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=310"},{"no":8,"stem":"重症域の妊娠高血圧症候群の血圧基準として正しいものはどれか。1つ選べ。","choices":{"a":"≥140/90 mmHg","b":"≥150/100 mmHg","c":"≥160/110 mmHg","d":"≥180/120 mmHg","e":"≥200/120 mmHg"},"format":"単一","correct":"c","explanation":"重症HDPは血圧160/110 mmHg以上と定義される。重症域では母体合併症（脳出血、子癇、HELLP症候群、肺水腫、急性腎障害など）および胎児合併症（胎盤早期剥離、胎児発育不全、死産）リスクが急増する。注射薬（ヒドララジン静注、ニカルジピン静注）による緊急降圧と入院加療、子癇予防の硫酸マグネシウム投与を考慮する。GL p.183, SU p.310参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=185","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=310"},{"no":9,"stem":"Q11：妊娠高血圧症候群における塩分制限について、JSH2025の見解として正しいものを2つ選べ。","choices":{"a":"妊娠高血圧症候群では積極的減塩は推奨されない","b":"非妊娠成人と同様に1日6g未満の減塩が推奨される","c":"極端な減塩は循環血漿量減少を介して胎盤血流を悪化させうる","d":"1日3g未満まで厳格に減塩すべきである","e":"塩分摂取量と妊娠高血圧症候群の発症リスクは明確に比例する"},"format":"複数","correct":"ac","explanation":"Q11：妊娠高血圧症候群に対して積極的な減塩は推奨されない。妊娠中は循環血漿量の生理的増加が胎盤血流維持に必要で、極端な減塩は胎盤血流低下を介して胎児発育不全を招きうる。一方、妊婦の塩分摂取量と本症発症リスクとの関連を示すエビデンスは確立していない。非妊娠成人の減塩目標（6g/日未満）をそのまま妊婦に当てはめる必要はない。GL p.186, SU p.311参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=188","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=311"},{"no":10,"stem":"妊娠高血圧症候群の非薬物療法として誤っているものはどれか。1つ選べ。","choices":{"a":"安静と十分な睡眠","b":"ストレス回避","c":"厳格な水分制限（1L/日未満）","d":"適切な体重管理","e":"禁煙・節酒"},"format":"単一","correct":"c","explanation":"妊娠中の厳格な水分制限は循環血漿量低下を介して胎盤血流を悪化させるため推奨されない。妊娠中の非薬物療法の中心は安静と十分な睡眠、ストレス回避、適切な体重管理（妊娠中の急激な体重増加抑制）、禁煙・節酒。非妊娠期の高血圧治療と異なり、極端な減塩・水分制限は避け、胎盤血流維持を最優先する。GL p.186-187, SU p.311参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=188","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=311"},{"no":11,"stem":"妊娠高血圧症候群の発症リスク因子として正しいものを2つ選べ。","choices":{"a":"初産婦","b":"若年（20歳以下）のみ","c":"肥満（BMI高値）","d":"低出生体重児出産歴","e":"服薬コンプライアンス良好"},"format":"複数","correct":"ac","explanation":"HDPのリスク因子：初産婦、高齢妊娠（35歳以上）、肥満（BMI高値）、HDP既往、家族歴、慢性高血圧、慢性腎臓病、糖尿病、自己免疫疾患（SLE、抗リン脂質抗体症候群）、多胎妊娠、長期不妊期間後の妊娠など。これらは妊娠初期のリスク評価に重要で、高リスク群には予防的低用量アスピリン投与（妊娠12-16週から）が推奨される。GL p.184, SU p.309参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=185","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=309"},{"no":12,"stem":"妊娠高血圧症候群におけるアスピリン低用量予防投与について正しいものはどれか。1つ選べ。","choices":{"a":"全妊婦に推奨される","b":"妊娠高血圧症候群の高リスク妊婦に妊娠初期からの低用量アスピリンが推奨される","c":"アスピリンは妊娠中は禁忌である","d":"妊娠後期から開始する","e":"効果は確立されていない"},"format":"単一","correct":"b","explanation":"妊娠高血圧腎症の高リスク妊婦（HDP既往、慢性高血圧、CKD、1型/2型糖尿病、自己免疫疾患合併、多胎妊娠など）には、妊娠12-16週頃から分娩前までの低用量アスピリン（80-150 mg/日）投与が発症予防に有効とされる。胎盤形成期の血栓予防が機序とされ、世界的ガイドラインでも推奨される。低用量では胎児への有害事象は増加しない。GL p.187, SU p.312参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=312"},{"no":13,"stem":"28歳初産婦、妊娠32週で血圧148/95 mmHg、尿蛋白2+。母体・胎児ともに重症所見なし。JSH2025に基づく初期対応として最も適切なものはどれか。1つ選べ。","choices":{"a":"外来で経過観察、降圧療法は行わない","b":"妊娠高血圧腎症と診断し入院加療、降圧目標130/80 mmHg未満","c":"直ちに帝王切開","d":"ACE阻害薬を開始する","e":"塩分摂取を1日3g未満に制限する"},"format":"単一","correct":"b","explanation":"妊娠20週以降の高血圧+蛋白尿は妊娠高血圧腎症と診断する。非重症域（148/95）でもCQ17に基づき130/80 mmHg未満を目標とした降圧療法を行い、母体・胎児管理のため入院加療を考慮する。使用薬剤はメチルドパ・ラベタロール・徐放性ニフェジピン・ヒドララジン。ACE阻害薬・ARBは妊娠中禁忌、厳格な塩分制限（Q11）も推奨されない。GL p.185-186, SU p.310参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=187","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=310"},{"no":14,"stem":"HELLP症候群の所見として正しい組み合わせはどれか。1つ選べ。","choices":{"a":"溶血・肝機能正常・血小板増加","b":"溶血・肝酵素上昇・血小板減少","c":"溶血・肝酵素低下・血小板減少","d":"貧血なし・肝酵素上昇・血小板増加","e":"凝固亢進・肝機能正常・白血球減少"},"format":"単一","correct":"b","explanation":"HELLP症候群：Hemolysis（溶血）、Elevated Liver enzymes（肝酵素上昇）、Low Platelets（血小板減少）の3徴を示す妊娠高血圧腎症の重症型。LDH上昇、間接ビリルビン上昇、AST/ALT上昇、血小板10万/μL未満が特徴。母体・胎児の予後不良で、肝被膜下血腫破裂・DIC・脳出血のリスクがあるため、安定化後の早急な分娩終了が原則。GL p.184, SU p.309参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=186","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=309"},{"no":15,"stem":"妊娠高血圧症候群と関連する母体長期合併症として正しいものを2つ選べ。","choices":{"a":"脳心血管病リスク増加","b":"将来の高血圧発症リスク低下","c":"将来の慢性腎臓病リスク増加","d":"認知症リスク低下","e":"甲状腺機能低下症リスク低下"},"format":"複数","correct":"ac","explanation":"HDP既往女性は、将来の高血圧、虚血性心疾患・脳卒中などの脳心血管病、慢性腎臓病、糖尿病、認知症などの発症リスクが一般妊婦の約2-4倍に増加することが大規模疫学研究で示されている。産後の長期フォロー（生活習慣指導、定期的な血圧・腎機能・代謝指標の評価）が将来の脳心血管病予防に重要である。GL p.189-190, SU p.318参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=191","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=318"},{"no":16,"stem":"プレコンセプションケア（妊娠前ケア）における高血圧管理として正しいものはどれか。1つ選べ。","choices":{"a":"ACE阻害薬を継続したまま妊娠を許可する","b":"妊娠前にACE阻害薬・ARBから妊娠中も使用可能な薬剤に変更しておく","c":"降圧薬は妊娠が判明してから変更すれば十分","d":"妊娠予定でも降圧薬選択に配慮は不要","e":"全ての女性で挙児前にサイアザイドを開始"},"format":"単一","correct":"b","explanation":"妊娠を希望する高血圧女性ではプレコンセプションケアとして、妊娠中に禁忌となるACE阻害薬・ARB・直接的レニン阻害薬・利尿薬から、妊娠中も使用可能な薬剤（メチルドパ、ラベタロール、徐放性ニフェジピン、ヒドララジン）への変更を妊娠前に行うことが推奨される。妊娠判明時には既に器官形成期にあたるため、計画的な変更が望ましい。減塩・体重管理・禁煙の生活習慣指導も併行する。GL p.187, SU p.313参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=313"},{"no":17,"stem":"妊娠高血圧症候群の管理において、母体重症化のサインとして注意すべき症状はどれか。1つ選べ。","choices":{"a":"下腿浮腫のみ","b":"視覚異常・激しい頭痛・心窩部痛","c":"つわり","d":"便秘","e":"体重増加のみ"},"format":"単一","correct":"b","explanation":"母体重症化の自覚症状サイン：頭痛、視覚異常（霧視・閃輝暗点・複視）、心窩部痛/右上腹部痛（肝被膜下血腫・HELLP症候群の徴候）、悪心嘔吐、息切れ（肺水腫）、過反射・痙攣前駆症状（子癇前兆候）。これらは妊娠高血圧腎症の重症化・子癇発症リスクを示唆し、緊急入院・降圧療法・硫酸マグネシウム投与など速やかな対応が必要。GL p.184-185, SU p.309参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=186","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=309"},{"no":18,"stem":"JSH2025における妊娠高血圧症候群の血圧管理について、正しいものを2つ選べ。","choices":{"a":"非重症域でも降圧療法を積極的に行う","b":"重症域（≥160/110 mmHg）は緊急降圧が必要","c":"妊娠中は血圧150/100 mmHg未満で全例観察のみ","d":"重症HDPでは経口降圧薬のみで対応","e":"降圧は急激に行うほど良い"},"format":"複数","correct":"ab","explanation":"JSH2025では非重症HDP（140-159/90-109）でも積極的な降圧（CQ17：130/80未満を弱く推奨）が母体予後を改善。重症域（≥160/110）は脳出血リスクが高く、注射薬（ヒドララジン、ニカルジピン静注など）による速やかな降圧を行う。ただし急激な過剰降圧は胎盤血流低下を招くため避ける。GL p.185-187参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=187","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=310"},{"no":19,"stem":"妊娠高血圧症候群における家庭血圧測定（HBPM）の意義として正しいものはどれか。1つ選べ。","choices":{"a":"妊娠中は家庭血圧測定は意義がない","b":"白衣高血圧の鑑別と母体管理に有用","c":"診察室血圧のみで管理すべき","d":"ABPMでしか評価できない","e":"妊娠後期のみ意義がある"},"format":"単一","correct":"b","explanation":"妊娠中の家庭血圧測定（HBPM）は白衣高血圧の鑑別、母体管理（早期発見・降圧薬調整）、患者教育に有用とされる。妊婦では白衣高血圧が比較的多く、過剰治療を避けるためにも有効。JSH2025でも妊娠中の家庭血圧の活用が推奨されている。測定方法は非妊娠成人と同様で、上腕用カフ式血圧計を用いる。GL p.184-185, SU p.310参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=186","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=310"},{"no":20,"stem":"33歳女性、HDP既往あり。今回2回目の妊娠で12週。プレコンセプションから低用量アスピリン投与が予定されていた。最も適切な対応はどれか。1つ選べ。","choices":{"a":"アスピリンは胎児奇形リスクのため中止","b":"妊娠12-16週から低用量アスピリン（80-150 mg/日）を継続","c":"アスピリンを高用量（500 mg/日）に増量","d":"妊娠中はワルファリンに変更","e":"アスピリンは妊娠28週以降のみ"},"format":"単一","correct":"b","explanation":"HDP高リスク妊婦への低用量アスピリン（80-150 mg/日）は妊娠12-16週から開始し、分娩前まで継続することで妊娠高血圧腎症の発症リスクを有意に低減する。CLASP・ASPRE試験などのRCTでエビデンスが確立。低用量では胎児奇形・出血リスクは増加せず、ACOG・NICE・JSH2025など世界的ガイドラインで推奨される。本例は2回目の妊娠でHDP既往あり高リスクに該当。GL p.187, SU p.312参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=312"}]},{"day":2,"theme":"薬物療法（妊娠期・授乳期）・産後管理・緊急症対応","questions":[{"no":1,"stem":"JSH2025で妊娠中の高血圧治療に使用可能とされる降圧薬の組み合わせとして正しいものはどれか。1つ選べ。","choices":{"a":"メチルドパ、ラベタロール、徐放性ニフェジピン、ヒドララジン","b":"ACE阻害薬、ARB、サイアザイド、Ca拮抗薬","c":"アリスキレン、ARB、ループ利尿薬、β遮断薬","d":"サイアザイド、スピロノラクトン、ARB、α遮断薬","e":"ARNI、ACE阻害薬、MR拮抗薬、SGLT2阻害薬"},"format":"単一","correct":"a","explanation":"妊娠中に使用可能な降圧薬：メチルドパ（α2刺激薬）、ラベタロール（αβ遮断薬）、徐放性ニフェジピン（Ca拮抗薬）、ヒドララジン（血管拡張薬）。ACE阻害薬・ARB・直接的レニン阻害薬（アリスキレン）は催奇形性と胎児腎不全リスクで禁忌。利尿薬は循環血漿量低下で原則避ける。GL p.187-188, SU p.313参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=313"},{"no":2,"stem":"妊娠中の高血圧治療において絶対禁忌（催奇形性・胎児腎機能障害リスク）とされる薬剤はどれか。1つ選べ。","choices":{"a":"メチルドパ","b":"ラベタロール","c":"徐放性ニフェジピン","d":"ARB（アンジオテンシンII受容体拮抗薬）","e":"ヒドララジン"},"format":"単一","correct":"d","explanation":"ACE阻害薬・ARB・直接的レニン阻害薬（アリスキレン）は妊娠中（特に第二・第三三半期）に絶対禁忌。胎児腎不全、羊水過少、肺低形成、頭蓋骨骨化不全、四肢拘縮、胎児死亡などのリスクがある。第一三半期での催奇形性も報告されている。妊娠判明時には速やかに他剤（メチルドパ、ラベタロール、徐放性ニフェジピン、ヒドララジン）へ変更する。GL p.187, SU p.313参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=313"},{"no":3,"stem":"妊娠中の降圧薬の第一選択として古くから使われている、α2刺激薬はどれか。1つ選べ。","choices":{"a":"メチルドパ","b":"クロニジン","c":"プラゾシン","d":"ニカルジピン","e":"アムロジピン"},"format":"単一","correct":"a","explanation":"メチルドパ（中枢性α2刺激薬）は妊娠中の安全性に関する50年以上の使用実績があり、JSH2025でも妊娠中の降圧薬第一選択の一つとして位置づけられる。胎児への有害事象が少なく、長期予後への安全性も確認されているが、降圧効果は緩徐で重症例には不十分なことがある。母体副作用として眠気、抑うつ、肝機能障害、溶血性貧血（直接Coombs陽性）などに注意。GL p.187, SU p.313-314参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=313"},{"no":4,"stem":"妊娠中に使用可能な降圧薬で、αβ遮断作用を有し、海外でも第一選択として広く用いられる薬剤はどれか。1つ選べ。","choices":{"a":"プロプラノロール","b":"アテノロール","c":"ラベタロール","d":"カルベジロール","e":"ビソプロロール"},"format":"単一","correct":"c","explanation":"ラベタロール（αβ遮断薬）は妊娠中の経口・静注ともに使用可能で、海外（英国NICEなど）では第一選択。本邦では経口剤が中心で、降圧効果は比較的速やか。アテノロール（水溶性β遮断薬）は胎児発育不全リスクの報告があり妊娠中は推奨されない。プロプラノロールも胎児徐脈・発育不全の懸念で第一選択にはならない。GL p.187-188, SU p.314参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=314"},{"no":5,"stem":"妊娠中の降圧薬として使用される徐放性ニフェジピン（Ca拮抗薬）について正しいものを2つ選べ。","choices":{"a":"妊娠中に使用可能なCa拮抗薬である","b":"舌下投与（短時間作用型）が推奨される","c":"妊娠高血圧症候群でも経口投与で広く使用される","d":"胎児奇形リスクが高く禁忌","e":"硫酸マグネシウムとの併用は完全禁忌"},"format":"複数","correct":"ac","explanation":"徐放性ニフェジピンは妊娠中に使用可能なCa拮抗薬で経口投与される。短時間作用型ニフェジピン（舌下含む）は急激な降圧で胎盤血流を悪化させうるため避ける。硫酸マグネシウムとの併用では神経筋遮断作用増強の懸念があるが、絶対禁忌ではなく注意して使用される。GL p.187-188参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=314"},{"no":6,"stem":"重症妊娠高血圧症候群（≥160/110 mmHg）の緊急降圧に使用される注射薬はどれか。1つ選べ。","choices":{"a":"ニトロプルシド静注","b":"ヒドララジン静注またはニカルジピン静注","c":"エナラプリラート静注","d":"フロセミド静注","e":"プロプラノロール静注"},"format":"単一","correct":"b","explanation":"重症HDPの緊急降圧にはヒドララジン静注、ニカルジピン静注、ラベタロール静注（本邦未承認）が第一選択として用いられる。ニトロプルシドはシアン中毒リスク（胎児チオシアン酸蓄積）で妊娠中は避ける。ACE阻害薬静注（エナラプリラート）は妊娠中禁忌。フロセミド静注は肺水腫合併時など循環血漿量過多が明らかな場合に限定。プロプラノロール静注は胎児徐脈リスクで推奨されない。GL p.188, SU p.315参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=190","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=315"},{"no":7,"stem":"子癇発作の予防および治療に第一選択として用いられる薬剤はどれか。1つ選べ。","choices":{"a":"ジアゼパム","b":"フェニトイン","c":"硫酸マグネシウム","d":"フェノバルビタール","e":"プロポフォール"},"format":"単一","correct":"c","explanation":"子癇（妊娠中の全身性痙攣発作）の予防および治療には硫酸マグネシウムが第一選択。MAGPIE試験、Collaborative Eclampsia Trialなど大規模RCTで子癇発症・再発予防効果が証明されている。重症妊娠高血圧腎症でも予防投与される。投与中は腱反射、呼吸数（≥12/分）、尿量（≥25 mL/h）、SpO2をモニタリングし、Mg中毒時はグルコン酸カルシウム静注で拮抗する。GL p.188, SU p.315参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=190","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=315"},{"no":8,"stem":"授乳期の高血圧治療において、母乳移行が少なく使用しやすいとされる薬剤の組み合わせはどれか。1つ選べ。","choices":{"a":"ARB、サイアザイド利尿薬、ACE阻害薬","b":"ニフェジピン、ニカルジピン、エナラプリル、カプトプリル","c":"メチルドパ、プロプラノロール、ARB、アリスキレン","d":"アムロジピン、ラベタロール、フロセミド、ARNI","e":"MR拮抗薬、ARNI、SGLT2阻害薬"},"format":"単一","correct":"b","explanation":"授乳期に使用可能な降圧薬：ニフェジピン、ニカルジピン、エナラプリル、カプトプリル（一部のACE阻害薬は授乳期には可）、ラベタロール、メチルドパなど。ARB、アリスキレンは授乳中のデータ不足。ARBは妊娠期と異なり授乳期は禁忌ではないがACE阻害薬の方が安全性データが豊富。GL p.188-189, SU p.316参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=190","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=316"},{"no":9,"stem":"産褥期（出産直後〜数週間）の血圧管理について正しいものを2つ選べ。","choices":{"a":"出産後は速やかに血圧が正常化するため経過観察のみで十分","b":"産褥早期は血圧上昇のピークが認められ、慎重な血圧管理が必要","c":"産褥期の脳卒中・子癇リスクは依然として高い","d":"産褥期はすべての降圧薬を中止する","e":"授乳をやめれば降圧療法は不要"},"format":"複数","correct":"bc","explanation":"産褥期、特に産後3-6日に体内水分の血管内への移行などで血圧上昇のピークが認められ、産後子癇・脳卒中・肺水腫の発症リスクが残存する。妊娠中の高血圧を呈した女性では分娩後も降圧療法を継続し、産後12週まで母体管理を継続的に行う。授乳と血圧管理は両立可能で、授乳期に使用可能な薬剤を選べば母乳育児を断念する必要はない。GL p.188-189, SU p.316参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=190","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=316"},{"no":10,"stem":"HDP既往女性の産後長期フォローについて、JSH2025が推奨するものはどれか。1つ選べ。","choices":{"a":"産後12週で血圧正常化すればフォロー不要","b":"脳心血管病リスク評価と生活習慣指導を継続的に行う","c":"ACE阻害薬を予防的に投与する","d":"産後6か月での血圧測定のみで十分","e":"次回妊娠まで医療介入は不要"},"format":"単一","correct":"b","explanation":"HDP既往女性は将来の高血圧、虚血性心疾患、脳卒中、CKD、糖尿病、認知症などの発症リスクが一般妊婦の2-4倍に上昇するため、産後の生活習慣指導（減塩・運動・体重管理・禁煙）と定期的な血圧・腎機能・代謝指標の評価（年1回以上）を継続することが推奨される。ACE阻害薬の予防投与は推奨されない。プレコンセプションケアとしての意義も大きい。GL p.189-190, SU p.318参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=191","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=318"},{"no":11,"stem":"26歳初産婦、妊娠34週で血圧172/115 mmHg、頭痛・視覚異常・尿蛋白3+。最も適切な初期対応はどれか。1つ選べ。","choices":{"a":"外来でメチルドパ経口を開始し1週間後再診","b":"入院、ヒドララジン静注またはニカルジピン静注、硫酸マグネシウム、分娩終了を考慮","c":"ARBを開始し胎児モニタリング","d":"サイアザイドで利尿を促進","e":"ACE阻害薬経口で速やかに降圧"},"format":"単一","correct":"b","explanation":"重症HDP（≥160/110）かつ母体重症化サイン（頭痛・視覚異常）あり。緊急降圧（ヒドララジン静注/ニカルジピン静注）、子癇予防の硫酸マグネシウム、母体・胎児評価のうえ分娩終了を検討する。ARB・ACE阻害薬は妊娠中禁忌。サイアザイドは推奨されない。GL p.188参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=190","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=315"},{"no":12,"stem":"妊娠中の高血圧治療において、利尿薬（特にループ利尿薬・サイアザイド）が原則避けられる理由として正しいものはどれか。1つ選べ。","choices":{"a":"胎児奇形リスクが極めて高い","b":"循環血漿量を低下させ胎盤血流を悪化させうる","c":"母体の低カリウム血症は無関係","d":"降圧効果が強すぎるため","e":"妊娠中はかえって血圧を上昇させる"},"format":"単一","correct":"b","explanation":"妊娠中は循環血漿量の生理的増加が胎盤血流維持に重要な役割を果たす。利尿薬（特にサイアザイド、ループ利尿薬）は循環血漿量を低下させ胎盤血流を悪化させうるため原則避ける。また母体の電解質異常（低K血症）、新生児の低Na/低K血症の原因にもなりうる。心不全・肺水腫合併など特殊な場合のみ慎重投与する。GL p.187-188, SU p.313参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=313"},{"no":13,"stem":"34歳女性、慢性高血圧（高血圧合併妊娠）でアムロジピンとARB内服中。挙児希望で妊娠を計画している。プレコンセプションケアとして最も適切なものはどれか。1つ選べ。","choices":{"a":"現在の処方を継続したまま妊娠する","b":"ARBを中止し、メチルドパ・ラベタロール・徐放性ニフェジピンへ変更","c":"アムロジピンを中止しARBのみ継続","d":"妊娠が判明してから処方変更を考える","e":"サイアザイドを追加して降圧を強化"},"format":"単一","correct":"b","explanation":"妊娠予定の高血圧女性は、妊娠前にARB・ACE阻害薬・利尿薬を中止し、妊娠中に使用可能な薬剤（メチルドパ・ラベタロール・徐放性ニフェジピン・ヒドララジン）への変更を行う。妊娠判明時点で胎児曝露が起きうるため、計画妊娠が望ましい。GL p.187, SU p.313参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=313"},{"no":14,"stem":"妊娠高血圧症候群に対する硫酸マグネシウム療法の副作用モニタリング項目として正しいものを2つ選べ。","choices":{"a":"腱反射の消失","b":"呼吸数の低下","c":"血糖値の上昇","d":"肝酵素の急激な低下","e":"瞳孔散大"},"format":"複数","correct":"ab","explanation":"硫酸マグネシウム中毒のモニタリング項目：腱反射消失（早期サイン）、呼吸数低下（<12/分）、尿量低下（<25 mL/h）、心電図異常（PQ延長・QRS幅広）、意識レベル低下、SpO2低下など。腱反射消失は中毒の早期警告サインで投与中止のシグナル。Mg中毒（治療域 5-9 mg/dL、中毒域 ≥10 mg/dL）時はグルコン酸カルシウム静注で拮抗する。腎機能低下例ではMg蓄積に特に注意。GL p.188, SU p.315参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=190","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=315"},{"no":15,"stem":"妊娠中の降圧薬選択について、避けるべき組み合わせはどれか。1つ選べ。","choices":{"a":"メチルドパ + ラベタロール","b":"徐放性ニフェジピン + ヒドララジン","c":"ACE阻害薬 + ARB","d":"メチルドパ + 徐放性ニフェジピン","e":"ラベタロール + 徐放性ニフェジピン"},"format":"単一","correct":"c","explanation":"ACE阻害薬とARBはいずれも妊娠中禁忌（催奇形性・胎児腎不全・羊水過少）であり、両者の併用は妊娠の有無にかかわらず腎機能悪化リスクから推奨されない（ONTARGET試験）。妊娠中の併用療法は妊娠中使用可能な薬剤（メチルドパ・ラベタロール・徐放性ニフェジピン・ヒドララジン）の組み合わせで行う。重症例では複数薬の併用がしばしば必要となる。GL p.187, SU p.313参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=313"},{"no":16,"stem":"妊娠高血圧症候群の根本治療として最も重要なものはどれか。1つ選べ。","choices":{"a":"完全な減塩","b":"抗凝固療法","c":"妊娠の終結（分娩）","d":"ステロイド大量療法","e":"免疫抑制療法"},"format":"単一","correct":"c","explanation":"HDPの根本治療は妊娠の終結（分娩）であり、胎盤娩出により症状は通常改善する。降圧薬や硫酸マグネシウムは対症療法・予防療法に過ぎない。重症化や母体・胎児合併症のリスク（HELLP・子癇・脳出血・胎児発育不全）と胎児の在胎週数（成熟度）・出生後予後を産科・新生児科と共同で慎重に勘案し、分娩のタイミング（時期・方法）を決定する。GL p.183-184, SU p.309参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=185","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=309"},{"no":17,"stem":"授乳中の母親で、母乳移行が比較的多く授乳期には避けるべきとされる降圧薬はどれか。1つ選べ。","choices":{"a":"ニフェジピン","b":"エナラプリル","c":"アテノロール","d":"メチルドパ","e":"ラベタロール"},"format":"単一","correct":"c","explanation":"アテノロール（水溶性β遮断薬）は母乳移行が多く、新生児徐脈・低血糖などのリスクで授乳期には避けるのが望ましい。プロプラノロール、ラベタロール、メチルドパ、ニフェジピン、エナラプリル、カプトプリルは比較的安全とされる。GL p.188-189, SU p.316参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=190","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=316"},{"no":18,"stem":"29歳女性、第1子をHDPで32週帝王切開分娩。産後6週で血圧148/92 mmHg、尿蛋白(-)。JSH2025に基づく適切な対応を2つ選べ。","choices":{"a":"降圧療法を継続し、産後12週で再評価","b":"授乳中も使用可能な降圧薬（エナラプリル等）を選択","c":"産後はARBが第一選択","d":"産後の生活習慣指導と長期フォローは不要","e":"脳心血管病リスク評価は妊娠が終わったので不要"},"format":"複数","correct":"ab","explanation":"産褥期も血圧上昇が持続することが多く、産後12週まで降圧療法を継続し再評価する。授乳中に使用可能な薬剤（エナラプリル、ニフェジピンなど）を選択。HDP既往は将来の脳心血管病リスクが高く、長期フォロー（生活習慣・血圧・代謝）が必要。GL p.188-190参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=190","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=316"},{"no":19,"stem":"妊娠中の血圧コントロールにおいて、急激な過剰降圧で生じうる胎児合併症として最も注意すべきものはどれか。1つ選べ。","choices":{"a":"胎児奇形","b":"胎盤血流低下による胎児機能不全（胎児徐脈・胎児発育不全）","c":"新生児多血症","d":"巨大児","e":"早期破水"},"format":"単一","correct":"b","explanation":"妊娠中の急激な過剰降圧は子宮胎盤血流を減少させ、胎児徐脈、胎児機能不全（non-reassuring fetal status）、胎児発育不全を引き起こしうる。重症HDPの緊急降圧時は連続胎児心拍モニタリング下で行い、目標血圧は160/110 mmHg未満まで段階的に降圧することが原則。短時間作用型ニフェジピン舌下投与は急峻な降圧で危険なため避ける。GL p.187-188, SU p.314参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=189","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=314"},{"no":20,"stem":"JSH2025における周産期女性の高血圧管理の総括として、誤っているものはどれか。1つ選べ。","choices":{"a":"HDPは妊娠高血圧、妊娠高血圧腎症、加重型妊娠高血圧腎症、高血圧合併妊娠の4病型に分類される","b":"非重症域HDPでも130/80 mmHg未満を目標とした降圧が母体合併症予防に有用（CQ17）","c":"妊娠中は積極的な減塩（6g/日未満）が必須である","d":"ACE阻害薬・ARB・利尿薬は妊娠中原則禁忌","e":"HDP既往女性は将来の脳心血管病リスクが高く長期フォローが必要"},"format":"単一","correct":"c","explanation":"Q11：妊娠中は積極的な減塩は推奨されない。極端な減塩は循環血漿量低下を介し胎盤血流を悪化させうる。他の選択肢（HDP4分類、CQ17、ACE/ARB/利尿薬禁忌、HDP既往の長期フォロー）はいずれも正しい。GL p.183-191, SU p.306-320参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=188","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=311"},{"no":21,"stem":"次のうち妊娠高血圧症候群ではないものはどれか。1つ選べ。","choices":{"a":"妊娠高血圧腎症","b":"妊娠高血圧","c":"子癇","d":"加重型妊娠高血圧腎症","e":"高血圧合併妊娠"},"format":"単一","correct":"c","explanation":"妊娠高血圧症候群（HDP）は『妊娠高血圧』『妊娠高血圧腎症（preeclampsia）』『加重型妊娠高血圧腎症』『高血圧合併妊娠』の4病型に分類される（JSH2025 第13章「周産期女性の高血圧」）。子癇（eclampsia）はHDPに合併する痙攣発作であり、症候群の独立した病型ではないためCが正解（HDPに含まれない）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=185","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=308","from_past_exam":true,"note":"解説（10.50.26～10.53.45『妊娠高血圧症候群の定義および分類』）を経て、次スライド(10.54.03)でCが黄色ハイライト。子癇は妊娠高血圧症候群の合併症であって、症候群そのもののサブタイプではない。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.50.11.png","confidence":"high","slide_section":"13 女性高血圧"}]}],"gl_pages":[183,191],"su_pages":[306,320]},{"id":14,"title":"小児領域の高血圧","is_clinical":true,"part":3,"key_topics":["高血圧の有病率","血圧測定と基準値（測定法・基準値）","病因・病態（生活習慣病・食塩過剰摂取・低出生体重）","治療に関する臨床実装（介入の根拠・治療・管理手順・非薬物療法・薬物療法）"],"sets":[{"day":1,"questions":[{"no":1,"stem":"わが国の小児高血圧の有病率について、JSH2025の記載として正しいのはどれか。","choices":{"a":"わが国の健常小児を複数回測定した場合、JSH2019基準で高血圧と判定される割合は約0.1〜5.5%である","b":"わが国の健常小児では高血圧と判定される割合は30%を超える","c":"AAP2017基準で1回測定するとJSH2019基準より有病率が著しく低くなる","d":"近年、小学生の血圧は一律に上昇傾向であると報告されている","e":"わが国では小児高血圧の疫学データは存在しない"},"format":"単一","correct":"a","explanation":"JSH2025 GL p.192では、わが国の健常小児を複数回血圧測定し、JSH2019基準で判定した場合の高血圧割合は0.1〜5.5%、1回測定では0.59〜3.75%と報告されている。AAP2017基準では1.4〜11.6%とJSH基準より高めに出る。1994〜2010年では小学生の血圧は低下傾向の報告もあり、男女・指標で動向は異なる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=194","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=321"},{"no":2,"stem":"小児の血圧測定法について、JSH2025の推奨として誤っているのはどれか。","choices":{"a":"座位で右上腕を、適切なサイズのカフを用いて測定する","b":"3〜6歳未満は7cm幅、6〜9歳未満は9cm幅、9歳以上は12cm幅（成人用）が目安である","c":"ゴム嚢の幅が上腕周囲の40%を超え、長さが上腕周囲の80%以上を取り囲むカフを選ぶ","d":"オシロメトリック式自動血圧計の使用は禁忌であり、必ず聴診法のみを用いる","e":"JSH2025では3回連続測定し、2・3回目の平均値あるいは3回目の値の採用を推奨する"},"format":"単一","correct":"d","explanation":"JSH2025 GL p.192では、聴診法による測定が望ましいとしつつ、オシロメトリック式自動血圧計の使用も可能と明記されている（ただし聴診法より拡張期血圧が低くなる傾向がある点に留意）。カフサイズの目安や3回連続測定し2・3回目の平均または3回目を採用、という方針は本文記載通り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=194","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=321"},{"no":3,"stem":"8歳男児。学校健診で偶然1回のみ血圧130/82mmHgを指摘された。両親には対応の説明を求められている。JSH2025の方針として最も適切なのはどれか。","choices":{"a":"1回の測定で基準値以上なら直ちに高血圧と確定し、薬物治療を開始する","b":"3回以上の異なる機会の血圧測定で基準値以上であることを確認してから高血圧と判定する","c":"小児では家庭血圧やABPMは一切参考にならない","d":"小学校低学年の高血圧基準は収縮期≧150mmHgであるため、この患児は正常範囲である","e":"性別・年齢にかかわらず成人と同じ140/90mmHg基準を用いる"},"format":"単一","correct":"b","explanation":"GL p.192-193では、3回以上の異なる機会の血圧測定で基準値以上の場合に小児高血圧と判定するとされる。表14-1の小学校低学年の基準は収縮期≧130mmHgであり、8歳130/82は基準を満たすが、確定診断には複数機会の測定が必須。白衣・仮面高血圧の鑑別にABPMや家庭血圧が有用である。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=194","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=322"},{"no":4,"stem":"JSH2025における小児高血圧の基準値設定について、正しい組合せを2つ選べ。","choices":{"a":"JSH2025の健診用基準では性別・年代別の血圧値を採用し、身長パーセンタイル別の設定はしていない","b":"中学校男子の収縮期血圧の高血圧基準は≧140mmHgである","c":"JSH2025では基準値を変更し、JSH2019から大幅に引き上げた","d":"幼児期（1歳以上）の管理用基準は設定されていない","e":"AAP2017では13歳未満で身長パーセンタイル別に基準を設定している"},"format":"複数","correct":"ae","explanation":"GL p.193の通り、わが国では身長と血圧の関連エビデンスが十分でないため、JSH2025は身長パーセンタイル別の設定はせず、年代別・性別の基準を継続採用。表14-1で中学校男子は≧140/85mmHg。基準はJSH2000以来踏襲（変更による現場混乱を避けるためJSH2019基準を継続）。AAP2017は13歳未満を身長別に設定。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=194","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=322"},{"no":5,"stem":"5歳男児。3歳児健診以後、肥満傾向が増悪し、現在BMIパーセンタイル97以上。複数回測定で血圧上昇を指摘されている。小児本態性高血圧の危険因子として、JSH2025で「もっとも重要」とされるのはどれか。","choices":{"a":"肥満","b":"高尿酸血症","c":"脂質異常症","d":"ストレス","e":"睡眠時間の延長"},"format":"単一","correct":"a","explanation":"GL p.193では、肥満は小児本態性高血圧のもっとも重要な危険因子であり、肥満度が増すほど高血圧の有病率が高くなると明記されている。2〜19歳18,618名を対象とした後向き研究でも、2〜5歳の幼児を含む全年齢群でBMIの増加とともに血圧が上昇することが確認されている。高尿酸血症・脂質異常はメタボリック関連因子だが、肥満が最上位の危険因子と位置づけられる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=195","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=323"},{"no":6,"stem":"3歳未満の小児で高血圧を指摘された場合、原因として最も多いのはどれか。","choices":{"a":"本態性高血圧","b":"腎実質性疾患（急性・慢性糸球体腎炎、CAKUTによるCKDなど）","c":"原発性アルドステロン症","d":"褐色細胞腫","e":"甲状腺機能亢進症"},"format":"単一","correct":"b","explanation":"GL p.193の通り、6歳未満（特に3歳未満）では二次性高血圧の頻度が高く、腎実質性障害に伴う腎性高血圧が60〜80%を占める。原因として急性・慢性糸球体腎炎のほか、先天性腎尿路異常（CAKUT）に起因するCKDが重要である。6歳以上では本態性高血圧の割合が増加する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=195","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=323"},{"no":7,"stem":"小児高血圧と食塩摂取の関係について、JSH2025の記載と合致するのはどれか。","choices":{"a":"原因不特定の血圧上昇のある小児では、1日Na摂取量1g増加ごとに収縮期血圧が約6.3mmHg、拡張期血圧が約3.5mmHg上昇するとのメタ解析がある","b":"小児では食塩摂取量と血圧との関連は認められない","c":"新生児期からの減塩は意味がなく、小児期以降に開始すれば十分である","d":"小児では減塩よりも糖質制限の方が降圧効果が高い","e":"5〜6歳時点の食事の質は、その後の血圧と無関係である"},"format":"単一","correct":"a","explanation":"GL p.193-196で、原因不特定の血圧上昇のある小児を対象としたメタ解析では、1日Na摂取量1g増加ごとに収縮期血圧6.3mmHg/拡張期3.5mmHg上昇と示されている。新生児期からの減塩や5〜6歳時の食事の質が後年の血圧に影響することも報告されており、より早期からの食事介入が望ましいとされる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=195","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=324"},{"no":8,"stem":"低出生体重と将来の高血圧について、JSH2025の記載として誤っているのはどれか。","choices":{"a":"早産や低出生体重児を含む出生歴の異常は、成人期の高血圧や脳心血管病の危険因子となる","b":"わが国の前向きコホート研究では、低出生体重は成人期の高血圧・糖尿病の有病率と関連する","c":"成人期のBMIが高いほど、低出生体重児における高血圧の有病率は高くなる","d":"ネフロン数減少によるNa排泄能低下やRA系活性化、エピジェネティックな変化が機序として想定される","e":"低出生体重児は成人期になると血圧が低下傾向となり、保護的に働く"},"format":"単一","correct":"e","explanation":"GL p.193の通り、低出生体重はDOHaD仮説に沿って成人期の高血圧・脳心血管病・糖尿病リスクを上昇させる。機序としてネフロン数減少によるNa排泄能低下、RA系活性化、胎児期ストレスによるDNAメチル化などのエピジェネティックな変化が考えられている。eは逆で明確な誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=195","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=324"},{"no":9,"stem":"12歳男児。学校健診で血圧138/86mmHg。再検でも同様。両親はともに高血圧、本人BMI 26（高度肥満）。小児期の高血圧を放置した場合のリスクとして、JSH2025の記載と合致するものを2つ選べ。","choices":{"a":"小児期の高血圧は高率に成人期の高血圧に移行する","b":"小児期の高血圧は成人期の脳心血管病リスクと関連する","c":"小児期に左室肥大などの標的臓器障害が生じることはない","d":"適切な治療を行っても臓器障害は不可逆的である","e":"小児期高血圧は思春期を過ぎれば必ず自然軽快する"},"format":"複数","correct":"ab","explanation":"GL p.193-194の通り、大規模縦断コホート研究から小児高血圧は高率に成人期高血圧へ移行し、すでに左室肥大などの標的臓器障害を合併していること、成人期の脳心血管病リスクを高めることが示されている。一方、適切な管理により標的臓器障害は改善され脳心血管病リスクが低下することも報告されており、c・d・eは誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=195","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=324"},{"no":10,"stem":"10歳男児、高血圧（管理用基準の95パーセンタイル以上）。JSH2025の小児高血圧の降圧目標として最も適切なのはどれか。","choices":{"a":"健常小児の血圧分布の50パーセンタイル未満","b":"健常小児の血圧分布の80パーセンタイル未満","c":"健常小児の血圧分布の90パーセンタイル未満","d":"健常小児の血圧分布の99パーセンタイル未満","e":"成人と同様に140/90mmHg未満で十分"},"format":"単一","correct":"c","explanation":"GL p.192のPOINT 14-4および p.194本文で、高血圧と診断された小児・青年の治療目標は『血圧値を健常小児の血圧分布の90パーセンタイル未満』とすることが推奨されている。AAP2017基準でも90パーセンタイル以上で左室肥大等の臓器障害や脳心血管病危険因子との関連が報告されており、長期的な脳心血管病予防の観点から90パーセンタイル未満が望ましい。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=194","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=325"},{"no":11,"stem":"JSH2025における小児高血圧の管理手順について、正しいのはどれか。","choices":{"a":"わが国では健診用基準と管理用基準の2つの基準値が設定されている","b":"管理用基準は健診用基準と全く同一である","c":"白衣高血圧・仮面高血圧の鑑別にはABPMや家庭血圧は禁忌である","d":"標的臓器障害を認める例でも、降圧目標は90パーセンタイル未満で固定する","e":"二次性高血圧でも降圧目標は本態性と全く同じである"},"format":"単一","correct":"a","explanation":"GL p.194の通り、わが国では健診用（表14-1：集団健診向け）と管理用（表14-2：医療現場向け）の2基準が設定されている。健診用でスクリーニング後、管理用基準と複数機会の測定で確定診断する。ABPMや家庭血圧は白衣・仮面高血圧の鑑別に有用。標的臓器障害合併例や二次性高血圧では、より低い降圧目標が推奨される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=196","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=325"},{"no":12,"stem":"小児高血圧の非薬物療法（食事療法）について、JSH2025の記載と合致するものはどれか。","choices":{"a":"食塩摂取量は小児では血圧と無関係であり、減塩は不要である","b":"食塩制限とともに脂質を減らし、カリウムを多く含む果物・野菜・食物繊維の摂取を増やす食事が有効である","c":"新生児期からの減塩は禁忌である","d":"小児では肉類を中心とした高蛋白食が降圧に最も有効である","e":"果物・野菜の摂取量を制限することが推奨される"},"format":"単一","correct":"b","explanation":"GL p.196の通り、食塩過剰摂取は小児の血圧上昇と関連し、減塩は有効。さらに脂質を減らしカリウムを多く含む果物・野菜・食物繊維の摂取を増やすこと（DASH様食）が小児の肥満解消や高血圧管理に有効。新生児期からの減塩が小児期の血圧上昇抑制に寄与することも示されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=196","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=326"},{"no":13,"stem":"JSH2025における小児高血圧の運動療法の推奨として正しいのはどれか。","choices":{"a":"水泳・ジョギング・サイクリング・ダンスなどの有酸素運動が推奨される","b":"運動療法は禁忌である","c":"1回5分未満の短時間運動のみ推奨される","d":"週1回程度で十分である","e":"柔軟運動（ヨガ・ストレッチ）は推奨されない"},"format":"単一","correct":"a","explanation":"GL p.192のPOINT 14-5および p.196本文の通り、肥満解消・予防に運動療法は不可欠で、有酸素運動（水泳・ジョギング・サイクリング・ダンス）が推奨される。ヨガ・ストレッチングなどの柔軟運動も効果的。1回30〜60分、週3回程度（週150分以上）の定期的な運動が推奨されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=326"},{"no":14,"stem":"小児・青年期の睡眠と血圧との関連について、JSH2025の記載と合致するものを2つ選べ。","choices":{"a":"小児においても短い睡眠時間は高血圧や肥満マーカーの増加、インスリン抵抗性と関連する","b":"性別・年齢・肥満度にかかわらず、睡眠時間が短く入眠時間が遅いほど血圧が高値となる報告がある","c":"小児では睡眠時間は血圧と無関係である","d":"夜更かしは血圧低下に寄与する","e":"睡眠は小児高血圧治療において重要ではない"},"format":"複数","correct":"ab","explanation":"GL p.196の通り、小児期・青年期のSRでは短い睡眠時間が高血圧・肥満マーカー増加・インスリン抵抗性と関連。性別・年齢・肥満度に関わらず、睡眠時間が短く入眠時間が遅いほど血圧が高値という報告もあり、良質な睡眠の確保とストレス解消が小児高血圧管理上重要とされる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=327"},{"no":15,"stem":"11歳男児。肥満を伴う本態性高血圧で、生活習慣改善6ヶ月で目標達成困難。降圧薬導入を検討する。JSH2025の小児高血圧薬物療法の第一選択薬として誤っているのはどれか。","choices":{"a":"Ca拮抗薬","b":"ACE阻害薬","c":"ARB","d":"ループ利尿薬","e":"上記a〜cはいずれも第一選択となりうる"},"format":"単一","correct":"d","explanation":"GL p.192のPOINT 14-6および p.196の通り、小児高血圧の第一選択薬は小児への有効性・安全性が確立しているCa拮抗薬とACE阻害薬・ARB（RA系阻害薬）。ループ利尿薬は標準的な第一選択薬には位置づけられていない。本邦の保険適用がある薬剤（表14-4）から優先的に使用する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=327"},{"no":16,"stem":"15歳女子、CKD合併高血圧。月経歴あり。JSH2025の小児・思春期での降圧薬使用上の注意点として正しいのはどれか。","choices":{"a":"RA系阻害薬は催奇形性があるため、思春期以降の女子に使用する場合は注意が必要である","b":"ACE阻害薬は妊娠可能女子に第一選択として強く推奨される","c":"Ca拮抗薬は催奇形性があるため思春期女子では禁忌である","d":"RA系阻害薬はCKD合併例でも降圧効果のみで、脳心血管病リスク低減効果はない","e":"副作用が出ても増量を継続する"},"format":"単一","correct":"a","explanation":"GL p.196の通り、RA系阻害薬（ACE阻害薬・ARB）は催奇形性があるため、思春期以降の女子に使用する場合は妊娠の可能性に配慮した注意が必要。一方で、CKDや左室機能不全合併例では降圧効果に加え脳心血管病リスク低減効果が報告されている。少量から開始し有害事象（血清K上昇等）を確認しつつ増量する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=328"},{"no":17,"stem":"JSH2025の表14-4「小児高血圧の治療に保険適用を有する降圧薬」について、正しい組合せはどれか。","choices":{"a":"Ca拮抗薬：アムロジピン（6歳以上：2.5mg分1から、最大5mg/日）","b":"ACE阻害薬：エナラプリルは生後1ヶ月未満の新生児にのみ適応","c":"ARB：バルサルタンは2歳未満から保険適用となる","d":"MR拮抗薬：スピロノラクトンが小児高血圧の第一選択として保険適用される","e":"β遮断薬：プロプラノロールが本邦小児高血圧の標準薬として表14-4に掲載されている"},"format":"単一","correct":"a","explanation":"GL p.197 表14-4の通り、アムロジピンは6歳以上で2.5mg分1から開始し最大5mg/日。エナラプリルは生後1ヶ月以上で0.08mg/kg/日分1、リシノプリルは6歳以上で0.07mg/kg/日分1。バルサルタン・カンデサルタン・アジルサルタンも年齢・体重別の用量が定められている。MR拮抗薬・β遮断薬は表14-4の第一選択リストには含まれない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=199","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=328"},{"no":18,"stem":"13歳男児、本態性高血圧で降圧薬を導入。血圧コントロールが安定した後の対応について、JSH2025の方針として正しいものを2つ選べ。","choices":{"a":"薬物療法中も非薬物療法を同時に行うことがより効果的である","b":"血圧コントロールがつけば、薬剤を漸減・中止し非薬物療法のみに戻って経過をみることができる","c":"一度開始した降圧薬は終生継続する必要がある","d":"目標血圧に達したら非薬物療法は中止してよい","e":"小児では副作用が出ても薬剤の見直しはしない"},"format":"複数","correct":"ab","explanation":"GL p.196の通り、小児では薬物療法中も非薬物療法を同時に行うことがより効果的であり、血圧コントロールがつけば薬剤を漸減・中止し非薬物療法のみに戻して経過観察することが可能と明記されている。副作用や目標血圧未達時には治療計画の見直しが必要。c（生涯継続）・d（非薬物療法中止）・e（副作用無視）はいずれも方針に反する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=329"},{"no":19,"stem":"2歳男児、血圧176/104mmHg、左右上下肢の血圧差を指摘されている。腎エコーで左腎が小さい。診断と治療方針として最も適切なのはどれか。","choices":{"a":"腎血管性高血圧などの二次性高血圧を疑い、根治可能な病態では小児でも可能な限り根治治療を優先する","b":"本態性高血圧と判断し、生活習慣改善のみで経過観察する","c":"原因精査せずに直ちにβ遮断薬を開始する","d":"2歳では血圧測定の意義がない","e":"小児では二次性高血圧は極めて稀であり、本態性として治療する"},"format":"単一","correct":"a","explanation":"GL p.193・p.196の通り、6歳未満（特に3歳未満）では二次性高血圧の頻度が高く、腎実質性高血圧（CAKUT/糸球体腎炎）、腎血管性高血圧、大動脈縮窄、内分泌性などを念頭にスクリーニングする。2歳・左右差・左腎萎縮の所見は腎血管性高血圧（FMD等）を強く示唆する。二次性高血圧では原疾患治療を併用し、根治可能な病態では小児でも可能な限り根治治療（経皮的血管形成術等）を優先する方針が明記されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=329"},{"no":20,"stem":"小児高血圧について、JSH2025 第14章の記載として誤っているのはどれか。","choices":{"a":"睡眠は小児の高血圧治療に有効である","b":"薬物治療の第一選択薬としてACE阻害薬を選択する","c":"薬物治療の第一選択薬としてCa拮抗薬を選択する","d":"高血圧と診断された小児および青年の治療目標は、血圧値を健常小児の血圧分布の80パーセンタイル未満とすることを目標とする","e":"小児の高血圧は高率に成人の高血圧に移行する"},"format":"単一","correct":"d","explanation":"JSH2025 第14章 p.192-194では、高血圧と診断された小児および青年の治療目標は『血圧値を健常小児の血圧分布の90パーセンタイル未満』と明記されており、Dの『80パーセンタイル』は誤り。a（睡眠の重要性）、b・c（ACE阻害薬・Ca拮抗薬は第一選択）、e（成人期高血圧への移行）はいずれもガイドラインの記載と合致する。【過去問Q14該当】","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=194","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=322"}]},{"day":2,"questions":[{"no":1,"stem":"7歳男児。学校健診で1回測定で血圧126/78mmHgを指摘された。両親は『1回でも基準を超えたら高血圧か』と尋ねている。JSH2025の判定について最も適切なのはどれか。","choices":{"a":"1回の測定値では血圧の分布の検討はできず、3回以上の異なる機会の測定が必要である","b":"1回でも基準を超えれば直ちに高血圧と確定する","c":"小学校低学年は血圧測定の対象とならない","d":"成人と同じ140/90mmHgが基準値である","e":"再検なしに薬物治療を直ちに開始する"},"format":"単一","correct":"a","explanation":"GL p.192-193では、原則1回の測定では血圧分布の検討はできず、3回以上の異なる機会の血圧測定で基準値以上の場合に小児の高血圧と判定すると明記されている。表14-1（健診用基準）で小学校低学年は収縮期≧130/拡張期≧80mmHgが基準であり、本症例は基準を満たすため再検と複数機会の測定が必須。1回測定での確定診断や成人基準の流用、薬物治療の即時開始は不適切である。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=194","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=321"},{"no":2,"stem":"JSH2025の小児血圧測定のカフサイズについて、誤っているのはどれか。","choices":{"a":"3〜6歳未満は7cm幅のカフが目安である","b":"6〜9歳未満は9cm幅のカフが目安である","c":"9歳以上は12cm幅（成人用）が目安である","d":"年齢に固定し、上腕周囲長は考慮しない","e":"ゴム嚢の幅が上腕周囲の40%を超え、長さが80%以上を取り囲むカフを選ぶ"},"format":"単一","correct":"d","explanation":"GL p.192の通り、3〜6歳未満は7cm幅、6〜9歳未満は9cm幅、9歳以上は12cm幅（成人用）が年齢別カフ幅の目安だが、本文では『年齢よりも上腕周囲長に合わせた方がよく、ゴム嚢の幅が上腕周囲の40%を超え、長さが上腕周囲を80%以上取り囲むものを選ぶ』と明記されている。したがって年齢に固定し上腕周囲を考慮しない（d）が誤り。カフが小さすぎると血圧は過大評価される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=194","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=321"},{"no":3,"stem":"中学校3年生女子（14歳）の高血圧診断基準（JSH2025 表14-1）として正しいのはどれか。","choices":{"a":"収縮期血圧≧135mmHgまたは拡張期血圧≧80mmHg","b":"収縮期血圧≧120mmHgまたは拡張期血圧≧70mmHg","c":"収縮期血圧≧160mmHgまたは拡張期血圧≧100mmHg","d":"収縮期血圧≧140mmHgまたは拡張期血圧≧90mmHg（成人と同じ）","e":"性別による違いはない"},"format":"単一","correct":"a","explanation":"GL p.193 表14-1の通り、中学校女子の高血圧基準は収縮期≧135mmHgまたは拡張期≧80mmHg（中学校男子は≧140/85mmHg）。幼児は≧120/70mmHg、小学校低学年は≧130/80mmHg、高学年は≧135/80mmHg、高等学校は≧140/85mmHgと年齢・性別で異なる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=195","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=322"},{"no":4,"stem":"JSH2025の管理用基準（表14-2）について正しい組合せを2つ選べ。","choices":{"a":"1歳以上の幼児期の管理用基準が90/95パーセンタイル値で設定されている","b":"管理用基準には90パーセンタイル値と95パーセンタイル値の両方が示されている","c":"幼児期（1〜5歳）の管理用基準はJSH2025では削除された","d":"管理用基準はJSH2025で初めて導入された概念で、JSH2019には存在しなかった","e":"管理用基準は性別を区別しない"},"format":"複数","correct":"ab","explanation":"GL p.194-195 表14-2の通り、JSH2025の管理用基準には90パーセンタイル値と95パーセンタイル値の両方が掲載されており、1歳以上の幼児期から中学校3年生まで性別・年齢別に設定されている。5歳以下の幼児期はAAP2017基準（身長25パーセンタイル）も参照可能。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=196","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=322"},{"no":5,"stem":"6歳未満の小児高血圧で、二次性高血圧として最も頻度が高いのはどれか。","choices":{"a":"腎実質性高血圧（急性・慢性糸球体腎炎、CAKUTに伴うCKDなど）","b":"褐色細胞腫","c":"原発性アルドステロン症","d":"クッシング症候群","e":"甲状腺機能亢進症"},"format":"単一","correct":"a","explanation":"GL p.193の通り、6歳未満（特に3歳未満）では二次性高血圧の確率が高くなり、腎実質性障害に伴う腎性高血圧が60〜80%を占めるとされる。原因として急性・慢性糸球体腎炎のほか、先天性腎尿路異常（CAKUT：congenital anomalies of the kidney and urinary tract）に起因するCKDが重要である。内分泌性二次性高血圧（PA・褐色細胞腫・Cushing症候群・甲状腺機能亢進症等）は小児では本群より頻度が低い。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=195","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=323"},{"no":6,"stem":"小児期からの食塩過剰摂取と血圧の関係について、JSH2025の記載として誤っているのはどれか。","choices":{"a":"1日Na摂取量が1g増加すると収縮期血圧が約6.3mmHg上昇するとのメタ解析報告がある","b":"新生児期からの減塩は小児期の血圧上昇を抑制し得る","c":"5〜6歳時の食事の質は6年後の血圧と関連する","d":"減塩は脂質制限・カリウム摂取と組み合わせるとさらに有効である","e":"小児期では食塩摂取量と血圧との間に関連は認められていない"},"format":"単一","correct":"e","explanation":"GL p.193・p.196の通り、小児高血圧においても食塩過剰摂取は重要な要因。メタ解析で1日Na摂取量1g増加ごとに収縮期6.3mmHg・拡張期3.5mmHg上昇。新生児期からの減塩、5〜6歳時の食事の質改善、脂質減・カリウム増・食物繊維増などの食事介入が有効。eは明確な誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=195","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=324"},{"no":7,"stem":"低出生体重児の成人期リスクと機序について、JSH2025の記載と合致するのはどれか。","choices":{"a":"ネフロン数減少によるNa排泄能の低下、RA系活性化、胎児期ストレスによるDNAメチル化などのエピジェネティックな変化が機序として考えられている","b":"低出生体重児はネフロン数が増加するため腎機能が良好になる","c":"低出生体重は成人期の高血圧・糖尿病とは無関係である","d":"DOHaD仮説は否定されている","e":"成人期のBMIが低いほど高血圧の有病率が高い"},"format":"単一","correct":"a","explanation":"GL p.193の通り、低出生体重は成人期の脳心血管病・高血圧・糖尿病の有病率と関連し、成人期のBMIが高いほど高血圧の有病率が高い。機序として腎ネフロン数減少によるNa排泄能低下、RA系活性化、胎児期ストレス由来DNAメチル化等のエピジェネティック変化が考えられている（DOHaD仮説）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=195","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=324"},{"no":8,"stem":"JSH2025の小児高血圧治療目標について、正しいのはどれか。","choices":{"a":"本態性高血圧では血圧分布の90パーセンタイル未満が望ましく、二次性高血圧や標的臓器障害合併例ではより低い降圧目標が推奨される","b":"二次性高血圧でも本態性と全く同じ目標値で十分である","c":"標的臓器障害がある場合は降圧目標を緩めて80パーセンタイル以上とする","d":"幼児では降圧目標は設けない","e":"目標は一律に成人と同じ130/80mmHg未満である"},"format":"単一","correct":"a","explanation":"GL p.194の通り、小児高血圧の治療目標は将来の脳心血管病予防の観点から健常小児の血圧分布の90パーセンタイル未満とすることが望ましいとされる。一方で、すでに左室肥大などの標的臓器障害を認める例や二次性高血圧では、より低い降圧目標を設定することが推奨される。成人と同じ130/80mmHgや80パーセンタイル以上といった一律設定は不適切である。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=196","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=325"},{"no":9,"stem":"10歳女児、肥満度+25%、複数機会の測定で血圧132/82mmHg。標的臓器障害なし、二次性高血圧除外済み。JSH2025に基づく初期対応として正しい組合せを2つ選べ。","choices":{"a":"減塩・脂質減・カリウム増（果物・野菜・食物繊維）の食事療法を導入する","b":"1回30〜60分、週3回程度（週150分以上）の有酸素運動を指導する","c":"直ちにACE阻害薬を導入する","d":"生活習慣改善は無効であり、運動は禁忌である","e":"両親には『成人になれば自然に治る』と説明し経過観察のみとする"},"format":"複数","correct":"ab","explanation":"GL p.196の通り、小児本態性高血圧の初期治療は非薬物療法が中心。食塩制限・脂質減・カリウム増・食物繊維増の食事と、有酸素運動（水泳・ジョギング・サイクリング・ダンス）を1回30〜60分・週3回程度（週150分以上）が推奨される。生活習慣改善で効果不十分・症候性・臓器障害・二次性の場合に薬物療法を検討する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=326"},{"no":10,"stem":"小児における薬物療法開始の適応として、JSH2025で挙げられているのはどれか。","choices":{"a":"生活習慣の改善のみで十分な効果が得られない場合、すでに高血圧による臓器障害を認める場合、症候性高血圧、二次性高血圧","b":"1回でも基準値を超えた小児全例","c":"肥満を伴う高血圧は全例で薬物療法から開始する","d":"症候のない軽症高血圧でも薬物療法を直ちに開始する","e":"二次性高血圧では薬物療法は禁忌である"},"format":"単一","correct":"a","explanation":"GL p.196・図14-1（小児高血圧の管理手順）の通り、(1)生活習慣の改善のみでは十分な効果が得られない場合、(2)すでに高血圧による臓器障害を認める場合、(3)症候性高血圧、(4)二次性高血圧で薬物療法を開始する。原則として一定期間の非薬物療法を試行した上で導入を検討し、症状や臓器障害がない軽症の本態性高血圧では薬物療法は初回からの導入対象とならない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=326"},{"no":11,"stem":"JSH2025の小児高血圧の第一選択薬として正しい組合せを2つ選べ。","choices":{"a":"Ca拮抗薬（アムロジピン等）","b":"RA系阻害薬（ACE阻害薬・ARB）","c":"ループ利尿薬（フロセミド）","d":"α遮断薬","e":"中枢性交感神経抑制薬"},"format":"複数","correct":"ab","explanation":"GL p.192のPOINT 14-6および p.196・p.197 表14-4の通り、小児高血圧の第一選択は小児への有効性ならびに安全性が確立しているCa拮抗薬（アムロジピン等）とRA系阻害薬（ACE阻害薬・ARB）である。本邦で保険適用を有する薬剤（表14-4）から優先的に使用し、少量から開始する。ループ利尿薬、α遮断薬、中枢性交感神経抑制薬は第一選択には位置づけられない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=327"},{"no":12,"stem":"CKDを合併する小児高血圧で、RA系阻害薬を選択する根拠として、JSH2025で挙げられているのはどれか。","choices":{"a":"降圧効果のみで、脳心血管病リスクや臓器保護効果は期待できない","b":"降圧効果に加え、左室機能不全等の脳心血管病リスクを合併した小児やCKD合併小児で脳心血管病リスクを低減する効果が報告されている","c":"RA系阻害薬は小児では効果が確認されていない","d":"小児CKDではループ利尿薬が第一選択である","e":"RA系阻害薬は小児CKDでは禁忌である"},"format":"単一","correct":"b","explanation":"GL p.196の通り、RA系阻害薬（ACE阻害薬・ARB）は降圧効果に加え、左室機能不全などの脳心血管病リスクを合併した小児や、CKDを合併した小児例において脳心血管病リスクを低減する効果が報告されている。CKDでは蛋白尿減少・腎保護効果も期待できる。ただし催奇形性があるため、思春期以降の女子に使用する場合は妊娠の可能性に配慮した注意（避妊指導等）が必要である。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=327"},{"no":13,"stem":"降圧薬導入時の小児への用量設定について、JSH2025の方針として誤っているのはどれか。","choices":{"a":"成人量から開始し、副作用が出てから減量する","b":"少量から開始し、過度の血圧低下や頭痛、血清カリウム値上昇などの有害事象を確認しながら増量する","c":"副作用や目標血圧未達時には治療計画を見直す","d":"可能な限り本邦で保険適用を有する薬剤を優先使用する","e":"血圧コントロール後は漸減・中止し、非薬物療法のみで経過観察可能"},"format":"単一","correct":"a","explanation":"GL p.196の通り、小児では降圧薬を少量から開始し、過度の血圧低下や頭痛、血清カリウム値上昇などの有害事象の有無を確認しながら増量する。成人量から開始する（a）のは適切でなく明確な誤り。副作用や目標血圧未達時には治療計画の見直しが必要であり、可能な限り本邦で保険適用を有する薬剤（表14-4）を優先使用する。コントロール後の漸減・中止は方針通り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=328"},{"no":14,"stem":"表14-4（保険適用降圧薬）について、用量と適応年齢の組合せとして正しいものを2つ選べ。","choices":{"a":"アムロジピン：6歳以上、2.5mg分1から、最大5mg/日","b":"エナラプリル：生後1ヶ月以上、0.08mg/kg/日分1、最大10mg/日","c":"リシノプリル：新生児から第一選択として使用可能","d":"バルサルタンは生後1ヶ月未満の新生児にのみ適応","e":"カンデサルタンは18歳未満では禁忌である"},"format":"複数","correct":"ab","explanation":"GL p.197 表14-4の通り、アムロジピン（6歳以上、2.5mg分1から、最大5mg/日）、エナラプリル（生後1ヶ月以上、0.08mg/kg/日分1、最大10mg/日）、リシノプリル（6歳以上、0.07mg/kg/日分1、最大20mg/日）、バルサルタン（6歳以上、体重別用量）、カンデサルタン（1〜6歳未満から年齢別用量）が記載されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=199","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=328"},{"no":15,"stem":"二次性小児高血圧の管理として、JSH2025の方針として正しいのはどれか。","choices":{"a":"原疾患の治療を併用し、腎血管性高血圧など根治可能な病態では小児でも可能な限り根治治療を優先する","b":"原疾患は治療せず降圧薬のみで管理する","c":"腎血管性高血圧では小児では血行再建は禁忌である","d":"二次性高血圧でも本態性と全く同じアプローチでよい","e":"二次性高血圧では非薬物療法は不要である"},"format":"単一","correct":"a","explanation":"GL p.196の通り、小児二次性高血圧では原疾患の治療を併せて行い、腎血管性高血圧など根治可能な病態では、小児でも可能な限り根治治療（経皮的腎動脈形成術等）を優先する方針が明記されている。原疾患を治療せず降圧薬のみ、本態性と同一アプローチ、根治治療を禁忌とする、といった対応はいずれも適切でない。非薬物療法（食事・運動・睡眠）の併用は二次性でも有用である。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=329"},{"no":16,"stem":"15歳女子、本態性高血圧、生活習慣改善で効果不十分。降圧薬導入を検討。JSH2025の方針として最も適切なのはどれか。","choices":{"a":"RA系阻害薬は催奇形性があるため、月経開始後の女子では妊娠の可能性に配慮し、Ca拮抗薬から開始するか、RA系阻害薬使用時は十分な避妊指導を行う","b":"性別にかかわらず一律にARBを第一選択とし、避妊指導は不要である","c":"女子では薬物療法は禁忌である","d":"思春期以降は成人量から開始してよい","e":"MR拮抗薬を第一選択とする"},"format":"単一","correct":"a","explanation":"GL p.196の通り、RA系阻害薬（ACE阻害薬・ARB）は催奇形性があるため、思春期以降の女子に使用する場合は妊娠の可能性に十分注意が必要と明記されている。臨床的にはCa拮抗薬を優先するか、RA系阻害薬使用時には十分な避妊指導を行う。少量から開始し有害事象（過度の血圧低下・頭痛・血清K上昇等）を確認しつつ増量する点も小児共通の原則であり、成人量からの開始やMR拮抗薬を第一選択とすることは推奨されない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=198","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=329"},{"no":17,"stem":"白衣高血圧・仮面高血圧の鑑別における小児での評価手段として、JSH2025で有用とされているのはどれか。","choices":{"a":"ABPMや家庭血圧測定","b":"聴診のみで十分","c":"小児では家庭血圧・ABPMは禁忌","d":"心エコー検査のみで鑑別する","e":"尿検査で鑑別する"},"format":"単一","correct":"a","explanation":"GL p.194の通り、小児においても白衣高血圧や仮面高血圧の鑑別にABPM（24時間自由行動下血圧測定）や家庭血圧が有用と明記されている。診察室血圧のみでの判断には限界があり、健診用基準・管理用基準による複数機会の測定に加え、ABPM・家庭血圧を組み合わせて評価する。聴診のみ・心エコー・尿検査のみで白衣高血圧の鑑別はできず、特にABPMや家庭血圧が禁忌とされる記載はない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=196","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=329"},{"no":18,"stem":"AAP2017基準とJSH2025基準の対応について、誤っているのはどれか。","choices":{"a":"JSH2025の管理用基準（収縮期血圧の90/95パーセンタイル）は、AAP2017基準の身長25パーセンタイルにおける同パーセンタイル値とほぼ一致する","b":"拡張期血圧についてはJSH基準がAAP2017基準より約10mmHg低い傾向があり、これは測定法（聴診法対オシロメトリック式自動血圧計）の違いに起因する","c":"JSHの管理基準では5歳以下の幼児期の基準がないため、1歳以上の基準値が設定されている","d":"5歳以下の幼児ではAAP2017基準（表14-3）が参照可能と考えられる","e":"AAP2017基準とJSH基準は全く対応しないため比較できない"},"format":"単一","correct":"e","explanation":"GL p.194-196の通り、JSH管理用基準の収縮期90/95パーセンタイルは、AAP2017の身長25パーセンタイルにおける同パーセンタイル値とほぼ一致する。拡張期はAAP2017より約10mmHg低くこれは測定法の違いに起因。5歳以下はAAP2017表14-3が参照可能。e『全く対応しない』は誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=197","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=329"},{"no":19,"stem":"16歳男子、健診で血圧150/96mmHg、低カリウム血症（K 2.9 mEq/L）、家族歴に若年性高血圧。JSH2025の小児高血圧の鑑別として、まず考えるべきものはどれか。","choices":{"a":"本態性高血圧","b":"二次性高血圧（原発性アルドステロン症、腎血管性高血圧、Liddle症候群等）","c":"白衣高血圧のみ","d":"運動誘発性血圧上昇のみ","e":"肥満による高血圧のみ"},"format":"単一","correct":"b","explanation":"GL p.193の通り、6歳以上では本態性高血圧の割合が増加するが、低カリウム血症や若年発症・家族歴を伴う高度高血圧は二次性高血圧を強く示唆する。原発性アルドステロン症、腎血管性高血圧、遺伝性高血圧（Liddle症候群等）を念頭に置きスクリーニング検査を行う。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=195","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=329"},{"no":20,"stem":"JSH2025 第14章「小児領域の高血圧」のPOINT 14として誤っているのはどれか。","choices":{"a":"小児の血圧測定は適切なサイズのカフを用い、3回連続測定して2・3回目の平均または3回目を採用する","b":"3回以上の異なる機会の血圧測定で基準値以上の場合に小児の高血圧と判定する","c":"健診用基準は集団健診向け、管理用基準は医療現場向けに区別される","d":"高血圧と診断された小児・青年の治療目標は健常小児の血圧分布の80パーセンタイル未満","e":"薬物療法の第一選択薬としてACE阻害薬・ARBまたはCa拮抗薬を用いる"},"format":"単一","correct":"d","explanation":"GL p.192 POINT 14-4では、高血圧と診断された小児および青年の治療目標は『血圧値を健常小児の血圧分布の90パーセンタイル未満とすることを推奨する』と明記されている。dの『80パーセンタイル』は誤り（過去問Q14と同主旨）。a（カフサイズと3回連続測定）、b（3回以上の異なる機会）、c（健診用・管理用基準の区別）、e（第一選択薬：ACE阻害薬/ARB/Ca拮抗薬）はPOINT 14（POINT 14-1〜14-6）の記載通りである。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=194","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=322"},{"no":21,"stem":"つぎのうち誤っているものはどれか。1つ選べ。","choices":{"a":"睡眠は小児の高血圧治療に有効である","b":"薬物治療の第一選択薬としてACE阻害薬を選択する","c":"薬物治療の第一選択薬としてCa拮抗薬を選択する","d":"高血圧と診断された小児および青年の治療目標は、血圧値を健常小児の血圧分布の80パーセンタイル未満とすることを目標とする","e":"小児の高血圧は高率に成人の高血圧に移行する"},"format":"単一","correct":"d","explanation":"JSH2025 第14章「小児領域の高血圧」p.192-194によると、『高血圧と診断された小児および青年の治療目標は、血圧値を健常小児の血圧分布の90パーセンタイル未満とする』と明記されている。Dは『80パーセンタイル』としている点が誤り。A（睡眠は重要）、B・C（ACE阻害薬・Ca拮抗薬は第一選択）、E（小児高血圧は高率に成人高血圧へ移行）はいずれもJSH2025の記載に合致。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=194","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=322","from_past_exam":true,"note":"解説スライドは画像セット内に確認できず（次画像は次問の特殊条件下高血圧）。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.54.06.png","confidence":"high","slide_section":"14 小児高血圧"}]}],"gl_pages":[192,197],"su_pages":[321,330]},{"id":15,"title":"二次性高血圧","is_clinical":true,"part":3,"key_topics":["原発性アルドステロン症（PA）の診断と治療","その他の内分泌性高血圧（クッシング症候群・褐色細胞腫・パラガングリオーマ）","腎血管性高血圧（診断・治療）","薬剤誘発性高血圧（NSAIDs・カンゾウ・グルココルチコイド・シクロスポリン・ESA・エストロゲン・分子標的薬）","遺伝性高血圧","その他の二次性高血圧（血管性高血圧・脳/中枢神経性高血圧）","CQ18: PA治療として副腎摘出術 vs MR拮抗薬","CQ19: 腎動脈狭窄症に対する経皮的腎動脈形成術併用療法"],"sets":[{"day":1,"questions":[{"no":1,"stem":"原発性アルドステロン症（PA）の疫学・病態に関する記述で正しいのはどれか。1つ選べ。","choices":{"a":"全高血圧患者の0.5%未満と稀な疾患である","b":"本態性高血圧と比較して脳心血管合併症の発症率は同等である","c":"高血圧患者全体の5～10%を占め、治療抵抗性高血圧では20%程度に上る","d":"血圧日内変動はextreme dipper型を呈する","e":"食塩感受性は低く、減塩は降圧に無効である"},"format":"単一","correct":"c","explanation":"JSH2025 第15章 p.198によると、PAは高血圧患者の約5-10%（治療抵抗性では20%以上）を占める頻度の高い二次性高血圧であり、本態性高血圧より脳心血管合併症（脳卒中・冠動脈疾患・心房細動・心不全・末梢動脈疾患）の発症率が2-5倍高い。血圧日内変動はnon-dipper/riser型が典型で、食塩感受性が高いため減塩は降圧に有効。aは誤り（頻度過小評価）、b・d・eも誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=200","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=331"},{"no":2,"stem":"PAのスクリーニング対象として、JSH2025が積極的推奨としているのはどれか。1つ選べ。","choices":{"a":"全ての本態性高血圧患者","b":"低カリウム血症・治療抵抗性高血圧・若年発症・副腎偶発腫瘍・SAS合併・若年脳血管障害","c":"正常血圧で低カリウム血症のみの患者","d":"白衣高血圧の患者","e":"妊娠高血圧症候群のみ"},"format":"単一","correct":"b","explanation":"JSH2025 第15章 p.199-200では、PA有病率の高い「低カリウム血症」「治療抵抗性高血圧」「若年（40歳未満）発症高血圧」「未治療時150/100mmHg以上」「副腎偶発腫瘍」「若年脳血管障害」「睡眠時無呼吸症候群（SAS）合併」をPAスクリーニングの積極的推奨対象としており、bが正解。全例スクリーニング（a）はコスト面・偽陽性の問題から推奨されていない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=200","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=331"},{"no":3,"stem":"PAスクリーニング検査のARR（アルドステロン/レニン比）について正しいのはどれか。1つ選べ。","choices":{"a":"早朝臥位安静30分後の採血が標準である","b":"PAC/PRA比≧200かつPAC≧60 pg/mLでスクリーニング陽性","c":"MR拮抗薬・β遮断薬は中止せずそのまま測定してよい","d":"ARRはレニン値の影響を受けない","e":"ARR陽性のみでPA確定診断可能"},"format":"単一","correct":"b","explanation":"JSH2025 第15章とPA診療GL2021によると、ARR採血は座位30分後または早朝安静座位で行い、PAC/PRA≧200かつPAC≧60 pg/mL（≧150 pmol/L）でスクリーニング陽性とする。MR拮抗薬は4週以上、β遮断薬・利尿薬・中枢性降圧薬・ARB/ACEIは2週以上中止か影響の少ないCa拮抗薬・α遮断薬に置換するのが原則。aは座位が標準、cは中止必要、dはレニン分母の影響大、eは機能確認検査で確定が原則のため誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=200","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=332"},{"no":4,"stem":"PAの機能確認検査について正しいものを2つ選べ。","choices":{"a":"カプトプリル試験はカプトプリル50mg内服後60～90分のARR≧200で陽性","b":"生理食塩水負荷試験は1時間で1Lを急速静注する","c":"経口食塩負荷試験は24時間尿中アルドステロン≧6μg/日で陽性","d":"心不全合併例には生理食塩水負荷試験が第一選択である","e":"確定診断には複数の機能確認検査の全てが陽性である必要がある"},"format":"複数","correct":"ac","explanation":"JSH2025 第15章 表15-4と日本内分泌学会PA診療GLによると、機能確認検査は①カプトプリル試験（カプトプリル50mg内服→60-90分後ARR≧200で陽性、外来可能）、②生理食塩水負荷試験（生食2L/4時間点滴→PAC≧60 pg/mLで陽性、心・腎不全には不適）、③フロセミド立位試験（フロセミド40mg静注+2時間立位→PRA≦2.0 ng/mL/時で陽性）、④経口食塩負荷試験（NaCl 10-12g/日×3日→24時間尿中アルドステロン≧6μg/日で陽性）の4種類。a・cが正しい。bは2L/4時間、dは心腎不全例で不適、eは1種類で確定可能のため誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=200","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=332"},{"no":5,"stem":"PAにおける副腎静脈サンプリング（AVS）の適応・判定について正しいのはどれか。1つ選べ。","choices":{"a":"全てのPA確定例にAVSを実施する","b":"手術希望のない高齢者にも積極的に施行する","c":"ACTH負荷下AVSで両側のコルチゾール上昇＞5倍以上（選択指数）で採取成功と判定する","d":"AVSは1mm未満のCT検出限界以下の腺腫の局在を診断できない","e":"両側性PAでも片側副腎摘出術が標準治療である"},"format":"単一","correct":"c","explanation":"JSH2025 第15章とPA-JSC2021によると、AVSは「手術希望があり全身状態的に副腎摘出術可能なPA患者」が適応で、全例実施ではない（aは誤り）。高齢者・手術希望なしには不要（b誤り）。判定はACTH負荷下に両副腎静脈と末梢静脈のコルチゾール濃度を測定し、コルチゾールが末梢の5倍以上（選択指数SI≧5）で採取成功と判定。コルチゾール補正アルドステロン比（LI）≧4で片側性、≦2で両側性と判定される（cが正解）。AVSはCT非検出腺腫も局在診断可能（d誤り）、両側性は手術不適でMR拮抗薬治療が原則（e誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=202","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=333"},{"no":6,"stem":"CQ18『片側性PAに対する副腎摘出術はMR拮抗薬治療と比べ推奨されるか』のJSH2025の推奨はどれか。1つ選べ。","choices":{"a":"副腎摘出術を弱く推奨する（エビデンス：低）","b":"MR拮抗薬治療を強く推奨する","c":"両者の優劣はないため推奨度なし","d":"AVSなしでの副腎摘出術を推奨する","e":"副腎摘出術は禁忌とする"},"format":"単一","correct":"a","explanation":"JSH2025 第15章 CQ18では、片側性PAに対しては副腎摘出術がMR拮抗薬治療と比較して血圧改善・降圧薬数減少・低K血症の是正・心血管イベント抑制・QOL改善で優れる観察研究・コホート研究が複数あり、『副腎摘出術を弱く推奨する（エビデンスレベル：低、推奨度：弱）』とされている。RCTは未施行のためエビデンスレベルは低いが、片側性であればAVS確認下で副腎摘出術を推奨。両側性PAではMR拮抗薬治療が原則。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=204","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=334"},{"no":7,"stem":"両側性PAおよび手術非適応PAに対する薬物療法について正しいのはどれか。1つ選べ。","choices":{"a":"ACE阻害薬・ARBが第一選択である","b":"MR拮抗薬（スピロノラクトン・エプレレノン・エサキセレノン）が第一選択である","c":"Ca拮抗薬単剤治療で十分である","d":"サイアザイド系利尿薬を高用量で使用する","e":"副腎摘出術が両側性でも推奨される"},"format":"単一","correct":"b","explanation":"JSH2025 第15章では、両側性PA・手術非適応PA・術前管理にはMR拮抗薬が第一選択。スピロノラクトン（25-100mg/日、女性化乳房・月経異常などのprogesterone/androgen受容体作用の副作用に注意）、エプレレノン（50-100mg/日、選択的MR拮抗薬、ただしCCr<50で禁忌のような注意点あり）、エサキセレノン（2.5-5mg/日、非ステロイド型MR拮抗薬、糖尿病性腎症で使用可能だがK上昇に注意）が選択肢。降圧不十分例ではCa拮抗薬・利尿薬の追加併用も行う。bが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=204","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=334"},{"no":8,"stem":"クッシング症候群のスクリーニング検査について正しいのはどれか。1つ選べ。","choices":{"a":"早朝血清コルチゾールが第一選択スクリーニングである","b":"1mgデキサメサゾン抑制試験（DST）後の血清コルチゾール≧1.8μg/dLで陽性と判定する","c":"24時間尿中遊離コルチゾールは判定不能である","d":"深夜唾液コルチゾールは検査として不適切である","e":"ACTH測定のみで診断確定する"},"format":"単一","correct":"b","explanation":"JSH2025 第15章とクッシング症候群診療GLによると、クッシング症候群のスクリーニングは①1mgデキサメサゾン抑制試験（DST、夜23時に1mg内服→翌朝8時の血清コルチゾール≧1.8μg/dLで陽性）、②深夜唾液コルチゾール、③24時間尿中遊離コルチゾールの3種類のうち2種類以上の異常で疑診とする。早朝コルチゾール単独はストレス・日内変動の影響を受けるため不適。確定にはCRH試験・デキサメサゾン-CRH試験など追加検査が必要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=205","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=335"},{"no":9,"stem":"サブクリニカルクッシング症候群（自律性コルチゾール分泌）の特徴で正しいのはどれか。1つ選べ。","choices":{"a":"中心性肥満・満月様顔貌・皮膚線条などのCushing徴候が明らかである","b":"副腎偶発腫瘍患者の約5～10%に認められる","c":"心血管イベントリスクは正常者と同等である","d":"1mgDST抑制良好でも診断可能である","e":"手術介入は無効である"},"format":"単一","correct":"b","explanation":"JSH2025 第15章では、サブクリニカルクッシング症候群（顕在化していない自律性コルチゾール分泌、ACS）は副腎偶発腫瘍の約5-10%に認められ、Cushing徴候は乏しいが高血圧・糖尿病・骨粗鬆症・脂質異常・心血管イベントリスクが増加する。1mgDSTで抑制不良（≧1.8μg/dL）が必須所見。臨床所見が乏しくても症例によっては副腎摘出術が有効。bが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=205","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=335"},{"no":10,"stem":"褐色細胞腫・パラガングリオーマ（PPGL）のスクリーニング検査として最も推奨されるのはどれか。1つ選べ。","choices":{"a":"血漿・随時尿中メタネフリン分画（メタネフリン・ノルメタネフリン）","b":"尿中VMA測定（単独）","c":"血漿カテコールアミン分画（単独）","d":"MIBGシンチグラフィを第一選択とする","e":"副腎CTを第一選択とする"},"format":"単一","correct":"a","explanation":"JSH2025 第15章とPPGL診療GLによると、PPGLのスクリーニングは『血漿遊離メタネフリン分画』または『24時間蓄尿または随時尿中メタネフリン分画（メタネフリン・ノルメタネフリン）』が第一選択で、感度95%以上と最も優れる。尿中VMAは感度・特異度ともに劣り単独では不十分。血漿カテコールアミンは半減期短く変動大で不安定。確定診断後にMIBGシンチ・腹部造影CT/MRIで局在診断。aが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=206","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=336"},{"no":11,"stem":"PPGLの周術期管理について正しいのはどれか。1つ選べ。","choices":{"a":"β遮断薬を単独で先行投与する","b":"ACE阻害薬を術前2週間以上前から投与する","c":"α遮断薬（ドキサゾシン・フェノキシベンザミン）を術前2～4週間先行投与し、頻脈を伴えばその後β遮断薬を追加する","d":"Ca拮抗薬を単独で十分にコントロールできる","e":"MR拮抗薬を術前必須に投与する"},"format":"単一","correct":"c","explanation":"JSH2025 第15章 第16章とPPGL診療GLによると、PPGLの周術期管理ではα遮断薬（フェノキシベンザミン10-80mg/日またはドキサゾシン2-16mg/日）を術前2-4週間先行投与し圧利尿による体液量減少を補正。頻脈が残存する場合は十分なα遮断後にβ遮断薬を追加する。β遮断薬単独投与はα受容体刺激優位による血管収縮増悪・高血圧クリーゼを誘発するため禁忌（a誤り）。術中はニカルジピン・ニトロプルシド・フェントラミン持続静注で血圧管理。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=206","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=336"},{"no":12,"stem":"腎血管性高血圧の診断について正しいのはどれか。1つ選べ。","choices":{"a":"腎エコー・ドプラ・MRA・CTAいずれも感度・特異度80%以上で診断補助に有用","b":"RA系阻害薬で腎機能が改善した場合に強く疑う","c":"腎サイズの左右差は本症を示唆しない","d":"腹部血管雑音は若年女性のFMDでは聴取されない","e":"確定診断には腎生検が必須である"},"format":"単一","correct":"a","explanation":"JSH2025 第15章 表15-1と腎血管性高血圧の項目によると、腎血管性高血圧（動脈硬化性RAS・線維筋性異形成FMD）の診断ではドプラ法、MRA、CTAが感度・特異度ともに80-90%以上で第一選択の非侵襲検査。確定診断は腎動脈造影（DSA）。本症を示唆する所見：①RA系阻害薬投与後の急激な腎機能悪化（両側性・単腎・血流依存）、②腎サイズの左右差（>1.5cm）、③腹部血管雑音（FMDの若年女性で典型的）、④突然発症・治療抵抗性・若年高血圧。aが正解、bは『悪化』が正しい。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=207","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=337"},{"no":13,"stem":"CQ19『腎動脈狭窄症に対する経皮的腎動脈形成術（PTRA）併用療法は推奨されるか』のJSH2025の推奨はどれか。1つ選べ。","choices":{"a":"全ての腎動脈狭窄症にPTRAを強く推奨する","b":"動脈硬化性RASでは降圧薬治療単独と比較してPTRA併用の上乗せ効果は明らかでなく、ルーチンには推奨しない","c":"FMDによる若年女性のRASにはPTRA禁忌である","d":"急速進行性腎不全合併例・治療抵抗性高血圧合併例にもPTRAは無効","e":"PTRA併用は脳心血管病発症リスクを増加させる"},"format":"単一","correct":"b","explanation":"JSH2025 第15章 CQ19では、動脈硬化性腎動脈狭窄症（AS-RAS）に対するPTRA併用は降圧薬治療単独と比較した複数のRCT（ASTRAL、CORAL、STAR）で血圧・腎機能・心血管イベントとも有意差なしと報告されており、ルーチンでの推奨はされない。ただし①コントロール困難な治療抵抗性高血圧、②急速進行性腎不全、③flash pulmonary edemaなど特定の状況では考慮される。FMDによる若年女性RASはPTRAが第一選択で良好な治療効果を示す（cは誤り、bが正解）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=208","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=337"},{"no":14,"stem":"薬剤誘発性高血圧の主要原因薬剤と機序の組み合わせで正しいものを2つ選べ。","choices":{"a":"NSAIDs：プロスタグランジン産生抑制→腎Na再吸収増加・血管拡張作用減弱","b":"甘草（カンゾウ・グリチルリチン）：偽性アルドステロン症（11β-HSD2阻害→コルチゾールのMR活性化）","c":"シクロスポリン：β受容体直接刺激による末梢血管収縮","d":"エリスロポエチン製剤（ESA）：レニン分泌亢進が主機序","e":"経口避妊薬：直接β遮断作用による末梢血管収縮"},"format":"複数","correct":"ab","explanation":"JSH2025 第15章 表15-5 薬剤誘発性高血圧によると、a：NSAIDsはCOX阻害→PGE2/PGI2産生抑制→腎Na貯留・血管拡張作用減弱で血圧上昇（正）、b：甘草（グリチルリチン）は11β-HSD2阻害でコルチゾールのMR活性化→偽性アルドステロン症（低K血症・代謝性アルカローシス・高血圧）（正）。c：シクロスポリン・タクロリムスは交感神経活性化・血管内皮NO低下・腎血管収縮・MR活性化が機序（β刺激でなく誤り）、d：ESAは血液粘性上昇・血管内皮NO低下・血管再構築（レニンでなく誤り）、e：経口避妊薬はエストロゲンによるレニン-アンジオテンシノーゲン産生亢進・血管反応性増強が機序。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=210","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=338"},{"no":15,"stem":"VEGF阻害薬（ベバシズマブ・スニチニブ・ソラフェニブ等）関連高血圧の主要機序として最も適切なのはどれか。1つ選べ。","choices":{"a":"Na貯留","b":"VEGF阻害→血管内皮NO産生低下・PGI2低下・末梢血管抵抗増加・腎細小血管床減少","c":"末梢α受容体刺激","d":"RAA系活性化が主体","e":"ACE活性亢進"},"format":"単一","correct":"b","explanation":"JSH2025 第15章 p.210によると、VEGF阻害薬（抗VEGF抗体ベバシズマブ、チロシンキナーゼ阻害薬スニチニブ・ソラフェニブ・パゾパニブ等）関連高血圧の主要機序は『VEGF阻害による血管内皮NO・PGI2産生低下、細小血管床の希薄化（capillary rarefaction）、腎機能障害』であり、特にNO産生低下が中心機序。治療は通常の降圧薬（Ca拮抗薬・ACE/ARB等）で対応するが、抗腫瘍効果との両立を図る。Onco-Hypertension領域で重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=210","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=338"},{"no":16,"stem":"甘草（グリチルリチン）による偽性アルドステロン症の特徴的所見はどれか。1つ選べ。","choices":{"a":"高K血症・代謝性アシドーシス・血漿アルドステロン上昇","b":"低K血症・代謝性アルカローシス・血漿アルドステロン低下・血漿レニン活性低下","c":"高Na血症のみで電解質異常を伴わない","d":"血漿レニン活性上昇とアルドステロン上昇","e":"血漿コルチゾール著明高値"},"format":"単一","correct":"b","explanation":"JSH2025 第15章とステップアップによると、甘草（グリチルリチン酸）による偽性アルドステロン症は、グリチルレチン酸が腎11β-HSD2を阻害し、コルチゾールがMR（鉱質コルチコイド受容体）を活性化することで発症。所見は低K血症・代謝性アルカローシス・高血圧の三徴と、血漿アルドステロンと血漿レニン活性がともに低下する（mineralocorticoid過剰の自己抑制）。漢方薬（芍薬甘草湯・小柴胡湯等）に含まれる甘草が原因で、高齢者・服薬量多に注意。中止と低K補正で改善。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=210","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=339"},{"no":17,"stem":"遺伝性（単一遺伝子性）高血圧の代表疾患と機序の組み合わせで誤っているのはどれか。1つ選べ。","choices":{"a":"Liddle症候群：上皮性Naチャネル（ENaC）活性化変異→Na貯留・低K血症","b":"グルココルチコイド奏功性アルドステロン症（GRA, FH-I）：CYP11B1/B2キメラ遺伝子→ACTH依存性アルドステロン産生","c":"見かけのミネラルコルチコイド過剰症（AME）：11β-HSD2欠損→コルチゾールがMR活性化","d":"Gordon症候群（PHA II）：WNK1/4遺伝子変異→Cl依存性Na再吸収亢進","e":"Bartter症候群：高血圧・低K血症を呈する遺伝性高血圧症候群"},"format":"単一","correct":"e","explanation":"JSH2025 第15章 遺伝性高血圧の項によると、a-dは全て正しい単一遺伝子性高血圧。eのBartter症候群は遠位尿細管の塩類輸送異常（NKCC2・ROMK・ClC-Kb・Barttin等の変異）で『血圧は正常または低値・低K血症・代謝性アルカローシス・高レニン・高アルドステロン血症』を呈する低/正常血圧の疾患であり、高血圧症候群ではない。Gitelman症候群（NCCT変異）も同様に低/正常血圧。一方Liddle・GRA・AME・Gordonは『低レニン性高血圧』の代表疾患。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=215","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=341"},{"no":18,"stem":"睡眠時無呼吸症候群（SAS）合併高血圧の特徴で正しいものを2つ選べ。","choices":{"a":"夜間血圧上昇（non-dipper/riser型）が特徴的","b":"治療抵抗性高血圧の頻度が高い","c":"CPAP治療は血圧に影響しない","d":"高血圧の二次性原因として除外不要である","e":"PA合併は稀である"},"format":"複数","correct":"ab","explanation":"JSH2025 第15章および第10章 SAS関連項目によると、中等症～重症SAS合併高血圧の特徴は①夜間血圧上昇（non-dipper/riser型）・morning surge増強、②治療抵抗性高血圧で約30-50%にSAS合併、③CPAP療法で平均2-3mmHgの降圧効果（特にOSA治療効果が高い場合）、④PAとの合併が報告（SASがPAスクリーニング推奨対象）。a・bが正解。c誤り（CPAPで降圧）、d誤り（二次性除外必要）、e誤り（PA合併多い）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=216","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=341"},{"no":19,"stem":"大動脈縮窄症による二次性高血圧の特徴で正しいのはどれか。1つ選べ。","choices":{"a":"上肢血圧高値・下肢血圧低値、上下肢血圧較差・大腿動脈拍動の減弱・遅延","b":"下肢血圧高値・上肢血圧低値が典型的","c":"胸部X線で側副血行による肋骨切痕（rib notching）は認めない","d":"治療は薬物療法のみで十分","e":"高齢発症が大部分を占める"},"format":"単一","correct":"a","explanation":"JSH2025 第15章 血管性高血圧の項によると、大動脈縮窄症（CoA）は若年高血圧の重要な原因疾患。①上肢血圧高値（縮窄部位より中枢）、下肢血圧低値、ankle-brachial index低下、②大腿動脈拍動の減弱・橈骨-大腿動脈拍動の遅延（radio-femoral delay）、③胸部X線で側副血行による肋骨下縁切痕（rib notching、Rösler徴候）、心拡大、④心エコー・MRI/CTで診断確定。治療はステント留置術または外科手術（縮窄部切除・人工血管置換）が根治療法。aが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=212","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=340"},{"no":20,"stem":"二次性高血圧を疑う臨床所見の組み合わせで、JSH2025 表15-1に記載されている所見はどれか。1つ選べ。","choices":{"a":"年齢不相応の骨密度減少・圧迫骨折（クッシング症候群）、蛋白尿・血尿（腎実質性高血圧）、腎サイズの左右差（腎血管性高血圧）、RA系阻害薬投与後の急激な腎機能悪化（両側性RAS）","b":"白衣現象・夜間血圧上昇のみ","c":"BMI 20未満の若年女性のみが対象","d":"全例で二次性高血圧の精査は不要","e":"高齢発症のみが二次性高血圧の所見"},"format":"単一","correct":"a","explanation":"JSH2025 第15章 表15-1（二次性高血圧の原因疾患と示唆する所見）によると、aの所見全てが二次性高血圧を強く示唆する所見である。①若年（40歳未満）発症、②急激な発症、③治療抵抗性、④著明な高血圧（180/110以上）、⑤未治療時の臓器障害、⑥低K血症、⑦圧迫骨折・骨粗鬆症、⑧蛋白尿・血尿、⑨腎サイズ左右差、⑩RA系阻害薬での急激な腎機能悪化、⑪発作性高血圧・動悸・頭痛、⑫腹部血管雑音などが代表的トリガー所見。これらの組み合わせで二次性高血圧の精査を進める。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=199","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=331"}]},{"day":2,"questions":[{"no":1,"stem":"PAの病態生理について正しいのはどれか。1つ選べ。","choices":{"a":"副腎皮質球状帯からのアルドステロン自律的過剰分泌により低レニン性高血圧を呈する","b":"副腎髄質からのカテコールアミン過剰分泌が主病態である","c":"腎臓からのレニン分泌亢進が主病態である","d":"下垂体からのACTH過剰分泌が原因である","e":"甲状腺ホルモン過剰分泌による二次性高血圧である"},"format":"単一","correct":"a","explanation":"JSH2025 第15章とPA診療GLによると、PAは副腎皮質『球状帯』からのアルドステロン自律的過剰分泌（RAS系の制御を脱した）が病態。これによりMR活性化→腎遠位尿細管・集合管でNa再吸収・K排泄・H+排泄促進→Na・体液貯留・低K血症・代謝性アルカローシス・血圧上昇を来す。フィードバックで血漿レニン活性は低下するため『低レニン性高血圧』を呈する。aが正解。bは褐色細胞腫、cは腎血管性、dはCushing病、eは甲状腺機能亢進症の機序。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=200","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=331"},{"no":2,"stem":"PAのスクリーニング採血時に降圧薬の影響を最小化するため、ARRに影響の少ない降圧薬として継続使用可能なのはどれか。1つ選べ。","choices":{"a":"MR拮抗薬・利尿薬","b":"ACE阻害薬・ARB","c":"Ca拮抗薬・α遮断薬","d":"β遮断薬","e":"中枢性交感神経抑制薬（クロニジン）"},"format":"単一","correct":"c","explanation":"JSH2025 第15章とPA診療GLによると、PAスクリーニング時の降圧薬影響として：①MR拮抗薬・利尿薬→偽陰性（レニン上昇でARR低下、4-6週中止）、②ACE阻害薬・ARB→偽陰性（レニン上昇、2週中止）、③β遮断薬・中枢性降圧薬→偽陽性（レニン抑制でARR上昇、2週中止）。一方④Ca拮抗薬・α遮断薬（ドキサゾシン）はARRへの影響が少なく継続使用可能。降圧コントロールが必要な場合はこれらに置換してから採血する。cが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=200","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=332"},{"no":3,"stem":"PAにおいて機能確認検査を省略してPA確定診断可能と判断される条件として、JSH2025/PA-JSC2021で挙げられているのはどれか。1つ選べ。","choices":{"a":"ARR≧100のみ","b":"低カリウム血症（K<3.5 mEq/L）＋PAC≧100 pg/mL＋PRA検出限界以下（<0.2 ng/mL/時）の全てを満たす","c":"CT上副腎腺腫が存在するのみ","d":"血圧150/100mmHg以上のみ","e":"血漿レニン活性正常範囲"},"format":"単一","correct":"b","explanation":"JSH2025 第15章とPA診療GL2021によると、PAスクリーニングでARR陽性の上、①自発性低K血症（K<3.5 mEq/L、Kサプリ・利尿薬なしで）、②PAC基礎値≧100 pg/mL、③PRA<0.2 ng/mL/時（検出限界以下）、の全てを満たす場合は機能確認検査を省略してPA確定としうる（JPAS/JRAS基準）。これは典型的に病勢の強いAPA（アルドステロン産生腺腫）症例に該当する。bが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=201","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=332"},{"no":4,"stem":"PA確定後の副腎局在診断について正しいものを2つ選べ。","choices":{"a":"thin slice造影ダイナミックMDCTを第一選択で施行","b":"副腎CT単独で片側性・両側性の鑑別と治療方針決定が可能","c":"AVSは手術希望のあるPA確定例に施行する","d":"若年（35歳未満）でCT上明瞭な片側副腎腺腫・対側正常であれば、AVSなしで副腎摘出術を考慮できる","e":"副腎シンチグラフィ（131I-アドステロール）はAVSと同等の局在診断能を持つ"},"format":"複数","correct":"cd","explanation":"JSH2025 第15章とPA診療GLによると、PA確定後はthin slice造影ダイナミックMDCTで副腎腫瘤の評価を行うが（a正だが第一選択は厳密にはCT/MRI）、CT単独で片側性/両側性を判断するのは困難で、CTで明瞭な腺腫がない両側性病変や微小腺腫を見落とすため、手術希望例ではAVSが標準（b誤り）。AVSは『手術希望ある手術可能例』に施行（c正）。若年（35歳未満）で典型的なCT像（片側≧1cm腺腫＋対側正常）かつ自発性低K血症ありの場合はAVSなしで副腎摘出を考慮可能（d正）。アドステロールシンチはAVSより局在診断能は劣る（e誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=202","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=333"},{"no":5,"stem":"CQ18のPA治療（副腎摘出術vs MR拮抗薬）に関する記述で誤っているのはどれか。1つ選べ。","choices":{"a":"片側性PAでは副腎摘出術がMR拮抗薬と比較して血圧改善・降圧薬数減少で優る","b":"副腎摘出術後の高血圧治癒率は約30-60%程度","c":"副腎摘出術後の心血管イベント抑制効果が報告されている","d":"両側性PAに対しても副腎摘出術が第一選択である","e":"副腎摘出術はQOLが改善するという観察研究がある"},"format":"単一","correct":"d","explanation":"JSH2025 第15章 CQ18によると、a・b・c・eはいずれも正しい（片側性PAで副腎摘出術が優れる根拠となる観察研究・コホート研究の知見）。一方、両側性PAは副腎全摘の侵襲が大きく、両側摘出はAddison病をきたす不適応であり、両側性PAの第一選択はMR拮抗薬治療である（d誤り）。AVSで両側性と確定した場合はMR拮抗薬（スピロノラクトン・エプレレノン・エサキセレノン）を中心とした薬物療法を行う。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=204","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=334"},{"no":6,"stem":"PA手術後の管理について正しいのはどれか。1つ選べ。","choices":{"a":"術後は対側副腎のアルドステロン分泌能が即座に回復するため、特別な管理は不要","b":"術後は一時的に低アルドステロン状態・高K血症を来しうるため、塩分摂取と血清K・Na・Cr経過観察が必要","c":"術後は永続的にステロイド補充が必要","d":"術後は降圧薬を完全中止できる例が90%以上である","e":"術後の血圧低下効果は3か月以内で消失する"},"format":"単一","correct":"b","explanation":"JSH2025 第15章によると、PA副腎摘出術後は長期に抑制されていた対側副腎のアルドステロン分泌能の回復が遅延し、一時的に低アルドステロン症（高K血症・低Na血症・代謝性アシドーシス）を来しうる。術後は塩分摂取を制限せず、血清K・Na・Cr・血圧を定期的にフォロー。降圧効果は段階的に出現し、術後3-6か月で評価。完全治癒率（降圧薬中止）は30-60%、改善率は80%以上だが、全例完全治癒ではない（d誤り）。eも誤り（持続的効果）。bが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=204","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=335"},{"no":7,"stem":"クッシング症候群の病型分類で正しいのはどれか。1つ選べ。","choices":{"a":"ACTH依存性（Cushing病：下垂体腺腫、異所性ACTH産生腫瘍）とACTH非依存性（副腎腺腫・副腎癌・PPNAD・PMAH）に分類される","b":"全てACTH依存性である","c":"全て副腎原発である","d":"Cushing病とは副腎腺腫を指す","e":"サブクリニカルクッシング症候群はACTH依存性のみである"},"format":"単一","correct":"a","explanation":"JSH2025 第15章とCushing症候群診療GLによると、Cushing症候群は①ACTH依存性（中枢性Cushing病70-80%＝下垂体ACTH産生腺腫、異所性ACTH産生腫瘍10-15%＝小細胞肺癌・カルチノイド等）と②ACTH非依存性（副腎皮質腺腫10-20%、副腎皮質癌、原発性色素性結節性副腎皮質異形成PPNAD、原発性両側大結節性副腎過形成PMAH）に分類される。aが正解。Cushing病は下垂体ACTH産生腺腫を指す。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=205","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=335"},{"no":8,"stem":"クッシング症候群（顕在型）の典型的身体所見・検査所見で正しいものを2つ選べ。","choices":{"a":"中心性肥満・満月様顔貌・buffalo hump・赤紫色皮膚線条・近位筋萎縮・易出血・骨粗鬆症","b":"低血糖・低血圧・低Na血症","c":"高血糖（耐糖能異常）・脂質異常症・低K血症・代謝性アルカローシス","d":"貧血・甲状腺機能低下症","e":"高Ca血症・腎結石"},"format":"複数","correct":"ac","explanation":"JSH2025 第15章とCushing症候群診療GLによると、Cushing症候群（顕在型）の典型所見はa：中心性肥満・満月様顔貌・buffalo hump（背部脂肪沈着）・赤紫色皮膚線条・近位筋萎縮・薄い皮膚・易出血斑・骨粗鬆症・うつ症状、c：高血糖（耐糖能異常・糖尿病）・脂質異常症・低K血症・代謝性アルカローシス（コルチゾール過剰によるMR活性化）・高血圧・易感染性。bは反対所見、d・eは関連性低い。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=205","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=335"},{"no":9,"stem":"褐色細胞腫の臨床像で典型的とされる『5つのH（5H）』に含まれないのはどれか。1つ選べ。","choices":{"a":"Hypertension（高血圧）","b":"Headache（頭痛）","c":"Hyperhidrosis（発汗）","d":"Heart palpitations（動悸）","e":"Hypocalcemia（低Ca血症）"},"format":"単一","correct":"e","explanation":"JSH2025 第15章とPPGL診療GLによると、褐色細胞腫の古典的『5つのH（5H）』はHypertension（高血圧）・Headache（頭痛）・Hyperhidrosis（発汗）・Heart palpitations（動悸）・Hyperglycemia（高血糖）の5つ。低Ca血症は含まれない（eが該当）。他に体重減少・蒼白・不安・起立性低血圧（圧利尿で循環血漿量減少のため）・発作性高血圧（パラガングリオーマ）・治療抵抗性高血圧が特徴。3H（頭痛・発汗・動悸）で本症を疑う。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=206","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=336"},{"no":10,"stem":"PPGLの局在診断について正しいのはどれか。1つ選べ。","choices":{"a":"腹部単純CTのみで十分である","b":"腹部造影CT/MRIで局在診断し、転移検索・多発性検索に131I-MIBGシンチグラフィを併用する","c":"PETは無効である","d":"副腎外（パラガングリオーマ）は腹部のみに発生する","e":"遺伝子検査は不要である"},"format":"単一","correct":"b","explanation":"JSH2025 第15章とPPGL診療GLによると、PPGL局在診断は①腹部造影CT/MRIで副腎腫瘤の有無を評価、②131I-MIBGシンチグラフィで全身の機能的腫瘍検索（特異度高）・多発性・転移検索、③転移性・悪性疑いには18F-FDG-PETや68Ga-DOTATATE-PETを使用。パラガングリオーマは交感神経節由来（腹部大動脈周囲・膀胱・縦隔）、副交感神経節由来（頸動脈小体・glomus tumor＝頭頸部）と多発生部位あり。約30-40%でSDHB/D/A、RET、VHL、NF1等の生殖細胞系列変異があり遺伝子検査推奨。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=206","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=336"},{"no":11,"stem":"腎血管性高血圧の原因疾患について正しいものを2つ選べ。","choices":{"a":"動脈硬化性腎動脈狭窄症（AS-RAS）：高齢者・喫煙・脂質異常・糖尿病合併、近位部狭窄が主体","b":"線維筋性異形成（FMD）：若年女性に多く、遠位部・分枝部のstring-of-beads像が特徴","c":"FMDは高齢男性に好発する","d":"AS-RASは小児・若年女性が主な対象である","e":"両疾患とも腎動脈分枝部に限局して発生する"},"format":"複数","correct":"ab","explanation":"JSH2025 第15章 腎血管性高血圧の項によると、腎血管性高血圧の2大原因疾患は①AS-RAS（動脈硬化性、高齢者・男性・喫煙・脂質異常・糖尿病・末梢動脈疾患合併が背景、腎動脈起始部・近位部狭窄が主、80-90%）、②FMD（線維筋性異形成、若年-中年女性に多く、腎動脈中部以遠・分枝部のstring-of-beads像が特徴、10-20%）。aとbが正解、c・d・eは逆または誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=207","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=337"},{"no":12,"stem":"腎血管性高血圧における薬物療法について正しいのはどれか。1つ選べ。","choices":{"a":"両側性RAS・単腎RASでもACE阻害薬・ARBは禁忌ではなく安全に使用できる","b":"片側性RASではACE阻害薬・ARBが第一選択で、慎重に投与可能（腎機能・Kを厳重にモニタ）","c":"Ca拮抗薬は禁忌である","d":"MR拮抗薬が第一選択である","e":"β遮断薬は使用不可"},"format":"単一","correct":"b","explanation":"JSH2025 第15章によると、腎血管性高血圧での降圧薬選択は：①片側性RAS（対側腎機能正常）→ACE阻害薬・ARBは降圧効果高く第一選択候補。ただし投与開始後に腎機能・K・血圧を厳重にモニタし、急激な腎機能悪化（Cr 30%上昇）・高K血症・低血圧があれば減量・中止。②両側性RASまたは単腎RAS→ACE阻害薬・ARBは輸出細動脈収縮による糸球体濾過圧維持機構を阻害し、急性腎不全をきたすリスクから原則禁忌（または極めて慎重に）。Ca拮抗薬・β遮断薬・α遮断薬・利尿薬は使用可能。bが正解（a誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=207","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=337"},{"no":13,"stem":"CQ19に関連する記述で正しいのはどれか。1つ選べ。","choices":{"a":"ASTRAL・CORAL・STAR試験は動脈硬化性RASに対するPTRA+薬物療法 vs 薬物療法単独で『有意な差なし』を示した","b":"全RAS患者にPTRAを行えば心血管イベントは半減する","c":"FMDの若年女性RASにもPTRAは推奨されない","d":"PTRAは降圧薬治療より腎機能保護効果が常に優れる","e":"Flash pulmonary edema合併例にPTRAは禁忌"},"format":"単一","correct":"a","explanation":"JSH2025 第15章 CQ19によると、動脈硬化性RAS（AS-RAS）に対するPTRA併用療法を検討した代表的RCT（ASTRAL、CORAL、STAR）はいずれも『PTRA+薬物療法 vs 薬物療法単独』の比較で血圧・腎機能・心血管イベント・死亡率いずれも有意な差を示さなかった。このためAS-RASへのルーチンPTRAは推奨されない（aが正解）。ただし①治療抵抗性高血圧、②急速進行性腎不全、③flash pulmonary edema、④急性冠症候群を伴う場合は考慮される（e誤り）。FMDの若年女性RASはPTRAが第一選択で良好（c誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=208","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=337"},{"no":14,"stem":"NSAIDsによる血圧上昇の機序として誤っているのはどれか。1つ選べ。","choices":{"a":"腎髄質でのCOX2阻害によるPGE2/PGI2産生抑制","b":"腎血管拡張作用減弱・腎血流低下","c":"腎尿細管でのNa再吸収増加・体液貯留","d":"腎β受容体の直接刺激による血管収縮","e":"降圧薬（ACE/ARB・利尿薬）の降圧効果減弱"},"format":"単一","correct":"d","explanation":"JSH2025 第15章 薬剤誘発性高血圧の項によると、NSAIDs（非ステロイド性消炎鎮痛薬）による血圧上昇機序はCOX-1/2阻害→腎髄質PGE2/PGI2産生抑制→腎血管拡張作用減弱・腎血流低下→腎尿細管Na再吸収増加・体液貯留が中心。これによりACE阻害薬・ARB・利尿薬・β遮断薬の降圧効果を減弱させる（Ca拮抗薬への影響は少ない）。腎β受容体直接刺激は機序ではない（d誤り）。COX2選択的阻害薬も同様に注意。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=210","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=338"},{"no":15,"stem":"グルココルチコイド（GC）長期使用による高血圧の機序で正しいのはどれか。1つ選べ。","choices":{"a":"GR（グルココルチコイド受容体）刺激のみで血圧上昇","b":"GCのMR交差反応性→Na貯留、血管反応性増強（αアドレナリン感受性増強）、NO/PGI2低下、肥満・インスリン抵抗性","c":"腎血管拡張による血流増加","d":"副甲状腺ホルモン分泌抑制が主機序","e":"血管内皮NO産生増加"},"format":"単一","correct":"b","explanation":"JSH2025 第15章とCushing症候群関連項によると、グルココルチコイド長期投与による高血圧の機序は①11β-HSD2阻害以上のGCの高濃度ばく露によるMR（鉱質コルチコイド受容体）交差刺激→Na貯留・K排泄、②血管平滑筋のα-アドレナリン感受性増強（血管反応性増強）、③血管内皮NO・PGI2産生低下、④肥満・インスリン抵抗性誘発、⑤RAA系刺激（アンジオテンシノーゲン合成亢進）が複合的に作用。長期使用時は降圧薬併用とGC減量・MR拮抗薬を考慮。bが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=210","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=338"},{"no":16,"stem":"シクロスポリン・タクロリムスによる高血圧の機序で誤っているのはどれか。1つ選べ。","choices":{"a":"交感神経活性化","b":"血管内皮NO産生低下・エンドセリン上昇による血管収縮","c":"腎血管収縮による腎血流低下・GFR低下","d":"MR活性化・Na貯留","e":"β受容体遮断作用"},"format":"単一","correct":"e","explanation":"JSH2025 第15章 薬剤誘発性高血圧の項によると、カルシニューリン阻害薬（シクロスポリン・タクロリムス）による高血圧の機序は①交感神経活性化、②血管内皮NO産生低下・エンドセリン上昇による血管収縮、③腎入球・輸出細動脈収縮による腎血管収縮・腎血流低下・GFR低下、④MR活性化様作用によるNa貯留が複合的に作用。β受容体遮断作用はない（e誤り）。臓器移植後・自己免疫疾患・関節リウマチ等で広く使用されるため、本剤投与中の血圧モニタは重要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=210","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=339"},{"no":17,"stem":"本態性高血圧における遺伝因子の現代的知見について正しいのはどれか。1つ選べ。","choices":{"a":"両親ともに高血圧がある場合の発症リスクは一般集団の3倍程度","b":"GWASで同定された本態性高血圧関連遺伝子座位は50程度のみ","c":"個々の遺伝子多型1つの血圧への影響は数十mmHgに及ぶ","d":"高血圧の遺伝率は10%未満である","e":"人種差は存在しない"},"format":"単一","correct":"a","explanation":"JSH2025 第15章 遺伝性高血圧の項目によると、本態性高血圧は多因子遺伝（polygenic）疾患であり、①両親ともに高血圧がある場合の発症リスクは一般集団の約3倍、②GWAS（ゲノムワイド関連解析）で同定された血圧関連遺伝子座位は2024年時点で1000以上（『50程度』は古い知見で誤り、bは誤り）、③個々の多型の効果サイズは数mmHg程度と小さい（cは誤り）、④遺伝率は30-60%程度、⑤人種差あり（日本人で食塩感受性関連多型のリスクが高い等）。aが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=215","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=341"},{"no":18,"stem":"Liddle症候群の特徴で正しいものを2つ選べ。","choices":{"a":"ENaC（β/γサブユニット）の機能獲得型変異により集合管でのNa再吸収亢進・K排泄亢進","b":"若年発症・治療抵抗性高血圧・低K血症・代謝性アルカローシス・低レニン・低アルドステロン血症","c":"MR拮抗薬（スピロノラクトン）が第一選択治療","d":"ENaC阻害薬（トリアムテレン・アミロライド）が特異的治療","e":"常染色体劣性遺伝形式である"},"format":"複数","correct":"ab","explanation":"JSH2025 第15章 遺伝性高血圧によると、Liddle症候群はENaC（上皮性Naチャネル）β/γサブユニットの機能獲得型変異（常染色体『優性』遺伝）でNeddylation部位（PYモチーフ）が変異しチャネル分解低下→Na再吸収亢進・K排泄亢進。臨床像は若年発症・治療抵抗性高血圧・低K血症・代謝性アルカローシス・低レニン『かつ低アルドステロン』血症（鉱質コルチコイド受容体非依存性）。治療は『MR拮抗薬は無効』で、ENaC阻害薬（アミロライド・トリアムテレン）が特異的治療（dも正しい）。問題はaとbを選ばせる構成だが、c・eは誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=215","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=341"},{"no":19,"stem":"脳/中枢神経性高血圧（脳幹圧迫・神経血管圧迫症候群等）について正しいのはどれか。1つ選べ。","choices":{"a":"頭蓋内圧亢進（脳腫瘍・脳出血・髄膜炎等）ではCushing反射（高血圧・徐脈・呼吸異常）を呈する","b":"脳神経血管圧迫症候群（延髄腹外側部血管圧迫）は治療抵抗性高血圧の原因にはならない","c":"脳梗塞急性期では速やかな降圧が常に推奨される","d":"睡眠時無呼吸症候群（SAS）は脳/中枢神経性高血圧の原因にはならない","e":"起立性低血圧と高血圧の合併は稀である"},"format":"単一","correct":"a","explanation":"JSH2025 第15章 脳/中枢神経性高血圧によると、頭蓋内圧亢進（脳出血・脳腫瘍・髄膜炎・水頭症等）では『Cushing反射（または三徴）』として高血圧・徐脈・不規則呼吸を呈する（脳幹虚血を防ぐ生理反応）。aが正解。脳神経血管圧迫症候群（延髄腹外側部RVLMの血管圧迫）も難治性高血圧の二次性原因として知られ（b誤り）、脳梗塞急性期では過度の降圧が梗塞拡大を招くため通常は控えめな降圧（c誤り）、SAS・自律神経障害も中枢神経性高血圧の原因（d・e誤り）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=216","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=342"},{"no":20,"stem":"二次性高血圧の総合的鑑別アプローチについて正しいものを2つ選べ。","choices":{"a":"初診時の全例で詳細な病歴聴取・身体所見・基本検査（電解質・腎機能・尿検査・心電図・胸部X線・腹部エコー）を実施し、二次性疑い所見の有無をスクリーニングする","b":"PA・腎血管性・PPGL・Cushing・SAS・薬剤性・甲状腺機能異常など複数の二次性原因を体系的に除外する","c":"全例ARR・尿中メタネフリン・DST・腎動脈造影を施行する","d":"二次性高血圧の頻度は1%未満なので精査は不要","e":"若年発症のみが二次性精査の対象である"},"format":"複数","correct":"ab","explanation":"JSH2025 第15章および第5章（二次性高血圧の除外）によると、a：初診時の全例で病歴聴取（薬剤・既往・家族歴）・身体所見（BMI・腹部血管雑音・甲状腺・Cushing徴候）・基本検査（電解質・腎機能・尿一般・心電図・胸部X線・腹部エコー）を実施しトリガー所見（低K血症・蛋白尿/血尿・腎サイズ左右差・コントロール不良等）の有無をスクリーニング、b：トリガー所見ありの場合に体系的に複数の二次性原因（PA・腎血管性・PPGL・Cushing・SAS・薬剤性・甲状腺・大動脈縮窄・遺伝性等）を除外する戦略が原則。a・bが正解。c（全例の高度検査）は不要・コスト面で不適、d・eも誤り（二次性は約10-15%）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=199","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=331"},{"no":21,"stem":"原発性アルドステロン症に関する記述のうち、正しいのはどれか。1つ選べ。","choices":{"a":"原発性アルドステロン症の頻度は、全高血圧患者の3～5%と考えられる。","b":"典型的には、アルドステロン産生腺腫が特発性アルドステロン症と比べ高頻度にみられる。","c":"原発性アルドステロン症における血圧日内変動パターンはextreme dipper型が特徴である。","d":"原発性アルドステロン症は、脳心血管合併症の発症率が本態性高血圧より高い。","e":"原発性アルドステロン症は食塩感受性高血圧を呈するため、減塩は降圧に無効と考えられる。"},"format":"単一","correct":"d","explanation":"JSH2025 第15章「二次性高血圧」p.198によると、原発性アルドステロン症（PA）は『脳血管障害、冠動脈疾患、心房細動、心不全、末梢動脈疾患などの脳心血管合併症の発症率が本態性高血圧患者より2〜5倍高い』と明記されており、Dが正解。Aは誤り（PA有病率は3-5%ではなく5-10%）、Bは誤り（典型的にはIHA（特発性アルドステロン症）の方がAPAより高頻度との報告もある）、Cは誤り（PAではnon-dipper/riser型が特徴でextreme dipperではない）、Eは誤り（PAは食塩感受性高血圧だが減塩は降圧に有効）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=200","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=332","from_past_exam":true,"note":"解説（10.56.09同じ問題、10.56.45/10.56.47『二次性高血圧 原発性アルドステロン症』JSH2025）を経て、次スライド(10.56.58)でDが黄色ハイライト。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.55.59.png","confidence":"high","slide_section":"16 内分泌性高血圧"},{"no":22,"stem":"二次性高血圧を疑わせる臨床検査所見は次のうちどれか。1つ選べ。","choices":{"a":"年齢不相応の骨密度の減少・圧迫骨折","b":"蛋白尿・血尿","c":"腎サイズの左右差","d":"RA系阻害薬投与後の急激な腎機能悪化","e":"ABCD全て"},"format":"単一","correct":"e","explanation":"JSH2025 第15章 表15-1（二次性高血圧の原因疾患と示唆する所見）p.199によると、A『年齢不相応の骨密度減少・圧迫骨折』はクッシング症候群を、B『蛋白尿・血尿』は腎実質性高血圧を、C『腎サイズの左右差』は腎血管性高血圧を、D『RA系阻害薬投与後の急激な腎機能悪化』は両側性腎血管性高血圧を、それぞれ示唆する所見として記載されている。よってE『ABCD全て』が正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=201","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=332","from_past_exam":true,"note":"解説スライドは画像セット内に明示されていない。臨床的には全ての所見が二次性高血圧を示唆するためEと推定される。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.57.20.png","confidence":"high","slide_section":"17 腎性・腎血管性"},{"no":23,"stem":"本態性高血圧における遺伝因子に関する記述について誤っているものはどれか。1つ選べ。","choices":{"a":"高血圧を有する両親の1代一般集団における高血圧罹患率の3倍の発症リスクがある。","b":"ゲノムワイド関連解析（GWAS）により明らかとなった高血圧関連遺伝子座位は現在のところ50程度である。","c":"一つの高血圧関連遺伝子多型・変異の血圧への影響はmmHg程度である。","d":"遺伝素因の遺伝子変異・変異の前後、血圧への影響は人種差がある。","e":"日本人では食塩感受性遺伝子多型のリスクを有する者の人口比に占めて高いことが報告されている。"},"format":"単一","correct":"b","explanation":"JSH2025 第15章「遺伝性高血圧」の項によれば、GWASにより明らかになった本態性高血圧関連遺
