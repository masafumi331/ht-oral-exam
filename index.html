// ===== ユーティリティ =====
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s){
  return String(s||'').replace(/"/g, '&quot;');
}

// ===== 模試モード（Exam Mode） =====
const EXAM_HISTORY_KEY = 'ht-quiz-exam-history';
const EXAM_DURATION_SEC = 40 * 60; // 40分
const EXAM_QUESTION_COUNT = 40;

function loadExamHistory(){
  try{ return JSON.parse(localStorage.getItem(EXAM_HISTORY_KEY)) || []; }
  catch(e){ return []; }
}
function saveExamHistory(arr){
  localStorage.setItem(EXAM_HISTORY_KEY, JSON.stringify(arr));
}

// 模試用の状態
let examState = null;       // 進行中の模試: {questions, answers, marks, idx, startedAt, durationLeft}
let examTimer = null;       // setInterval ID

// 全640問プールを構築（{ch, day, q} のフラットリスト）
function buildAllQuestions(){
  const all = [];
  for(const ch of CHAPTERS){
    for(const s of ch.sets){
      for(const q of s.questions){
        all.push({ch, day:s.day, q});
      }
    }
  }
  return all;
}

// 章のバランスを取りつつ40問サンプリング
function sampleExamQuestions(n){
  const byCh = {};
  for(const ch of CHAPTERS){
    byCh[ch.id] = [];
    for(const s of ch.sets){
      for(const q of s.questions){
        byCh[ch.id].push({ch, day:s.day, q});
      }
    }
  }
  // 各章から1問ずつ取り、残りを総プールからランダムに
  const chIds = Object.keys(byCh).map(Number).sort((a,b)=>a-b);
  const picked = [];
  const usedKeys = new Set();
  // 各章をシャッフル
  for(const cid of chIds){
    byCh[cid].sort(()=>Math.random()-0.5);
  }
  // 第1パス: 各章から最低1問（16章ある→16問確保、残り24問）
  for(const cid of chIds){
    if(byCh[cid].length === 0) continue;
    const item = byCh[cid].shift();
    const key = `${item.ch.id}-${item.day}-${item.q.no}`;
    if(usedKeys.has(key)) continue;
    usedKeys.add(key);
    picked.push(item);
    if(picked.length >= n) break;
  }
  // 第2パス: 残りを全章ラウンドロビン的に
  let safety = 1000;
  while(picked.length < n && safety-- > 0){
    let advanced = false;
    for(const cid of chIds){
      if(picked.length >= n) break;
      if(byCh[cid].length === 0) continue;
      const item = byCh[cid].shift();
      const key = `${item.ch.id}-${item.day}-${item.q.no}`;
      if(usedKeys.has(key)) continue;
      usedKeys.add(key);
      picked.push(item);
      advanced = true;
    }
    if(!advanced) break;
  }
  // 出題順をシャッフル
  picked.sort(()=>Math.random()-0.5);
  return picked.slice(0, n);
}

// ===== 模試スタート画面 =====
function renderExamStart(){
  const history = loadExamHistory();
  const totalQ = countAll();
  let bestScore = 0;
  for(const h of history){
    if(h.score > bestScore) bestScore = h.score;
  }
  const histListHtml = history.length === 0
    ? '<p style="color:var(--muted); text-align:center">まだ受験履歴はありません</p>'
    : history.slice().reverse().slice(0,5).map(h=>{
        const dt = new Date(h.date);
        const dtStr = `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
        const pct = Math.round(h.score/h.total*100);
        const dur = h.duration_sec || 0;
        const mm = Math.floor(dur/60), ss = dur%60;
        return `<div class="h-row">
          <div class="date">${dtStr}</div>
          <div class="scr">${h.score}/${h.total}</div>
          <div class="pct">(${pct}%) ${mm}:${String(ss).padStart(2,'0')}</div>
        </div>`;
      }).join('');

  app.innerHTML = `
    <div class="card">
      <button class="btn sec" onclick="QuizM.state.screen='home'; QuizM.render()">← ホームに戻る</button>
      <h2 style="margin-top:14px">📝 模試モード</h2>
      <p style="font-size:18px; line-height:1.7">本番試験を模した形式の総合演習です。</p>
      <div style="background:var(--bg); padding:16px; border-radius:10px; margin:14px 0; line-height:1.85">
        <b>仕様</b><br>
        ・全${EXAM_QUESTION_COUNT}問（全${totalQ}問プールから章バランスを取りランダム出題）<br>
        ・制限時間 <b>${EXAM_DURATION_SEC/60}分</b>（タイムアップで自動提出）<br>
        ・即時判定なし。全問終了後に一括採点<br>
        ・問題間の移動・後で見直しマーク可<br>
        ・途中でホームに戻ると進行中の模試は破棄されます
      </div>
      <div class="warn-box">
        <b>注意</b>: 受験中はブラウザを閉じたり別タブに移動するとタイマーがズレる可能性があります。集中できる環境で開始してください。
      </div>
      <button class="btn big" onclick="QuizM.startExam()">模試を開始する</button>
    </div>
    <div class="card">
      <h3>受験履歴（最新5件）</h3>
      <div class="exam-history-list">${histListHtml}</div>
      ${history.length>0?`<p style="margin-top:14px; color:var(--muted); font-size:15px">最高スコア: <b style="color:var(--accent); font-size:18px">${bestScore}/${EXAM_QUESTION_COUNT}</b> (${Math.round(bestScore/EXAM_QUESTION_COUNT*100)}%) / 通算${history.length}回受験</p>`:''}
    </div>`;
}

function startExam(){
  const qs = sampleExamQuestions(EXAM_QUESTION_COUNT);
  if(qs.length < EXAM_QUESTION_COUNT){
    alert('問題数が不足しています');
    return;
  }
  examState = {
    questions: qs,
    answers: qs.map(()=>null),  // 単一: 'a' or null, 複数: ['a','c']
    marks: qs.map(()=>false),
    idx: 0,
    startedAt: Date.now(),
    durationLeft: EXAM_DURATION_SEC,
  };
  // タイマー開始
  if(examTimer){ clearInterval(examTimer); examTimer = null; }
  examTimer = setInterval(tickExamTimer, 1000);
  state.screen = 'exam-quiz';
  render();
}

function tickExamTimer(){
  if(!examState) return;
  examState.durationLeft--;
  if(examState.durationLeft <= 0){
    examState.durationLeft = 0;
    clearInterval(examTimer); examTimer = null;
    // 自動提出
    if(state.screen === 'exam-quiz'){
      alert('制限時間になりました。結果画面に移動します。');
      submitExam(true);
    }
    return;
  }
  // タイマー表示だけ部分更新（再描画を避ける）
  const t = document.getElementById('exam-time-val');
  if(t){
    const s = examState.durationLeft;
    const mm = Math.floor(s/60);
    const ss = s%60;
    t.textContent = `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    t.classList.remove('warn','urgent');
    if(s <= 60) t.classList.add('urgent');
    else if(s <= 300) t.classList.add('warn');
  }
}

function renderExamQuiz(){
  if(!examState){ state.screen='home'; render(); return; }
  const idx = examState.idx;
  const item = examState.questions[idx];
  const q = item.q;
  const ch = item.ch;
  const day = item.day;
  const total = examState.questions.length;
  const isMulti = q.correct.length > 1;

  // 時間表示
  const s = examState.durationLeft;
  const mm = Math.floor(s/60), ss = s%60;
  let timeCls = '';
  if(s <= 60) timeCls = 'urgent';
  else if(s <= 300) timeCls = 'warn';
  const timeStr = `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;

  // 進捗ドット
  const dotsHtml = examState.questions.map((_, i)=>{
    let cls = 'exam-dot';
    if(examState.answers[i] !== null && examState.answers[i] !== undefined){
      const a = examState.answers[i];
      if((Array.isArray(a) && a.length>0) || (typeof a === 'string' && a)) cls += ' answered';
    }
    if(examState.marks[i]) cls += ' marked';
    if(i === idx) cls += ' current';
    return `<button class="${cls}" onclick="QuizM.jumpExamQ(${i})" title="問${i+1}"></button>`;
  }).join('');

  // 選択肢
  const ans = examState.answers[idx];
  let choicesHtml = '';
  const keys = ['a','b','c','d','e'];
  for(const k of keys){
    const text = q.choices[k] || '';
    if(!text) continue;
    let cls = 'choice';
    const picked = isMulti
      ? (Array.isArray(ans) && ans.includes(k))
      : ans === k;
    if(picked) cls += ' picked';
    choicesHtml += `<button class="${cls}" onclick="QuizM.pickExamChoice('${k}')">
      <span class="key">${k.toUpperCase()})</span>
      <span>${escapeHtml(text)}</span>
    </button>`;
  }

  const isLast = idx + 1 >= total;
  const marked = examState.marks[idx];

  app.innerHTML = `
    <div class="exam-timer">
      <div><span style="font-size:14px; color:var(--muted)">残り時間</span>
        <span class="time-val ${timeCls}" id="exam-time-val">${timeStr}</span></div>
      <div class="qpos">問 <b>${idx+1}</b> / ${total}</div>
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:8px">
        <div style="font-size:14px; color:var(--muted)">模試モード - 全${total}問</div>
        <button class="btn sec" style="font-size:13px; padding:5px 12px; margin:0"
          onclick="if(confirm('模試を中止してホームに戻りますか？進行は破棄されます。')){QuizM.abortExam();}">中止</button>
      </div>
      <div class="exam-dots">${dotsHtml}</div>
      <div style="display:flex; align-items:center; flex-wrap:wrap; gap:4px; margin-top:8px">
        <span class="tag">問${idx+1}</span>
        ${isMulti?`<span class="multi-hint">複数選択 (${q.correct.length}つ)</span>`:''}
      </div>
      <div class="qtext">${escapeHtml(q.stem)}</div>
      <div class="choices">${choicesHtml}</div>
      <div class="exam-nav">
        <button class="btn sec" onclick="QuizM.prevExamQ()" ${idx===0?'disabled':''}>← 前へ</button>
        <button class="exam-mark-btn ${marked?'on':''}" onclick="QuizM.toggleExamMark()">
          ${marked?'☆ マーク済':'☆ マーク'}
        </button>
        ${isLast
          ? `<button class="btn warn" onclick="QuizM.confirmSubmitExam()">結果を見る</button>`
          : `<button class="btn" onclick="QuizM.nextExamQ()">次へ →</button>`}
      </div>
      <div style="text-align:center; margin-top:12px">
        <button class="btn sec" style="font-size:14px" onclick="QuizM.confirmSubmitExam()">提出する</button>
      </div>
    </div>`;
}

function pickExamChoice(k){
  if(!examState) return;
  const idx = examState.idx;
  const q = examState.questions[idx].q;
  const isMulti = q.correct.length > 1;
  if(isMulti){
    let arr = examState.answers[idx];
    if(!Array.isArray(arr)) arr = [];
    const i = arr.indexOf(k);
    if(i>=0) arr.splice(i,1);
    else arr.push(k);
    examState.answers[idx] = arr;
  } else {
    // 単一: 同じものを再タップで解除
    if(examState.answers[idx] === k) examState.answers[idx] = null;
    else examState.answers[idx] = k;
  }
  render();
}

function toggleExamMark(){
  if(!examState) return;
  examState.marks[examState.idx] = !examState.marks[examState.idx];
  render();
}

function prevExamQ(){
  if(!examState || examState.idx === 0) return;
  examState.idx--;
  render();
}
function nextExamQ(){
  if(!examState) return;
  if(examState.idx + 1 < examState.questions.length){
    examState.idx++;
    render();
  }
}
function jumpExamQ(i){
  if(!examState) return;
  if(i<0 || i>=examState.questions.length) return;
  examState.idx = i;
  render();
}

function confirmSubmitExam(){
  if(!examState) return;
  const unanswered = examState.answers.filter(a=>
    a===null || a===undefined || (Array.isArray(a) && a.length===0)
  ).length;
  let msg = '模試を提出します。\n';
  if(unanswered > 0) msg += `未回答が ${unanswered}問 あります。\n`;
  msg += '結果を確認しますか？';
  if(confirm(msg)) submitExam(false);
}

function abortExam(){
  if(examTimer){ clearInterval(examTimer); examTimer = null; }
  examState = null;
  state.screen='home'; render();
}

let lastExamResult = null;  // 結果画面用

function submitExam(timeUp){
  if(!examState) return;
  if(examTimer){ clearInterval(examTimer); examTimer = null; }

  const qs = examState.questions;
  const answers = examState.answers;
  let score = 0;
  const detail = [];      // 全問の詳細
  const wrongs = [];      // 誤答のみ
  const chBreakdown = {}; // {chId: {correct, total}}

  for(let i=0; i<qs.length; i++){
    const item = qs[i];
    const q = item.q;
    const ch = item.ch;
    let picked = answers[i];
    let pickedStr;
    if(Array.isArray(picked)){
      pickedStr = picked.slice().sort().join('');
    } else {
      pickedStr = picked || '';
    }
    const ok = pickedStr === q.correct;
    if(ok) score++;
    if(!chBreakdown[ch.id]) chBreakdown[ch.id] = {correct:0, total:0, title:ch.title};
    chBreakdown[ch.id].total++;
    if(ok) chBreakdown[ch.id].correct++;

    detail.push({
      idx: i,
      ch_id: ch.id,
      day: item.day,
      q_no: q.no,
      picked: pickedStr,
      correct: q.correct,
      ok,
      marked: examState.marks[i]
    });
    if(!ok){
      wrongs.push({
        idx: i,
        item,
        picked: pickedStr,
        marked: examState.marks[i]
      });
    }
  }

  const duration_sec = EXAM_DURATION_SEC - examState.durationLeft;
  const record = {
    date: new Date().toISOString(),
    score,
    total: qs.length,
    duration_sec,
    timeUp: !!timeUp,
    chapter_breakdown: chBreakdown,
    answers: detail.map(d=>({
      q_id: `ch${d.ch_id}-day${d.day}-q${d.q_no}`,
      selected: d.picked,
      correct: d.correct,
      marked: d.marked,
      ok: d.ok
    }))
  };
  // 履歴に保存
  const hist = loadExamHistory();
  hist.push(record);
  saveExamHistory(hist);

  // 結果画面用に保持
  lastExamResult = {
    record,
    wrongs,        // 詳細問題情報を含む（item を保持）
    qs,            // 全問題（解説確認用）
    chBreakdown
  };

  // examStateはまだ持ったまま（再受験時に再構築）
  examState = null;
  state.screen = 'exam-result';
  render();
}

function renderExamResult(){
  if(!lastExamResult){ state.screen='home'; render(); return; }
  const r = lastExamResult.record;
  const pct = Math.round(r.score/r.total*100);
  let cls = 'fail', verdict = '要復習（60%未満）';
  if(pct >= 70){ cls = 'pass'; verdict = '合格圏（70%以上）'; }
  else if(pct >= 60){ cls = 'border'; verdict = 'ボーダー（60-69%）'; }
  const mm = Math.floor(r.duration_sec/60);
  const ss = r.duration_sec%60;
  const dtStr = (()=>{
    const d = new Date(r.date);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  })();

  // 章別バー
  const chOrder = Object.keys(lastExamResult.chBreakdown).map(Number).sort((a,b)=>a-b);
  const chBarHtml = chOrder.map(cid=>{
    const b = lastExamResult.chBreakdown[cid];
    const p = b.total ? Math.round(b.correct/b.total*100) : 0;
    let rcls = '';
    if(p < 50) rcls = 'bad';
    else if(p < 70) rcls = 'warn';
    return `<div class="row ${rcls}">
      <div class="lbl">第${cid}章 ${escapeHtml(b.title)}</div>
      <div class="bar"><span style="width:${p}%"></span></div>
      <div class="pct">${b.correct}/${b.total} (${p}%)</div>
    </div>`;
  }).join('');

  // 誤答リスト
  const wrongsHtml = lastExamResult.wrongs.length === 0
    ? '<p style="color:var(--good); text-align:center; font-size:22px; padding:20px">🎉 全問正解！素晴らしいです。</p>'
    : lastExamResult.wrongs.map(w=>{
        const q = w.item.q;
        const ch = w.item.ch;
        const day = w.item.day;
        const pastBadge = q.from_past_exam ? '<span class="past-tag">過去問</span>' : '';
        const pickedDisp = (w.picked || '').toUpperCase().split('').join(', ') || '(未回答)';
        const correctDisp = q.correct.toUpperCase().split('').join(', ');
        // 選択肢一覧
        const choiceLines = ['a','b','c','d','e'].map(k=>{
          const t = q.choices[k];
          if(!t) return '';
          let mark = '';
          if(q.correct.includes(k)) mark = ' ✓正解';
          else if((w.picked||'').includes(k)) mark = ' ✗あなたの選択';
          return `${k.toUpperCase()}) ${t}${mark}`;
        }).filter(Boolean).join('\n');
        return `<div class="exam-wrong-card">
          <div class="qhead">
            <span class="tag" style="background:var(--bad)">問${w.idx+1}</span>
            <span class="tag part">第${ch.id}章 Day${day} 問${q.no}</span>
            ${pastBadge}
            ${w.marked?'<span class="tag" style="background:var(--warn)">★マーク</span>':''}
          </div>
          <div class="qstem">${escapeHtml(q.stem)}</div>
          <div class="qmeta" style="white-space:pre-wrap; font-size:14px; background:var(--card); padding:10px; border-radius:6px">${escapeHtml(choiceLines)}</div>
          <div class="qmeta">正解: <b style="color:var(--good)">${correctDisp}</b> / あなた: <b style="color:var(--bad)">${pickedDisp}</b></div>
          <div class="qexp"><b>解説</b>\n${escapeHtml(q.explanation || '(解説なし)')}</div>
          <div class="refrow">
            ${q.gl_link?`<a class="reflink" href="${escapeAttr(q.gl_link)}" target="_blank" rel="noopener">📖 ガイドライン2025</a>`:''}
            ${q.su_link?`<a class="reflink" href="${escapeAttr(q.su_link)}" target="_blank" rel="noopener">📖 ステップアップ</a>`:''}
          </div>
        </div>`;
      }).join('');

  app.innerHTML = `
    <div class="card">
      <div class="exam-result-banner ${cls}">
        <div style="font-size:16px; color:var(--muted)">${dtStr} ${r.timeUp?'（時間切れ）':''}</div>
        <div class="big-score">${r.score}<span style="font-size:36px">/${r.total}</span></div>
        <div style="font-size:24px; font-weight:bold">${pct}%</div>
        <div class="verdict-text">${verdict}</div>
        <div class="sub">所要時間 ${mm}分${ss}秒 / 制限${EXAM_DURATION_SEC/60}分</div>
      </div>
    </div>
    <div class="card">
      <h3>章別正答率</h3>
      <div class="exam-chbar-list">${chBarHtml}</div>
    </div>
    <div class="card">
      <h3>誤答した問題 (${lastExamResult.wrongs.length}問)</h3>
      ${wrongsHtml}
    </div>
    <div class="card">
      <h3>次のアクション</h3>
      <button class="btn big" onclick="QuizM.state.screen='exam-start'; QuizM.render()">もう一度受験</button>
      <button class="btn big sec" onclick="QuizM.state.screen='home'; QuizM.render()">ホームに戻る</button>
    </div>`;
}

// ===== render() のフックを拡張 =====
const _origRender = render;
render = function(){
  // 模試画面以外に遷移する際は、進行中の模試タイマーを止める
  if(state.screen !== 'exam-quiz' && examTimer){
    clearInterval(examTimer); examTimer = null;
  }
  if(state.screen === 'exam-start'){ renderExamStart(); window.scrollTo(0,0); return; }
  if(state.screen === 'exam-quiz'){ renderExamQuiz(); window.scrollTo(0,0); return; }
  if(state.screen === 'exam-result'){ renderExamResult(); window.scrollTo(0,0); return; }
  return _origRender();
};

// ===== ホーム画面に模試カードを追加（renderHomeをラップ） =====
const _origRenderHome = renderHome;
renderHome = function(){
  _origRenderHome();
  // ヒーローセクション直下に模試カードを差し込む
  const firstCard = app.querySelector('.card');
  if(!firstCard) return;
  const hist = loadExamHistory();
  let bestScore = 0;
  for(const h of hist){ if(h.score > bestScore) bestScore = h.score; }
  const examHtml = `
    <div class="exam-hero">
      <h3>📝 模試モード（${EXAM_QUESTION_COUNT}問・${EXAM_DURATION_SEC/60}分）</h3>
      <div class="sub">本番試験を模した形式。全章バランス${EXAM_QUESTION_COUNT}問・制限時間${EXAM_DURATION_SEC/60}分。途中提出可・即時判定なし。</div>
      <div class="exam-history-row">
        <div class="item">受験回数 <b>${hist.length}</b></div>
        <div class="item">最高スコア <b>${hist.length?bestScore+'/'+EXAM_QUESTION_COUNT:'--'}</b></div>
      </div>
      <button class="btn gold" onclick="QuizM.state.screen='exam-start'; QuizM.render()">模試を開始</button>
    </div>`;
  // 挿入
  firstCard.insertAdjacentHTML('afterend', examHtml);
};

// rendered on demand via QuizM.start()
// ===== Hub integration =====
function quizStart(){
  state.screen = 'home';
  state.chId = null; state.day = null;
  state.pickList = null; state.pickIdx = 0;
  state.selected = null; state.graded = false;
  render();
}
function quizExit(){
  if(examTimer){ clearInterval(examTimer); examTimer = null; }
  examState = null;
}
function quizStartExam(){
  if(examTimer){ clearInterval(examTimer); examTimer = null; }
  examState = null;
  state.screen = 'exam-start';
  render();
}
window.QuizM = {
  start: quizStart, exit: quizExit, startExamMode: quizStartExam,
  render: render,
  enterChapter: enterChapter,
  startSet: startSet,
  startRandom: startRandom,
  startWeak: startWeak,
  pickChoice: pickChoice,
  gradeSingle: gradeSingle,
  gradeMulti: gradeMulti,
  nextQ: nextQ,
  reviewQuestion: reviewQuestion,
  toggleTheme: toggleTheme,
  resetData: resetData,
  confirmSubmitExam: confirmSubmitExam,
  abortExam: abortExam,
  prevExamQ: prevExamQ,
  nextExamQ: nextExamQ,
  jumpExamQ: jumpExamQ,
  pickExamChoice: pickExamChoice,
  toggleExamMark: toggleExamMark,
  startExam: startExam,
  get state(){ return state; }, set state(v){ state = v; },
  get progress(){ return progress; }, set progress(v){ progress = v; },
  get settings(){ return settings; }, set settings(v){ settings = v; },
};

})();
</script>
