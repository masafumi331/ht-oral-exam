強化しないこと","c":"医師の知識不足のみが原因","d":"日本では問題にならない","e":"降圧薬の副作用"},"format":"単一","correct":"b","explanation":"臨床イナーシャは血圧が目標に達していないにもかかわらず治療を強化（増量・追加）しないこと。血圧管理不良の重要な要因。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=106"}]},{"day":2,"questions":[{"no":1,"stem":"JSH2025における高血圧治療の最終目標として、最も適切なのはどれか。1つ選べ。","choices":{"a":"診察室血圧を130/80 mmHg未満に維持すること自体が目的である","b":"降圧薬の処方を継続して服薬アドヒアランスを保つこと","c":"脳心血管病の発症・進展・再発を抑制し、生命予後とQOLを改善すること","d":"高血圧性臓器障害を早期に発見すること","e":"外来通院を継続させること"},"format":"単一","correct":"c","explanation":"JSH2025 p.63によると、高血圧治療の目的は単に血圧値を下げることではなく、脳心血管病（脳卒中・冠動脈疾患・心不全・CKD等）の発症・進展・再発を抑制し、生命予後とQOL（健康寿命）を改善することである。降圧目標の達成は手段であって目的ではない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=63","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=98"},{"no":2,"stem":"高血圧患者のリスク層別化において評価すべき因子として、誤っているのはどれか。1つ選べ。","choices":{"a":"血圧値（高値血圧～III度高血圧）","b":"高血圧性臓器障害（左室肥大・蛋白尿・eGFR低下等）","c":"心血管病既往（脳卒中・冠動脈疾患等）","d":"脂質異常症・糖尿病・喫煙などの危険因子","e":"患者の社会経済的地位（年収・職業）"},"format":"単一","correct":"e","explanation":"JSH2025 p.64-65のリスク層別化では、(1)血圧値、(2)高血圧性臓器障害（左室肥大、蛋白尿、eGFR<60、頸動脈プラーク等）、(3)心血管病既往、(4)危険因子（年齢65歳以上、男性、喫煙、脂質異常、糖尿病、肥満、CKD、家族歴）を評価する。社会経済的地位は背景因子として把握するが、リスク層別化の基本因子には含まれない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=65","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=99"},{"no":3,"stem":"70歳男性、診察室血圧148/86 mmHg、家庭血圧142/84 mmHg。糖尿病（HbA1c 7.2%）と微量アルブミン尿あり。JSH2025における降圧目標として最も適切なのはどれか。1つ選べ。","choices":{"a":"診察室140/90 mmHg未満（年齢を考慮）","b":"診察室130/80 mmHg未満、家庭125/75 mmHg未満","c":"診察室150/90 mmHg未満（高齢のため）","d":"診察室120/70 mmHg未満（糖尿病合併のため）","e":"拡張期は90未満であれば収縮期は問わない"},"format":"単一","correct":"b","explanation":"JSH2025 p.68では、糖尿病・CKD合併を含むすべての成人で診察室血圧130/80 mmHg未満、家庭血圧125/75 mmHg未満が目標。JSH2019で75歳以上に設定されていた140/90未満は廃止され、全年齢で統一された。本例は75歳未満かつ糖尿病・CKD合併であり、130/80未満が標準目標。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=68","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=100"},{"no":4,"stem":"高血圧のリスク層別化と治療開始時期に関して、JSH2025の管理計画として正しいものを2つ選べ。","choices":{"a":"高値血圧（130-139/80-89）でも糖尿病・CKD・心血管病既往があれば降圧薬治療を考慮する","b":"I度高血圧で低リスクなら生活習慣改善を1～3ヶ月行い未達なら薬物治療開始","c":"II度以上の高血圧では生活習慣改善のみで6ヶ月経過観察してから薬物治療を考慮する","d":"高リスクでも血圧が130/80未満であれば降圧薬は不要である","e":"高値血圧で低リスクの患者は1年後の再評価で十分である"},"format":"複数","correct":"ab","explanation":"JSH2025 p.66-67の管理計画: (a)正しい。高値血圧でも高リスク（糖尿病・CKD・心血管病既往等）では薬物治療を考慮。(b)正しい。I度＋低リスクは生活習慣改善1～3ヶ月後に再評価。(c)誤り。II度以上は生活習慣改善と薬物治療を同時に直ちに開始。(d)誤り。高リスクでも130/80未満維持には降圧薬継続が必要。(e)誤り。高値血圧でも3～6ヶ月以内の再評価が必要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=67","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=102"},{"no":5,"stem":"JSH2025における生活習慣改善と降圧薬治療の関係について、正しいのはどれか。1つ選べ。","choices":{"a":"降圧薬開始後は生活習慣改善は不要となる","b":"生活習慣改善は降圧薬治療開始後も継続すべきである","c":"薬物治療の効果が十分なら減塩は中止してよい","d":"高齢者では生活習慣改善は無効であり指導しない","e":"生活習慣改善は薬物治療と相反するため併用しない"},"format":"単一","correct":"b","explanation":"JSH2025 p.66-67によると、生活習慣改善（減塩6g/日未満・適正体重・運動・節酒・禁煙・DASH食等）は降圧薬治療開始後も継続することが基本。生活習慣改善は降圧効果の上乗せだけでなく、心血管病リスク全般を低減する。aは誤り（継続が必要）、cは誤り（減塩は継続）、dは誤り（高齢者でも有効）、eは誤り（併用が原則）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=66","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=100"},{"no":6,"stem":"JSH2025で重視される共同意思決定（SDM: Shared Decision Making）について、誤っているのはどれか。1つ選べ。","choices":{"a":"医師がエビデンスや治療選択肢を分かりやすく説明する","b":"患者の価値観・希望・生活背景を治療方針に反映させる","c":"リスクとベネフィットを医師と患者で共有する","d":"服薬アドヒアランス向上に寄与しうる","e":"ガイドラインの推奨と異なる選択は許容されない"},"format":"単一","correct":"e","explanation":"JSH2025 p.78の共同意思決定（SDM）は、医師・患者がエビデンス・選択肢・リスク・ベネフィットを共有し、患者の価値観・生活背景を反映して協働で意思決定するプロセス。ガイドラインの推奨と異なる選択（薬剤忌避、生活習慣改善優先等）も、患者の理解と同意のもとで許容される。aからdは正しい。eが誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=78","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=108"},{"no":7,"stem":"CQ4「成人の高血圧患者において収縮期血圧130 mmHg未満を目標とした降圧治療は推奨されるか」について、最も適切なのはどれか。1つ選べ。","choices":{"a":"全例で強く推奨される（強い推奨/エビデンスレベル高）","b":"脳心血管病リスクと忍容性を勘案して推奨される","c":"75歳以上では140/90未満を優先する","d":"エビデンスが不足し推奨されない","e":"拡張期血圧のみを指標とすべきである"},"format":"単一","correct":"b","explanation":"JSH2025 CQ4（p.70）では、SPRINT・STEP・ESPRIT等のRCTおよびメタ解析に基づき、収縮期血圧130 mmHg未満を目標とした降圧治療は脳心血管病リスクを低減するため推奨される。ただし起立性低血圧・腎機能悪化・電解質異常等の忍容性を勘案する必要があり、患者個別に判断する。aは「全例で強く」と一律的で不適切、cはJSH2025で否定された旧推奨、dとeは誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=70","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=100"},{"no":8,"stem":"CQ5「デジタル技術を活用した遠隔医療・保健指導は高血圧管理を改善するか」について、JSH2025の見解として正しいのはどれか。1つ選べ。","choices":{"a":"対面診療を完全に代替できる","b":"高血圧管理の改善に寄与する可能性があり、条件付きで推奨される","c":"若年者にのみ有効で高齢者には適用できない","d":"保険診療上の制限があるため推奨されない","e":"効果がないため推奨されない"},"format":"単一","correct":"b","explanation":"JSH2025 CQ5（p.74）では、デジタル技術を活用した遠隔医療・保健指導（オンライン診療、家庭血圧の遠隔モニタリング、スマートフォンアプリ、ウェアラブル等）が血圧コントロール改善やアドヒアランス向上に寄与しうるエビデンスがあり、条件付き推奨。ただし対面診療の代替ではなく補完的位置づけ。aは誤り、cとdは過度な制限、eは誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=74","su_link":null},{"no":9,"stem":"Q2「拡張期高血圧（孤立性拡張期高血圧、IDH）に対する積極的な降圧治療」に関して、正しいのはどれか。1つ選べ。","choices":{"a":"収縮期血圧が140未満であれば治療は不要である","b":"若年・中年男性に多く、肥満・飲酒等と関連する","c":"心血管リスクは収縮期高血圧と比較して常に低い","d":"降圧薬は禁忌である","e":"高齢者に最も多い病型である"},"format":"単一","correct":"b","explanation":"JSH2025 p.76のQ2: 孤立性拡張期高血圧（SBP<140かつDBP≧90）は若年・中年男性に多く、肥満・飲酒・交感神経亢進等と関連。心血管イベント（特に冠動脈疾患・心不全）のリスクが上昇するため、生活習慣改善＋必要に応じて降圧薬による治療が推奨される。aは誤り（DBP≧90は治療対象）、cは誤り（リスク上昇）、dは誤り、eは誤り（高齢者は孤立性収縮期高血圧が多い）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=76","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=104"},{"no":10,"stem":"62歳女性、健診で診察室血圧152/94 mmHg。家庭血圧は朝平均145/90、夜平均140/88 mmHg。喫煙20本/日、BMI 28。心電図上左室高電位、尿蛋白(±)、eGFR 58 mL/分/1.73m²。JSH2025リスク層別化と初期管理として最も適切なのはどれか。1つ選べ。","choices":{"a":"高値血圧・低リスクで生活習慣改善のみ3ヶ月経過観察","b":"II度高血圧・高リスクで生活習慣改善＋降圧薬を直ちに開始","c":"I度高血圧・低リスクで生活習慣改善のみ6ヶ月経過観察","d":"II度高血圧だが若年のため経過観察","e":"二次性高血圧確定のため精査入院"},"format":"単一","correct":"b","explanation":"JSH2025 p.66-67の管理: 診察室血圧≧160/100または≧140/90かつ家庭血圧高値で本例はII度高血圧（150-159/90-99）相当～I度高め。さらに喫煙・肥満・左室肥大疑い・CKD（eGFR<60）・蛋白尿(±)等の複数の臓器障害・危険因子があり高リスク。II度以上または高リスクではリスクに関係なく生活習慣改善＋降圧薬を直ちに開始する。a、c、dは経過観察で不適切、eは現時点で二次性は除外段階で入院適応ではない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=67","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=103"},{"no":11,"stem":"高血圧管理におけるリスク層別化に関して、JSH2025で「絶対リスク」評価の考え方として正しいのはどれか。1つ選べ。","choices":{"a":"個人ではなく集団のリスクを評価する指標である","b":"一定期間（例えば10年間）に脳心血管病を発症する確率を推定する","c":"降圧療法による相対リスク減少のみで治療適応を決める","d":"年齢の影響は考慮しない","e":"日本人ではJALS、Suita scoreなどの絶対リスクモデルは使用されない"},"format":"単一","correct":"b","explanation":"JSH2025 p.64-66によると、絶対リスクは個人が一定期間（通常10年間）に脳心血管病を発症する確率を、年齢・性別・血圧値・喫煙・脂質・糖尿病・CKD等から推定する指標。日本ではJALSやSuita scoreが用いられる。治療強度の判断には絶対リスクが特に重要（高齢者では相対リスクが小さくても絶対リスクが大きい）。a・c・d・eはいずれも誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=65","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=99"},{"no":12,"stem":"JSH2025の降圧目標に関して、誤っているのはどれか。1つ選べ。","choices":{"a":"成人すべてで診察室血圧130/80 mmHg未満を目標とする","b":"家庭血圧では125/75 mmHg未満を目標とする","c":"ABPM 24時間平均は125/75 mmHg未満が目安","d":"75歳以上の高齢者では降圧目標は150/90 mmHg未満に緩和される","e":"起立性低血圧・腎機能悪化等の有害事象がある場合は個別に調整する"},"format":"単一","correct":"d","explanation":"JSH2025 p.68の降圧目標: (a)正しい、全年齢で診察室130/80未満。(b)正しい、家庭血圧125/75未満。(c)正しい、ABPM 24時間平均125/75未満が目安。(d)誤り。JSH2025では75歳以上も130/80未満に統一され、JSH2019の140/90未満は廃止された。(e)正しい、忍容性に応じた個別調整は必要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=68","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=100"},{"no":13,"stem":"高血圧初診時の管理計画として、JSH2025で推奨される評価項目に含まれるものはどれか。1つ選べ。","choices":{"a":"診察室血圧の単回測定のみで重症度を判定する","b":"家庭血圧測定の導入・指導と臓器障害・二次性高血圧のスクリーニング","c":"降圧薬を試験的に処方して効果を見る","d":"心エコー・腎血管造影をすべての患者に施行","e":"1年後の再診を予約して経過観察のみ行う"},"format":"単一","correct":"b","explanation":"JSH2025 p.65-66の初診時管理計画: 診察室血圧の複数回測定、家庭血圧測定の導入・指導、病歴・身体所見、基本検査（血液・尿・心電図・胸部X線）、臓器障害評価（蛋白尿・eGFR・心電図・必要に応じ心エコー・頸動脈エコー等）、二次性高血圧のスクリーニング（PA、腎血管性、褐色細胞腫等）、リスク因子評価を行う。aは不十分、cは試験投薬は推奨されない、dは全例ではない、eは経過観察のみは不適切。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=65","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=99"},{"no":14,"stem":"JSH2025における生活習慣改善と薬物療法の基本に関して、正しいものを2つ選べ。","choices":{"a":"降圧薬第一選択にはCa拮抗薬・ARB・ACE阻害薬・サイアザイド系利尿薬が含まれる","b":"I度高血圧低リスクでは生活習慣改善を1～3ヶ月先行する","c":"降圧薬を開始したら生活習慣改善は中止してよい","d":"目標未達でも単剤少量で長期間維持するのが基本である","e":"II度以上では生活習慣改善のみで開始し3ヶ月後に薬物療法を追加する"},"format":"複数","correct":"ab","explanation":"JSH2025 p.66-68: (a)正しい。第一選択薬はCa拮抗薬、ARB、ACE阻害薬、サイアザイド系利尿薬。β遮断薬は積極的適応がある場合に限る。(b)正しい。I度低リスクは生活習慣改善1-3ヶ月後に再評価。(c)誤り。降圧薬開始後も生活習慣改善は継続。(d)誤り。目標未達なら増量・併用・薬剤変更で治療強化（臨床イナーシャを避ける）。(e)誤り。II度以上は生活習慣改善と薬物療法を同時に開始。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=67","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=103"},{"no":15,"stem":"高血圧治療における服薬アドヒアランス向上のためのJSH2025推奨として、誤っているのはどれか。1つ選べ。","choices":{"a":"1日1回投与の薬剤や配合剤の活用","b":"患者教育と共同意思決定（SDM）の実践","c":"家庭血圧測定の活用とフィードバック","d":"薬剤師・看護師等を含む多職種連携の活用","e":"副作用があっても患者に申告させず治療を継続する"},"format":"単一","correct":"e","explanation":"JSH2025 p.77-78のアドヒアランス向上策: (a)正しい、1日1回・配合剤で服薬負担軽減。(b)正しい、SDMで患者の理解と納得を得る。(c)正しい、家庭血圧で患者自身が効果を実感できる。(d)正しい、多職種連携（薬剤師・看護師・管理栄養士等）が有効。(e)誤り。副作用は患者に確認・申告させ、必要なら薬剤変更・減量を行う。隠蔽は禁物。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=78","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=108"},{"no":16,"stem":"降圧療法の効果に関するエビデンスについて、誤っているのはどれか。1つ選べ。","choices":{"a":"収縮期血圧10 mmHg低下で脳卒中リスクは約30%、冠動脈疾患リスクは約20%減少する","b":"SPRINT試験はSBP<120群が<140群より心血管イベント・死亡を有意に減少させた","c":"STEP試験は中国人高齢者でSBP 110-130 mmHg目標が140-150目標より心血管イベントを減少させた","d":"ESPRIT試験は130未満群でも血圧低下によりイベント減少が示された","e":"厳格降圧は腎機能を改善し、有害事象は全くない"},"format":"単一","correct":"e","explanation":"JSH2025 p.69-71のエビデンス: (a)正しい、メタ解析の代表値。(b)正しい、SPRINT試験の主要結果。(c)正しい、STEP試験で高齢者でも厳格降圧の有用性。(d)正しい、ESPRIT試験等で130未満の有用性。(e)誤り。厳格降圧では急性腎障害・電解質異常・起立性低血圧等の有害事象がやや増加する報告があり、忍容性評価と個別調整が必要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=70","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=100"},{"no":17,"stem":"65歳男性。診察室血圧145/88 mmHg。家庭血圧は朝平均128/78、夜平均126/76 mmHgで家庭血圧は目標達成。仮面高血圧の有無を含めた評価方針として最も適切なのはどれか。1つ選べ。","choices":{"a":"診察室血圧のみを指標に降圧薬を増量する","b":"家庭血圧が低いので白衣高血圧と判断し降圧薬は不要とする","c":"ABPMを施行して24時間血圧パターンを評価する","d":"拡張期血圧のみを目標に治療を調整する","e":"1年後に再評価とし当面は無治療"},"format":"単一","correct":"c","explanation":"JSH2025 p.68・p.77: 診察室血圧高値・家庭血圧目標達成のパターンは白衣高血圧と仮面コントロール不良（夜間高血圧・早朝高血圧）の鑑別が必要。ABPMは24時間血圧パターン（夜間血圧・morning surge・血圧変動）の評価に有用で、仮面高血圧・夜間高血圧の同定に推奨される。aは家庭血圧を無視、bは早計、dは収縮期も評価必要、eは経過観察のみは不適切。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=68","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=104"},{"no":18,"stem":"孤立性収縮期高血圧（ISH）の高齢者管理に関して、JSH2025の方針として正しいのはどれか。1つ選べ。","choices":{"a":"高齢者ISHでは140/90未満で十分であり130未満は推奨されない","b":"JSH2025では75歳以上のISHも診察室130/80未満が降圧目標である","c":"拡張期血圧が60未満まで下がっても問題ない","d":"脈圧の評価は不要である","e":"ISHでは降圧療法のエビデンスはない"},"format":"単一","correct":"b","explanation":"JSH2025 p.68・p.76: 75歳以上のISH（SBP≧140、DBP<90）も含めて、全年齢で診察室130/80未満が降圧目標に統一された。ただし高齢者では脈圧が広く、過度の拡張期低下（特に<60-70 mmHg）でJ曲線現象による冠動脈イベント増加リスクがあるため、忍容性に応じた個別調整が必要。STEP試験・SPRINT試験等で高齢者でも厳格降圧の有用性が示されている。aは旧基準で誤り、cは誤り、dは誤り、eは誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=76","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=104"},{"no":19,"stem":"高血圧治療における多職種連携・チーム医療に関するJSH2025の推奨について、正しいのはどれか。1つ選べ。","choices":{"a":"医師単独での管理が最も成績が良い","b":"薬剤師・看護師・管理栄養士・保健師等を含む多職種連携が血圧管理を改善する","c":"多職種連携はコストがかかるため推奨されない","d":"日本では多職種連携のエビデンスはまったくない","e":"チーム医療は専門病院でのみ可能である"},"format":"単一","correct":"b","explanation":"JSH2025 p.78（およびCQ15関連）: 薬剤師・看護師・管理栄養士・保健師等を含む多職種連携・チーム医療は、患者教育・生活指導・服薬支援・家庭血圧モニタリング等を通じて血圧管理率を改善するエビデンスがあり、強く推奨される。プライマリケア・診療所でも実践可能。aは誤り、cは誤り、dは誤り（CQ15で日本含むエビデンスあり）、eは誤り。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=78","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=108"},{"no":20,"stem":"高血圧治療の長期的な評価指標として、JSH2025で重視されないものはどれか。1つ選べ。","choices":{"a":"降圧目標達成率（診察室・家庭血圧）","b":"脳心血管病の発症・再発抑制","c":"高血圧性臓器障害（蛋白尿・LVMI・IMT等）の進展抑制","d":"服薬アドヒアランス・QOL","e":"受診回数の最大化と検査件数"},"format":"単一","correct":"e","explanation":"JSH2025 p.78の治療の質の評価指標: (a)降圧目標達成率、(b)脳心血管イベントの発症・再発抑制、(c)臓器障害（蛋白尿・左室質量係数LVMI・頸動脈IMT等）の進展抑制、(d)アドヒアランス・QOL（健康寿命）が重視される。(e)受診回数の最大化や検査件数の多さ自体は治療の質を示す指標ではない（むしろ過剰医療のリスク）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=78","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=109"},{"no":21,"stem":"高血圧患者におけるリスク層別化の基本となる考え方で正しいのはどれか。1つ選べ。","choices":{"a":"脳心血管病全体ではなく脳卒中に対するリスクを評価する","b":"国内外のエビデンスを利用する","c":"相対リスクを算出し、それを参考にリスク層別化を行う","d":"心房細動患者の脳卒中発生リスクは血圧値に依存しない","e":"eGFR低値はリスク層別化には用いない"},"format":"単一","correct":"b","explanation":"JSH2025第6章「管理および治療の基本」におけるリスク層別化では、Aは誤り（脳卒中だけでなく脳心血管病全体のリスクを評価）、Bは正しい（国内外の最新エビデンスを利用）、Cは誤り（相対リスクではなく絶対リスクを用いる）、Dは誤り（心房細動の脳卒中リスクも血圧値に依存する）、Eは誤り（eGFR低値はCKDとしてリスク層別化の重要因子）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=66","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=99","from_past_exam":true,"note":"解説（10.37.34『診察室血圧に基づく脳心血管病リスクの層別化』表、10.39.26『降圧目標 診察室<130/80 mmHg、家庭<125/75 mmHg』）が示されたが、正解ハイライトは確認できず。臨床的にはB（国内外のエビデンスを利用する）が正解と推定される。\n正解ハイライト未確認のため自信度medium。臨床的・教科書的にBが正解。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.37.28.png","confidence":"medium","slide_section":"5 治療の基本方針"}]}],"gl_pages":[63,79],"su_pages":[98,110]},{"id":7,"title":"生活習慣の改善","is_clinical":true,"part":2,"key_topics":["食塩制限（6g/日未満）","Na以外の栄養素と食事パターン（DASH食・カリウム）","適正体重の維持","運動（有酸素運動・レジスタンス運動）","節酒・禁煙","その他の生活習慣（寒冷・睡眠・便秘・ストレス）","デジタル技術の活用（アプリ・遠隔医療・ウェアラブル・AI）","CQ6: レジスタンス運動の降圧効果","CQ7: スマートフォンアプリによる血圧低下","Q3: 減塩目標6g/日未満","Q4: スポット尿による食塩摂取量推定","Q5: スポット尿Na/K比"],"sets":[{"day":1,"questions":[{"no":1,"stem":"62歳男性。診察室血圧148/92mmHg、家庭血圧142/88mmHg。BMI 26.0、塩辛い食事を好み外食が多い。JSH2025における高血圧患者の食塩摂取の目標値として正しいのはどれか。","choices":{"a":"3g/日未満","b":"6g/日未満","c":"8g/日未満","d":"10g/日未満","e":"制限不要（カリウム摂取が十分であれば）"},"format":"単一","correct":"b","explanation":"JSH2025では高血圧患者の食塩摂取量は6g/日未満が推奨される（GL p.80, Q3）。WHOは5g/日未満を提唱するが、日本人の平均摂取量は約10g/日と多く、実行可能性も考慮し6g/日未満が現実的目標とされた。なお全国民レベルでは7g/日未満（健康日本21）が掲げられている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=80","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=111"},{"no":2,"stem":"58歳女性。本態性高血圧で生活指導中。食塩摂取量の評価法について誤っているのはどれか。","choices":{"a":"24時間蓄尿によるNa排泄量測定がゴールドスタンダードである","b":"随時尿（スポット尿）のNa・Cr濃度から田中式や川崎式で1日食塩摂取量を推定できる","c":"スポット尿による推定は個人での日々の変動を正確に把握できる","d":"食物摂取頻度調査票（FFQ）や食事記録による評価も用いられる","e":"Na/K比は減塩とカリウム増加の両者を反映する簡便な指標である"},"format":"単一","correct":"c","explanation":"スポット尿による食塩摂取量推定（田中式・川崎式・INTERSALT式）は集団評価や経時的変化の把握には有用だが、個人の単回測定では日内・日間変動が大きく精度に限界がある（GL p.86, Q4）。24時間蓄尿が最も正確（ゴールドスタンダード）であるが負担が大きい。Na/K比は減塩とK摂取の両者を一度に評価できる指標（Q5）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=86","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=112"},{"no":3,"stem":"70歳男性。I度高血圧、BMI 27.5。腎機能正常（eGFR 75）。栄養指導の一環としてDASH食的な食事パターンを勧めたい。JSH2025のカリウム摂取に関する記述として正しいのはどれか。","choices":{"a":"腎機能が正常でも血清Kが4.0mEq/L以上ならK摂取増加は行わない","b":"野菜・果物・低脂肪乳製品を豊富に含む食事は降圧効果がある","c":"K摂取増加はアルドステロンの分泌を抑制する作用がある","d":"CKDステージG3以上でもK摂取増加が推奨される","e":"ナトリウム摂取制限よりカリウム摂取増加の方が優先される"},"format":"単一","correct":"b","explanation":"DASH食（Dietary Approaches to Stop Hypertension）は野菜・果物・低脂肪乳製品を豊富に含み、飽和脂肪酸とコレステロールを減らした食事で、降圧効果が確立している（GL p.83-84）。K摂取増加はNa利尿促進・血管拡張・交感神経抑制を介して降圧に寄与するが、アルドステロンを抑制するのではなく、むしろ血清Kが上昇するとアルドステロン分泌が促進される（過去問Q6 の正解Dの根拠）。腎機能低下例（CKD G3b以降、特に高K血症リスク）ではK摂取制限が必要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=83","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=114"},{"no":4,"stem":"55歳男性。身長170cm、体重78kg（BMI 27.0）、診察室血圧144/90mmHg。減量による降圧効果について正しい記述を2つ選べ。","choices":{"a":"JSH2025ではBMI 25未満を目標とすることが推奨されている","b":"体重4kgの減量でおおむね収縮期血圧4mmHg程度の低下が期待できる","c":"減量による降圧効果は1〜2ヶ月以内に消失する","d":"肥満者ではまず薬物療法を開始し減量は補助的に行う","e":"BMI 22未満まで減量しないと降圧効果は得られない"},"format":"複数","correct":"ab","explanation":"JSH2025では適正体重としてBMI 25未満を目標とし（GL p.84-85）、減量4kgで収縮期血圧 約4mmHg、拡張期血圧 約2mmHgの低下が期待できるとされる（メタ解析）。減量は降圧効果が持続し、肥満合併高血圧では生活習慣改善（減量・運動）が第一に行われる。BMI 22未満まで下げる必要はなく、無理のない減量が現実的。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=85","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=115"},{"no":5,"stem":"65歳男性。高血圧I度。喫煙20本/日×40年、毎晩日本酒2合と缶ビール500mL。JSH2025における節酒・禁煙の指導として正しいのはどれか。","choices":{"a":"男性の節酒目標はエタノール換算20-30mL/日（日本酒1合程度）以下である","b":"ワインはポリフェノールが豊富なので量に制限はない","c":"喫煙は急性昇圧作用のみで慢性的な血圧上昇とは関連しない","d":"受動喫煙は血圧には影響しないため家族の喫煙は問題ない","e":"禁煙は体重増加を招くため高血圧患者には推奨されない"},"format":"単一","correct":"a","explanation":"JSH2025の節酒目標は男性エタノール20-30mL/日以下（日本酒1合、ビール中瓶1本、ワイングラス2杯程度）、女性は10-20mL/日以下である（GL p.86）。喫煙は一過性の昇圧作用に加え、長期的に動脈硬化を促進し心血管リスクを高める。受動喫煙も心血管リスクを上げるため避ける。禁煙後の体重増加には注意するが、禁煙の心血管リスク低下効果が上回るため全例で推奨される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=86","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=117"},{"no":6,"stem":"78歳男性。高血圧治療中。冬季に脱衣所で意識消失し搬送された。日内・季節変動と生活環境に関する指導として誤っているのはどれか。","choices":{"a":"脱衣所・浴室の暖房により急激な血圧変動を避ける","b":"入浴は42℃以上の高温短時間入浴が推奨される","c":"睡眠不足や睡眠の質低下は高血圧と関連する","d":"便秘による怒責で著明な血圧上昇が起こりうる","e":"慢性的なストレスは高血圧の要因となる"},"format":"単一","correct":"b","explanation":"JSH2025では入浴は40℃前後のぬるめの湯に短時間入ることが推奨される（GL p.87）。42℃以上の高温入浴は急激な血圧変動・心血管イベント（ヒートショック）の誘因となる。寒冷曝露（脱衣所の温度差）、睡眠障害、便秘時の怒責、慢性ストレスはいずれも血圧上昇要因として記載されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=87","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=118"},{"no":7,"stem":"45歳女性、IT企業勤務。高血圧I度（家庭血圧138/88mmHg）。スマートフォンアプリやウェアラブルデバイスを希望している。JSH2025のデジタル技術活用に関する記述として正しいのはどれか。","choices":{"a":"スマートフォンアプリによる介入は降圧効果が示されており推奨される","b":"ウェアラブルでの血圧測定値はカフ式血圧計と同等に診断に使える","c":"AIによる血圧管理は薬物療法の代替として確立されている","d":"遠隔医療は対面診療と同等のエビデンスはない","e":"アプリ活用は若年者のみ有効で高齢者には推奨されない"},"format":"単一","correct":"a","explanation":"JSH2025 CQ7では、スマートフォンアプリを用いた介入は高血圧患者の血圧低下に有用とされ推奨されている（GL p.91-92）。ウェアラブルの血圧測定はまだ精度・標準化が確立されておらず、診断には上腕カフ式が原則。AIや遠隔医療は活用が進むが薬物療法の代替ではなく補助手段である。年齢を問わず適切に活用できる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=91","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=128"},{"no":8,"stem":"60歳男性。高血圧I度、整形外科的問題なし。運動療法を導入したい。JSH2025 CQ6で扱われたレジスタンス運動の降圧効果について正しいのはどれか。","choices":{"a":"有酸素運動と異なりレジスタンス運動には降圧効果はない","b":"高強度・等尺性の最大強度負荷が最も推奨される","c":"中等度強度のレジスタンス運動は降圧効果があり推奨される","d":"心血管イベントを増加させるため高血圧患者には禁忌である","e":"有酸素運動を行えばレジスタンス運動を併用する意義は乏しい"},"format":"単一","correct":"c","explanation":"JSH2025 CQ6では、高血圧患者に対する中等度強度のレジスタンス運動（ダンベル・自重・マシン等）は有酸素運動と組み合わせることで降圧効果があり、推奨される（GL p.89-90）。最大強度・息こらえを伴うValsalva手技は急性昇圧を招くため避ける。心血管疾患合併例では事前評価が必要だが、適切に行えば安全。有酸素運動とレジスタンス運動の併用が望ましい。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=89","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=125"},{"no":9,"stem":"52歳男性。本態性高血圧。減塩指導のため食塩摂取量を評価したい。スポット尿による推定（Q4）について正しいのはどれか。","choices":{"a":"スポット尿のNa・Cr濃度から推定式（田中式等）で1日Na排泄量を推算できる","b":"個人の単回スポット尿で日々の食塩摂取量を正確に判定できる","c":"推定値は24時間蓄尿値より系統的に高くなることが知られている","d":"推定式は欧米人のデータに基づくため日本人には使えない","e":"随時尿のNa濃度だけで補正なしに推定できる"},"format":"単一","correct":"a","explanation":"スポット尿の尿中Na・Cr濃度に体格・年齢・性別の補正を加える田中式・川崎式・INTERSALT式により、1日食塩摂取量を推算できる（GL p.86-87, Q4）。集団評価・経時変化の把握には有用だが、個人の単回測定では日内・日間変動が大きく信頼性は限定的。日本人を含むデータに基づく推定式（田中式は日本人データから開発）が存在する。Na濃度のみではCr補正なしには評価できない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=86","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=120"},{"no":10,"stem":"48歳女性。高血圧I度、腎機能正常（eGFR 80）、生鮮野菜の摂取が少なく加工食品中心。スポット尿Na/K比を測定したい。JSH2025 Q5の記述として正しいのはどれか。","choices":{"a":"Na/K比は食塩摂取量とK摂取量の両者を反映する指標である","b":"Na/K比は重度CKDでも安全に減塩指標として使える","c":"Na/K比の目標値は20以上が望ましい","d":"Na/K比は血圧と無関係であることが示されている","e":"Na/K比は尿酸排泄評価の指標として確立されている"},"format":"単一","correct":"a","explanation":"スポット尿のNa/K比は、減塩（Na低下）とカリウム摂取増加（K上昇）の両者を同時に評価できる指標で、低いほど望ましい食習慣を示す（GL p.87, Q5）。日本人では平均5前後、目標は2前後（理想は1〜2）とされる。Na/K比は血圧および心血管イベントと正の関連が示されている。CKD進行例ではK摂取制限が必要なため、指標の解釈には注意が必要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=87","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=121"},{"no":11,"stem":"68歳男性。II度高血圧、糖尿病合併、BMI 28。包括的な生活習慣改善を行う場合の指導として最も適切なのはどれか。","choices":{"a":"食塩6g/日未満、BMI 25未満、有酸素運動週180分以上、節酒、禁煙をすべて同時に目指す","b":"減量のみを優先し、塩分制限・運動は数年後から開始する","c":"肥満があれば食塩制限は不要である","d":"高齢者では生活習慣改善の効果は乏しいので薬物のみで管理する","e":"糖尿病合併例ではK摂取増加は禁忌である"},"format":"単一","correct":"a","explanation":"JSH2025では複数の生活習慣改善（減塩6g/日未満、適正体重BMI<25、有酸素運動30分以上/日 または週180分以上、節酒、禁煙、野菜・果物摂取、ストレス管理）を統合的に行うことで相加的な降圧効果が得られる（GL p.81-82）。高齢者でも生活習慣改善は降圧および心血管イベント抑制に有効。糖尿病合併例でも野菜・果物の摂取は基本的に推奨される（腎機能に応じて調整）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=81","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=111"},{"no":12,"stem":"50歳男性。本態性高血圧、合併症なし。運動療法の処方について、JSH2025の有酸素運動の推奨として正しいのはどれか。","choices":{"a":"中等度強度の有酸素運動を毎日30分以上（または週180分以上）","b":"高強度の運動を週1回行えば十分である","c":"心血管疾患合併例でも事前評価なしに開始してよい","d":"ウォーキングは強度が低いため降圧効果は期待できない","e":"息切れを感じる強度では運動は中止する必要がある"},"format":"単一","correct":"a","explanation":"JSH2025では中等度強度（ややきつい〜きついと感じる程度、最大酸素摂取量の40-60%）の有酸素運動を毎日30分以上、または週180分以上行うことが推奨される（GL p.88-89）。ウォーキング・速歩・ジョギング・サイクリング・水泳などが該当し、降圧効果が確立している。心血管疾患既往例では運動負荷試験など事前評価が必要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=88","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=124"},{"no":13,"stem":"75歳女性。高血圧治療中、降圧不十分。減塩指導を強化したい。日本人の食塩摂取の現状と減塩の効果について誤っているのはどれか。","choices":{"a":"日本人の食塩摂取量は平均約10g/日と国際的にみても多い","b":"食塩感受性高血圧では特に減塩の降圧効果が大きい","c":"高齢者は食塩感受性が高まる傾向がある","d":"減塩により脳卒中など心血管イベントが減少することが示されている","e":"減塩は降圧薬の作用を弱めるため、薬物治療中は減塩を控える"},"format":"単一","correct":"e","explanation":"減塩はサイアザイド系利尿薬・ARB・ACE阻害薬・Ca拮抗薬などほぼ全ての降圧薬の効果を増強する（GL p.81-82）。日本人の食塩摂取は約10g/日（令和元年国民健康・栄養調査：男性10.9g、女性9.3g）と多く、食塩感受性高血圧、高齢者、CKD合併例、肥満では特に減塩の降圧効果が大きい。減塩は心血管イベント減少も示されている。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=81","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=112"},{"no":14,"stem":"高血圧患者の食事における栄養素・食事パターンについて、JSH2025の記載と一致する正しい記述を2つ選べ。","choices":{"a":"DASH食パターン（野菜・果物・低脂肪乳製品中心）は降圧効果が確立している","b":"腎機能正常者ではK摂取増加（男性3000mg/日以上、女性2600mg/日以上）が望ましい","c":"コーヒー摂取は1日1杯以下に制限すべきである","d":"K摂取増加はアルドステロン分泌を抑制することで降圧する","e":"K製剤での補充が食事からのK摂取より推奨される"},"format":"複数","correct":"ab","explanation":"JSH2025ではDASH食パターン（野菜・果物・低脂肪乳製品、飽和脂肪酸とコレステロール抑制）の降圧効果が確立しており推奨される（GL p.83-84）。腎機能正常者のK摂取目標は男性3000mg/日以上、女性2600mg/日以上（食事摂取基準2025参照）。Kの降圧機序はNa利尿促進・血管拡張・交感神経抑制であり、アルドステロンはむしろKで分泌促進される（過去問Q6）。K補充は食事から行うのが原則で、K製剤は通常推奨されない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=83","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=114"},{"no":15,"stem":"肥満合併高血圧（BMI 28.5、腹囲95cm）の中年男性。減量について、JSH2025の推奨と一致しないのはどれか。","choices":{"a":"適正体重としてBMI 25未満を目標とする","b":"腹囲（男性85cm、女性90cm以上で内臓脂肪型肥満を疑う）も評価する","c":"減量4kgで収縮期血圧 約4mmHgの低下が期待できる","d":"減量は食事療法と運動療法の組み合わせが推奨される","e":"減量目標は1ヶ月で10kg以上の急速減量が望ましい"},"format":"単一","correct":"e","explanation":"JSH2025では3〜6ヶ月で現体重の3〜5%程度の緩徐な減量が現実的で持続性も高いとされ、急速減量は推奨されない（GL p.84-85）。BMI 25未満を目標とし、内臓脂肪型肥満の評価には腹囲（男性85cm、女性90cm以上）を用いる。減量4kgで収縮期血圧 約4mmHg低下、食事療法（適正エネルギー）と運動療法の組み合わせが基本。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=85","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=115"},{"no":16,"stem":"55歳男性。安定狭心症で冠動脈ステント留置後（PCI後6ヶ月）、降圧治療中。運動療法について誤っているのはどれか。","choices":{"a":"心血管疾患既往例では運動開始前に運動耐容能評価が必要","b":"心臓リハビリテーションの枠組みで運動療法を行うことが望ましい","c":"高強度の等尺性運動（重量挙げの最大努力等）は急激な昇圧を招き避ける","d":"ウォーキングなど中等度有酸素運動は安全性・有効性が確立されている","e":"心血管疾患既往例ではいかなる運動も禁忌である"},"format":"単一","correct":"e","explanation":"心血管疾患既往例でも、適切な事前評価（運動負荷試験等）と心臓リハビリテーションの枠組みのもとで中等度有酸素運動・レジスタンス運動を行うことが推奨される（GL p.89-90）。運動はむしろ二次予防として重要。最大努力の等尺性運動はValsalva手技による急激な昇圧を招くため避ける。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=89","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=125"},{"no":17,"stem":"60歳男性。高血圧、肝機能正常、ビール大瓶2本＋日本酒2合/日。節酒指導の根拠と方法について正しいのはどれか。","choices":{"a":"節酒により収縮期血圧3〜4mmHgの低下が期待できる","b":"断酒は反動で血圧を上昇させるため不可である","c":"ワイン・焼酎は血圧に影響しない","d":"毎日少量の飲酒（適量）はむしろ降圧効果がある","e":"アルコール量ではなく飲酒回数のみで評価する"},"format":"単一","correct":"a","explanation":"節酒（多量飲酒者がエタノール摂取を80%程度減らした場合）により収縮期血圧3〜4mmHgの低下が期待できる（GL p.86）。アルコール種類にかかわらずエタノール摂取量で評価し、男性20-30mL/日以下、女性10-20mL/日以下を目標とする。少量飲酒の心血管保護効果は近年否定的なエビデンスが増えており、健康のために飲酒を勧めることはない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=86","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=126"},{"no":18,"stem":"高血圧管理に影響を与えうる「その他の生活習慣」について、JSH2025の記載と一致する正しい記述を2つ選べ。","choices":{"a":"冬季の寒冷曝露（脱衣所の温度差等）はヒートショックの一因となる","b":"睡眠時間6時間未満や睡眠の質低下は高血圧リスクと関連する","c":"便秘・怒責は血圧変動と無関係である","d":"短時間の激しいストレスは血圧上昇するが、慢性ストレスは血圧と無関係である","e":"緑茶・コーヒーは血圧を上げるため禁止する"},"format":"複数","correct":"ab","explanation":"JSH2025では寒冷曝露の回避（脱衣所・浴室の暖房、入浴温度40℃前後）、適切な睡眠時間（7時間程度を目安）の確保、便秘改善（怒責で著明な血圧上昇）、ストレス管理が推奨されている（GL p.87）。慢性ストレス・睡眠障害も高血圧の要因として記載される。コーヒーは急性昇圧があるが慢性的影響は限定的で、過度な制限は不要。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=87","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=127"},{"no":19,"stem":"40歳男性、IT勤務、高血圧I度。仕事が多忙で通院困難。デジタル技術活用について、JSH2025の見解として誤っているのはどれか。","choices":{"a":"オンライン診療を組み合わせた高血圧管理は実装が進んでいる","b":"家庭血圧データのクラウド共有は血圧管理の質向上に有用","c":"ウェアラブル光学式血圧計は薬物治療の判断根拠として推奨される","d":"スマートフォンアプリによる介入は降圧効果のエビデンスがある（CQ7）","e":"高血圧領域でもAIを活用したリスク予測・最適治療選択が研究されている"},"format":"単一","correct":"c","explanation":"ウェアラブル光学式血圧計はまだ精度・標準化が不十分で、診断・治療判断には上腕カフ式血圧計（家庭血圧含む）を用いるのが原則（GL p.91-92）。オンライン診療、クラウド型データ共有、スマートフォンアプリ（CQ7：降圧効果あり、推奨）、AIによる管理支援は実装・研究が進んでいる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=91","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=128"},{"no":20,"stem":"55歳女性。本態性高血圧、合併症なし。レジスタンス運動を取り入れたい。JSH2025 CQ6に基づくレジスタンス運動の処方として最も適切なのはどれか。","choices":{"a":"中等度強度（1RMの40-60%程度）を週2-3回、息こらえを避けて行う","b":"最大努力（1RM 90%以上）で週5回、息止めを伴って行う","c":"短時間の等尺性最大握力運動を1日10回×複数セット","d":"ベンチプレスでValsalva呼吸を用いて高重量挙上","e":"全身運動は避け上肢のみの運動を行う"},"format":"単一","correct":"a","explanation":"JSH2025 CQ6では中等度強度（1RM=最大1回挙上重量の40-60%程度）のレジスタンス運動を週2-3回、息こらえ（Valsalva手技）を避けて行うことが推奨される（GL p.89-90）。これにより降圧効果と筋力維持が得られる。最大努力の等尺性運動や息止めを伴う挙上は急激な昇圧を招き危険。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=89","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=125"}]},{"day":2,"questions":[{"no":1,"stem":"65歳男性、高血圧I度。生活習慣の改善で食塩6g/日未満を目標とした根拠（Q3）として誤っているのはどれか。","choices":{"a":"メタ解析で減塩により有意な収縮期血圧低下が示されている","b":"減塩により脳卒中など心血管イベントの減少が報告されている","c":"日本人の食塩摂取量（約10g/日）を考慮し実行可能性も評価されている","d":"WHOは5g/日未満を推奨しているが、6g/日未満は妥当な現実的目標である","e":"6g/日未満を超えて減塩しても降圧効果はみられない"},"format":"単一","correct":"e","explanation":"JSH2025 Q3では、減塩量と血圧低下は用量反応関係を示し、より低い摂取量（例：5g/日未満）でさらなる降圧が期待できることが報告されている（GL p.82, p.85）。ただし日本人の現状摂取量と実行可能性を考慮し6g/日未満を実用目標とした。WHOは5g/日未満、健康日本21では7g/日未満（国民全体）を掲げる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=82","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=111"},{"no":2,"stem":"60歳男性。eGFR 35（CKDステージG3b）、血清K 5.0mEq/L、本態性高血圧。栄養指導として誤っているのはどれか。","choices":{"a":"食塩は6g/日未満（むしろより厳格な減塩が望ましい）","b":"DASH食を腎機能正常者と同様に強く推奨する","c":"K摂取は血清K値をモニターしつつ制限・調整する","d":"蛋白摂取量はCKD進行抑制の観点から個別に評価する","e":"降圧薬（特にRA系阻害薬・MR拮抗薬）併用時は高K血症に注意する"},"format":"単一","correct":"b","explanation":"CKD G3b以降（eGFR<45）や血清K 5.0mEq/L以上の高K血症傾向例では、野菜・果物中心のDASH食を無条件に強く推奨することは適切でなく、血清K値をモニターしつつ個別に調整する（GL p.83-84）。CKDではむしろより厳格な減塩（3〜6g/日）が推奨される。RA系阻害薬・MR拮抗薬併用時は高K血症リスクに注意。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=83","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=114"},{"no":3,"stem":"高血圧患者における適正体重維持に関連した記述として正しいのはどれか。","choices":{"a":"BMI 25未満が目標で、内臓脂肪型肥満では腹囲も評価する","b":"減量は3ヶ月以内に20%以上の急速減量が推奨される","c":"高齢者では肥満があっても減量は禁忌である","d":"肥満があれば減塩は不要である","e":"BMIが目標値内なら腹囲は評価不要である"},"format":"単一","correct":"a","explanation":"JSH2025では適正体重としてBMI 25未満を目標とし、内臓脂肪型肥満の評価には腹囲（男性85cm、女性90cm以上）を併用する（GL p.84-85）。緩徐な減量（3〜6ヶ月で3〜5%）が現実的。高齢者でも肥満合併高血圧では減量により降圧効果が得られるが、サルコペニア予防（蛋白質・運動）に配慮する。肥満と減塩は独立した推奨。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=85","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=115"},{"no":4,"stem":"高血圧患者に運動療法を処方する際の留意点について、JSH2025の記載と一致する正しい記述を2つ選べ。","choices":{"a":"中等度有酸素運動と中等度レジスタンス運動の併用が推奨される","b":"心血管疾患既往例では事前の運動耐容能評価が必要","c":"180/110mmHg以上の高度高血圧でも運動制限なく開始してよい","d":"重症高血圧・未治療の不安定狭心症は運動の禁忌・慎重対象である","e":"65歳以上では運動療法はむしろ有害であり推奨されない"},"format":"複数","correct":"ab","explanation":"JSH2025では有酸素運動（中等度強度30分以上/日または週180分以上）とレジスタンス運動（中等度強度週2-3回）の併用が推奨される（GL p.88-89, CQ6）。重症高血圧（180/110mmHg以上）・未治療の不安定狭心症・急性大動脈解離直後などは運動の禁忌・慎重対象であり、まず血圧管理を優先する。心血管疾患既往例では運動負荷試験等で評価する。年齢を問わず適切に処方できる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=88","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=124"},{"no":5,"stem":"高血圧患者の節酒・禁煙指導に関する記述として正しいのはどれか。","choices":{"a":"節酒・禁煙はいずれもJSH2025で標準的に推奨される生活習慣改善である","b":"禁煙後の体重増加リスクから、肥満合併例には禁煙を勧めない","c":"電子タバコ・加熱式タバコは紙巻きタバコの完全な代替で推奨される","d":"アルコールは少量なら心血管保護目的に処方される","e":"受動喫煙対策は高血圧管理とは無関係である"},"format":"単一","correct":"a","explanation":"JSH2025では節酒（男性エタノール20-30mL/日以下、女性10-20mL/日以下）と禁煙（受動喫煙対策含む）がいずれも標準的な生活習慣改善として推奨される（GL p.86）。禁煙後の体重増加は対策の対象ではあるが禁煙の禁忌ではない。電子タバコ・加熱式タバコの安全性は確立しておらず、紙巻きタバコの完全な代替とは認められない。少量飲酒の心血管保護は近年否定的。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=86","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=117"},{"no":6,"stem":"75歳男性。冬季早朝にトイレ立ち上がり後の意識消失。本態性高血圧で長期治療中。寒冷・睡眠・便秘・ストレスに関する管理として誤っているのはどれか。","choices":{"a":"脱衣所・浴室の温度差を小さくしヒートショックを予防","b":"便秘予防（食物繊維・水分摂取）により怒責による血圧上昇を回避","c":"睡眠時無呼吸症候群の合併は積極的に評価する","d":"夜間のトイレ起立時の急激な体位変化に注意する","e":"ストレス管理は高血圧管理に意味がないため考慮不要"},"format":"単一","correct":"e","explanation":"JSH2025ではストレス（職場・家庭）が高血圧の要因として記載され、ストレス管理（リラクゼーション・カウンセリング・睡眠の質改善）が推奨される（GL p.87）。寒冷曝露の回避、便秘改善、睡眠時無呼吸症候群の評価、起立性血圧変動への配慮もいずれも重要である。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=87","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=118"},{"no":7,"stem":"デジタル技術の活用に関するJSH2025の記載として正しいのはどれか。","choices":{"a":"スマートフォンアプリ・遠隔医療・ウェアラブル・AIなどを活用した管理が推進されている","b":"ウェアラブル光学式血圧計はカフ式血圧計に代わる診断機器として推奨される","c":"デジタル介入は若年者のみ有効で65歳以上では効果がない","d":"デジタル介入は薬物治療を代替する位置づけである","e":"家庭血圧データのクラウド共有は推奨されない"},"format":"単一","correct":"a","explanation":"JSH2025ではスマートフォンアプリ（CQ7：降圧効果あり、推奨）、遠隔医療、ウェアラブル、AI技術を活用したデジタルヘルスが推進されている（GL p.91-92）。ただしウェアラブル光学式血圧計は標準化途上で診断には上腕カフ式が原則。デジタル介入は薬物治療の代替ではなく補助で、家庭血圧の電子的共有は管理に有用とされる。年齢を問わず適切に活用できる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=91","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=128"},{"no":8,"stem":"JSH2025 CQ6「レジスタンス運動の降圧効果」に関する記述として正しいのはどれか。","choices":{"a":"中等度強度のレジスタンス運動は降圧効果があり、推奨される","b":"レジスタンス運動は降圧効果がない","c":"レジスタンス運動は心血管イベントを増加させるため禁忌である","d":"若年者のみ有効で高齢者には無効","e":"有酸素運動と比べ降圧効果は数倍大きい"},"format":"単一","correct":"a","explanation":"JSH2025 CQ6ではメタ解析等の結果から、中等度強度のレジスタンス運動は収縮期血圧・拡張期血圧をいずれも有意に低下させ、推奨される（GL p.89-90）。降圧効果は有酸素運動と同等または補完的で、両者の併用が望ましい。心血管疾患合併例では事前評価のもと安全に施行できる。年齢を問わず有効。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=89","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=125"},{"no":9,"stem":"JSH2025 CQ7「スマートフォンアプリによる血圧低下」に関する記述として正しいのはどれか。","choices":{"a":"スマートフォンアプリを用いた介入は血圧低下に有用と評価され推奨される","b":"アプリ介入には降圧効果がないことが確立している","c":"アプリは家庭血圧の値を改ざんするリスクが高く推奨されない","d":"アプリは医療費削減に逆行するため推奨されない","e":"高齢者にはスマートフォンを使えないため推奨されない"},"format":"単一","correct":"a","explanation":"JSH2025 CQ7では、スマートフォンアプリを用いた血圧管理介入は対照群と比較して血圧低下に有用とのメタ解析結果が示され、推奨されている（GL p.91-92）。家庭血圧記録、服薬・生活習慣のリマインダー、教育コンテンツ、遠隔指導との連携が降圧に寄与する。年齢にかかわらず操作可能な範囲で活用できる。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=91","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=128"},{"no":10,"stem":"JSH2025 Q3「減塩目標を6g/日未満とすべきか」の根拠について誤っているのはどれか。","choices":{"a":"減塩により高血圧患者で有意な収縮期血圧低下が示されている","b":"減塩は心血管イベント抑制と関連する","c":"日本人の現状摂取量と実行可能性から6g/日未満が現実的目標とされた","d":"WHO推奨（5g/日未満）と比較して合理的に説明できる目標値である","e":"国民全体の目標値（健康日本21）も6g/日未満で統一されている"},"format":"単一","correct":"e","explanation":"国民全体（一般集団）の目標は健康日本21（第三次）で男性7.5g/日未満、女性6.5g/日未満（合計を概ね7g/日未満レベル）とされ、高血圧患者の6g/日未満（JSH2025）とは異なる（GL p.85-86）。減塩の降圧・心血管イベント抑制効果はメタ解析等で確立しており、実行可能性も考慮した上で6g/日未満が現実的目標として設定されている。WHO（5g/日）より緩やかだが妥当。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=85","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=119"},{"no":11,"stem":"JSH2025 Q4「スポット尿による食塩摂取量推定」について誤っているのはどれか。","choices":{"a":"尿中Na・Cr濃度から推定式（田中式・川崎式・INTERSALT式）で算出される","b":"簡便で集団評価や長期的変化の把握に有用である","c":"個人の単回測定では日内・日間変動が大きく精度は限定的","d":"Na/K比は減塩とK摂取増加を一度に評価でき有用である","e":"24時間蓄尿と比べてゴールドスタンダードである"},"format":"単一","correct":"e","explanation":"食塩摂取量評価のゴールドスタンダードは24時間蓄尿によるNa排泄量測定であり、スポット尿による推定はその簡便な代替に位置づけられる（GL p.86, Q4）。スポット尿（田中式等）は集団評価・経時変化把握に有用、個人の単回評価では限界あり。Na/K比は減塩とK摂取の両者を一度に評価できる（Q5）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=86","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=120"},{"no":12,"stem":"JSH2025 Q5「スポット尿Na/K比」に関する記述として誤っているのはどれか。","choices":{"a":"Na/K比は減塩とK摂取の両者を反映する複合指標である","b":"Na/K比が高いほど血圧が高い傾向が示されている","c":"簡便な指標として臨床現場で活用できる","d":"腎機能低下例ではK摂取制限が必要なため指標の解釈に注意","e":"Na/K比は脳心血管病リスクと無関係である"},"format":"単一","correct":"e","explanation":"JSH2025 Q5では、スポット尿Na/K比は血圧および脳心血管病リスクと有意に関連し、複合指標として有用とされる（GL p.87）。Na/K比が高い（=Na過剰・K不足）ほど血圧が高く心血管イベントリスクも高い。腎機能低下例ではK摂取制限が必要となるため、Na/K比の解釈は腎機能を踏まえて行う。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=87","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=121"},{"no":13,"stem":"高血圧患者への減塩指導の実践（具体的方法）として誤っているのはどれか。","choices":{"a":"外食・加工食品・麺類のスープを残すなど食塩源の特定と回避","b":"減塩調味料・香辛料・酸味・出汁の活用","c":"栄養成分表示でNa量（mg）から食塩相当量（g）に換算（食塩相当量=Na×2.54÷1000）","d":"尿中Na排泄量や食事記録で経時的に減塩状況を評価","e":"減塩を急速に進めれば短期間で必ず血圧が30mmHg以上低下する"},"format":"単一","correct":"e","explanation":"減塩による降圧効果は平均で収縮期4-5mmHg、拡張期2-3mmHg程度（メタ解析）であり、個人差はあるが30mmHg以上の急激低下は通常期待できない（GL p.81-82）。減塩指導は食塩源の特定（汁物・漬物・加工食品・外食）、調味の工夫、栄養成分表示の活用、尿中Na評価による継続的フィードバックが基本。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=82","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=122"},{"no":14,"stem":"JSH2025における野菜・果物・カリウム摂取に関する記載として正しい記述を2つ選べ。","choices":{"a":"野菜・果物の摂取増加は血圧低下と関連する","b":"腎機能正常者ではK摂取増加が推奨される","c":"K摂取増加はアルドステロン分泌を抑制することで降圧する","d":"K製剤による補充が食事摂取より優先される","e":"果物は糖質が多いため高血圧患者全例で禁止する"},"format":"複数","correct":"ab","explanation":"JSH2025では野菜・果物摂取増加と腎機能正常者でのK摂取増加（男性3000mg/日以上、女性2600mg/日以上）が推奨される（GL p.83-84, p.88）。K摂取の降圧機序はNa利尿促進・血管拡張・交感神経抑制で、アルドステロンはむしろKで分泌促進される（過去問Q6の正解Dの根拠）。K製剤での補充は通常推奨されず、食事から摂取するのが基本。果物は糖質含有量に配慮しつつ適量摂取が推奨される（糖尿病合併例では量を調整）。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=83","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=123"},{"no":15,"stem":"55歳男性、肥満（BMI 28）合併高血圧。減量による降圧の機序として最も適切でないのはどれか。","choices":{"a":"交感神経活動の低下","b":"インスリン抵抗性の改善","c":"RAS（レニン-アンジオテンシン系）の活性低下","d":"ナトリウム保持の低下","e":"甲状腺機能の亢進"},"format":"単一","correct":"e","explanation":"減量による降圧機序として、交感神経活動低下・インスリン抵抗性改善・RAS活性低下・Na保持の低下・脂肪由来の昇圧因子（レプチン等）減少などが知られる（GL p.84-85）。甲状腺機能亢進は逆に血圧上昇・頻脈などを来す病態であり、減量による降圧機序ではない。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=85","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=124"},{"no":16,"stem":"高血圧患者に対する有酸素運動・レジスタンス運動の組み合わせとして誤っているのはどれか。","choices":{"a":"有酸素運動を毎日30分以上または週180分以上","b":"レジスタンス運動を中等度強度で週2-3回","c":"両者を組み合わせると単独より降圧効果が補完的に得られる","d":"重症高血圧では血圧管理を優先し、運動はまず控える","e":"高強度等尺性運動（最大握力静止保持等）を第一選択とする"},"format":"単一","correct":"e","explanation":"高強度の等尺性運動（Valsalva手技や最大努力の静止保持）は急激な昇圧を招き、第一選択ではない（GL p.89-90）。中等度の有酸素運動（毎日30分以上または週180分以上）と中等度のレジスタンス運動（週2-3回）の併用が標準。重症高血圧（180/110mmHg以上）では血圧管理を優先し運動は慎重に開始する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=89","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=125"},{"no":17,"stem":"60歳男性、高血圧、習慣性飲酒（日本酒3合/日）。節酒指導について誤っているのはどれか。","choices":{"a":"節酒目標はエタノール換算で男性20-30mL/日以下とする","b":"ビール中瓶1本、日本酒1合、ワイングラス2杯がほぼ同等のエタノール量","c":"節酒で収縮期血圧3〜4mmHgの低下が期待できる","d":"アルコール多飲では脳卒中・心房細動・肝障害のリスクも増加する","e":"完全禁酒は反動で重度高血圧を招くため避ける必要がある"},"format":"単一","correct":"e","explanation":"節酒目標を超えて完全断酒に至ることが高血圧管理上で問題となる根拠はなく、むしろアルコール依存・健康障害リスクのある例では断酒が望ましい（GL p.86）。離脱症候群（振戦・血圧変動）には注意するが計画的な減酒・断酒は安全に行える。節酒3〜4mmHgの降圧効果、脳卒中・心房細動・肝障害リスク低下、エタノール量換算（日本酒1合=ビール中瓶1本=ワイングラス2杯=約20-25mL）はいずれも正しい。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=86","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=126"},{"no":18,"stem":"高血圧管理における「その他の生活習慣」（寒冷・睡眠・便秘・ストレス）に関する正しい記述を2つ選べ。","choices":{"a":"冬季の入浴は脱衣所・浴室の暖房とぬるめの湯（40℃前後）で行う","b":"睡眠時無呼吸症候群（SAS）の合併は治療抵抗性高血圧の要因となりうる","c":"便秘・怒責は血圧変動と無関係である","d":"ストレスは血圧と関係しないため指導の対象外である","e":"寒冷曝露を意図的に増やすことで血圧が下がる"},"format":"複数","correct":"ab","explanation":"JSH2025では冬季の入浴は脱衣所・浴室の暖房とぬるめの湯（40℃前後）でヒートショック予防する（GL p.87）。睡眠時無呼吸症候群（SAS）は治療抵抗性高血圧・夜間/早朝高血圧の重要な要因。便秘時の怒責は急激な昇圧を招き、慢性ストレスも血圧上昇要因として記載される。寒冷曝露を増やすことで血圧は上昇する。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=87","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=127"},{"no":19,"stem":"高血圧におけるデジタル技術の活用について、JSH2025の見解として最も適切なのはどれか。","choices":{"a":"アプリ・遠隔医療・ウェアラブル・AI等を補助的に活用しつつ、診断は上腕カフ式血圧計を原則とする","b":"全症例で診断にウェアラブル光学式血圧計を用いるべきである","c":"デジタル技術は薬物治療を完全に代替する","d":"遠隔医療は対面診療より優れることが確立している","e":"AI診断は専門医による評価より精度が高いと確立している"},"format":"単一","correct":"a","explanation":"JSH2025ではデジタル技術（スマートフォンアプリ、遠隔医療、ウェアラブル、AI）を高血圧管理の補助として推進する一方、診断・治療判断には上腕カフ式血圧計（家庭血圧・診察室血圧）を原則とする（GL p.91-92）。ウェアラブル光学式血圧計は標準化途上。遠隔医療やAIは対面診療・専門医診断を代替するものではなく補完的に活用される。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=91","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=128"},{"no":20,"stem":"70歳男性、高血圧、軽度骨関節症。レジスタンス運動を新たに導入したい。CQ6を踏まえた処方として最も適切なのはどれか。","choices":{"a":"整形外科的評価のうえ、中等度強度（1RMの40-60%）を週2-3回、息こらえを避けて漸増","b":"最大努力（1RMの100%）の挙上を毎日行う","c":"高齢者には禁忌のため有酸素運動のみで対応","d":"脱水状態で運動した方が血圧が下がりやすい","e":"整形外科的問題があっても評価なしで高負荷から開始する"},"format":"単一","correct":"a","explanation":"JSH2025 CQ6に基づき、高齢者・関節疾患合併例では整形外科的評価のうえ、中等度強度（1RMの40-60%）を週2-3回、息こらえ（Valsalva）を避けつつ無理のない範囲で漸増することが推奨される（GL p.89-90）。年齢自体は禁忌ではない。最大努力の挙上や脱水下の運動はリスクを高めるため避ける。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=89","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=125"},{"no":21,"stem":"K摂取量増加の効果（作用）について間違っているものはどれか。1つ選べ。","choices":{"a":"Na利尿","b":"血管拡張","c":"交感神経抑制","d":"アルドステロン分泌抑制","e":"脳心血管病発症リスク低下"},"format":"単一","correct":"d","explanation":"JSH2025 第7章「生活習慣の改善」によると、カリウム摂取増加は①Na利尿促進、②血管拡張、③交感神経活性抑制、④脳心血管病発症リスク低下といった多面的作用を持つ。一方、Kはアルドステロン分泌をむしろ刺激する（高K血症で副腎からアルドステロンが分泌される生理機構）ため、『アルドステロン分泌抑制』は誤り。よってDが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=85","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=117","from_past_exam":true,"note":"次スライド(10.42.24)でDが黄色ハイライト。K負荷（高K摂取）の多面的作用としてはNa利尿・血管拡張・交感神経抑制・脳心血管系保護があるが、アルドステロン分泌は『抑制』ではなくむしろ刺激されるため誤り。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.40.03.png","confidence":"high","slide_section":"6 生活習慣改善"}]}],"gl_pages":[80,93],"su_pages":[111,130]},{"id":8,"title":"薬物治療","is_clinical":true,"part":2,"key_topics":["降圧薬選択の基本（主要降圧薬5クラス）","降圧薬治療STEP","薬物相互作用","減量と中止","併用療法（メリット・組合せ方・配合剤）","各種降圧薬の特徴と主な副作用（Ca拮抗薬・ARB・ACE阻害薬・利尿薬・β遮断薬・MR拮抗薬・ARNI）","Q6: III度高血圧で併用療法から開始","Q7: chronotherapy（投薬時刻の調整）"],"sets":[{"day":1,"questions":[{"no":1,"stem":"JSH2025における主要降圧薬5クラスの組合せとして正しいのはどれか。","choices":{"a":"Ca拮抗薬、ARB、ACE阻害薬、サイアザイド系利尿薬、β遮断薬","b":"Ca拮抗薬、ARB、ACE阻害薬、サイアザイド系利尿薬、MR拮抗薬","c":"Ca拮抗薬、ARB、ACE阻害薬、ループ利尿薬、β遮断薬","d":"Ca拮抗薬、ARB、ACE阻害薬、α遮断薬、β遮断薬","e":"Ca拮抗薬、ARNI、ACE阻害薬、サイアザイド系利尿薬、β遮断薬"},"format":"単一","correct":"a","explanation":"JSH2025の主要降圧薬5クラスは、Ca拮抗薬・ARB・ACE阻害薬・サイアザイド/サイアザイド類似利尿薬・β遮断薬。ARNIは主要5クラスとは別枠で新たに位置づけられた。MR拮抗薬は治療抵抗性高血圧での追加薬として推奨される。GL p.94-95参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=96","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=131"},{"no":2,"stem":"JSH2025における降圧薬STEPに関する記述として正しいのはどれか。","choices":{"a":"STEP1はARB/ACE阻害薬+Ca拮抗薬+利尿薬の3剤併用が推奨される","b":"STEP1で積極的適応がなければG1降圧薬から選択する","c":"STEP2は主要5クラスから1剤を選択する単剤治療段階である","d":"STEP3でMR拮抗薬を追加投与することは推奨されない","e":"降圧薬STEPは降圧目標達成までの薬物選択フローではない"},"format":"単一","correct":"b","explanation":"JSH2025の降圧薬STEP1では積極的適応の有無を確認し、なければG1降圧薬（ACE阻害薬・ARB・Ca拮抗薬・サイアザイド系利尿薬・ARNI）から選択する。STEP2でG1の2剤併用、STEP3で3剤併用（RA系阻害薬+Ca拮抗薬+利尿薬）、STEP4でMR拮抗薬等を追加する。GL p.95-96参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=97","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=132"},{"no":3,"stem":"降圧薬の選択に関して、JSH2025で示される降圧薬群分類（G1～G3）について正しいのはどれか。","choices":{"a":"ARNIはG1降圧薬に分類される","b":"β遮断薬はG1降圧薬に分類される","c":"ループ利尿薬はG1降圧薬として最初の1剤に使用できる","d":"α遮断薬はG1降圧薬に分類される","e":"MR拮抗薬はG1降圧薬に分類される"},"format":"単一","correct":"a","explanation":"JSH2025の新分類でARNI（アンジオテンシン受容体ネプリライシン阻害薬・サクビトリルバルサルタン）はG1降圧薬に位置づけられた。β遮断薬はG2、MR拮抗薬・α遮断薬はG3。ループ利尿薬はうっ血性心不全等の積極的適応がある場合に限り使用される。GL p.95、SU p.132参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=97","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=132"},{"no":4,"stem":"70歳男性、III度高血圧（180/110 mmHg）で受診。臓器障害なし、糖尿病・CKDなし。JSH2025に基づく初期治療として最も適切なのはどれか。","choices":{"a":"生活習慣改善のみで1ヶ月経過観察","b":"ARB単剤少量から開始","c":"Ca拮抗薬単剤少量から開始","d":"ARB+Ca拮抗薬の2剤併用療法から開始","e":"ARB+Ca拮抗薬+サイアザイド系利尿薬の3剤併用から開始"},"format":"単一","correct":"d","explanation":"Q6（III度高血圧で併用療法から開始）はJSH2025で推奨される。160/100 mmHg以上のII度以上高血圧では単剤での降圧目標達成率が低く、初期から2剤併用が考慮される。特にIII度高血圧では2剤併用が推奨され、配合剤の活用も有用。3剤併用はSTEP3に該当する。GL p.96-97参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=98","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=135"},{"no":5,"stem":"chronotherapy（投薬時刻の調整）に関するJSH2025の記述として正しいのはどれか。","choices":{"a":"夜間高血圧例では全例就寝前投与に切り替えることが推奨される","b":"Hygia試験の結果に基づき就寝前投与が一律推奨される","c":"ABPMで夜間血圧上昇例では就寝前投与を考慮してもよいが画一的な就寝前投与は推奨されない","d":"morning surge抑制を目的に全例朝食前投与が推奨される","e":"chronotherapyの概念はJSH2025では削除された"},"format":"単一","correct":"c","explanation":"Q7（chronotherapy）はJSH2025で扱われる。Hygia試験は方法論的問題から再評価が必要とされ、TIME試験など追試では就寝前投与の有意性は示されなかった。よって画一的な就寝前投与は推奨されないが、夜間高血圧や早朝高血圧では個別に投与時刻調整を考慮してもよい。GL p.98参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=100","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=140"},{"no":6,"stem":"ジヒドロピリジン系Ca拮抗薬（アムロジピン等）の特徴と副作用について誤っているのはどれか。","choices":{"a":"強力な降圧効果を有する","b":"主な副作用に下腿浮腫・顔面紅潮・歯肉肥厚がある","c":"グレープフルーツジュースで血中濃度が上昇しうる","d":"高齢者・腎機能低下例でも比較的安全に使用可能","e":"高K血症の副作用に注意が必要である"},"format":"単一","correct":"e","explanation":"Ca拮抗薬は高K血症を起こさない。高K血症はARB・ACE阻害薬・MR拮抗薬・ARNIで注意すべき副作用。Ca拮抗薬はL型Caチャネル遮断で血管平滑筋を弛緩させ強力に降圧する。下腿浮腫は毛細血管前細動脈拡張による静水圧上昇が原因で、ARB併用で軽減する。CYP3A4代謝のためグレープフルーツで血中濃度上昇。GL p.99-100、SU p.144参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=101","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=144"},{"no":7,"stem":"ARB（アンジオテンシンII受容体拮抗薬）の特徴として正しいのはどれか。","choices":{"a":"空咳の副作用がACE阻害薬より高頻度である","b":"腎保護作用・心保護作用のエビデンスがある","c":"妊娠中も安全に使用可能である","d":"両側腎動脈狭窄症例に第一選択である","e":"高K血症は起こさない"},"format":"単一","correct":"b","explanation":"ARBは蛋白尿減少・腎機能低下抑制・左室肥大退縮など腎保護・心保護作用のエビデンスを有する。空咳はACE阻害薬で多くARBではまれ（ブラジキニン蓄積によらないため）。妊娠中は禁忌（胎児腎発生障害・羊水過少）。両側腎動脈狭窄では急性腎障害リスクで禁忌。高K血症は起こりうる。GL p.100、SU p.146参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=102","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=146"},{"no":8,"stem":"ACE阻害薬の副作用として典型的なのはどれか。","choices":{"a":"下腿浮腫","b":"歯肉肥厚","c":"空咳","d":"光線過敏症","e":"高血糖"},"format":"単一","correct":"c","explanation":"ACE阻害薬は気道粘膜のブラジキニン蓄積により空咳を約20-30%（日本人では特に多い）で生じる。誤嚥性肺炎予防効果として高齢者で逆に有用とされる場合もある。重篤な副作用に血管浮腫（angioedema）がある。下腿浮腫・歯肉肥厚はCa拮抗薬、光線過敏症はサイアザイド利尿薬、高血糖はサイアザイドやβ遮断薬で問題。GL p.100、SU p.147参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=102","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=147"},{"no":9,"stem":"サイアザイド系利尿薬（ヒドロクロロチアジド・トリクロルメチアジド等）の副作用として正しい組合せはどれか。","choices":{"a":"低K血症・高Na血症・高血糖","b":"低K血症・高尿酸血症・耐糖能異常","c":"高K血症・低尿酸血症・低血糖","d":"低Mg血症・低Ca血症・脱水","e":"高Na血症・代謝性アシドーシス・横紋筋融解症"},"format":"単一","correct":"b","explanation":"サイアザイド系利尿薬は遠位尿細管Na-Cl共輸送体を阻害。代謝面では低K血症・低Na血症・低Mg血症・高Ca血症・高尿酸血症・耐糖能異常（インスリン抵抗性増悪）・脂質異常をきたす。痛風・重症糖尿病では慎重投与。少量（HCTZ12.5mg等）使用で副作用軽減と降圧効果が得られる。GL p.101、SU p.152参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=103","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=152"},{"no":10,"stem":"β遮断薬の降圧薬としての位置づけについて正しいのはどれか。","choices":{"a":"JSH2025の第一選択薬として推奨される","b":"気管支喘息・II度以上の房室ブロックは禁忌である","c":"糖尿病合併例で第一選択である","d":"末梢動脈疾患合併例で推奨される","e":"脳卒中予防効果はARB・Ca拮抗薬より優れる"},"format":"単一","correct":"b","explanation":"β遮断薬は気管支喘息（β2遮断で気管支攣縮）、II度以上の房室ブロック、徐脈、SSSは禁忌または慎重投与。脳卒中予防効果がARB等より劣ることが示され第一選択から外れたが、冠動脈疾患・心不全・頻脈性不整脈合併例では積極的適応となる。糖尿病では低血糖症状マスク・耐糖能悪化に注意。末梢動脈疾患では末梢循環悪化に注意。GL p.101、SU p.155参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=103","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=155"},{"no":11,"stem":"MR拮抗薬（スピロノラクトン・エプレレノン・エサキセレノン）の使用上の注意として正しいのはどれか。","choices":{"a":"高K血症のリスクがあり、特にRA系阻害薬併用時にはK値モニタリングが必須","b":"サイアザイド系利尿薬との併用は禁忌","c":"原発性アルドステロン症の治療には推奨されない","d":"エプレレノンは女性化乳房の副作用が多い","e":"腎機能正常例では治療抵抗性高血圧に追加投与しても効果は限定的"},"format":"単一","correct":"a","explanation":"MR拮抗薬は腎集合管のMR遮断でNa排泄・K貯留を起こすため高K血症リスクが高く、RA系阻害薬併用時は特に厳重なK・腎機能モニタリングが必要（eGFR<30で禁忌相当）。スピロノラクトンは非選択的でアンドロゲン受容体阻害により女性化乳房・月経異常をきたすが、エプレレノン・エサキセレノンは選択的で軽減。PATHWAY-2試験で治療抵抗性高血圧へのスピロノラクトン追加の有用性が示された（Q10）。GL p.101-102、SU p.158参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=103","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=158"},{"no":12,"stem":"ARNI（サクビトリルバルサルタン）に関するJSH2025の記述として正しいのはどれか。","choices":{"a":"ACE阻害薬と併用することで降圧効果が増強される","b":"ネプリライシン阻害によりBNP・ANPの分解を抑制し降圧・心保護作用を示す","c":"高K血症の副作用はARBより少ない","d":"妊娠中の高血圧に推奨される","e":"腎機能低下例では禁忌である"},"format":"単一","correct":"b","explanation":"ARNI（サクビトリルバルサルタン）はネプリライシン（中性エンドペプチダーゼ）阻害でBNP/ANP/CNPの分解を抑制し、ナトリウム利尿・血管拡張・抗線維化作用を発揮。同時にARB成分でAT1受容体遮断。HFrEFで予後改善（PARADIGM-HF）、高血圧症にも適応拡大。ACE阻害薬併用は血管浮腫リスク増加で禁忌（36時間以上の中止が必要）。妊娠中禁忌。高K血症はARBと同等以上に注意。GL p.102、SU p.160参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=104","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=160"},{"no":13,"stem":"降圧薬の併用療法において推奨される組合せとして適切なのはどれか。","choices":{"a":"ACE阻害薬+ARB","b":"ACE阻害薬+ARNI","c":"ARB+Ca拮抗薬","d":"非ジヒドロピリジン系Ca拮抗薬+β遮断薬","e":"ループ利尿薬+サイアザイド系利尿薬（恒常的に）"},"format":"単一","correct":"c","explanation":"ARB+Ca拮抗薬はJSH2025で推奨される代表的併用パターンで、配合剤も多数。ARB+ACE阻害薬は併用禁忌（ONTARGET試験で腎障害・高K血症増加）。ARNI+ACE阻害薬も血管浮腫リスクで禁忌。非ジヒドロピリジン系Ca拮抗薬（ベラパミル・ジルチアゼム）+β遮断薬は徐脈・房室ブロック・心不全悪化で原則併用回避。ループ+サイアザイドは難治性浮腫・心不全での短期併用に限る。GL p.96-97、SU p.165参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=98","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=165"},{"no":14,"stem":"降圧薬の薬物相互作用について誤っているのはどれか。","choices":{"a":"NSAIDsはRA系阻害薬・利尿薬の降圧作用を減弱させる","b":"ジルチアゼム・ベラパミルはCYP3A4阻害によりスタチンの血中濃度を上昇させる","c":"ACE阻害薬とK保持性利尿薬（MR拮抗薬）併用で低K血症が問題となる","d":"リチウムとサイアザイドの併用でリチウム中毒のリスクがある","e":"グレープフルーツジュースは一部のCa拮抗薬の血中濃度を上昇させる"},"format":"単一","correct":"c","explanation":"ACE阻害薬（K上昇）+MR拮抗薬（K保持）併用ではむしろ高K血症（hyperkalemia）が問題となる。NSAIDsは腎プロスタグランジン抑制で腎血流低下・Na再吸収増加し、利尿薬・RA系阻害薬の作用を減弱。ベラパミル・ジルチアゼムは強力なCYP3A4阻害剤でシンバスタチン・アトルバスタチン濃度を上げ横紋筋融解症リスク。サイアザイドはNa排泄促進でリチウム再吸収増加→リチウム中毒。ジヒドロピリジン系はグレープフルーツで濃度上昇。GL p.95、SU p.137参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=97","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=137"},{"no":15,"stem":"60歳女性、糖尿病性腎症（eGFR 45 mL/min/1.73m²、尿蛋白2+）合併高血圧。第一選択薬として最も適切なのはどれか。","choices":{"a":"アムロジピン","b":"ロサルタン（ARB）","c":"ヒドロクロロチアジド","d":"ビソプロロール","e":"スピロノラクトン"},"format":"単一","correct":"b","explanation":"蛋白尿を有するCKD・糖尿病性腎症ではRA系阻害薬（ARB・ACE阻害薬）が第一選択（CQ11・CQ13）。輸出細動脈拡張による糸球体内圧低下で蛋白尿減少・腎保護効果が得られる。導入時は一過性のCr上昇（30%以内なら継続可）・高K血症に注意。eGFR<30では慎重投与。Ca拮抗薬は腎保護として2剤目以降、サイアザイドはeGFR<30で効果不十分。GL p.100、SU p.146参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=102","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=146"},{"no":16,"stem":"降圧薬の減量・中止に関するJSH2025の推奨として正しいのはどれか。","choices":{"a":"降圧目標達成後は速やかに全薬剤中止を検討する","b":"減量・中止後も家庭血圧モニタリングと定期受診で再上昇に備える","c":"中止可能例の予測因子は確立されておらず、減量試行は推奨されない","d":"β遮断薬は突然中止しても問題ない","e":"高齢者では一律に降圧薬中止が推奨される"},"format":"単一","correct":"b","explanation":"JSH2025では適切な血圧コントロール継続例で減量・中止を試みる場合は、家庭血圧モニタリング継続と定期受診による再上昇監視が必須。再上昇率は1年で約30-50%。減量可能性は若年・低リスク・少量単剤コントロール例で高い。β遮断薬は突然中止でリバウンド高血圧・狭心症増悪・頻脈をきたすため漸減が必要。高齢者でもフレイル・起立性低血圧時に個別判断で減量を考慮する。GL p.95-96、SU p.139参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=97","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=139"},{"no":17,"stem":"降圧薬の配合剤のメリットとして正しいものを2つ選べ。","choices":{"a":"服薬アドヒアランスの改善","b":"個々の薬剤用量の細かい調整が容易","c":"医療費の削減（多くの場合）","d":"副作用発現時の原因薬剤特定が容易","e":"腎機能低下時に用量調整が不要"},"format":"複数","correct":"ac","explanation":"配合剤は1錠で2-3成分を含み服薬数減少→アドヒアランス向上、医療費削減（合算薬価より低い）、降圧効果増強、副作用相殺（ARB+Ca拮抗薬で浮腫軽減等）のメリットあり。デメリットは用量調整困難、副作用の原因薬剤同定困難、腎機能変化時の調整困難。JSH2025では2剤併用が必要な症例で配合剤の活用を推奨。GL p.96-97、SU p.165参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=98","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=165"},{"no":18,"stem":"55歳男性、本態性高血圧で痛風発作既往あり、尿酸9.2 mg/dL。降圧薬選択として避けるべき薬剤はどれか。","choices":{"a":"ロサルタン","b":"アムロジピン","c":"ヒドロクロロチアジド","d":"エナラプリル","e":"アゼルニジピン"},"format":"単一","correct":"c","explanation":"サイアザイド系利尿薬は尿酸排泄低下により高尿酸血症・痛風発作を誘発・増悪させるため痛風例では避ける。ロサルタンは唯一URAT1阻害作用を持ちARBの中で尿酸低下作用を有するため好適。Ca拮抗薬・ACE阻害薬は尿酸代謝への悪影響は少ない。β遮断薬は尿酸上昇作用あり。MR拮抗薬（スピロノラクトン）も尿酸上昇に注意。GL p.101、SU p.152参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=103","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=152"},{"no":19,"stem":"ACE阻害薬・ARBを開始した患者で、初回投与1週間後に血清Cr 1.2→1.6 mg/dL（33%上昇）、K 4.2→5.8 mEq/Lとなった。最も疑うべき病態はどれか。","choices":{"a":"薬剤性間質性腎炎","b":"両側腎動脈狭窄症","c":"原発性アルドステロン症","d":"急性糸球体腎炎","e":"薬剤性肝障害"},"format":"単一","correct":"b","explanation":"両側腎動脈狭窄・片腎の腎動脈狭窄症ではアンジオテンシンII依存性の輸出細動脈収縮で糸球体濾過圧を維持しているため、RA系阻害薬で輸出細動脈拡張→糸球体内圧低下→急性腎障害・高K血症を起こす。RA系阻害薬は禁忌。Cr30%以上上昇または高度高K血症は中止基準。腎動脈エコー・CT/MRAで診断確認を行う。GL p.100、SU p.147参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=102","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=147"},{"no":20,"stem":"JSH2025で降圧薬の積極的適応について正しい組合せはどれか。","choices":{"a":"心不全（HFrEF）にはβ遮断薬・ARNI・MR拮抗薬・SGLT2阻害薬","b":"頻脈合併高血圧にはCa拮抗薬（ジヒドロピリジン系）","c":"蛋白尿合併CKDにはサイアザイド系利尿薬","d":"脳血管障害慢性期にはβ遮断薬","e":"高齢者収縮期高血圧にはα遮断薬"},"format":"単一","correct":"a","explanation":"HFrEFの基本治療薬は4本柱（fantastic four）：ARNI（またはACE阻害薬/ARB）+β遮断薬+MR拮抗薬+SGLT2阻害薬。頻脈合併高血圧にはβ遮断薬・非ジヒドロピリジン系Ca拮抗薬（ジヒドロピリジン系は反射性頻脈悪化）。蛋白尿合併CKDにはRA系阻害薬。脳血管障害慢性期にはCa拮抗薬・ARB・利尿薬（PROGRESS試験）。高齢者収縮期高血圧にはCa拮抗薬・利尿薬・ARB。GL p.97-98、SU p.142参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=99","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=142"}]},{"day":2,"questions":[{"no":1,"stem":"65歳男性、糖尿病・心房細動合併の高血圧（160/95 mmHg）。ワルファリン服用中。降圧薬選択で特に注意すべき相互作用を持つのはどれか。","choices":{"a":"アムロジピン","b":"オルメサルタン","c":"アゼルニジピン+トラスツズマブ","d":"ジルチアゼム","e":"テルミサルタン"},"format":"単一","correct":"d","explanation":"ジルチアゼム・ベラパミル（非ジヒドロピリジン系Ca拮抗薬）はCYP3A4阻害でワルファリン代謝を遅延させPT-INR上昇・出血リスクを増加。同様にスタチン・タクロリムス・シクロスポリン濃度も上昇させる。さらにβ遮断薬併用で徐脈・房室ブロック・心不全悪化に注意。心房細動例では基本的にレート/リズムコントロールと抗凝固を考慮し、降圧はARB+ジヒドロピリジン系Ca拮抗薬が無難。GL p.95、SU p.144参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=97","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=144"},{"no":2,"stem":"JSH2025の降圧薬STEPで、STEP3（3剤併用）からSTEP4に進むとき追加を考慮する薬剤として最も適切なのはどれか。","choices":{"a":"ループ利尿薬","b":"α遮断薬","c":"MR拮抗薬","d":"中枢性交感神経抑制薬","e":"直接作用型血管拡張薬（ヒドララジン）"},"format":"単一","correct":"c","explanation":"JSH2025のSTEP3はRA系阻害薬+Ca拮抗薬+サイアザイド系利尿薬の3剤併用、STEP4ではMR拮抗薬（スピロノラクトン）の追加を第一に考慮する。PATHWAY-2試験で治療抵抗性高血圧に対するスピロノラクトン25-50mg追加がα遮断薬・β遮断薬より優れた降圧効果を示した。Q10（治療抵抗性高血圧へのMR拮抗薬追加の有用性）参照。次にβ遮断薬・α遮断薬・中枢性交感神経抑制薬等を検討する。GL p.96、SU p.158参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=98","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=158"},{"no":3,"stem":"Ca拮抗薬と他薬の薬物相互作用について正しいのはどれか。","choices":{"a":"アムロジピンとシンバスタチンの併用で横紋筋融解症リスクが上がる","b":"ベラパミルはジゴキシン血中濃度を低下させる","c":"アゼルニジピンはアトルバスタチン濃度を増加させない","d":"ジヒドロピリジン系はグレープフルーツジュースで効果が減弱する","e":"ジルチアゼムはタクロリムス・シクロスポリン濃度を低下させる"},"format":"単一","correct":"a","explanation":"アムロジピンはCYP3A4基質で、シンバスタチン併用時20mg以下に制限が必要（添付文書）。横紋筋融解症リスクが上がる。ベラパミル・ジルチアゼムはCYP3A4阻害・P糖蛋白阻害でジゴキシン濃度上昇（中毒注意）。アゼルニジピン・ジルチアゼムはアトルバスタチン濃度を上げる。グレープフルーツジュースはCYP3A4阻害でCa拮抗薬濃度を上昇させる（効果増強）。ジルチアゼムは免疫抑制薬濃度を上昇させる。GL p.95、SU p.144参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=97","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=144"},{"no":4,"stem":"降圧薬の中止・減量を検討する際の指針として正しいものを2つ選べ。","choices":{"a":"1剤少量で良好にコントロールされた若年・低リスク例は減量試行可能","b":"減量後は家庭血圧と診察室血圧の両方でフォローする","c":"中止後の血圧再上昇率は5%未満と低い","d":"β遮断薬・クロニジンは突然中止が推奨される","e":"高齢者・複数臓器障害例では全例中止を試みる"},"format":"複数","correct":"ab","explanation":"JSH2025は降圧薬減量・中止について、低リスク・1剤少量コントロール例での試行を許容するが、中止後1年で30-50%が再上昇するため家庭血圧と定期受診の継続が必須。β遮断薬・クロニジンは突然中止でリバウンド・離脱症候群（高血圧・頻脈・狭心症増悪）を起こすため漸減（2-4週かけ）。高齢者・臓器障害例ではフレイル・起立性低血圧・転倒リスクと血圧管理のバランスで個別判断。GL p.95-96、SU p.139参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=97","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=139"},{"no":5,"stem":"55歳女性、本態性高血圧でACE阻害薬（エナラプリル）導入後3週間で夜間咳嗽が出現。最も適切な対応はどれか。","choices":{"a":"鎮咳薬を併用してエナラプリルを継続","b":"エナラプリルを中止しARBに変更","c":"Ca拮抗薬に変更","d":"β遮断薬に変更","e":"胸部CTで肺癌を除外する"},"format":"単一","correct":"b","explanation":"ACE阻害薬による空咳はブラジキニン・サブスタンスP蓄積による副作用で、日本人では特に高頻度（20-30%）。降圧効果・腎心保護効果を維持しつつ咳嗽を回避するには、同じRA系阻害薬であるARBへの変更が最適。ARBはブラジキニン蓄積を起こさず空咳発現率はプラセボと同等。ただし誤嚥性肺炎予防効果はACE阻害薬の利点でもあり、高齢者では条件次第で利点になることもある。GL p.100、SU p.147参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=102","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=147"},{"no":6,"stem":"ARNI（サクビトリルバルサルタン）の使用について誤っているのはどれか。","choices":{"a":"ACE阻害薬から切り替える際は36時間以上の休薬期間が必要","b":"高K血症・腎機能悪化に注意し定期モニタリングが必要","c":"血管浮腫の既往例には禁忌である","d":"重症肝障害例には禁忌である","e":"妊娠・授乳中も使用可能である"},"format":"単一","correct":"e","explanation":"ARNIはARB成分を含み、妊娠中（特に第2-3三半期）は胎児の腎発生障害・羊水過少・頭蓋低形成等を起こすため禁忌。授乳中も避ける。ACE阻害薬との併用・切替時は血管浮腫リスクで36時間以上の休薬必要。血管浮腫既往は禁忌。重症肝障害（Child-Pugh C）は禁忌。HFrEFと高血圧症に適応。降圧効果はARB単独より強力。GL p.102、SU p.160参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=104","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=160"},{"no":7,"stem":"降圧薬と代謝への影響について正しいのはどれか。","choices":{"a":"サイアザイド系利尿薬は耐糖能を改善する","b":"ARB（特にロサルタン）は尿酸を低下させる","c":"β遮断薬はLDLコレステロール・中性脂肪を改善する","d":"ACE阻害薬は新規糖尿病発症を増加させる","e":"Ca拮抗薬は血糖を上昇させる"},"format":"単一","correct":"b","explanation":"ロサルタンはURAT1（尿酸トランスポーター）阻害作用を持つ唯一のARBで尿酸低下作用を示す。サイアザイド系利尿薬・β遮断薬は耐糖能悪化・脂質悪化・尿酸上昇をきたしうる（メタボ・糖尿病で慎重）。ACE阻害薬・ARBはむしろ新規糖尿病発症を抑制（インスリン感受性改善）。Ca拮抗薬は代謝中立的で糖・脂質に影響なし。GL p.100-101、SU p.146参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=103","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=146"},{"no":8,"stem":"高血圧合併心不全（HFrEF、EF 30%）患者の降圧薬選択で最も推奨されないのはどれか。","choices":{"a":"サクビトリルバルサルタン（ARNI）","b":"ビソプロロール（β1選択性β遮断薬）","c":"スピロノラクトン（MR拮抗薬）","d":"エンパグリフロジン（SGLT2阻害薬）","e":"ジルチアゼム（非ジヒドロピリジン系Ca拮抗薬）"},"format":"単一","correct":"e","explanation":"非ジヒドロピリジン系Ca拮抗薬（ジルチアゼム・ベラパミル）は陰性変力作用でHFrEFを増悪させるため禁忌・原則使用しない。HFrEFの基本治療はGDMTのfantastic four：ARNI（または ACE阻害薬/ARB）+β遮断薬（カルベジロール/ビソプロロール）+MR拮抗薬+SGLT2阻害薬。Ca拮抗薬使用が必要ならアムロジピン（PRAISE試験で安全性確認）。GL p.97、SU p.142参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=99","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=142"},{"no":9,"stem":"降圧薬としてのβ遮断薬の選択について正しいのはどれか。","choices":{"a":"β2選択性が高いほど気管支喘息で安全","b":"ISA（内因性交感神経刺激作用）を有する薬剤は徐脈・心拍数低下効果が強い","c":"α/β遮断薬（カルベジロール）は末梢血管拡張作用を併せ持つ","d":"ピンドロールは心不全患者で第一選択である","e":"アテノロールは脳卒中予防効果が最も強い"},"format":"単一","correct":"c","explanation":"カルベジロール・ラベタロールはα1遮断作用も併せ持ち末梢血管拡張で降圧効果増強、心不全に有効。気管支喘息ではβ1選択性が高い薬剤（ビソプロロール等）の方が比較的安全だが完全には禁忌解除されない。ISAを持つ薬剤（ピンドロール等）は徐脈作用が弱く心不全・心筋梗塞二次予防には不向き。アテノロールは脳卒中予防効果が弱いことが示され第一選択から外れた（LIFE試験等）。GL p.101、SU p.155参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=103","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=155"},{"no":10,"stem":"75歳男性、収縮期高血圧（170/75 mmHg）。フレイル指標2項目該当、起立試験で起立性低血圧軽度あり。降圧薬選択として最も適切なのはどれか。","choices":{"a":"ARB（ロサルタン）少量から漸増","b":"α遮断薬（ドキサゾシン）","c":"ループ利尿薬（フロセミド）","d":"β遮断薬（アテノロール）","e":"クロニジン（中枢性交感神経抑制薬）"},"format":"単一","correct":"a","explanation":"高齢者・収縮期高血圧の第一選択はCa拮抗薬・サイアザイド系利尿薬・ARB/ACE阻害薬。起立性低血圧・フレイル例では少量から開始し慎重に増量。α遮断薬は起立性低血圧悪化で第一選択を避ける。ループ利尿薬は脱水・電解質異常リスクで通常の降圧目的には使わない（心不全・腎不全合併時のみ）。クロニジンは中枢作用で認知症リスク・抑うつ・突然中止時のリバウンド高血圧で避ける。GL p.96-98、SU p.140参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=98","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=140"},{"no":11,"stem":"ACE阻害薬・ARBの妊娠・授乳期における使用について正しいのはどれか。","choices":{"a":"妊娠初期のみ禁忌で第2-3三半期は使用可能","b":"妊娠中全期間禁忌である","c":"授乳中は問題なく使用できる","d":"ARBは胎児に影響しないが、ACE阻害薬は禁忌である","e":"妊娠高血圧症候群の第一選択薬である"},"format":"単一","correct":"b","explanation":"ACE阻害薬・ARB・ARNIは妊娠全期間で禁忌。特に第2-3三半期では胎児腎発生障害・羊水過少・肺低形成・頭蓋低形成・胎児死亡をきたす（fetal renin-angiotensin system blockade syndrome）。妊娠可能性のある女性には別の降圧薬（メチルドパ・ラベタロール・ニフェジピン徐放等）を選択。授乳中も乳児腎機能への影響からエナラプリル等一部を除き慎重投与。GL p.100、SU p.147参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=102","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=147"},{"no":12,"stem":"サイアザイド系利尿薬・サイアザイド類似薬（インダパミド）について正しいのはどれか。","choices":{"a":"eGFR 20 mL/min/1.73m²でも降圧効果は維持される","b":"インダパミドはサイアザイド類似薬で降圧効果が優れる","c":"低用量サイアザイドは代謝面の副作用が少なく安全に長期使用可能","d":"心不全合併例ではループ利尿薬で代替できない","e":"高Ca血症はサイアザイド使用例で生じない"},"format":"単一","correct":"c","explanation":"サイアザイド系利尿薬は通常用量（HCTZ 12.5-25mg、トリクロルメチアジド 1-2mg）で代謝面の副作用が軽減され、長期心血管予防効果も維持される。eGFR<30-40 mL/min/1.73m²では効果減弱しループ利尿薬への変更を検討。インダパミドは血管拡張作用も併せ持ち代謝への影響が少ない。サイアザイドは遠位尿細管でCa再吸収促進→高Ca血症をきたしうる（特に副甲状腺機能亢進例で注意）。GL p.101、SU p.152参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=103","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=152"},{"no":13,"stem":"原発性アルドステロン症（PA）が疑われる治療抵抗性高血圧患者で、MR拮抗薬を選択する際、副作用面で最も配慮されるのはどれか。","choices":{"a":"スピロノラクトンの女性化乳房・性機能障害がエプレレノン・エサキセレノンより多い","b":"エプレレノンはeGFR制限なく全症例に投与可能","c":"エサキセレノンは妊娠中も使用可能","d":"MR拮抗薬は高K血症をほぼ起こさない","e":"スピロノラクトンは選択的MR拮抗薬である"},"format":"単一","correct":"a","explanation":"スピロノラクトンは非選択的でアンドロゲン受容体・プロゲステロン受容体にも結合し女性化乳房・月経異常・性機能障害をきたす。エプレレノン・エサキセレノンは選択的MR拮抗薬でこれら副作用が少ない。ただしエプレレノンは糖尿病性腎症・中等度以上腎障害（eGFR<50）で禁忌。エサキセレノンはより新しく副作用バランス良好。全てのMR拮抗薬は高K血症に注意（特にRA系阻害薬併用時）。妊娠中は禁忌。GL p.101-102、SU p.158参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=103","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=158"},{"no":14,"stem":"次の降圧薬の副作用と組合せで誤っているのはどれか。","choices":{"a":"アムロジピン - 下腿浮腫","b":"エナラプリル - 空咳","c":"ヒドロクロロチアジド - 低Na血症・低K血症","d":"ビソプロロール - 気管支攣縮","e":"スピロノラクトン - 低K血症"},"format":"単一","correct":"e","explanation":"スピロノラクトンはMR拮抗薬でK保持性利尿薬であり、低K血症ではなく高K血症が問題となる副作用。RA系阻害薬・MR拮抗薬・ARNIは全て高K血症リスクあり。アムロジピン下腿浮腫・エナラプリル空咳・サイアザイドの低Na/低K血症・β遮断薬の気管支攣縮はいずれも代表的副作用。GL p.99-102、SU p.158参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=103","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=158"},{"no":15,"stem":"JSH2025のSTEP1で積極的適応がない高血圧患者に対して、最初に選択するG1降圧薬として推奨されないのはどれか。","choices":{"a":"アムロジピン","b":"オルメサルタン","c":"エナラプリル","d":"ヒドロクロロチアジド（少量）","e":"フロセミド"},"format":"単一","correct":"e","explanation":"G1降圧薬（first-line）はCa拮抗薬・ARB・ACE阻害薬・サイアザイド/サイアザイド類似系利尿薬・ARNI。ループ利尿薬（フロセミド・トラセミド）は降圧効果は弱く作用時間が短いため、心不全・腎不全合併等の積極的適応がない限り通常の降圧目的には用いない。サイアザイドの低用量使用でも降圧と心血管予防効果が確認されている。GL p.95、SU p.131参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=97","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=131"},{"no":16,"stem":"60歳男性、II度高血圧（165/100 mmHg）、糖尿病・蛋白尿あり、痛風既往あり。最も適切な初期治療はどれか。","choices":{"a":"ロサルタン+アムロジピンの2剤併用から開始","b":"ヒドロクロロチアジド単剤から開始","c":"スピロノラクトン単剤から開始","d":"アテノロール単剤から開始","e":"エナラプリル+ヒドロクロロチアジドの配合剤"},"format":"単一","correct":"a","explanation":"II度高血圧では2剤併用考慮、糖尿病性腎症（蛋白尿）にはRA系阻害薬が第一選択（腎保護）。さらにロサルタンは尿酸低下作用があり痛風例に好適。Ca拮抗薬を併用し降圧効果増強と浮腫相殺。サイアザイド単剤は痛風で禁忌相当。スピロノラクトンは初期単剤としては選ばれない。アテノロールは脳卒中予防効果に劣る上、糖尿病で耐糖能・尿酸悪化。GL p.96-97、SU p.146参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=98","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=146"},{"no":17,"stem":"降圧薬使用中の高K血症（K 6.0 mEq/L）の対応として誤っているのはどれか。","choices":{"a":"RA系阻害薬・MR拮抗薬の減量・中止を検討する","b":"K排泄促進薬（ポリスチレンスルホン酸・パチロマー）の併用を考慮","c":"腎機能・脱水・酸塩基平衡を評価する","d":"K含有食品（バナナ・果物・芋類）の摂取制限を指導","e":"サイアザイド系利尿薬の追加を直ちに中止する"},"format":"単一","correct":"e","explanation":"サイアザイド系利尿薬・ループ利尿薬はK排泄を促進するため、高K血症時にむしろ追加・併用が有用な場合がある。RA系阻害薬・MR拮抗薬・ARNI・K保持性利尿薬は高K血症リスクで減量・中止検討。K排泄補助薬（パチロマー・ジルコニウムシクロケイ酸ナトリウム）でRA系阻害薬継続を可能にする戦略もある。食事指導も重要。腎機能・脱水・代謝性アシドーシスは増悪因子で精査が必要。GL p.95、SU p.158参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=97","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=158"},{"no":18,"stem":"JSH2025のARNIに関する記述として正しいものを2つ選べ。","choices":{"a":"G1降圧薬として主要5クラスとは別枠で新たに位置づけられた","b":"ACE阻害薬との同時併用は血管浮腫リスクで禁忌","c":"降圧効果はARB単独と同等である","d":"ネプリライシン阻害でBNPの分解を促進する","e":"妊娠中も第一選択として使用できる"},"format":"複数","correct":"ab","explanation":"ARNI（サクビトリルバルサルタン）はJSH2025でG1降圧薬として新たに位置づけられた（主要5クラスのARB枠を補完）。ACE阻害薬との同時併用は両薬剤のブラジキニン蓄積で血管浮腫リスクが著明上昇し禁忌、切替時36時間休薬必要。降圧効果はARB単独より強力。ネプリライシンはBNP/ANP/CNPを分解する酵素であり、ARNIはこれを阻害し利尿ペプチド作用を増強（分解促進ではない）。妊娠中は禁忌。GL p.102、SU p.160参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=104","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=160"},{"no":19,"stem":"降圧薬と頻脈に関する記述として正しいのはどれか。","choices":{"a":"ジヒドロピリジン系Ca拮抗薬は反射性頻脈を起こしうる","b":"ベラパミルは頻脈を悪化させる","c":"β遮断薬は心拍数を上昇させる","d":"ARBは強い頻脈作用を持つ","e":"サイアザイド系利尿薬は徐脈を起こす"},"format":"単一","correct":"a","explanation":"短時間作用型のジヒドロピリジン系Ca拮抗薬（ニフェジピン即効カプセル等）は急激な血管拡張で反射性交感神経亢進→頻脈を起こしうるため、長時間作用型（アムロジピン・アゼルニジピン等）が推奨される。ベラパミル・ジルチアゼム（非ジヒドロピリジン系）は心抑制・徐脈作用あり頻脈には有効。β遮断薬は心拍数を低下させる。ARBは心拍数に大きな影響なし。サイアザイドも頻脈/徐脈には大きな影響なし。GL p.99、SU p.144参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=101","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=144"},{"no":20,"stem":"高血圧治療開始時の患者説明として、JSH2025で重視される観点として正しいのはどれか。","choices":{"a":"降圧薬は一度開始したら一生中止できない旨を必ず説明","b":"共同意思決定（SDM）に基づきベネフィット・リスク・選択肢を説明する","c":"副作用説明はアドヒアランスを下げるので最小限にとどめる","d":"服薬時刻は患者の都合より科学的根拠を優先し医師が一律に決める","e":"家庭血圧測定は不要であり診察室血圧のみで管理する"},"format":"単一","correct":"b","explanation":"JSH2025は共同意思決定（Shared Decision Making, SDM）を強調。患者の価値観・ライフスタイル・併存症を考慮しベネフィット（脳心血管病予防）・リスク（副作用・コスト）・治療選択肢を十分説明する。降圧薬は条件次第で減量・中止も可能。副作用は適切に説明することでアドヒアランス向上に寄与。投与時刻は患者ライフスタイルに合わせ調整（chronotherapyの個別化）。家庭血圧測定は治療管理の中心。GL p.94-95、SU p.131参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=96","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=131"},{"no":21,"stem":"降圧薬選択基準について正しいのはどれか。1つ選べ。","choices":{"a":"アンジオテンシン受容体ネプリライシン阻害薬はG1降圧薬に分類される。","b":"β遮断薬はG2降圧薬である。","c":"α遮断薬はG3降圧薬である。","d":"RAS阻害薬は最初の1剤として投与してはならない。","e":"ループ利尿薬はG1降圧薬に準ずるので最初の1剤として使用できる。"},"format":"単一","correct":"a","explanation":"JSH2025 第8章「薬物治療」では、主要降圧薬の併用STEPでG1（第一選択）にはACE阻害薬、ARB、Ca拮抗薬、サイアザイド系利尿薬、およびARNI（アンジオテンシン受容体ネプリライシン阻害薬）が含まれるとされる。BのB遮断薬はG2、Cのα遮断薬はG3に分類される。Dは誤り（RAS阻害薬は最初の1剤として推奨される）。Eは誤り（ループ利尿薬はG1ではなく、心不全等の積極的適応がある場合に限る）。よってAが正解。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=99","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=132","from_past_exam":true,"note":"解説（10.43.12『降圧薬の併用STEPにおけるグループ分類』、10.44.06『主要降圧薬の積極的適応と禁忌・重要な注意を要する病態』JSH2025、10.44.21『STEP1で積極的適応がない場合のG1降圧薬の選択例』）が提示されたが、正解ハイライトは確認できず。\n正解ハイライト未確認のため自信度medium。AのARNIがG1分類はJSH2025での新規記載。","source_image":"筆記試験/スクリーンショット 2026-05-17 10.42.32.png","confidence":"medium","slide_section":"7 降圧薬選択基準"}]}],"gl_pages":[94,107],"su_pages":[131,170]},{"id":9,"title":"高血圧性臓器障害の診断と高血圧治療","is_clinical":true,"part":2,"key_topics":["脳血管障害（急性期・慢性期・無症候性）","心疾患（心肥大・冠動脈疾患・心不全・心房細動・弁膜症）","腎疾患（CKD・DKD・慢性維持透析）","血管疾患（大動脈疾患・末梢動脈疾患）","認知機能障害","CQ8: 脳卒中の既往のある高血圧患者の降圧目標130/80mmHg未満","CQ9: HFpEFにおいて収縮期血圧130mmHg未満","CQ10: CKD合併高血圧に対して130/80mmHg未満","CQ11: 蛋白尿のあるCKD/糖尿病非合併CKDにおける降圧療法の第一選択薬"],"sets":[{"day":1,"title":"脳・心疾患の臓器障害と治療","questions":[{"no":1,"stem":"脳梗塞急性期に対するrt-PA（アルテプラーゼ）静注療法を行ううえで、投与前に達成すべき血圧基準として正しいのはどれか。","choices":{"a":"SBP<220 mmHg かつ DBP<120 mmHg","b":"SBP<200 mmHg かつ DBP<115 mmHg","c":"SBP<185 mmHg かつ DBP<110 mmHg","d":"SBP<160 mmHg かつ DBP<100 mmHg","e":"SBP<140 mmHg かつ DBP<90 mmHg"},"format":"単一","correct":"c","explanation":"脳卒中治療ガイドライン2021[改訂2023]およびJSH2025第9章脳血管障害急性期では、rt-PA静注療法の投与前血圧条件は『SBP<185 mmHgかつDBP<110 mmHg』と明示される。投与後24時間はSBP<180/DBP<105 mmHgに維持。これを超えると頭蓋内出血リスクが急増する。降圧不能例ではrt-PAは禁忌（適応外）。ニカルジピンorラベタロール静注で降圧。GL p.110-111参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=112","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=174"},{"no":2,"stem":"脳出血急性期の血圧管理について、JSH2025の推奨として最も適切なのはどれか。","choices":{"a":"発症直後はSBP 180 mmHg程度で経過観察する","b":"発症1時間以内にSBPを140 mmHg未満へ低下させる","c":"発症24時間以降に初めて降圧を開始する","d":"拡張期血圧のみを管理し収縮期血圧は介入しない","e":"脳灌流維持のため降圧は禁忌である"},"format":"単一","correct":"b","explanation":"JSH2025第9章脳血管障害急性期では、自発性脳出血急性期はできるだけ早期（発症1時間以内）にSBP<140 mmHgを目標に降圧することが推奨される（INTERACT2、ATACH-2試験に基づく）。早期降圧で血腫増大抑制と神経学的予後改善が期待される。ただし急激な降圧で脳灌流が低下するリスクもあり、ニカルジピン持続静注で慎重に調整する。発症24時間以降も130-140台を維持。GL p.111参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=113","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=175"},{"no":3,"stem":"脳卒中既往のある高血圧患者の慢性期の降圧目標について、JSH2025・CQ8の推奨として正しいのはどれか。","choices":{"a":"診察室血圧140/90 mmHg未満","b":"診察室血圧130/80 mmHg未満","c":"診察室血圧120/70 mmHg未満","d":"高齢者は150/90 mmHgで十分","e":"再発予防効果は証明されていないため一律目標はない"},"format":"単一","correct":"b","explanation":"JSH2025 CQ8では、脳卒中既往のある高血圧患者に対して『診察室血圧130/80 mmHg未満』が推奨される（SPS3・PROGRESS・RECOVER-Strokeなどのメタ解析で再発抑制効果が示される）。家庭血圧では125/75 mmHg未満が目安。再発予防にはRA系阻害薬・Ca拮抗薬・利尿薬等が用いられ、薬剤選択以上に130/80未満の達成が重要。GL p.115参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=117","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=178"},{"no":4,"stem":"MRIで認められる無症候性脳血管病変について誤っているのはどれか。","choices":{"a":"無症候性ラクナ梗塞は将来の脳卒中・認知症リスクを上昇させる","b":"脳深部白質病変（PVH/DWMH）は高血圧と強く関連する","c":"微小出血（cerebral microbleeds）はMRI T2*/SWIで検出される","d":"脳血管障害の無症候性病変は降圧治療の対象とはならない","e":"拡大血管周囲腔は加齢・高血圧と関連する"},"format":"単一","correct":"d","explanation":"MRIで認められる無症候性ラクナ梗塞・白質病変（PVH/DWMH）・微小出血・拡大血管周囲腔は、いずれも将来の脳卒中・認知症の独立危険因子であり、降圧治療を含む包括的リスク管理の対象となる。a・b・c・eはJSH2025の記載と合致。dは誤り——無症候性であっても積極的な降圧治療の適応で、診察室血圧130/80 mmHg未満を目標とすべき。GL p.113-114参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=115","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=177"},{"no":5,"stem":"高血圧性左室肥大（LVH）の診断について正しいのはどれか。","choices":{"a":"心電図のSokolow-Lyon指数はSV1+RV5(またはV6)≧35 mmで陽性","b":"心エコー左室心筋重量係数（LVMI）は男性≧95 g/m²で肥大","c":"心電図感度は心エコーより高く、スクリーニングには心電図が最適","d":"LVHは降圧治療で退縮しないため経過観察のみでよい","e":"LVHは脳心血管病リスクとは無関係である"},"format":"単一","correct":"a","explanation":"Sokolow-Lyon指数はSV1+RV5(またはV6)≧35 mmで陽性とするのが標準。bは誤り（LVMIによる肥大の基準は男性≧115 g/m²、女性≧95 g/m²で女性の方が低い）。cも誤り（心電図は感度が低く心エコーがゴールドスタンダード）。d・eも誤り（LVHはARB等の降圧治療で退縮しLIFE試験等で心血管イベント抑制が示された独立した予後規定因子）。aが正解。GL p.116-117参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=118","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=181"},{"no":6,"stem":"高血圧合併冠動脈疾患（慢性冠症候群CCS）における降圧治療で正しいのはどれか。","choices":{"a":"降圧目標は診察室血圧130/80 mmHg未満","b":"DBPは50 mmHg未満まで低下させても問題ない","c":"β遮断薬は冠動脈疾患では原則禁忌","d":"Ca拮抗薬は冠動脈疾患には禁忌","e":"RA系阻害薬は冠動脈疾患患者では使用しない"},"format":"単一","correct":"a","explanation":"JSH2025では冠動脈疾患合併高血圧（CCS）の降圧目標は130/80 mmHg未満。ただしDBPの過度な低下（<60-70 mmHg）はJ-curve現象による冠灌流低下と心血管イベント増加のリスクがあり注意が必要。β遮断薬（心拍数低下による心筋酸素需要減）、Ca拮抗薬（冠拡張）、RA系阻害薬（リモデリング抑制）はいずれも積極的適応。SCAD/CCSではβ遮断薬とRA系阻害薬が予後改善で重要。GL p.118-119参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=120","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=184"},{"no":7,"stem":"心不全リスクのステージ分類（2025年改訂版心不全診療ガイドライン）について、ステージA（心不全リスクあり）の構成因子として該当しないのはどれか。","choices":{"a":"高血圧","b":"脂質異常症","c":"糖尿病","d":"慢性腎臓病","e":"肥満"},"format":"単一","correct":"b","explanation":"2025年改訂版心不全診療ガイドラインのステージA（『心不全リスクあり』、構造的・機能的心疾患なし）の主要リスクとして『高血圧・糖尿病・慢性腎臓病・肥満』が挙げられる。脂質異常症は冠動脈疾患リスクとしては重要だが、ステージAの構成因子として明示はされていない（高血圧・糖尿病・CKD・肥満が心不全発症の直接因子として強調される）。過去問Q9と一致。GL p.118参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=120","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=187"},{"no":8,"stem":"HFrEF（左室駆出率の低下した心不全、LVEF<40%）の高血圧合併例で第一選択となる薬剤の組合せはどれか。","choices":{"a":"ARNI（またはACE阻害薬/ARB）＋β遮断薬＋MR拮抗薬＋SGLT2阻害薬","b":"Ca拮抗薬＋α遮断薬＋利尿薬","c":"ループ利尿薬単独療法","d":"ジヒドロピリジン系Ca拮抗薬＋β遮断薬のみ","e":"ARB＋直接的レニン阻害薬の併用"},"format":"単一","correct":"a","explanation":"HFrEF（LVEF<40%）の予後改善薬は『fantastic four』とされ、ARNI(またはACE阻害薬/ARB)＋β遮断薬＋MR拮抗薬＋SGLT2阻害薬の4剤併用が標準で、これら全てが降圧効果と心保護効果を兼ねる。非ジヒドロピリジン系Ca拮抗薬（ベラパミル・ジルチアゼム）は心収縮抑制でHFrEFに禁忌。α遮断薬単剤はALLHAT試験で心不全発症リスク増加のため避ける。GL p.120-121参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=122","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=189"},{"no":9,"stem":"HFpEF（左室駆出率の保たれた心不全、LVEF≧50%）合併高血圧の降圧治療について、JSH2025 CQ9の推奨として正しいのはどれか。","choices":{"a":"収縮期血圧140 mmHg未満を目標とする","b":"収縮期血圧130 mmHg未満を目標に降圧することを提案する","c":"収縮期血圧120 mmHg未満まで厳格に降圧する","d":"HFpEFでは降圧効果のエビデンスが乏しく目標値は設定しない","e":"DBPのみを管理しSBPは介入しない"},"format":"単一","correct":"b","explanation":"JSH2025 CQ9では『HFpEF（LVEF≧50%）合併高血圧でSBP<130 mmHgを目標とした降圧治療を提案する』（弱い推奨/エビデンスレベルC）。SPRINT/STEP試験等のサブ解析でHFpEFを含む心不全入院抑制効果が示唆される。HFpEFではSGLT2阻害薬（EMPEROR-Preserved・DELIVER）が予後改善で重要。SGLT2阻害薬・MR拮抗薬は降圧効果も併せ持つ。GL p.121参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=123","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=190"},{"no":10,"stem":"急性心不全による高血圧緊急症の初期治療として最も適切なのはどれか。","choices":{"a":"ニトログリセリン静注で前負荷・後負荷を軽減する","b":"ニカルジピンのワンショット静注で速やかに降圧","c":"β遮断薬の静注で心拍数低下を最優先","d":"経口Ca拮抗薬の舌下投与で迅速降圧","e":"輸液負荷で循環血液量を増やしてから降圧"},"format":"単一","correct":"a","explanation":"急性心不全/肺水腫を伴う高血圧緊急症ではニトログリセリン（または硝酸イソソルビド）静注が第一選択。静脈系を拡張して前負荷を低下、高用量では後負荷も軽減し肺うっ血を速やかに改善する。ニカルジピンのワンショット静注は反射性頻脈・過度の降圧で禁忌、Ca拮抗薬舌下も同様。β遮断薬静注は急性非代償性心不全では避け、安定後に経口導入。GL p.121参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=123","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=191"},{"no":11,"stem":"高血圧と心房細動（AF）の関係について誤っているのはどれか。","choices":{"a":"高血圧はAF発症の独立した危険因子である","b":"RA系阻害薬は新規AF発症抑制効果が示唆される","c":"AF合併高血圧では脳卒中リスクはCHADS2/CHA2DS2-VAScスコアで評価する","d":"降圧治療によりAF発症の二次予防効果も期待できる","e":"AFの治療目標は洞調律維持のみであり、血圧コントロールは無関係"},"format":"単一","correct":"e","explanation":"AFと高血圧は密接に関連し、降圧治療はAFの新規発症・再発抑制と脳卒中予防の両面で重要。RA系阻害薬は心房構造的・電気的リモデリング抑制を介して新規AF発症を減らす（メタ解析）。CHA2DS2-VAScには高血圧（H）が項目として含まれ、AF合併高血圧は脳塞栓症リスクが高い。eは『血圧コントロール無関係』が明らかに誤り——血圧管理はAF管理の中核である。GL p.123-124参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=125","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=193"},{"no":12,"stem":"高血圧合併AFで抗凝固薬を併用している患者の血圧管理について正しいのはどれか。","choices":{"a":"抗凝固薬使用時は出血リスクが高いため降圧目標は緩めの150/90 mmHgとする","b":"抗凝固薬使用中はむしろ厳格な血圧管理（130/80 mmHg未満）が脳出血予防に重要","c":"抗凝固薬とCa拮抗薬の併用は禁忌である","d":"DOAC使用中はRA系阻害薬を中止すべきである","e":"ワルファリン使用中はARBを使用してはならない"},"format":"単一","correct":"b","explanation":"抗凝固薬服用中の高血圧患者は脳出血リスクが高く、JSH2025では厳格な血圧管理（130/80 mmHg未満）がむしろ重要とされる（収縮期血圧高値ほど抗凝固薬関連頭蓋内出血が増加するため）。抗凝固薬とCa拮抗薬・RA系阻害薬の併用に絶対禁忌はない（ベラパミル・ジルチアゼム等のCYP3A4/P-gp阻害でDOAC濃度上昇に注意）。a・c・d・eは誤り。GL p.124参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=126","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=194"},{"no":13,"stem":"高度大動脈弁狭窄症（severe AS）合併高血圧における降圧治療の注意点として正しいのはどれか。","choices":{"a":"高度ASでは降圧治療は禁忌である","b":"高度ASでも降圧は可能だが、過度な前負荷低下（特にニトログリセリン）に注意する","c":"β遮断薬は高度ASで第一選択である","d":"ループ利尿薬を大量投与しても循環動態は安定する","e":"ARNIは高度ASに対する積極的適応である"},"format":"単一","correct":"b","explanation":"従来高度AS合併高血圧は降圧禁忌とされたが、JSH2025では『降圧は可能だが慎重に』が原則。特に重症ASは前負荷依存性のため、ニトログリセリン等の血管拡張薬で前負荷を急激に下げると失神・急死を来すリスクがあり、少量から開始しゆっくり調整する。β遮断薬は心拍数低下で拡張期充満時間を確保し有用だが第一選択とまでは言えず、RA系阻害薬・Ca拮抗薬も用いる。aは誤り（禁忌ではない）。GL p.125参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=127","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=196"},{"no":14,"stem":"65歳男性、高血圧の経過観察中に心電図でV5でR波高値、ストレイン型ST-T変化を認めた。心エコーで左室壁厚13 mm、LVMI 130 g/m²。次の対応として最も適切なのはどれか。","choices":{"a":"LVHは加齢性変化のため経過観察のみ","b":"降圧目標を130/80 mmHg未満とし、ARB/ACE阻害薬を含むレジメンを開始する","c":"β遮断薬単剤で十分","d":"外科的治療（中隔縮小術）の適応である","e":"Ca拮抗薬は禁忌"},"format":"単一","correct":"b","explanation":"本症例は心電図ストレイン型・心エコーLVMI 130 g/m²（男性≧115 g/m²）の高血圧性LVH。LVHは独立した心血管危険因子（心不全・冠動脈疾患・心房細動・突然死）であり、診察室130/80 mmHg未満を目標に積極的降圧。LIFE試験ではARB（ロサルタン）がアテノロールよりLVH退縮効果・心血管予後で優れた。Ca拮抗薬・利尿薬も使用可で、β遮断薬単剤よりRA系阻害薬を優先する。GL p.117参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=119","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=182"},{"no":15,"stem":"急性大動脈解離（Stanford A型/B型いずれも）の急性期血圧管理として正しいのはどれか。","choices":{"a":"SBPを120 mmHg程度・心拍数60/分以下を目標に静注降圧薬で厳格管理する","b":"SBP 180 mmHg程度で経過観察可","c":"Ca拮抗薬のみで管理する","d":"心拍数増加させて拡張期延長を狙う","e":"経口降圧薬のみで対応する"},"format":"単一","correct":"a","explanation":"急性大動脈解離（Stanford A/B型いずれも）急性期はSBP<120 mmHg・心拍数<60/分を目標に、ラベタロール／エスモロール／ニカルジピン等の静注薬で厳格に降圧する（impulse control）。dP/dt（左室収縮速度）の低下が解離進展・破裂防止に最重要。β遮断薬を先行投与し心拍を抑えてから血管拡張薬を加える順序が原則（血管拡張薬単独では反射性頻脈でdP/dtが上昇する）。GL p.131-132参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=133","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=210"},{"no":16,"stem":"75歳女性、ADL自立、高血圧と陳旧性ラクナ梗塞の既往。家庭血圧平均142/82 mmHg。降圧目標として最も適切なのはどれか。","choices":{"a":"家庭血圧145/85 mmHg未満","b":"家庭血圧135/85 mmHg未満","c":"家庭血圧125/75 mmHg未満","d":"家庭血圧115/65 mmHg未満","e":"高齢のため一律目標は設定しない"},"format":"単一","correct":"c","explanation":"脳卒中（陳旧性ラクナ梗塞）既往あり、ADL自立・忍容性ありの75歳女性ではJSH2025 CQ8に従い診察室130/80未満（家庭125/75未満）が目標。ADL自立であれば75歳以上でも厳格降圧（SBP<130）の適応で、SPRINT・STEP試験等のサブ解析でも高齢者で心血管・脳卒中再発抑制が示される。フレイルが進行した症例では個別調整。a・b・d・eは目標が不適切。GL p.115、過去問の高齢者高血圧と整合。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=117","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=179"},{"no":17,"stem":"HFrEFに対するARNI（サクビトリル・バルサルタン）使用時の注意点として正しいのはどれか。","choices":{"a":"ACE阻害薬から直接ARNIへ即日切替が安全","b":"ACE阻害薬中止後36時間以上空けてからARNIを開始する","c":"ARNIとARBは併用が推奨される","d":"ARNIは妊娠中も安全に使用できる","e":"血管浮腫の既往例にも問題なく投与可能"},"format":"単一","correct":"b","explanation":"ARNI（サクビトリル・バルサルタン）はネプリライシン阻害によりブラジキニン・ナトリウム利尿ペプチド系を上昇させる。ACE阻害薬と併用するとブラジキニン分解抑制が重畳し血管浮腫リスクが上昇するため、ACE阻害薬中止後36時間以上のwashout後にARNIを開始する。ARNIとARB併用は同一クラス重複で禁忌、妊娠・血管浮腫既往も絶対禁忌。aは即日切替の点で誤り。GL p.121参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=123","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=190"},{"no":18,"stem":"高血圧性脳症（hypertensive encephalopathy）の臨床像として誤っているのはどれか。","choices":{"a":"頭痛・嘔吐・意識障害・痙攣などを呈する","b":"後頭葉優位の可逆性白質脳症（PRES様変化）をMRIで認めることがある","c":"急速かつ重度の血圧上昇により脳血流自動調節能の破綻が病態","d":"治療は数時間以内に血圧を140/90 mmHgまで一気に低下させる","e":"ニカルジピン持続静注など可調節性の高い静注薬を用いる"},"format":"単一","correct":"d","explanation":"高血圧性脳症は急速降圧が必要だが、過度に急激な降圧は脳血流自動調節能の上限がずれた高血圧患者で逆に脳虚血・神経学的悪化を招くため段階的降圧が原則。最初の1時間で平均血圧（MAP）を20-25%程度低下、その後2-6時間で160/100 mmHg程度を目安に段階的に降圧し、24-48時間で目標値に到達させる。一気に140/90まで一時間以内で下げるのは誤り。ニカルジピン持続静注などを用いる。GL p.110参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=112","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=176"},{"no":19,"stem":"高血圧合併心房細動に対する降圧薬選択について、積極的適応とされるのはどれか。2つ選べ。","choices":{"a":"ARB/ACE阻害薬","b":"ヒドロクロロチアジド","c":"α遮断薬","d":"MR拮抗薬","e":"硝酸薬"},"format":"複数","correct":"ad","explanation":"高血圧合併AFの上流治療（upstream therapy）として、心房構造的・電気的リモデリング抑制効果のあるRA系阻害薬(ARB/ACE阻害薬)とMR拮抗薬がJSH2025で積極的適応とされる。サイアザイドは降圧効果はあるがAF自体への積極的適応ではなく、低K血症で逆に不整脈を助長する可能性がある。α遮断薬・硝酸薬もAFには積極的適応とならない。LIFE試験等でARBによるAF発症抑制が示されている。GL p.123-124参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=125","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=193"},{"no":20,"stem":"心不全予防のための高血圧管理について正しいのはどれか。2つ選べ。","choices":{"a":"ステージA（リスクあり）に対する降圧治療は心不全発症抑制に有効","b":"高血圧合併でステージBにすすんだ場合、無症状でもRA系阻害薬の導入が推奨される","c":"心不全予防のためにはDBPを最大限低下させる方が効果的","d":"高血圧があってもLVEF正常なら心不全予防の介入は不要","e":"心不全発症後の降圧は予後改善に寄与しない"},"format":"複数","correct":"ab","explanation":"JSH2025・心不全診療ガイドライン2025では、高血圧合併の心不全リスク段階（ステージA）からの早期降圧介入がSPRINT試験等で心不全発症抑制に有効と示された。構造的心疾患のあるステージB（LVH・LVEF低下・無症候性心筋梗塞既往等）では無症状でもRA系阻害薬・β遮断薬で予防的介入。DBP過低下はJ-curveで害があり過度な降圧は避ける。HFpEF/HFrEFいずれも降圧は予後改善に寄与。GL p.118-121参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=120","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=187"}]},{"day":2,"title":"腎・血管疾患・認知機能と治療","questions":[{"no":1,"stem":"CKD診療ガイド2024およびJSH2025における蛋白尿陽性の判定基準として正しいのはどれか。","choices":{"a":"尿蛋白/Cr比 0.10 g/gCr 以上","b":"尿蛋白/Cr比 0.15 g/gCr 以上","c":"尿蛋白/Cr比 0.30 g/gCr 以上","d":"尿蛋白/Cr比 0.50 g/gCr 以上","e":"尿蛋白/Cr比 1.0 g/gCr 以上"},"format":"単一","correct":"b","explanation":"CKD診療ガイド2024・JSH2025第9章腎疾患では、蛋白尿陽性の判定は『尿蛋白/Cr比 0.15 g/gCr 以上』。0.50 g/gCr以上は『高度蛋白尿』としてより厳格管理。糖尿病ではアルブミン尿区分（A1<30、A2 30-299、A3≧300 mg/gCr）を用いる。過去問Q10と整合。GL p.124参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=126","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=200"},{"no":2,"stem":"CKD合併高血圧の降圧目標について、JSH2025 CQ10の推奨として正しいのはどれか。","choices":{"a":"診察室血圧140/90 mmHg未満","b":"診察室血圧135/85 mmHg未満","c":"診察室血圧130/80 mmHg未満","d":"診察室血圧120/70 mmHg未満","e":"蛋白尿の有無で目標を分け、蛋白尿陰性なら140/90、陽性なら130/80"},"format":"単一","correct":"c","explanation":"JSH2025 CQ10ではCKD合併高血圧に対し、蛋白尿の有無によらず一律に『診察室血圧130/80 mmHg未満』が推奨される（SPRINTのCKDサブ解析、ACCORD等のメタ解析で心血管・全死亡抑制効果あり）。家庭血圧では125/75 mmHg未満。従来の蛋白尿有/無で目標を分ける考え方（旧JSH）から一本化された。高齢CKD例も忍容性をみつつ同目標を目指す。GL p.125-126参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=127","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=202"},{"no":3,"stem":"蛋白尿のあるCKD（糖尿病非合併）高血圧における降圧療法の第一選択薬として、JSH2025 CQ11が推奨するのはどれか。","choices":{"a":"ACE阻害薬またはARB（RA系阻害薬）","b":"ジヒドロピリジン系Ca拮抗薬","c":"サイアザイド系利尿薬","d":"β遮断薬","e":"α遮断薬"},"format":"単一","correct":"a","explanation":"JSH2025 CQ11では『蛋白尿のあるCKD（糖尿病非合併）の降圧第一選択薬はACE阻害薬またはARB（RA系阻害薬）』を強く推奨。RA系阻害薬は輸出細動脈優位の拡張により糸球体内圧を低下させ、蛋白尿減少と腎機能保護効果が示される（REIN・AASK・RENAAL・IDNT等のRCT）。蛋白尿陰性例ではARB/ACEi・Ca拮抗薬・サイアザイド系利尿薬から症例に応じて選択する。GL p.126参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=128","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=204"},{"no":4,"stem":"糖尿病性腎症（DKD）における降圧治療と腎保護薬について誤っているのはどれか。","choices":{"a":"ACE阻害薬/ARBはアルブミン尿のあるDKDの第一選択である","b":"SGLT2阻害薬はeGFR>20 mL/min/1.73m²の蛋白尿陽性CKD（糖尿病合併・非合併問わず）で腎保護効果が示されている","c":"MR拮抗薬（フィネレノン）はDKDの腎・心血管イベント抑制で推奨される","d":"ACE阻害薬とARBの併用は腎保護効果が高くDKDの標準治療である","e":"高K血症リスクのためK値モニタリングが重要"},"format":"単一","correct":"d","explanation":"ACE阻害薬とARBの併用（dual RA blockade）は腎保護効果の上乗せがなく、むしろ高K血症・急性腎機能悪化・低血圧リスクを増すことがONTARGET・VA-NEPHRON-D試験で示され推奨されない。a（ACE阻害薬/ARBは第一選択）、b（SGLT2阻害薬の腎保護、DAPA-CKD・EMPA-KIDNEY）、c（フィネレノンのFIDELIO-DKD/FIGARO-DKDでの腎・心保護）、e（高K血症モニタリング）はすべて正しい。GL p.127-128参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=129","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=205"},{"no":5,"stem":"慢性維持透析患者の血圧管理について正しいのはどれか。","choices":{"a":"降圧目標は透析前血圧で140/90 mmHg未満を目安にする","b":"透析中の血圧低下を防ぐため降圧薬は積極的に投与する","c":"ドライウェイト管理は血圧コントロールには関係しない","d":"透析患者では家庭血圧測定は不要","e":"透析患者の至適降圧目標を示す質の高いRCTは豊富にある"},"format":"単一","correct":"a","explanation":"慢性維持透析患者の至適血圧目標を示す質の高いRCTは乏しいが、JSH2025では透析前血圧で140/90 mmHg未満を目安とする。最重要なのはドライウェイト（DW）の適正化による体液量管理で、降圧薬は補助的位置づけ。透析中の血圧低下（IDH）を起こさないよう透析日に内服する降圧薬の選択・投与時刻を工夫する。家庭血圧・透析間血圧の記録が予後予測に有用。eは誤り（質の高いRCTは少ない）。GL p.128参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=130","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=207"},{"no":6,"stem":"RA系阻害薬投与開始2週後にCrが0.9→1.5 mg/dLへ上昇した患者で、最も疑うべき病態はどれか。","choices":{"a":"両側性腎動脈狭窄症（または機能的単腎の片側狭窄）","b":"原発性アルドステロン症","c":"尿細管間質性腎炎","d":"腎前性脱水のみ（疑う必要なし）","e":"ACE阻害薬の薬効発現として正常範囲"},"format":"単一","correct":"a","explanation":"RA系阻害薬投与後の急激なCr上昇（30%以上、特に2週間以内）は、両側性腎動脈狭窄症や機能的単腎の片側腎動脈狭窄を強く示唆する所見。これらの病態ではGFR維持を輸出細動脈収縮（アンジオテンシンII依存性）に依存しているため、RA系阻害により糸球体内圧が急落しGFRが低下する。RA系阻害薬を中止し、腎エコーで腎サイズの左右差・MRA/CTAで腎動脈評価を行う。過去問Q17（二次性高血圧の所見）と整合。GL p.130参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=132","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=208"},{"no":7,"stem":"腹部大動脈瘤（AAA）合併高血圧の管理について正しいのはどれか。","choices":{"a":"AAAの拡大を抑制する目的でβ遮断薬が第一選択である","b":"AAAでは降圧目標は緩めに（150/90 mmHg程度）とすべき","c":"Ca拮抗薬はAAAでは禁忌である","d":"AAAの破裂リスク低減のため厳格な血圧管理（130/80 mmHg未満）が重要","e":"AAAでは禁煙より降圧の方が拡大予防に有効である"},"format":"単一","correct":"d","explanation":"腹部大動脈瘤（AAA）合併高血圧では厳格な血圧管理（診察室<130/80 mmHg）が拡大・破裂予防に重要。かつてβ遮断薬がAAA拡大抑制で第一選択とされたが、近年のメタ解析・RCT（PIVOTAL等）でAAA拡大抑制効果は否定的。禁煙が最も強力な拡大予防策で、脂質管理（スタチン）・血糖管理も合わせる。Ca拮抗薬・RA系阻害薬の使用は問題ない。a・b・c・eはいずれも誤り。GL p.132参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=134","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=212"},{"no":8,"stem":"末梢動脈疾患（PAD）合併高血圧における降圧治療について誤っているのはどれか。","choices":{"a":"降圧目標は130/80 mmHg未満","b":"ABI≦0.90は下肢動脈病変のスクリーニング指標である","c":"ARB/ACE阻害薬・Ca拮抗薬は安全に使用できる","d":"β遮断薬はPADでは絶対禁忌であり、虚血を増悪させるため使用してはならない","e":"禁煙・脂質管理・抗血小板療法を併用する"},"format":"単一","correct":"d","explanation":"β遮断薬は理論的にβ2受容体阻害による末梢血管収縮が懸念されたが、近年のメタ解析でPAD（重症虚血肢を除く軽中等症）への影響は実臨床上問題なく、跛行距離を悪化させないことが示されている。冠動脈疾患・心不全を合併する場合はむしろ積極的適応となる。『絶対禁忌』とまでは言えない（dが誤り）。a・b・c・eは正しい——降圧目標130/80未満、ABI≦0.90が診断、ARB/Ca拮抗薬は安全、禁煙・抗血小板療法併用。GL p.133参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=135","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=214"},{"no":9,"stem":"中年期の高血圧と認知症リスクの関係について正しいのはどれか。","choices":{"a":"中年期高血圧は晩年の認知症（Alzheimer型・血管性とも）リスクを増加させる","b":"中年期の高血圧は将来の認知症と無関係である","c":"降圧治療は認知症リスクを増加させる","d":"認知症予防のためには血圧は高い方がよい","e":"認知症リスクには拡張期血圧のみが関与する"},"format":"単一","correct":"a","explanation":"JSH2025第9章認知機能障害では、中年期（midlife、40-60歳代）高血圧は晩年の認知症（Alzheimer型・血管性認知症・混合型・MCI）の独立した強力なリスク因子と明記されている。ARIC・Whitehall II・JPHC等の大規模コホート研究で確立した知見。SPRINT-MIND試験（2019）ではSBP<120 mmHg目標群でMCIリスクとMCI＋認知症複合エンドポイントが有意に低下。中年期からの降圧が認知症予防に重要。GL p.134参照。","gl_link":"https://ebook.m3.com/legacy-pcviewer/15491#page=136","su_link":"https://ebook.m3.com/legacy-pcviewer/15766#page=216"},{"no":10,"stem":"SPRINT-MIND試験の結果として正しいのはどれか。","choices":{"a":"厳格降圧群（SBP<120）で認知症（probable dementia）発症率は対照群（SBP<140）より有意に低かった","b":"厳格降圧群でMCI（軽度認知障害）の発症は有意に減少した","c":"厳格降圧群は脳萎縮を進行させた","d":"厳格降圧は認知症リスクを増
